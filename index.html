<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contratos L3A — Gestão Operacional SDAI</title>
<!-- defer: nenhuma das duas libs é usada durante o parse (XLSX só na importação, Chart só no
     dashboard após DOMContentLoaded), então não precisam mais bloquear o primeiro render -->
<script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
/* =========================================================================
   CONTRATOS L3A — SDAI MANAGER
   Design System v8.0 — fonte única de verdade para cores, tipografia,
   espaçamento, elevação e componentes. Substitui as camadas V5–V7
   acumuladas em versões anteriores (que conviviam com --blue, --premium-blue
   e --brand-blue simultaneamente). Nenhuma classe, id ou atributo usado
   pelo JavaScript foi removido ou renomeado — apenas a aparência.
   ========================================================================= */

/* ---------- 1. TOKENS ---------------------------------------------------- */
:root{
  /* Marca */
  --l3a-primary:#0B5FAD;        --l3a-primary-600:#0A4F92;   --l3a-primary-700:#073A6E;
  --l3a-primary-50:#EAF3FC;     --l3a-primary-100:#D3E7FA;
  --l3a-secondary:#0E2A44;      --l3a-secondary-700:#081A2C; --l3a-secondary-900:#050F1B;
  --l3a-accent:#0EA5B7;

  /* Semântica de status */
  --l3a-success:#15803D;   --l3a-success-bg:#E7F7EC;   --l3a-success-line:#BEE8C9;
  --l3a-warning:#B45309;   --l3a-warning-bg:#FDF3DF;   --l3a-warning-line:#F3DDA6;
  --l3a-danger:#B42318;    --l3a-danger-bg:#FCEAE9;    --l3a-danger-line:#F3C6C2;
  --l3a-info:#1D4ED8;      --l3a-info-bg:#EAF1FE;      --l3a-info-line:#C9DBFB;
  --l3a-neutral:#475569;   --l3a-neutral-bg:#EEF1F5;   --l3a-neutral-line:#D8DEE7;

  /* Superfícies e texto */
  --l3a-bg:#F3F6FA; --l3a-bg-soft:#EBF0F6; --l3a-surface:#FFFFFF;
  --l3a-border:#E2E8F1; --l3a-border-strong:#CBD6E4; --l3a-hover:#F2F6FB;
  --l3a-text:#101828; --l3a-text-soft:#51617A; --l3a-text-muted:#8695AB;
  --l3a-focus:#0B5FAD;

  /* Escala */
  --l3a-radius-sm:8px; --l3a-radius-md:12px; --l3a-radius-lg:18px; --l3a-radius-pill:999px;
  --l3a-shadow-sm:0 1px 2px rgba(16,24,40,.05),0 1px 1px rgba(16,24,40,.04);
  --l3a-shadow-md:0 8px 22px rgba(16,24,40,.08);
  --l3a-shadow-lg:0 22px 48px rgba(16,24,40,.14);
  --l3a-ease:cubic-bezier(.4,0,.2,1); --l3a-dur:160ms;
  --l3a-font:'Plus Jakarta Sans',Inter,'Segoe UI',Roboto,Arial,sans-serif;

  /* Aliases de compatibilidade — mantêm qualquer var(--x) legado apontando
     para o novo sistema, sem precisar tocar em nenhuma linha de JS */
  --bg:var(--l3a-bg); --panel:var(--l3a-secondary); --panel2:var(--l3a-secondary-700);
  --card:var(--l3a-surface); --line:var(--l3a-border); --text:var(--l3a-text);
  --muted:var(--l3a-text-muted); --blue:var(--l3a-primary); --blue2:var(--l3a-primary-700);
  --ok:var(--l3a-success); --bad:var(--l3a-danger); --warn:var(--l3a-warning);
  --chip:var(--l3a-primary-50); --gold:#C79A38; --shadow:var(--l3a-shadow-lg); --radius:var(--l3a-radius-lg);
  --brand-dark:var(--l3a-secondary); --brand-mid:var(--l3a-secondary-700); --brand-blue:var(--l3a-primary);
  --brand-soft:var(--l3a-bg); --brand-line:var(--l3a-border); --brand-text:var(--l3a-text);
  --brand-muted:var(--l3a-text-muted); --brand-radius:var(--l3a-radius-lg); --brand-shadow:var(--l3a-shadow-md);
  --brand-accent:var(--l3a-accent); --brand-primary:var(--l3a-primary); --brand-gold:#C79A38;
  --premium-blue:var(--l3a-primary); --premium-line:var(--l3a-border); --premium-muted:var(--l3a-text-muted);
  --premium-text:var(--l3a-text); --premium-navy:var(--l3a-secondary); --premium-surface:var(--l3a-surface);
  --premium-gold:#C79A38; --surface:var(--l3a-surface); --surface-2:var(--l3a-bg-soft); --text-main:var(--l3a-text);
}

/* ---------- 2. RESET & TIPOGRAFIA ---------------------------------------- */
*{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact}
html{-webkit-text-size-adjust:100%}
body{margin:0;font-family:var(--l3a-font);background:var(--l3a-bg);color:var(--l3a-text);
  font-size:14px;line-height:1.5;letter-spacing:-.011em;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer}
h1,h2,h3,h4{margin:0;font-family:var(--l3a-font);letter-spacing:-.02em;color:var(--l3a-text)}
p{margin:0}
a{color:var(--l3a-primary)}
::selection{background:var(--l3a-primary-100)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#c7d3e2;border-radius:99px}
::-webkit-scrollbar-track{background:transparent}

/* Foco de teclado visível + respeito a "reduzir movimento" */
a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,[tabindex]:focus-visible{
  outline:2px solid var(--l3a-focus);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion: reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}}

/* ---------- 3. LAYOUT — CASCA DO APP -------------------------------------- */
.app{display:grid;grid-template-columns:272px 1fr;min-height:100vh;transition:grid-template-columns var(--l3a-dur) var(--l3a-ease)}
.main{min-width:0;display:flex;flex-direction:column}
.content{padding:28px 32px 64px;max-width:1440px;width:100%;margin:0 auto}

/* ---------- 4. BARRA LATERAL ---------------------------------------------- */
.side{background:linear-gradient(190deg,var(--l3a-secondary) 0%,var(--l3a-secondary-700) 62%,var(--l3a-secondary-900) 100%);
  color:#e7eefb;padding:18px 12px 24px;position:sticky;top:0;height:100vh;overflow-y:auto;overflow-x:hidden;
  display:flex;flex-direction:column;gap:2px;box-shadow:6px 0 30px rgba(5,15,27,.18)}
.side::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14)}
.brandRow{display:flex;align-items:center;gap:8px;padding:6px 4px 14px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:6px}
.brand{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.logo{width:38px;height:38px;flex:0 0 38px;border-radius:var(--l3a-radius-md);background:linear-gradient(150deg,#fff,#eaf2fc);
  color:var(--l3a-primary-700);font-weight:800;font-size:12px;letter-spacing:.01em;display:grid;place-items:center;
  box-shadow:var(--l3a-shadow-sm);overflow:hidden}
.logo.hasImg{background-size:contain!important;background-position:center!important;background-repeat:no-repeat!important;
  background-color:#fff!important;color:transparent!important}
.brand b{display:block;font-size:14.5px;font-weight:800;letter-spacing:-.02em;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand span{display:none} /* subtítulo redundante com o cabeçalho/breadcrumb — removido da lateral (mantido no DOM/JS de applyBrand) */

/* Botão de recolher: discreto, somente ícone, ~34px — não deve competir visualmente com a navegação */
.sideToggle{display:flex;align-items:center;justify-content:center;flex:0 0 34px;width:34px;height:34px;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);color:#dce8f8;border-radius:var(--l3a-radius-md);padding:0;transition:background var(--l3a-dur) var(--l3a-ease)}
.sideToggle:hover{background:rgba(255,255,255,.14)}
.sideToggle svg{display:block}

.navTitle{display:none!important} /* substituído pelo acordeão .navGroup/.navTitleBtn gerado via JS */
.navGroup{margin:10px 2px 2px}
.navTitleBtn{width:100%;border:0;background:transparent;color:#7f9dbe;text-transform:uppercase;letter-spacing:.11em;
  font-size:10.5px;font-weight:800;display:flex;align-items:center;justify-content:space-between;padding:10px 10px 6px;
  transition:color var(--l3a-dur) var(--l3a-ease)}
.navTitleBtn:hover{color:#b7cbe3}
.navTitleBtn b{font-size:10px;font-weight:900;transition:transform var(--l3a-dur) var(--l3a-ease)}
.navGroup:not(.open) .navTitleBtn b{transform:rotate(-90deg)}
.navItems{display:grid;gap:2px}
.navGroup:not(.open) .navItems{display:none}

.nav{display:flex;flex-direction:column}
.nav button{width:100%;border:0;background:transparent;color:#c3d4ea;text-align:left;padding:10.5px 12px;
  border-radius:var(--l3a-radius-md);margin:1px 0;font-weight:650;font-size:13.5px;display:flex;align-items:center;gap:11px;
  transition:background var(--l3a-dur) var(--l3a-ease),color var(--l3a-dur) var(--l3a-ease),transform var(--l3a-dur) var(--l3a-ease)}
.nav button i{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;flex:0 0 20px;
  color:#7f9dbe;transition:color var(--l3a-dur) var(--l3a-ease)}
.nav button i svg{display:block}
.nav button:hover{background:rgba(255,255,255,.07);color:#fff;transform:translateX(1px)}
.nav button:hover i{color:#fff}
.nav button.active{background:linear-gradient(120deg,var(--l3a-primary-600),var(--l3a-primary));color:#fff;
  box-shadow:0 8px 20px rgba(11,95,173,.35),inset 0 0 0 1px rgba(255,255,255,.12)}
.nav button.active i{color:#fff}

.app.sideCollapsed{grid-template-columns:68px 1fr}
.app.sideCollapsed .brand div:not(.logo),.app.sideCollapsed .navTitleBtn,.app.sideCollapsed .navGroup,
.app.sideCollapsed .nav button span,.app.sideCollapsed .clienteSelector{display:none}
.app.sideCollapsed .side{padding-left:8px;padding-right:8px}
.app.sideCollapsed .nav button{justify-content:center;gap:0}
.app.sideCollapsed .nav{gap:6px}
.app.sideCollapsed .nav > button{display:flex} /* mantém acesso visível mesmo com grupos ocultos */
/* Menu recolhido: os itens da árvore real (navFlatItem/navSubsysHead/navGrpHead/navLeaf) continuam
   visíveis e clicáveis — texto truncado com tooltip (title) via JS em buildNavTree(), sem esconder
   o acesso aos subsistemas. */
.app.sideCollapsed .navTree button{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-left:8px;padding-right:8px}
.app.sideCollapsed .navSectionLabel{opacity:.4}

/* ---------- 5. CABEÇALHO --------------------------------------------------- */
.top{height:72px;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--l3a-border);
  display:flex;align-items:center;justify-content:space-between;gap:16px;padding:0 28px;position:sticky;top:0;z-index:40}
.pageHead{display:flex;align-items:center;gap:12px;min-width:0}
.pageTitleWrap{min-width:0}
.top h1{font-size:23px;font-weight:800;letter-spacing:-.03em;line-height:1.1}
.top p{margin:4px 0 0;color:var(--l3a-text-muted);font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* Breadcrumb navegável (item 22) */
.crumb{border:0;background:none;padding:0;font:inherit;font-size:12.5px;color:var(--l3a-text-muted);cursor:pointer;border-radius:4px}
button.crumb:hover{color:var(--l3a-primary);text-decoration:underline}
.crumb.current{color:var(--l3a-text-soft);font-weight:700;cursor:default}
.crumbSep{margin:0 5px;color:var(--l3a-text-muted);opacity:.5;font-size:11px}
/* Badge discreto de escopo (item 11): cliente ativo × plataforma — selo pequeno, não um cartão. */
.scopeBadge{display:inline-block;margin-left:8px;padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:700;letter-spacing:.02em;vertical-align:middle}
.scopeCliente{background:var(--l3a-primary-50,#e8f1fc);color:var(--l3a-primary-700,#0b5fad)}
.scopeGlobal{background:#fdf1e7;color:#9a5b12}
.topMeta{display:flex;align-items:center;gap:10px;margin-left:auto}
.menuToggle{display:none;border:0;background:var(--l3a-primary);color:#fff;border-radius:var(--l3a-radius-md);
  padding:9px 11px;align-items:center;justify-content:center}

.syncFooter{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--l3a-border);background:var(--l3a-surface);
  border-radius:var(--l3a-radius-pill);padding:7px 12px;font-size:11.5px;font-weight:700;color:var(--l3a-text-soft);
  box-shadow:var(--l3a-shadow-sm)}
.syncDot{width:8px;height:8px;border-radius:50%;background:#9aa8bb;flex:0 0 8px}
.syncDot.ok{background:var(--l3a-success)} .syncDot.warn{background:var(--l3a-warning)} .syncDot.bad{background:var(--l3a-danger)}

.datetimePill{height:42px;min-width:104px;border:1px solid var(--l3a-border);background:var(--l3a-surface);
  border-radius:var(--l3a-radius-pill);padding:6px 14px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;line-height:1.1;box-shadow:var(--l3a-shadow-sm)}
.datetimePill span{font-size:10px;color:var(--l3a-text-muted);font-weight:750;text-transform:uppercase;letter-spacing:.03em}
.datetimePill b{font-size:13.5px;color:var(--l3a-text);letter-spacing:-.01em}

.topUser{cursor:pointer;display:flex;align-items:center;gap:9px;border:1px solid var(--l3a-border);background:var(--l3a-surface);
  border-radius:var(--l3a-radius-pill);padding:5px 12px 5px 6px;box-shadow:var(--l3a-shadow-sm);font-size:12px;
  color:var(--l3a-text-muted);max-width:200px;transition:box-shadow var(--l3a-dur) var(--l3a-ease)}
.topUser:hover{box-shadow:var(--l3a-shadow-md)}
.topUser:after{content:'▾';font-size:11px;color:var(--l3a-primary);font-weight:900;margin-left:2px}
.topUser b{display:block;color:var(--l3a-text);font-size:12.5px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topUser .uText{min-width:0;display:flex;flex-direction:column}
.topUser .uText small{font-size:10.5px;color:var(--l3a-text-muted);white-space:nowrap}
.avatar{width:30px;height:30px;flex:0 0 30px;border-radius:50%;display:inline-grid;place-items:center;
  background:linear-gradient(135deg,var(--l3a-primary),var(--l3a-accent));color:#fff;font-size:12px;font-weight:800}

.userMenu{position:fixed;right:28px;top:70px;z-index:100;background:var(--l3a-surface);border:1px solid var(--l3a-border);
  border-radius:var(--l3a-radius-md);box-shadow:var(--l3a-shadow-lg);display:none;min-width:220px;overflow:hidden}
.userMenu.show{display:block}
.userMenu button{display:flex;align-items:center;gap:9px;width:100%;border:0;background:var(--l3a-surface);text-align:left;
  padding:12px 14px;font-weight:700;font-size:13px;color:var(--l3a-text);transition:background var(--l3a-dur) var(--l3a-ease)}
.userMenu button:hover{background:var(--l3a-hover)}

/* ---------- 6. CARDS E KPIs ------------------------------------------------ */
.card,.premiumPanel{background:var(--l3a-surface);border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-lg);
  padding:20px;box-shadow:var(--l3a-shadow-md);margin-bottom:18px}
.premiumPanel h3{margin:0 0 4px;font-size:15.5px;font-weight:800;letter-spacing:-.02em;color:var(--l3a-text)}
.premiumPanel p{margin:0;color:var(--l3a-text-muted);font-size:13px;line-height:1.5}
.sectionTitle{font-size:12px;text-transform:uppercase;letter-spacing:.09em;color:var(--l3a-text-soft);font-weight:800;margin:0 0 14px}

.grid{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:14px}
.metric{background:var(--l3a-surface);border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-lg);padding:16px 18px;
  position:relative;overflow:hidden;box-shadow:var(--l3a-shadow-sm);transition:box-shadow var(--l3a-dur) var(--l3a-ease),transform var(--l3a-dur) var(--l3a-ease)}
.metric:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--l3a-primary),var(--l3a-accent))}
.metric:hover{box-shadow:var(--l3a-shadow-md);transform:translateY(-1px)}
.metric small{display:block;color:var(--l3a-text-muted);font-weight:800;text-transform:uppercase;font-size:12px;letter-spacing:.06em}
.metric strong{display:block;margin-top:6px;font-size:28px;font-weight:800;letter-spacing:-.02em;color:var(--l3a-text)}

.premiumGrid{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:14px}
.premiumStat{border:1px solid var(--l3a-border);background:linear-gradient(180deg,#fff,var(--l3a-bg-soft));
  border-radius:var(--l3a-radius-md);padding:14px 15px;min-height:80px;box-shadow:var(--l3a-shadow-sm)}
.premiumStat small{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--l3a-text-muted);font-weight:800}
.premiumStat b{display:block;margin-top:7px;font-size:22px;font-weight:800;letter-spacing:-.02em;color:var(--l3a-text)}
.premiumActions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.split2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.systemHero,.configHero{display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap}
.systemHeroBox p{margin:4px 0 0;color:var(--l3a-text-muted);font-size:13px}
.systemInfo{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:12px}
.softCard{border:1px solid var(--l3a-border);background:var(--l3a-bg-soft);border-radius:var(--l3a-radius-md);padding:12px 14px}
.softCard small{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--l3a-text-muted);font-weight:800}
.softCard b{display:block;margin-top:6px;font-size:19px;font-weight:800;color:var(--l3a-text)}
.systemHeaderSlim{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.titleBlock h3{font-size:15.5px;margin:0 0 3px;font-weight:800;letter-spacing:-.02em}
.titleBlock p{font-size:12.5px;color:var(--l3a-text-muted);margin:0}

.diag{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.diagItem{border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);padding:12px;background:var(--l3a-bg-soft)}
.diagItem b{font-size:21px;display:block;font-weight:800}
.systemStatusGrid{display:grid;grid-template-columns:repeat(3,minmax(160px,1fr));gap:12px}
.systemBox{border:1px solid var(--l3a-border);background:var(--l3a-surface);border-radius:var(--l3a-radius-md);padding:14px}
.systemBox b{display:block;font-size:19px;font-weight:800}
.systemBox small{color:var(--l3a-text-muted);font-weight:800;text-transform:uppercase;font-size:10.5px}

.identityCard{display:grid;grid-template-columns:112px 1fr;gap:18px;align-items:center}
.logoPreviewBox{width:104px;height:104px;border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-lg);background:#fff;
  display:grid;place-items:center;overflow:hidden;box-shadow:var(--l3a-shadow-sm)}
.logoPreviewBox img{width:100%;height:100%;object-fit:contain;padding:8px}
.logoPreviewBox span{font-weight:800;color:var(--l3a-primary)}
.logoPreviewWrap{margin-top:14px;display:flex;align-items:center;gap:14px}
.logoPreview{max-width:180px;max-height:90px;border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);
  background:#fff;padding:8px;object-fit:contain}
.logoPreview.empty{width:72px;height:72px;display:grid;place-items:center;border:1px dashed var(--l3a-border-strong);
  border-radius:var(--l3a-radius-md);color:var(--l3a-primary);font-weight:800}

.userRoleCard{background:var(--l3a-surface);border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);
  padding:15px;box-shadow:var(--l3a-shadow-sm)}
.userRoleCard h4{margin:0 0 6px;font-size:13.5px;font-weight:800}
.userRoleCard p{margin:0;font-size:12.5px;color:var(--l3a-text-muted);line-height:1.5}
.userGrid{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:12px}
.accessCard{border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);background:var(--l3a-surface);padding:14px}
.accessCard h4{margin:0 0 8px;font-size:13.5px;font-weight:800}
.accessMuted{color:var(--l3a-text-muted);font-size:12px;line-height:1.5}
.compactHelp{background:var(--l3a-bg-soft);border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);
  padding:10px 12px;color:var(--l3a-text-muted);font-size:12.5px}
.mutedLine,.note{color:var(--l3a-text-muted);font-size:12.5px;line-height:1.5}
.emptyState{background:var(--l3a-bg-soft);border:1px dashed var(--l3a-border-strong);border-radius:var(--l3a-radius-md);
  padding:22px;color:var(--l3a-text-muted);font-weight:700;text-align:center}
.check{display:inline-flex;gap:7px;align-items:center;background:var(--l3a-bg-soft);border:1px solid var(--l3a-border);
  border-radius:var(--l3a-radius-pill);padding:8px 10px;font-weight:800;font-size:12px}
.permGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px 14px}
.permCheck{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--l3a-text-soft)}

/* ---------- 7. BOTÕES ------------------------------------------------------ */
.btn{border:0;border-radius:var(--l3a-radius-md);padding:10px 16px;font-weight:750;font-size:13.5px;background:var(--l3a-primary);
  color:#fff;box-shadow:0 6px 16px rgba(11,95,173,.20);display:inline-flex;align-items:center;gap:7px;line-height:1;
  transition:background var(--l3a-dur) var(--l3a-ease),box-shadow var(--l3a-dur) var(--l3a-ease),transform var(--l3a-dur) var(--l3a-ease),opacity var(--l3a-dur) var(--l3a-ease)}
.btn:hover{background:var(--l3a-primary-600);box-shadow:0 8px 20px rgba(11,95,173,.26)}
.btn:active{transform:translateY(1px);box-shadow:0 4px 10px rgba(11,95,173,.22)}
.btn.secondary{background:var(--l3a-surface);color:var(--l3a-primary-700);border:1px solid var(--l3a-border);box-shadow:none}
.btn.secondary:hover{background:var(--l3a-hover);border-color:var(--l3a-border-strong)}
.btn.danger{background:var(--l3a-danger);box-shadow:0 6px 16px rgba(180,35,24,.22)}
.btn.danger:hover{background:#992019}
.btn.small.danger{background:transparent;color:var(--l3a-text-muted);border:1px solid var(--l3a-border);box-shadow:none}
.btn.small.danger:hover{background:var(--l3a-danger-bg);color:var(--l3a-danger);border-color:var(--l3a-danger-line);box-shadow:none}
.btn.small{padding:6px 10px;border-radius:var(--l3a-radius-sm);font-size:12px;gap:6px}
.btn.small svg{flex:0 0 auto}
.btn:disabled,.btn[disabled]{opacity:.5;cursor:not-allowed;box-shadow:none;transform:none}

/* ---------- 8. FORMULÁRIOS -------------------------------------------------- */
.toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin:12px 0}
.field{display:flex;flex-direction:column;gap:6px;min-width:180px;flex:1}
.field label{font-size:12px;font-weight:800;color:var(--l3a-text-soft);text-transform:uppercase;letter-spacing:.03em}
.field input,.field select,.field textarea{border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-sm);
  padding:10.5px 11px;min-height:40px;background:var(--l3a-surface);font-size:14px;color:var(--l3a-text);
  transition:border-color var(--l3a-dur) var(--l3a-ease),box-shadow var(--l3a-dur) var(--l3a-ease)}
.field input:hover,.field select:hover,.field textarea:hover{border-color:var(--l3a-border-strong)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--l3a-primary);
  box-shadow:0 0 0 3px var(--l3a-primary-50)}
.field input[type=checkbox],.field input[type=radio]{accent-color:var(--l3a-primary);width:auto}
/* Campo de busca padronizado (Lojas/Áreas, Falhas, Plano de Ação) */
.searchField{min-width:220px}
.searchBox{position:relative;display:flex;align-items:center}
.searchBox input{width:100%;padding-right:30px!important}
.searchBox::before{content:'🔍';position:absolute;left:10px;font-size:12px;opacity:.5;pointer-events:none}
.searchBox input{padding-left:28px!important}
.searchClear{position:absolute;right:6px;top:50%;transform:translateY(-50%);border:0;background:var(--l3a-bg-soft);
  color:var(--l3a-text-muted);width:20px;height:20px;border-radius:50%;font-size:13px;line-height:1;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.searchClear:hover{background:var(--l3a-border);color:var(--l3a-text)}
.searchResultCount{font-size:11.5px;color:var(--l3a-text-muted);font-weight:700;margin:2px 2px 10px}
.searchNone{color:var(--l3a-warning,#b45309)}
input[type=checkbox],input[type=radio]{accent-color:var(--l3a-primary)}
.formGrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ---------- 8.5 PLANO DE AÇÃO — interface reestruturada (2026-07) --------- */
.planoToolbarCard{padding:10px 14px}
.planoFiltrosRow{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.planoFiltrosAvancados{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:8px;padding-top:8px;border-top:1px dashed var(--l3a-border)}
.planoFiltrosRow .field.grow{flex:1 1 220px;min-width:180px;margin:0}
.planoFiltrosRow .field.grow input{height:34px}
.planoSelect,.planoDate{height:34px;border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-sm,8px);background:var(--l3a-surface);color:var(--l3a-text);font-size:12.5px;padding:0 8px;min-width:118px}
.btn.small{padding:6px 10px;font-size:12.5px;height:34px;display:inline-flex;align-items:center}
.pdfMenu{position:relative}
.pdfMenu summary{list-style:none;cursor:pointer}
.pdfMenu summary::-webkit-details-marker{display:none}
.pdfMenuList{position:absolute;right:0;top:calc(100% + 4px);background:var(--l3a-surface);border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);box-shadow:var(--l3a-shadow-md);min-width:190px;z-index:20;display:flex;flex-direction:column;padding:6px;gap:2px}
.pdfMenuList button{background:transparent;border:0;text-align:left;padding:8px 10px;border-radius:8px;font-size:12.5px;cursor:pointer;color:var(--l3a-text)}
.pdfMenuList button:hover{background:var(--l3a-hover)}
.dsKpiStrip.planoKpiStrip{grid-template-columns:repeat(4,1fr);margin:12px 0}
.planoTableCard{padding:0;overflow:hidden;display:flex;flex-direction:column}
.planoTableHead{padding:10px 16px 6px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--l3a-border)}
.planoTableWrap{max-height:calc(100vh - 300px);min-height:360px;overflow:auto;flex:1 1 auto}
.planoAcoes{display:flex;gap:4px;align-items:center}
.iconBtn{border:1px solid var(--l3a-border);background:var(--l3a-surface);border-radius:8px;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;color:var(--l3a-text)}
.iconBtn:hover{background:var(--l3a-hover);border-color:var(--l3a-primary)}
.maisOpcoesLista{display:flex;flex-direction:column;gap:8px}
@media (max-width:900px){
  .planoFiltrosRow .field.grow{flex:1 1 100%}
  .planoSelect,.planoDate{flex:1 1 46%}
  .planoKpiStrip{grid-template-columns:repeat(2,1fr)}
}

/* ---------- 8.55 NOTIFICAÇÕES (sino) (2026-07) ----------------------------- */
.notifBell{position:relative;border:1px solid var(--l3a-border);background:var(--l3a-surface);border-radius:10px;width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--l3a-text-soft)}
.notifBell:hover{box-shadow:var(--l3a-shadow-md);color:var(--l3a-primary)}
.notifCount{position:absolute;top:-5px;right:-5px;background:#B42318;color:#fff;font-size:9.5px;font-weight:800;border-radius:9px;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--l3a-surface)}
.notifPanel{display:none;position:fixed;right:76px;top:66px;z-index:120;width:330px;max-height:420px;overflow:auto;background:var(--l3a-surface);border:1px solid var(--l3a-border);border-radius:14px;box-shadow:var(--l3a-shadow-md);padding:8px}
.notifPanel.show{display:block}
.notifItem{padding:9px 10px;border-radius:10px;font-size:12.5px;cursor:pointer;border-bottom:1px solid var(--l3a-border)}
.notifItem:hover{background:var(--l3a-hover)}
.notifItem.naoLida{background:var(--l3a-bg-soft);font-weight:600}
.notifItem small{display:block;color:var(--l3a-text-muted);font-weight:400;margin-top:2px}
@media print{.notifBell,.notifPanel{display:none!important}}

/* ---------- 8.6 PLANTAS BAIXAS INTERATIVAS (2026-07) ----------------------- */
.plantasLayout{display:flex;gap:14px;align-items:flex-start}
.plantasSide{flex:0 0 250px;position:sticky;top:8px;max-height:calc(100vh - 120px);overflow:auto;background:var(--l3a-surface);border:1px solid var(--l3a-border);border-radius:12px;padding:10px}
.plantasSide h4{margin:0 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--l3a-text-muted)}
.plantasSide .dsFilters{margin:0 0 10px;padding:0;border:0;background:transparent}
.plantasMain{flex:1 1 auto;min-width:0}
.plantaChip{display:flex;align-items:center;gap:7px;border:1px solid var(--l3a-border);border-radius:9px;padding:6px 8px;margin-bottom:6px;font-size:12px;background:var(--l3a-bg-soft);cursor:grab;user-select:none;touch-action:none}
.plantaChip:active{cursor:grabbing}
.plantaChip i{flex:0 0 auto;display:inline-flex}
.plantaChip .cNome{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.plantaChip .cSub{display:block;font-size:10.5px;color:var(--l3a-text-muted);font-weight:400}
.plantaBloco{background:var(--l3a-surface);border:1px solid var(--l3a-border);border-radius:14px;margin-bottom:18px;overflow:hidden}
.plantaBlocoHead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;border-bottom:1px solid var(--l3a-border);flex-wrap:wrap}
.plantaBlocoHead h3{margin:0;font-size:15px;font-weight:800}
.plantaBlocoHead .pMeta{font-size:11.5px;color:var(--l3a-text-muted)}
.plantaZoomBtns{display:flex;gap:4px}
.plantaViewport{position:relative;overflow:hidden;background:#eef1f5}
.plantaCanvas{position:relative;width:100%;transform-origin:0 0}
.plantaCanvas img.plantaImg{position:absolute;inset:0;width:100%;height:100%;object-fit:fill;user-select:none;-webkit-user-drag:none;pointer-events:none}
.plantaPlaceholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:220px;color:var(--l3a-text-muted);font-size:13px}
.plantaPin{position:absolute;transform:translate(-50%,-100%);display:flex;flex-direction:column;align-items:center;cursor:pointer;touch-action:none}
.plantaPin .pinDot{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;border:2px solid #fff;box-shadow:0 1px 4px rgba(16,24,40,.4);padding:5px;box-sizing:content-box;margin:-5px}
.plantaPin .pinDot svg{width:11px;height:11px}
.plantaPin.st-ok .pinDot{background:#15803D}
.plantaPin.st-bad .pinDot{background:#B42318}
.plantaPin.st-warn .pinDot{background:#B45309}
.plantaPin.st-off .pinDot{background:#8695AB;opacity:.65}
.plantaPin .pinBadge{position:absolute;top:-7px;right:-9px;background:#B42318;color:#fff;font-size:9px;font-weight:800;border-radius:8px;min-width:14px;height:14px;display:flex;align-items:center;justify-content:center;padding:0 3px;border:1.5px solid #fff}
.plantaPin .pinNome{margin-top:2px;font-size:11px;font-weight:700;background:rgba(255,255,255,.85);border-radius:6px;padding:1px 5px;white-space:nowrap;pointer-events:none;color:#0E2A44;box-shadow:0 1px 2px rgba(16,24,40,.18)}
.plantaZoomOut .pinNome{display:none}
.plantaPin.lojaFalha .pinDot{animation:none}
.animOn .plantaPin.lojaFalha .pinDot{animation:plantaPulso 1.6s ease-in-out infinite;will-change:opacity}
@keyframes plantaPulso{0%,100%{box-shadow:0 0 0 0 rgba(180,35,24,.55);opacity:1}50%{box-shadow:0 0 0 11px rgba(180,35,24,0);opacity:.82}}
.plantaGhost{position:fixed;z-index:9999;pointer-events:none;opacity:.8;transform:translate(-50%,-50%)}
.plantaDropAlvo{outline:3px dashed var(--l3a-primary);outline-offset:-3px}
.plantaLegenda{display:flex;flex-wrap:wrap;gap:12px;font-size:11.5px;color:var(--l3a-text-soft);padding:8px 14px;background:var(--l3a-bg-soft);border:1px solid var(--l3a-border);border-radius:10px;margin-bottom:12px}
.plantaLegenda span{display:inline-flex;align-items:center;gap:5px}
.plantaLegenda i.lg{width:11px;height:11px;border-radius:50%;display:inline-block}
@media (max-width:900px){.plantasLayout{flex-direction:column}.plantasSide{position:static;flex:1 1 auto;width:100%;max-height:260px}}
@media print{#plantas .plantasSide,#plantas .plantaZoomBtns{display:none!important}}

/* ---------- 9. TABELAS ------------------------------------------------------ */
.tableWrap{overflow:auto;border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);background:var(--l3a-surface)}
.softTable table{min-width:0}
table{border-collapse:collapse;width:100%;min-width:900px}
th,td{padding:11px 13px;border-bottom:1px solid var(--l3a-border);text-align:left;vertical-align:top;font-size:13px}
th{background:var(--l3a-bg-soft);color:var(--l3a-text-soft);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;
  font-weight:800;position:sticky;top:0}
tbody tr{transition:background var(--l3a-dur) var(--l3a-ease)}
tbody tr:hover td{background:var(--l3a-hover)}
tbody tr:last-child td{border-bottom:0}
.tableWrap td:has(.btn){text-align:right;white-space:nowrap}
.dataHoraCell{display:flex;flex-direction:column;line-height:1.35;gap:1px;white-space:nowrap}
.dataHoraCell b{font-weight:700;font-size:12.5px}
.dataHoraCell span{font-size:11.5px;color:var(--l3a-text-soft)}

/* ---------- 10. BADGES / STATUS --------------------------------------------- */
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:var(--l3a-radius-pill);
  font-weight:750;font-size:11px;background:var(--l3a-primary-50);color:var(--l3a-primary-700)}
.pill.ok{background:var(--l3a-success-bg);color:var(--l3a-success)}
.pill.bad{background:var(--l3a-danger-bg);color:var(--l3a-danger)}
.pill.warn{background:var(--l3a-warning-bg);color:var(--l3a-warning)}
.pill.off{background:var(--l3a-neutral-bg);color:var(--l3a-neutral)}
.pill.fire{background:var(--l3a-danger);color:#fff}
.statusPill{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-pill);
  padding:7px 11px;background:var(--l3a-surface);font-weight:800;font-size:12px;color:var(--l3a-text-soft)}
.statusPill i{width:8px;height:8px;border-radius:50%;background:var(--l3a-warning);display:block}
.statusPill.ok i{background:var(--l3a-success)}
.msg{padding:12px 14px;border-radius:var(--l3a-radius-md);margin:12px 0;font-weight:750;font-size:13px}
.msg.ok{background:var(--l3a-success-bg);color:var(--l3a-success)}
.msg.err{background:var(--l3a-danger-bg);color:var(--l3a-danger)}
.msg.warn{background:var(--l3a-warning-bg);color:var(--l3a-warning)}
.disabledByRole{opacity:.45;filter:grayscale(.5);pointer-events:none}
.accessDenied{opacity:.45;pointer-events:none}

/* ---------- 11. GRÁFICOS (dashboard e relatórios) --------------------------- */
.bars{display:grid;gap:12px}
.barrow{display:grid;grid-template-columns:170px 1fr 120px;gap:12px;align-items:center;font-size:12.5px}
.bar{height:9px;border-radius:99px;background:var(--l3a-bg-soft);overflow:hidden}
.bar i{display:block;height:100%;background:var(--l3a-primary);border-radius:99px}
.miniChart{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.chartCard{border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);padding:14px;background:var(--l3a-surface)}
.chartCard h4{margin:0 0 8px;font-size:13.5px;font-weight:800}
.chartGrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:14px 0}
.chartPanel{border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-lg);padding:16px;
  background:linear-gradient(180deg,#fff,var(--l3a-bg-soft))}
.chartPanel h4{margin:0 0 12px;font-size:13.5px;font-weight:800;color:var(--l3a-text)}
.chartBars{display:grid;gap:10px}
.chartLine{display:grid;grid-template-columns:150px 1fr 62px;gap:10px;align-items:center;font-size:12px}
.chartTrack{height:11px;border-radius:99px;background:var(--l3a-bg-soft);overflow:hidden}
.chartTrack i{display:block;height:100%;border-radius:99px;background:var(--l3a-primary)}
.chartTrack i.bad{background:var(--l3a-danger)} .chartTrack i.ok{background:var(--l3a-success)}
.donutWrap{display:flex;align-items:center;gap:18px}
.donut{width:114px;height:114px;border-radius:50%;
  background:conic-gradient(var(--l3a-danger) 0 var(--deg,0deg),var(--l3a-success) var(--deg,0deg) 360deg);position:relative}
.donut:after{content:"";position:absolute;inset:21px;background:#fff;border-radius:50%}
.legend{display:grid;gap:8px;font-size:12.5px}
.legend span{display:flex;align-items:center;gap:8px;font-weight:750;color:var(--l3a-text-soft)}
.dot{width:11px;height:11px;border-radius:50%;display:inline-block}
.dot.ok{background:var(--l3a-success)} .dot.bad{background:var(--l3a-danger)}
.premiumTable table{min-width:0}
.premiumTable th{background:var(--l3a-primary-50);color:var(--l3a-primary-700)}

.timeline{border-left:2px solid var(--l3a-border);margin-left:10px;padding-left:18px}
.tl{position:relative;margin:0 0 14px;padding:11px 13px;background:var(--l3a-bg-soft);border:1px solid var(--l3a-border);
  border-radius:var(--l3a-radius-md)}
.tl:before{content:"";position:absolute;left:-25px;top:17px;width:11px;height:11px;background:var(--l3a-primary);border-radius:50%}

/* ---------- 12. RELATÓRIOS / IMPRESSÃO -------------------------------------- */
.printArea{background:#fff}
.reportBlock{border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);margin:12px 0;padding:16px}
.reportCover{background:linear-gradient(135deg,var(--l3a-secondary-900),var(--l3a-primary));color:#fff;
  border-radius:var(--l3a-radius-lg);padding:30px;margin-bottom:18px;position:relative;overflow:hidden}
.reportCover:after{content:"";position:absolute;right:-90px;top:-90px;width:260px;height:260px;border-radius:50%;
  background:rgba(255,255,255,.10)}
.reportCover h2{font-size:27px;margin:0 0 8px;font-weight:800;color:#fff}
.reportCover p{margin:4px 0;color:#dcecff}
.reportMeta{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.reportMeta span{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.22);padding:8px 11px;
  border-radius:var(--l3a-radius-pill);font-weight:750;font-size:12px}
.reportFooter{border-top:2px solid var(--l3a-border);margin-top:24px;padding-top:14px;color:var(--l3a-text-muted);
  font-size:12px;display:flex;justify-content:space-between;gap:12px}
.reportCover,.metric,.chartPanel,.chartTrack i,.donut,.pill,.dot{-webkit-print-color-adjust:exact;print-color-adjust:exact}
.hidePrint{}
.view{display:none} .view.active{display:block}

/* ---------- 13. MODAL / DRAWER ---------------------------------------------- */
.modal{position:fixed;inset:0;background:rgba(8,20,36,.55);display:none;align-items:center;justify-content:flex-end;
  z-index:150;backdrop-filter:blur(1px)}
.modal.show{display:flex}
.drawer{width:min(720px,100%);height:100%;background:#fff;padding:28px;overflow:auto;box-shadow:var(--l3a-shadow-lg);position:relative}
.drawer h2{margin:0 0 8px;font-size:19px;font-weight:800;letter-spacing:-.02em}
.drawerClose{position:fixed;top:20px;right:20px;z-index:151;width:38px;height:38px;border:1px solid rgba(255,255,255,.25);
  background:rgba(15,25,40,.35);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);transition:background var(--l3a-dur) var(--l3a-ease)}
.drawerClose:hover{background:rgba(15,25,40,.55)}

/* ---------- 14. TELA DE LOGIN ------------------------------------------------ */
.loginScreen{position:fixed;inset:0;z-index:999;
  background:radial-gradient(circle at 18% 20%,rgba(14,165,183,.18),transparent 34%),
             linear-gradient(150deg,var(--l3a-secondary-900),var(--l3a-secondary-700) 55%,var(--l3a-secondary));
  display:none;align-items:center;justify-content:center;padding:22px}
.loginScreen.show{display:flex}
.loginCard{width:min(430px,100%);background:rgba(255,255,255,.98);border:1px solid rgba(255,255,255,.4);
  border-radius:var(--l3a-radius-lg);padding:32px;box-shadow:var(--l3a-shadow-lg)}
.loginLogo{width:72px;height:72px;border-radius:var(--l3a-radius-lg);background:linear-gradient(135deg,var(--l3a-primary),var(--l3a-primary-700));
  color:#fff;display:grid;place-items:center;font-weight:800;margin:0 auto 16px;letter-spacing:.04em}
.loginCard h1{text-align:center;margin:0;font-size:23px;font-weight:800;color:var(--l3a-text)}
.loginCard p{text-align:center;color:var(--l3a-text-muted);margin:8px 0 22px;font-size:13px}
.loginCard .field{min-width:0;margin-bottom:12px}
.loginCard input{font-size:15px}
.loginActions{display:flex;gap:10px;align-items:center;margin-top:10px}
.loginActions .btn{flex:1;justify-content:center}
.loginHint{margin-top:14px;font-size:12px;color:var(--l3a-text-muted);background:var(--l3a-bg-soft);
  border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);padding:11px}

/* ---------- 15. RESPONSIVIDADE ---------------------------------------------- */
@media(max-width:1200px){
  .grid,.premiumGrid{grid-template-columns:repeat(2,1fr)}
  .systemInfo{grid-template-columns:repeat(2,1fr)}
  .split2{grid-template-columns:1fr}
}
@media(max-width:1000px){
  .app{grid-template-columns:1fr}
  .side{position:fixed;left:0;top:0;bottom:0;width:288px;height:100vh;transform:translateX(-105%);
    transition:transform var(--l3a-dur) var(--l3a-ease);z-index:80}
  .side.open{transform:translateX(0)}
  .menuToggle{display:inline-flex}
  .top{padding:0 16px}
  .content{padding:18px 16px 64px}
  .diag,.chartGrid,.systemStatusGrid,.miniChart,.userGrid{grid-template-columns:1fr 1fr}
  .toolbar{display:grid;grid-template-columns:1fr}
  .field{min-width:0}
  .formGrid,.identityCard{grid-template-columns:1fr}
  .barrow,.chartLine{grid-template-columns:1fr}
  .drawer{width:100%}
  table{min-width:760px}
}
@media(max-width:640px){
  .grid,.premiumGrid,.diag,.chartGrid,.systemStatusGrid,.miniChart,.userGrid,.systemInfo{grid-template-columns:1fr!important}
  .top{height:auto;min-height:66px;padding:10px 14px;gap:8px;flex-wrap:wrap}
  .top h1{font-size:17px}
  .top p{display:none}
  .topMeta{gap:6px;width:100%;justify-content:space-between}
  .datetimePill{display:none}
  .syncFooter{font-size:0;padding:8px;gap:0}
  .syncFooter span:not(.syncDot){display:none}
  .topUser{max-width:44px;padding:5px}
  .topUser .uText,.topUser:after{display:none}
  .card,.premiumPanel{padding:15px}
  .content{padding-bottom:72px}
  .drawer{padding:20px}
}

/* ---------- 16. UTILITÁRIOS -------------------------------------------------- */
.hidden{display:none!important}

/* ---------- 16c. SUBTOTAL POR TIPO — lista organizada (v8.9) ----------------- */
.subTipoGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:0 22px;max-width:820px}
.subTipoRow{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--l3a-border)}
.subTipoRow:nth-last-child(-n+2){border-bottom:0}
.subTipoDot{width:8px;height:8px;border-radius:50%;flex:0 0 8px}
.subTipoDot.cat-modulo{background:var(--l3a-info)}
.subTipoDot.cat-fumaca{background:var(--l3a-warning)}
.subTipoDot.cat-termico{background:var(--l3a-danger)}
.subTipoDot.cat-acionador{background:var(--l3a-primary)}
.subTipoDot.cat-sirene{background:var(--l3a-success)}
.subTipoDot.cat-outro{background:var(--l3a-neutral)}
.subTipoLabel{flex:1;min-width:0;display:flex;flex-direction:column;line-height:1.3}
.subTipoLabel b{font-size:12.5px;font-weight:700;color:var(--l3a-text-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.subTipoLabel small{font-size:10.5px;color:var(--l3a-text-muted);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.subTipoCount{font-size:13.5px;font-weight:800;color:var(--l3a-text);min-width:24px;text-align:right;flex:0 0 auto}

/* ---------- 16d. LAÇOS — cards (substitui a tabela espremida) --------------- */
.lacoCardGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}
.lacoCard{border:1px solid var(--l3a-border);border-radius:14px;padding:16px 18px;background:var(--l3a-surface,#fff);display:flex;flex-direction:column;gap:10px}
.lacoCardHead{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap}
.lacoCardTitle{display:flex;flex-direction:column;line-height:1.25}
.lacoCardPainel{font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--l3a-text-muted)}
.lacoCardTitle h4{margin:2px 0 0;font-size:17px;font-weight:800;color:var(--l3a-text)}
.lacoCardBadges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.lacoCardMeta{font-size:12.5px;color:var(--l3a-text-soft)}
.lacoCardSub{border-top:1px solid var(--l3a-border);padding-top:10px}
.lacoCardActions{display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--l3a-border);padding-top:10px}
.pill.neutral{background:var(--l3a-neutral-bg,#eef0f3);color:var(--l3a-text-soft)}
.pill.info{background:var(--l3a-info-bg,#e5f0ff);color:var(--l3a-info,#2563eb)}

/* ---------- 16e. SISTEMA POR LAÇO — bloco dentro de Painéis ----------------- */
.sistemaPainelBlock{margin-bottom:16px}
.sistemaPainelBlock:last-child{margin-bottom:0}
.sistemaPainelBlock h4{margin:0 0 8px;font-size:13.5px;font-weight:800;color:var(--l3a-text)}
.sistemaLacoRow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid var(--l3a-border)}
.sistemaLacoRow:last-child{border-bottom:0}
.sistemaLacoNome{font-size:13px;font-weight:600;color:var(--l3a-text-soft)}

/* ---------- 16g. RELATÓRIO DETALHADO DO PLANO DE AÇÃO (com fotos) ---------- */
.detCard{border:1px solid var(--l3a-border);border-radius:12px;padding:16px 18px;margin-bottom:14px;break-inside:avoid}
.detHead{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.detHead h4{margin:0;font-size:15px;font-weight:800;color:var(--l3a-text)}
.detMeta{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:4px 14px;font-size:12.5px;color:var(--l3a-text-soft);margin-bottom:8px}
.detMeta b{color:var(--l3a-text)}
.detTexto{font-size:12.5px;color:var(--l3a-text-soft);margin-bottom:6px}
.detTexto b{color:var(--l3a-text)}
.detFotos{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.detFotos img{width:120px;height:120px;object-fit:cover;border-radius:8px;border:1px solid var(--l3a-border)}
.drawer.wide{width:min(1040px,96%)}
@media(max-width:1000px){.drawer.wide{width:100%}}

/* ---------- 16f. LISTA DE ENDEREÇOS (modal Ver endereços) ------------------- */
.endList{display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow:auto;padding-right:4px}
.endRow{border:1px solid var(--l3a-border);border-radius:10px;padding:10px 12px;display:grid;grid-template-columns:110px 1fr;gap:4px 14px;align-items:start}
.endRow .endTipo{font-size:11px;font-weight:800;letter-spacing:.02em;text-transform:uppercase;color:var(--l3a-text-muted);grid-row:1/3}
.endRow .endMain{font-size:13.5px;font-weight:700;color:var(--l3a-text)}
.endRow .endMeta{font-size:12px;color:var(--l3a-text-soft);display:flex;flex-wrap:wrap;gap:4px 10px}
.endRow .endMeta b{color:var(--l3a-text-soft);font-weight:700}
@media(max-width:560px){.endRow{grid-template-columns:1fr}.endRow .endTipo{grid-row:auto}}
.dashRow{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;margin-bottom:18px}
@media(max-width:1000px){.dashRow{grid-template-columns:1fr}}
.chartLegendRow{display:flex;flex-wrap:wrap;gap:14px;margin:0 0 12px;font-size:11.5px;color:var(--l3a-text-soft);font-weight:700}
.chartLegendRow span{display:inline-flex;align-items:center;gap:6px}
.chartLegendRow i{width:10px;height:10px;border-radius:3px;display:inline-block}
.chartCanvasWrap{position:relative;width:100%}
.failList{display:grid;gap:8px}
.failRow{display:grid;grid-template-columns:1.5fr .6fr .7fr .8fr;gap:10px;align-items:center;
  border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-sm);padding:9px 12px;font-size:12.5px}
.failRow.head{border:0;padding:0 12px;color:var(--l3a-text-muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;font-weight:800}
.failRow b{font-weight:750;color:var(--l3a-text)}
.failRow .tsince{font-weight:750}
.failRow .tsince.urgent{color:var(--l3a-danger)}
.failRow .tsince.recent{color:var(--l3a-warning)}
.subTipoTags{display:flex;flex-wrap:wrap;gap:6px;max-width:520px;align-items:flex-start}
.subTipoTags .pill{white-space:nowrap;background:var(--l3a-bg-soft);color:var(--l3a-text-soft);border:1px solid var(--l3a-border)}
.chartLine.clickable{cursor:pointer;border-radius:8px;transition:background var(--l3a-dur) var(--l3a-ease)}
.chartLine.clickable:hover{background:var(--l3a-hover)}
.chartLine.selected{background:var(--l3a-primary-50)}
.chartLine.selected b{color:var(--l3a-primary-700)}

/* =========================================================================
   RELATÓRIO GERENCIAL EXECUTIVO SDAI — Fase 1
   Eleva o padrão visual do módulo de Relatórios reaproveitando os tokens e
   componentes do Design System já existente (DS-1 a DS-10 acima). Nenhuma
   nova identidade visual foi criada — apenas novos arranjos dos mesmos
   tokens (--l3a-*) e das mesmas classes-base (dsKpiStrip, dsBadge, table).
   ========================================================================= */
.execCover{position:relative;overflow:hidden;border-radius:var(--l3a-radius-lg);
  background:linear-gradient(135deg,var(--l3a-secondary-900),var(--l3a-secondary-700) 55%,var(--l3a-primary-700));
  color:#fff;padding:34px 34px 28px;margin-bottom:20px;box-shadow:var(--l3a-shadow-lg)}
.execCover:after{content:"";position:absolute;right:-110px;top:-110px;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,.08)}
.execCover:before{content:"";position:absolute;left:-70px;bottom:-90px;width:220px;height:220px;border-radius:50%;background:rgba(14,165,183,.16)}
.execCoverTop{display:flex;align-items:center;justify-content:space-between;gap:16px;position:relative;z-index:1}
.execCoverLogos{display:flex;align-items:center;gap:14px}
.execCoverLogoBox{width:56px;height:56px;border-radius:14px;background:#fff;display:grid;place-items:center;overflow:hidden;box-shadow:var(--l3a-shadow-sm)}
.execCoverLogoBox img{width:100%;height:100%;object-fit:contain;padding:6px}
.execCoverLogoBox span{font-weight:800;color:var(--l3a-primary-700);font-size:13px}
.execCoverKicker{font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:800;color:#a9c4e8;margin:0 0 6px}
.execCoverTitle{font-size:30px;font-weight:800;letter-spacing:-.03em;margin:0 0 6px;color:#fff}
.execCoverSub{font-size:13.5px;color:#cfe0f7;margin:0}
.execCoverMetaGrid{position:relative;z-index:1;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:24px}
.execCoverMetaItem{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:12px;padding:11px 14px}
.execCoverMetaItem small{display:block;font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;font-weight:800;color:#aec6e6}
.execCoverMetaItem b{display:block;margin-top:4px;font-size:14px;font-weight:750;color:#fff}

.execSectionKicker{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:800;color:var(--l3a-primary-700);margin:0 0 4px}
.execSectionHead{margin:26px 0 14px}
.execSectionHead h2{font-size:19px;font-weight:800;letter-spacing:-.02em;color:var(--l3a-text);margin:0 0 3px}
.execSectionHead p{font-size:12.5px;color:var(--l3a-text-muted);margin:0}
.execSectionHead:first-child{margin-top:0}

.execChartGrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.execChartGrid.execChartGrid3{grid-template-columns:repeat(3,1fr)}
.execChartBox{border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-lg);padding:16px;background:linear-gradient(180deg,#fff,var(--l3a-bg-soft));break-inside:avoid}
.execChartBox h4{margin:0 0 2px;font-size:13.5px;font-weight:800;color:var(--l3a-text)}
.execChartBox p{margin:0 0 10px;font-size:11.5px;color:var(--l3a-text-muted)}
.execChartCanvasWrap{position:relative;width:100%}

.execPainelCard{border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-lg);padding:16px 18px;margin-bottom:14px;break-inside:avoid;background:var(--l3a-surface)}
.execPainelHead{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.execPainelHead h3{margin:0;font-size:16px;font-weight:800;color:var(--l3a-text)}

.execLacoGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-bottom:16px}
.execRanking{display:grid;gap:6px}
.execRankRow{display:grid;grid-template-columns:28px 1fr 60px;gap:10px;align-items:center;padding:6px 0;border-bottom:1px solid var(--l3a-border);font-size:12.5px}
.execRankRow:last-child{border-bottom:0}
.execRankPos{width:26px;height:26px;border-radius:50%;background:var(--l3a-primary-50);color:var(--l3a-primary-700);font-weight:800;font-size:11.5px;display:grid;place-items:center}
.execRankVal{text-align:right;font-weight:800;color:var(--l3a-text)}

.execPageBreak{break-before:page}
.execAvoidBreak{break-inside:avoid}
.execRunningFooter{display:none}
.execConclusao{border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-lg);padding:16px 18px;background:var(--l3a-bg-soft);margin:18px 0}
.execConclusao h3{margin:0 0 6px;font-size:14.5px;font-weight:800}
.execConclusao p{margin:0;font-size:12.5px;color:var(--l3a-text-soft);line-height:1.6}

/* ---------- 17. IMPRESSÃO (geração de relatório em PDF) --------------------- */
@page{size:A4;margin:16mm 12mm 20mm 12mm}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .side,.top,.hidePrint,.modal,.userMenu,.drawerClose{display:none!important}
  .app{display:block}
  .content{padding:0;max-width:none}
  .card{box-shadow:none;border:0}
  .view{display:block}
  .view:not(.printTarget){display:none!important}
  body{background:#fff;color:#0f172a}
  .reportCover{border-radius:0;margin:-8mm -8mm 8mm -8mm;padding:22mm 12mm 18mm}
  .reportCover h2{font-size:24px}
  .execCover{border-radius:0;margin:-16mm -12mm 10mm -12mm;padding:20mm 12mm 14mm}
  .grid,.premiumGrid{grid-template-columns:repeat(4,1fr);gap:8px}
  .metric{padding:10px;border-radius:10px}
  .metric strong{font-size:20px}
  .chartGrid,.execChartGrid,.execChartGrid3{grid-template-columns:1fr 1fr;gap:8px}
  .chartPanel,.execChartBox,.execPainelCard,.dsLacoCard{break-inside:avoid;padding:10px}
  .reportBlock{break-inside:avoid;border-radius:10px;padding:10px;margin:8px 0}
  .execLacoGrid{grid-template-columns:1fr 1fr}
  .execPageBreak{break-before:page}
  table{min-width:0;font-size:9px}
  th,td{font-size:9px;padding:5px}
  .reportFooter{font-size:10px}
  .execRunningFooter{display:flex;position:fixed;left:12mm;right:12mm;bottom:6mm;justify-content:space-between;
    font-size:8.5px;color:#61728a;border-top:1px solid #d8dee7;padding-top:4px}
}

/* ======================================================================
   DESIGN SYSTEM — SDAI MANAGER (Corporate Premium v2)
   Todas as telas usam esses componentes — não duplicar.
   ====================================================================== */

/* --- DS-1. Cabeçalho de tela unificado -------------------------------- */
.dsPageHeader{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.dsPageTitle{font-size:18px;font-weight:800;letter-spacing:-.025em;color:var(--l3a-text);margin:0 0 2px}
.dsPageSub{font-size:12px;color:var(--l3a-text-muted);margin:0}
.dsPageActions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* --- DS-2. Faixa de KPIs padronizada ---------------------------------- */
.dsKpiStrip{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.dsKpiCard{background:var(--l3a-surface);border:1px solid var(--l3a-border);border-radius:12px;padding:12px 14px;
  cursor:pointer;transition:box-shadow var(--l3a-dur) var(--l3a-ease),transform var(--l3a-dur) var(--l3a-ease);
  position:relative;overflow:hidden}
.dsKpiCard:hover{box-shadow:var(--l3a-shadow-md);transform:translateY(-1px)}
.dsKpiCard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--l3a-primary);border-radius:0}
.dsKpiCard.ok::before{background:var(--l3a-success)}
.dsKpiCard.bad::before{background:var(--l3a-danger)}
.dsKpiCard.warn::before{background:var(--l3a-warning)}
.dsKpiCard.info::before{background:var(--l3a-info,#1D4ED8)}
.dsKpiCard.off::before{background:var(--l3a-neutral)}
.dsKpiLabel{font-size:10px;text-transform:uppercase;letter-spacing:.06em;font-weight:800;color:var(--l3a-text-muted);margin-bottom:5px}
.dsKpiValue{font-size:24px;font-weight:800;letter-spacing:-.03em;color:var(--l3a-text);line-height:1}
.dsKpiSub{font-size:10.5px;color:var(--l3a-text-muted);margin-top:3px}

/* --- DS-3. Filtros padronizados --------------------------------------- */
.dsFilters{background:var(--l3a-surface);border:1px solid var(--l3a-border);border-radius:12px;
  padding:12px 14px;margin-bottom:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.dsFilters .field{min-width:130px;flex:1;margin:0}
.dsFilters .field label{font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-weight:800;
  color:var(--l3a-text-muted);margin-bottom:3px;display:block}
.dsFilters .field input,.dsFilters .field select{padding:7px 9px;font-size:12.5px;border-radius:8px}
.dsFilterActions{display:flex;gap:6px;align-items:flex-end;flex:0 0 auto}

/* --- DS-4. Tabela corporativa ----------------------------------------- */
.dsTable{width:100%;border-collapse:collapse;font-size:13px}
table{font-size:13px}
.dsTable th{padding:7px 10px;background:var(--l3a-bg-soft);font-size:10px;text-transform:uppercase;
  letter-spacing:.06em;font-weight:800;color:var(--l3a-text-muted);border-bottom:2px solid var(--l3a-border);
  white-space:nowrap;position:sticky;top:0;z-index:2}
.dsTable td{padding:7px 10px;border-bottom:1px solid var(--l3a-border);font-size:12.5px;
  color:var(--l3a-text);vertical-align:middle}
.dsTable tbody tr:hover td{background:var(--l3a-hover)}
.dsTable tbody tr:last-child td{border-bottom:0}
.dsTableWrap{border:1px solid var(--l3a-border);border-radius:12px;overflow:auto;background:var(--l3a-surface);
  max-height:calc(100vh - 320px)}

/* --- DS-5. Componente Localização ------------------------------------- */
.dsLoc{display:flex;flex-direction:column;gap:1px;min-width:0}
.dsLocTag{font-size:10px;font-weight:800;color:var(--l3a-text-muted);text-transform:uppercase;letter-spacing:.04em}
.dsLocMain{font-size:12.5px;font-weight:700;color:var(--l3a-text)}
.dsLocSub{font-size:11px;color:var(--l3a-text-soft)}

/* --- DS-6. Badges padronizados ---------------------------------------- */
.dsBadge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;
  font-size:11px;font-weight:750;white-space:nowrap}
.dsBadge.op{background:#E7F7EC;color:#15803D}          /* Em operação  — Verde   */
.dsBadge.test{background:#EAF1FE;color:#1D4ED8}        /* Em teste     — Azul    */
.dsBadge.wait{background:#FDF3DF;color:#B45309}        /* Aguardando   — Amarelo */
.dsBadge.alert{background:#FEF0E6;color:#C05A0A}       /* Alerta       — Laranja */
.dsBadge.fail{background:#FCEAE9;color:#B42318}        /* Falha        — Vermelho*/
.dsBadge.off{background:#EEF1F5;color:#475569}         /* Desativado   — Cinza   */
.dsBadge.open{background:#EAF1FE;color:#1D4ED8}        /* Aberto (plano)         */
.dsBadge.prog{background:#FDF3DF;color:#B45309}        /* Em andamento           */
.dsBadge.done{background:#E7F7EC;color:#15803D}        /* Concluído              */
.dsBadge.noplan{background:#EEF1F5;color:#475569}      /* Sem plano              */
.dsBadge.fire{background:#B42318;color:#fff}           /* Incêndio disparado     */

/* --- DS-7. Botões ícone ------------------------------------------------ */
.dsIco{border:1px solid var(--l3a-border);background:var(--l3a-surface);color:var(--l3a-text-soft);
  border-radius:8px;padding:5px 8px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;
  gap:4px;transition:background var(--l3a-dur) var(--l3a-ease),color var(--l3a-dur) var(--l3a-ease);
  white-space:nowrap;line-height:1}
.dsIco:hover{background:var(--l3a-hover);color:var(--l3a-primary);border-color:var(--l3a-border-strong)}
.dsIco.del{color:var(--l3a-text-muted)}
.dsIco.del:hover{background:var(--l3a-danger-bg);color:var(--l3a-danger);border-color:var(--l3a-danger-line)}
.dsIco.prim{background:var(--l3a-primary);color:#fff;border-color:var(--l3a-primary)}
.dsIco.prim:hover{background:var(--l3a-primary-600)}
.dsIcoGroup{display:flex;gap:4px;align-items:center}

/* --- DS-8. Portas no Módulo ------------------------------------------- */
.dsPortas{display:flex;flex-direction:column;gap:3px}
.dsPortaRow{display:flex;align-items:center;gap:6px;font-size:11.5px}
.dsPortaDot{width:7px;height:7px;border-radius:50%;flex:0 0 7px;background:var(--l3a-success)}
.dsPortaDot.fail{background:var(--l3a-danger)}
.dsPortaLabel{font-weight:700;color:var(--l3a-text-muted);font-size:10px;min-width:20px}
.dsPortaNome{color:var(--l3a-text);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px}

/* --- DS-9. Card executivo de Laço ------------------------------------- */
.dsLacoGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.dsLacoCard{background:var(--l3a-surface);border:1px solid var(--l3a-border);border-radius:12px;
  padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.dsLacoHead{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.dsLacoTitle{font-size:16px;font-weight:800;color:var(--l3a-text);margin:0}
.dsLacoPainel{font-size:10px;font-weight:800;color:var(--l3a-text-muted);text-transform:uppercase;letter-spacing:.04em}
.dsLacoStats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.dsLacoStat{background:var(--l3a-bg-soft);border-radius:8px;padding:7px 8px;text-align:center}
.dsLacoStatLabel{font-size:9.5px;text-transform:uppercase;font-weight:800;color:var(--l3a-text-muted);letter-spacing:.04em}
.dsLacoStatVal{font-size:18px;font-weight:800;color:var(--l3a-text);line-height:1.1;margin-top:2px}
.dsLacoActions{display:flex;gap:6px;padding-top:6px;border-top:1px solid var(--l3a-border)}

/* --- DS-10. Linha de data BR ------------------------------------------ */
.dsDt{white-space:nowrap;font-size:12px;line-height:1.4}
.dsDt small{display:block;font-size:11px;color:var(--l3a-text-muted)}

/* ── MULTI-CLIENTE ─────────────────────────────────────────────── */
.clienteSelector{padding:0 4px 10px;position:relative}
.clienteSelector select{width:100%;background:rgba(255,255,255,.08);color:#e7eefb;border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:6px 26px 6px 9px;font-size:12px;font-weight:600;cursor:pointer;appearance:none;-webkit-appearance:none;outline:none;transition:background .15s;height:32px}
.clienteSelector select:focus{background:rgba(255,255,255,.18)}
.clienteSelector::after{content:'▾';position:absolute;right:18px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.55);pointer-events:none;font-size:11px}
.clienteSelector select option{background:#0e2a44;color:#fff}
.clienteBadge{display:flex;align-items:center;gap:6px;padding:6px 10px 8px;font-size:11px;color:rgba(255,255,255,.5);border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:4px}
.clienteBadge svg{opacity:.5}

/* ── SUBSISTEMAS (CFTV / ACESSO / AMBIENTE) ─────────────────────── */
.subsisGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;margin-top:20px}
.subsisCard{background:var(--l3a-surface);border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);padding:20px;box-shadow:var(--l3a-shadow-sm)}
.subsisCard h4{margin:0 0 6px;font-size:15px;color:var(--l3a-text)}
.subsisCard p{font-size:13px;color:var(--l3a-text-soft);margin:0 0 14px}
.subsisModuleToggle{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--l3a-border)}
.subsisModuleToggle label{font-size:13px;font-weight:500;flex:1}
.subsisModuleToggle input[type=checkbox]{width:16px;height:16px;accent-color:var(--l3a-primary);cursor:pointer}
.subsisHeader{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.subsisHeader svg{color:var(--l3a-primary)}
.subsisHeader h3{margin:0;font-size:18px}
.subsisEmptyMsg{text-align:center;padding:64px 24px;color:var(--l3a-text-muted)}
.subsisEmptyMsg svg{display:block;margin:0 auto 14px;opacity:.35}
.subsisEmptyMsg h4{font-size:16px;margin:0 0 6px;color:var(--l3a-text-soft)}
.cftvGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-top:16px}
.cftvCam{background:var(--l3a-surface);border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);padding:16px;position:relative}
.cftvCam .camStatus{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:var(--l3a-radius-pill);margin-bottom:10px}
.cftvCam .camStatus.ok{background:var(--l3a-success-bg);color:var(--l3a-success)}
.cftvCam .camStatus.falha{background:var(--l3a-danger-bg);color:var(--l3a-danger)}
.cftvCam .camStatus.offline{background:var(--l3a-neutral-bg);color:var(--l3a-neutral)}
.acessoTable .pill{background:var(--l3a-primary-50);color:var(--l3a-primary);padding:2px 8px;border-radius:var(--l3a-radius-pill);font-size:11px}
.tabsSubsis{display:flex;gap:4px;border-bottom:2px solid var(--l3a-border);margin-bottom:20px}

<script>
const KEY='sdai_bosch_manager_v4_flm_portas';
const KEY_CLIENTES='sdai_l3a_clientes_v1';
const KEY_CLIENTE_ATIVO='sdai_l3a_cliente_ativo';

/* =========================================================================
   MENU TREE — navegação em árvore
   ========================================================================= */
const MENU_TREE_SUBSYS = [
  { key:'sdai', label:'SDAI', modulo:'sdai',
    groups:[
      {key:'gestao',label:'Gestão',items:[{view:'dashboard',label:'Dashboard SDAI'}]},
      {key:'baseTecnica',label:'Base Técnica',items:[
        {view:'paineis',label:'Painéis'},{view:'lacos',label:'Laços'},
        {view:'flms',label:'Módulos'},{view:'equipamentos',label:'Detectores / Acionadores'}
      ]},
      {key:'operacao',label:'Operação',items:[
        {view:'locais',label:'Lojas / Áreas'},{view:'falhas',label:'Falhas'},
        {view:'plano',label:'Plano de Ação'},{view:'plantas',label:'Plantas'}
      ]},
      {key:'dados',label:'Dados',items:[
        {view:'relatorios',label:'Relatórios SDAI'},{view:'importacao',label:'Importação SDAI'},
