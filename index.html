  let out='';
  if(fotos.length){
    out+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">${fotos.map((f,idx)=>
      `<img src="${escAttrRaw(f.url)}" title="${esc(f.nome)}" onclick='abrirGaleriaFoto(${idx},${fotosJson})' style="width:110px;height:110px;object-fit:cover;border-radius:10px;border:1px solid var(--l3a-border);cursor:pointer">`
    ).join('')}</div>`;
  }
  if(videos.length){
    out+=videos.map(v=>{
      const player=v.url&&v.url.startsWith('data:')?`<video controls src="${escAttrRaw(v.url)}" style="max-width:220px;border-radius:8px;display:block;margin-top:4px"></video>`:(v.url?`<a href="${escAttrRaw(v.url)}" target="_blank" class="pill info">Abrir vídeo</a>`:'');
      return `<div style="margin-bottom:8px"><span class="pill neutral">🎬 ${esc(v.nome||'Não informado')}</span> <small class="note">${esc(formatarDataHoraBR(v.data))} • ${esc(v.responsavel||'Não informado')}</small>${player}</div>`;
    }).join('');
  }
  if(docs.length){
    out+=`<div style="display:flex;gap:6px;flex-wrap:wrap">${docs.map(d=>
      `<span class="pill neutral">📄 ${esc(d.nome||'Não informado')}${d.tamanho?' — '+esc(String(d.tamanho)):''}</span> <a href="${escAttrRaw(d.url)}" target="_blank" class="pill info">Abrir</a> <a href="${escAttrRaw(d.url)}" download="${escAttrRaw(d.nome||'documento')}" class="pill info">Baixar</a>`
    ).join(' ')}</div>`;
  }
  return out||'<p class="mutedLine">Nenhuma evidência anexada.</p>';
}
function inspAnexosHtml(lista,label){
  if(!lista||!lista.length)return '';
  const thumbs=lista.map(a=>{
    if(a.tipo&&a.tipo.startsWith('image/'))return `<a href="${a.dataUrl}" target="_blank" title="${esc(a.name)}"><img src="${a.dataUrl}" style="width:52px;height:52px;object-fit:cover;border-radius:8px;border:1px solid var(--l3a-border)"></a>`;
    return `<a href="${a.dataUrl}" download="${esc(a.name)}" class="pill neutral" style="font-size:11px">${esc(a.name)}</a>`;
  }).join(' ');
  return `<div style="margin-top:6px"><small class="note">${esc(label)} (${lista.length})</small><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">${thumbs}</div></div>`;
}
function formInspecao(localId,i=''){
  if(!requireAccess('cadastro','Seu perfil não pode registrar inspeções/testes.'))return;
  const l=db.locais.find(x=>x.id===localId); if(!l)return;
  const o=i?(l.inspecoes||[]).find(x=>x.id===i)||{}:{};
  openModal(`<h2>${i?'Editar':'Executar Teste'} — ${esc(l.nome)}</h2>
  <p class="msg warn">Registre a inspeção/teste técnico da loja/área. Se o resultado for <b>Não Conforme</b>, o sistema cria automaticamente uma Falha e o respectivo Plano de Ação vinculados a este teste.</p>
  <input type="hidden" id="mInspLocalId" value="${esc(localId)}">
  <div class="formGrid">
    <div class="field"><label>Data e hora</label><input id="mInspData" type="datetime-local" value="${esc(o.data?o.data.slice(0,16):isoNow().slice(0,16))}"></div>
    <div class="field"><label>Responsável</label><input id="mInspResp" list="mInspRespList" value="${esc(o.responsavel||'')}" placeholder="Nome do técnico responsável"><datalist id="mInspRespList">${locaisResponsaveisDisponiveis().map(r=>`<option value="${esc(r)}">`).join('')}</datalist></div>
    <div class="field"><label>Resultado</label><select id="mInspResultado">${['Conforme','Ajustado','Não Conforme'].map(op=>`<option ${o.resultado===op?'selected':''}>${op}</option>`).join('')}</select></div>
    <div class="field" style="grid-column:1/-1"><label>Observações técnicas</label><textarea id="mInspObs" placeholder="Detalhe o que foi testado/observado">${esc(o.observacoes||'')}</textarea></div>
    <div class="field"><label>Fotos</label><input type="file" id="mInspFotos" accept="image/*" multiple></div>
    <div class="field"><label>Vídeos (opcional)</label><input type="file" id="mInspVideos" accept="video/*" multiple></div>
    <div class="field"><label>Documentos (opcional)</label><input type="file" id="mInspDocs" multiple></div>
  </div><br>
  <button class="btn" onclick="saveInspecao('${localId}','${i}')">Salvar teste</button> <button class="btn secondary" onclick="closeModal()">Cancelar</button>`);
}
async function saveInspecao(localId,i){
  const l=db.locais.find(x=>x.id===localId); if(!l)return;
  l.inspecoes=l.inspecoes||[];
  const resultado=document.getElementById('mInspResultado').value;
  const responsavel=n(document.getElementById('mInspResp').value);
  const observacoes=n(document.getElementById('mInspObs').value);
  const dataVal=document.getElementById('mInspData').value||isoNow();
  const [fotos,videos,documentos]=await Promise.all([
    readFilesAsDataUrls(document.getElementById('mInspFotos').files),
    readFilesAsDataUrls(document.getElementById('mInspVideos').files),
    readFilesAsDataUrls(document.getElementById('mInspDocs').files)
  ]);
  let rec=i?l.inspecoes.find(x=>x.id===i):{id:id(),criadoEm:isoNow()};
  if(!rec){rec={id:id(),criadoEm:isoNow()}}
  rec.data=dataVal;
  rec.responsavel=responsavel;
  rec.resultado=resultado;
  rec.observacoes=observacoes;
  rec.fotos=(rec.fotos||[]).concat(fotos);
  rec.videos=(rec.videos||[]).concat(videos);
  rec.documentos=(rec.documentos||[]).concat(documentos);
  if(!i)l.inspecoes.push(rec);

  // Regra: Conforme/Ajustado NÃO cria Falha. Não Conforme cria Falha + Plano de Ação vinculados.
  if(resultado==='Não Conforme'&&!rec.falhaGeradaId){
    const falhaRec={
      id:id(),data:isoNow(),painelId:l.painelId,lacoId:l.lacoId,piso:l.piso,tipo:'Inspeção',
      itemId:'',itemNome:l.nome,localId:l.id,status:'Falha em inspeção',statusAnterior:l.status||'Em operação',
      responsavel,origem:'Inspeção',motivo:'Não conformidade identificada em teste/inspeção',
      obs:observacoes,resolvidaEm:'',origemInspecaoId:rec.id
    };
    db.falhas.push(falhaRec);
    rec.falhaGeradaId=falhaRec.id;
    l.status=normalizeStatus(falhaRec.status);
    l.ultimaAlteracao=isoNow();
    if(!db.planos.find(p=>p.falhaId===falhaRec.id)){
      db.planos.push({id:id(),falhaId:falhaRec.id,criadoEm:isoNow(),categoria:'Manutenção corretiva',prioridade:'Média',
        responsavel:'L3A Engenharia',situacao:'Aberto',painel:paiName(falhaRec.painelId),laco:lacName(falhaRec.lacoId),
        piso:falhaRec.piso,local:locName(falhaRec.localId),item:falhaRec.itemNome,statusFalha:falhaRec.status,
        justificativa:falhaRec.motivo,providencia:'',necessitaCompra:false,material:''});
    }
  }
  closeModal();save();
  _localModalState={id:localId,tab:'historico'};
  openLocal(localId);
}
function verInspecao(localId,i){
  const l=db.locais.find(x=>x.id===localId); if(!l)return;
  const insp=(l.inspecoes||[]).find(x=>x.id===i); if(!insp)return;
  openModal(`<h2>Teste — ${esc(l.nome)}</h2>
  <p><b>Data:</b> ${esc(fmtDataHoraTexto?fmtDataHoraTexto(insp.data):insp.data)} • <b>Responsável:</b> ${esc(insp.responsavel||'—')} • <b>Resultado:</b> ${esc(insp.resultado)}</p>
  <p><b>Observações:</b> ${esc(insp.observacoes||'—')}</p>
  ${inspAnexosHtml(insp.fotos,'Fotos')}${inspAnexosHtml(insp.videos,'Vídeos')}${inspAnexosHtml(insp.documentos,'Documentos')}
  ${insp.falhaGeradaId?`<p class="msg warn" style="margin-top:10px">Esta inspeção gerou a Falha/Plano de Ação vinculado (não conformidade).</p>`:''}
  <br><button class="btn secondary" onclick="_localModalState={id:'${localId}',tab:'historico'};openLocal('${localId}')">Voltar</button>`);
}
function localModalSetTab(tab){_localModalState.tab=tab; if(tab!=='historico')_localHistoricoPeriodo=null; openLocal(_localModalState.id);}
function localModalDadosHtml(l){
  return `<p><b>LUC:</b> ${lucDisplayLocal(l)} • <b>Chave lógica:</b> ${esc(lucChaveLogicaLocal(l))} • <b>Tipo:</b> ${esc(l.tipo)} • <b>Painel:</b> ${esc(paiName(l.painelId))} • <b>Laço:</b> ${esc(lacName(l.lacoId))} • <b>Piso:</b> ${esc(l.piso)}</p>${l.nomeOriginalCadastro?`<p class="note"><b>Nome antigo:</b> ${esc(l.nomeOriginalCadastro)}</p>`:''}<p><b>Status atual:</b> ${dsBadgeHtml(l.status)}</p><div class="toolbar"><button class="btn small" onclick="formInspecao('${l.id}')">Executar Teste</button><button class="btn small secondary" onclick="formLocal('${l.id}')">Editar cadastro</button></div>`;
}
// eventoHistoricoBlocoHtml(): renderiza UM evento do histórico da loja como bloco expansível
// (Resumo sempre visível → <details> abre Detalhes + Evidências), com todos os campos pedidos
// para eventos de Plano de Ação concluído, e um resumo enxuto para os demais tipos de evento.
// Datas sempre passam por formatarDataHoraBR() — nunca ISO cru na tela.
function eventoHistoricoBlocoHtml(l,ev){
  const dataFmt=formatarDataHoraBR(ev.data);
  const resumoTopo=`<div class="tl"><b>${esc(ev.tipoEvento)}</b> • <small>${esc(dataFmt)} • ${esc(ev.responsavel||'Não informado')}</small><p>${esc(ev.titulo||'')}${ev.status?' — '+esc(ev.status):''}</p>`;
  if(ev.tipoEvento==='Plano concluído'){
    const c=ev.conclusaoPlano||{};
    const detalhes=`<div style="margin-top:8px;font-size:13px;line-height:1.7">
      <p><b>Data de abertura:</b> ${esc(formatarDataHoraBR(ev.dataAbertura))}</p>
      <p><b>Data de conclusão:</b> ${esc(formatarDataHoraBR(ev.dataConclusao))}</p>
      <p><b>Responsável:</b> ${esc(ev.responsavel||'Não informado')}</p>
      <p><b>Situação:</b> ${esc(c.situacaoPlano||'Não informado')}</p>
      <p><b>Status técnico inicial:</b> ${esc(ev.statusTecnicoInicial||'Não informado')}</p>
      <p><b>Resultado do atendimento:</b> ${esc(ev.resultado||'Não informado')}</p>
      <p><b>Status técnico final:</b> ${esc(c.statusTecnicoFinal||'Não informado')}</p>
      <p><b>Encaminhamento final:</b> ${esc(ev.encaminhamentoFinal||'Não informado')}</p>
      <p><b>Categoria:</b> ${esc(ev.categoria||'Não informado')}</p>
      <p><b>Execução realizada:</b> ${esc(ev.execucaoRealizada||'Não informado')}</p>
      <p><b>Observação técnica final:</b> ${esc(ev.descricao||'Não informado')}</p>
      <p><b>Providência:</b> ${esc((ev.plano&&ev.plano.providencia)||'Não informado')}</p>
      <p><b>Conclusão:</b> ${esc(c.conclusao||'Não informado')}</p>
    </div>`;
    return resumoTopo+`<details style="margin-top:6px"><summary style="cursor:pointer;font-weight:700;font-size:12.5px;color:var(--l3a-text-soft)">Detalhes e evidências</summary>${detalhes}<div style="margin-top:8px"><small class="note">Evidências (${ev.fotos||0})</small><div style="margin-top:6px">${eventoAnexosHtml(ev.anexos)}</div></div></details></div>`;
  }
  const linkDetalhe=ev.origem==='Inspeção'?`<button class="btn small secondary" style="margin-top:6px" onclick="verInspecao('${l.id}','${ev.origemId}')">Ver detalhes do teste</button>`:'';
  const anexosBloco=(ev.anexos&&ev.anexos.length)?`<details style="margin-top:6px"><summary style="cursor:pointer;font-weight:700;font-size:12.5px;color:var(--l3a-text-soft)">Evidências (${ev.fotos||0})</summary><div style="margin-top:6px">${eventoAnexosHtml(ev.anexos)}</div></details>`:'';
  const conclusaoTeste=ev.tipoEvento==='Teste'&&ev.conclusao?`<p class="note" style="margin-top:4px">${esc(ev.conclusao)}</p>`:'';
  const vinculos=ev.tipoEvento==='Teste'&&ev.falhaGeradaId?`<p class="msg warn" style="margin-top:6px">Falha gerada${ev.planoGeradoId?' e Plano de Ação gerado':''} por esta inspeção (não conformidade).</p>`:'';
  return resumoTopo+(ev.descricao?`<p>${esc(ev.descricao)}</p>`:'')+conclusaoTeste+vinculos+linkDetalhe+anexosBloco+'</div>';
}
function localModalHistoricoHtml(l){
  // Quando _localHistoricoPeriodo está definido (ver verHistoricoPeriodo/openLocal), a aba
  // Histórico reaproveita obterHistoricoLojaNoPeriodo() para mostrar só os eventos do intervalo
  // escolhido na tabela de Lojas/Áreas; sem período, também usa obterHistoricoLojaNoPeriodo() sem
  // limites de data, garantindo que TODOS os eventos (testes, falhas, planos) e seus campos
  // completos (datas, responsável, situação, resultado, conclusão, anexos) passem pelo mesmo
  // pipeline enriquecido — sem duplicidade e sem "undefined" em registros antigos.
  const periodoAtivo=_localHistoricoPeriodo&&(_localHistoricoPeriodo.de||_localHistoricoPeriodo.ate);
  const filtroHtml=`<div class="dsFilters" style="margin-bottom:10px">
    <div class="field"><label>De</label><input type="date" value="${esc((_localHistoricoPeriodo&&_localHistoricoPeriodo.de)||'')}" onchange="_localHistoricoPeriodo={de:this.value,ate:(_localHistoricoPeriodo&&_localHistoricoPeriodo.ate)||''};openLocal('${l.id}',_localHistoricoPeriodo)"></div>
    <div class="field"><label>Até</label><input type="date" value="${esc((_localHistoricoPeriodo&&_localHistoricoPeriodo.ate)||'')}" onchange="_localHistoricoPeriodo={de:(_localHistoricoPeriodo&&_localHistoricoPeriodo.de)||'',ate:this.value};openLocal('${l.id}',_localHistoricoPeriodo)"></div>
    ${periodoAtivo?`<div class="dsFilterActions"><button class="btn small secondary" onclick="_localHistoricoPeriodo=null;openLocal('${l.id}')">Limpar período</button></div>`:''}
  </div>`;
  const de=periodoAtivo?_localHistoricoPeriodo.de:'';
  const ate=periodoAtivo?_localHistoricoPeriodo.ate:'';
  const hist=obterHistoricoLojaNoPeriodo(l.id,de,ate);
  if(!hist.eventos.length)return filtroHtml+`<p class="msg warn">Sem eventos registrados${periodoAtivo?' no período selecionado':''}.</p>`;
  return filtroHtml+`<div class="timeline">${hist.eventos.slice().reverse().map(ev=>eventoHistoricoBlocoHtml(l,ev)).join('')}</div>`;
}
function openLocal(i,periodo){
  ensureLucSchema();
  let l=db.locais.find(x=>x.id===i); if(!l)return;
  l.inspecoes=l.inspecoes||[];
  if(periodo){_localHistoricoPeriodo=periodo; _localModalState={id:i,tab:'historico'};}
  else{_localModalState={id:i,tab:_localModalState.id===i?_localModalState.tab:'dados'};}
  const tab=_localModalState.tab;
  const tabs=[['dados','Dados'],['historico','Histórico']];
  const tabsHtml=tabs.map(([k,label])=>`<button class="btn small ${tab===k?'':'secondary'}" onclick="localModalSetTab('${k}')">${label}</button>`).join(' ');
  const body=tab==='historico'?localModalHistoricoHtml(l):localModalDadosHtml(l);
  openModal(`<h2>${esc(lucNomeOficialLocal(l))}</h2><div class="toolbar" style="margin-bottom:10px">${tabsHtml}</div>${body}`);
}
function bootSDAIManager(){
  try{
    ensureLucSchema();
    // A auditoria Falhas↔Plano de Ação já rodou dentro de load() (via normalizeAllStatuses, chamada
    // ANTES deste boot — ver `let db=load()`), então o `db` aqui embaixo já está corrigido. Só falta
    // persistir a correção localmente (se algo foi criado/removido) e avisar o usuário, senão a
    // rotina rodaria de novo a cada F5 sem nunca ficar "resolvido" para valer no navegador dele.
    const rel=db._ultimaAuditoriaPlanos;
    if(rel&&(rel.planosCriados>0||rel.duplicidadesRemovidas>0)){
      markDirty('sincronização automática Falhas↔Plano de Ação na abertura');
      console.warn('[SDAI] Auditoria Falhas↔Plano de Ação corrigiu inconsistências no carregamento:',rel);
    }
    render();
    setTimeout(verificarBaseAoAbrir,50);
  }catch(e){
    console.error('Falha crítica ao iniciar SDAI Manager:', e);
    const msg=(e&&e.message)?e.message:String(e);
    document.body.innerHTML=`<div style="font-family:Arial,sans-serif;background:#f3f6fa;min-height:100vh;padding:32px;color:#101828"><div style="max-width:760px;margin:0 auto;background:#fff;border:1px solid #e2e8f1;border-radius:16px;padding:24px;box-shadow:0 8px 22px rgba(16,24,40,.08)"><h1 style="margin:0 0 8px;color:#b42318">Falha ao carregar o SDAI Manager</h1><p>O sistema encontrou um erro de inicialização. Isso normalmente ocorre por cache antigo do navegador, base local corrompida ou arquivo publicado parcialmente no GitHub.</p><p><b>Erro técnico:</b> ${msg}</p><button onclick="localStorage.removeItem('sdai_bosch_manager_v4_flm_portas:currentUserId'); location.reload();" style="background:#0B5FAD;color:#fff;border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer">Recarregar sessão</button><button onclick="localStorage.removeItem('sdai_bosch_manager_v4_flm_portas'); localStorage.removeItem('sdai_bosch_manager_v4_flm_portas:currentUserId'); location.reload();" style="margin-left:8px;background:#fff;color:#0B5FAD;border:1px solid #cbd6e4;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer">Limpar base local e abrir</button></div></div>`;
  }
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',bootSDAIManager);
}else{
  bootSDAIManager();
}
</script>
