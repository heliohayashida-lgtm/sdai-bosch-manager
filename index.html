function ensurePhotoUploadFrame(){
  if(document.getElementById('photoUploadFrame'))return;
  const iframe=document.createElement('iframe');
  iframe.name='photoUploadFrame'; iframe.id='photoUploadFrame'; iframe.style.display='none';
  document.body.appendChild(iframe);
  window.addEventListener('message',e=>{if(e.data&&e.data.type==='fotoUploadResult')handleFotoUploadResult(e.data)});
}
function compressImageFile(file,maxWidth=1200,quality=0.72){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxWidth){h=Math.round(h*maxWidth/w);w=maxWidth}
        const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.onerror=reject; img.src=ev.target.result;
    };
    reader.onerror=reject; reader.readAsDataURL(file);
  });
}
let _fotoUploadQueue=[]; let _fotoUploadBusy=false; const _fotoUploadPending={};
function queueFotoUploads(planoId,files){
  ensurePhotoUploadFrame();
  const LIMITE_REJEITAR=30*1024*1024, LIMITE_AVISAR=8*1024*1024;
  let avisouGrande=false, rejeitadas=0;
  [...files].forEach(file=>{
    if(file.size>LIMITE_REJEITAR){rejeitadas++; return}
    if(file.size>LIMITE_AVISAR&&!avisouGrande){avisouGrande=true; alert('Uma ou mais fotos são grandes — o navegador pode levar alguns segundos pra comprimir antes de enviar. Aguarde sem fechar a janela.')}
    _fotoUploadQueue.push({planoId,file});
  });
  if(rejeitadas)alert(`${rejeitadas} foto(s) maior(es) que 30MB foram ignoradas — tire uma foto nova ou reduza o tamanho antes de anexar.`);
  updateFotoUploadStatus(); processFotoQueue();
}
function updateFotoUploadStatus(){
  const el=document.getElementById('mFotoStatus'); if(!el)return;
  const pend=Object.values(_fotoUploadPending);
  const total=_fotoUploadQueue.length+pend.length;
  if(!total){el.textContent='';return;}
  const aguardando=pend.filter(p=>!p.timedOut).length;
  const recuperando=pend.filter(p=>p.timedOut).length;
  let msg='';
  if(_fotoUploadQueue.length)msg+=`${_fotoUploadQueue.length} foto(s) na fila. `;
  if(aguardando)msg+=`Enviando ${aguardando} foto(s)... `;
  if(recuperando)msg+=`Aguardando confirmação do servidor (pode levar até 4 min)... `;
  el.textContent=msg.trim();
}
async function processFotoQueue(){
  if(_fotoUploadBusy||!_fotoUploadQueue.length)return;
  _fotoUploadBusy=true;
  const job=_fotoUploadQueue.shift();
  try{
    // Plantas baixas sobem em resolução maior (2000px) que fotos de serviço (1200px) — o traçado
    // arquitetônico precisa continuar legível com zoom. job.dataUrl pré-pronto (PDF já convertido
    // via PDF.js) pula a compressão.
    const dataUrl=job.dataUrl||await compressImageFile(job.file,job.destino==='planta'?2000:1200,job.destino==='planta'?0.85:0.72);
    const reqId=id();
    const nomeFoto=(job.file&&job.file.name)||job.filename||'foto';
    _fotoUploadPending[reqId]={planoId:job.planoId,filename:nomeFoto,timedOut:false,destino:job.destino||''};
    updateFotoUploadStatus();
    const form=document.createElement('form');
    form.method='POST'; form.action=API_URL; form.target='photoUploadFrame'; form.style.display='none';
    const fields={action:'uploadFoto',token:getApiToken(),reqId,planoId:job.planoId,filename:nomeFoto,imageData:dataUrl,...(job.destino?{destino:job.destino}:{})};
    Object.entries(fields).forEach(([k,v])=>{const inp=document.createElement('input');inp.type='hidden';inp.name=k;inp.value=v;form.appendChild(inp)});
    document.body.appendChild(form); form.submit(); setTimeout(()=>form.remove(),2000);
    // Polling independente: consulta o diagnóstico a cada 10s por até 4 minutos
    let tentativas=0; let resolvido=false;
    const pollTimer=setInterval(async()=>{
      if(resolvido||!_fotoUploadPending[reqId]){clearInterval(pollTimer);return;}
      tentativas++;
      try{
        const r=await jsonp('debugFoto');
        if(!r||!r.ok)return;
        const linhas=r.log.split('\n');
        // Procura linha de SUCESSO para este planoId, ou pelo nome do arquivo (fallback p/ Code.gs antigo)
        const sucessoLinha=linhas.find(l=>l.includes('SUCESSO')&&(l.includes(job.planoId)||l.includes(nomeFoto)));
        if(sucessoLinha){
          const mId=sucessoLinha.match(/id=([a-zA-Z0-9_-]{25,})/);
          if(mId){
            resolvido=true; clearInterval(pollTimer);
            const fileId=mId[1];
            const url='https://drive.google.com/thumbnail?id='+fileId+'&sz=w800';
            handleFotoUploadResult({reqId,ok:true,url,planoId:job.planoId,conta:'(recuperado via polling)'});
            return;
          }
        }
        // Procura linha de ERRO para este planoId
        const erroLinha=linhas.find(l=>l.includes('ERRO')&&l.includes(job.planoId));
        if(erroLinha&&tentativas>2){
          resolvido=true; clearInterval(pollTimer);
          handleFotoUploadResult({reqId,ok:false,error:erroLinha,planoId:job.planoId});
          return;
        }
      }catch(_e){}
      if(tentativas>=24){
        resolvido=true; clearInterval(pollTimer);
        if(_fotoUploadPending[reqId]){
          delete _fotoUploadPending[reqId];
          const el=document.getElementById('mFotoStatus');
          if(el)el.textContent=`Foto "${nomeFoto}" não confirmada em 4 minutos. Verifique a pasta no Drive.`;
          updateFotoUploadStatus();
          _fotoUploadBusy=false; processFotoQueue();
        }
      }
    },10000);
  }catch(e){
    alert('Não foi possível preparar a foto: '+e.message);
    _fotoUploadBusy=false; processFotoQueue();
  }
}
function handleFotoUploadResult(data){
  _fotoUploadBusy=false;
  const pend=_fotoUploadPending[data.reqId];
  if(pend){
    if(pend.destino==='planta'){
      // Upload de imagem de planta baixa: grava a URL (nunca o dataURL/base64) no registro da planta.
      if(data.ok&&data.url){
        const pl=(db.plantas||[]).find(x=>x.id===pend.planoId);
        if(pl){
          pl.imagemUrl=String(data.url).replace(/sz=w\d+/,'sz=w2000');
          pl.atualizadoEm=isoNow();
          // Dimensões naturais: carrega a imagem uma vez só para gravar imagemW/H (aspect-ratio).
          const im=new Image();
          im.onload=()=>{pl.imagemW=im.naturalWidth;pl.imagemH=im.naturalHeight;markDirty('dimensões da planta baixa');if(currentView==='plantas')renderPlantas()};
          im.src=pl.imagemUrl;
          markDirty('imagem da planta baixa enviada');
          if(currentView==='plantas')renderPlantas();
        }
      } else {
        alert('Falha ao enviar a imagem da planta: '+(data.error||'erro desconhecido no Apps Script'));
        const pl=(db.plantas||[]).find(x=>x.id===pend.planoId);
        if(pl&&!pl.imagemUrl){pl.uploadFalhou=true;if(currentView==='plantas')renderPlantas()}
      }
      delete _fotoUploadPending[data.reqId];
      updateFotoUploadStatus();
      processFotoQueue();
      return;
    }
    if(data.ok&&data.url){
      const plano=(db.planos||[]).find(p=>p.id===pend.planoId);
      if(plano){plano.fotos=normalizeFotos(plano.fotos);plano.fotos.push(data.url);markDirty('foto anexada ao plano');renderPlano();const grid=document.getElementById('mFotoGrid');if(grid)grid.innerHTML=fotosThumbsHtml(plano.fotos,72,plano.id)}
      if(pend.timedOut){alert('Foto recebida com sucesso (chegou depois do aviso de demora). Já foi salva no chamado.');}
      if(data.conta&&!window._contaFotoAvisada){window._contaFotoAvisada=true;const elc=document.getElementById('mFotoConta');if(elc)elc.innerHTML=`Foto salva na conta <b>${esc(data.conta)}</b>${data.pastaUrl?` — <a href="${esc(data.pastaUrl)}" target="_blank" rel="noopener">abrir pasta no Drive</a>`:''}.`}
    } else {
      alert('Falha ao enviar uma foto: '+(data.error||'erro desconhecido no Apps Script')+(data.conta?`\n\nConta: ${data.conta}`:''));
    }
    delete _fotoUploadPending[data.reqId];
  }
  updateFotoUploadStatus();
  processFotoQueue();
}

function confirmarResultadoPlano(i){

  const val=id=>document.getElementById(id)?.value ?? '';

  const dataInformada=val('mrData'); const respInformado=n(val('mrResp'))||o.responsavel;
  const execucao=n(val('mrExecucao')); const obsTecnica=n(val('mrObs'));
  criarNotificacao(respInformado,`Plano de ação concluído: ${o.local||''} — ${o.item||''}`.trim(),'plano');
  // Data informada pelo técnico no modal (input datetime-local) é usada verbatim quando presente;
  // só cai para isoNow() se o campo veio vazio.
  const dataConclusao=(dataInformada&&dataInformada.trim())?dataInformada.trim():isoNow();
  o.situacao='Concluído'; o.concluidoEm=dataConclusao; o.resultado=resultado; o.responsavel=respInformado;
  o.execucaoRealizada=execucao; o.observacaoTecnica=obsTecnica; o.providencia=execucao||o.providencia;
  o.fotos=normalizeFotos(o.fotos);
  let f=db.falhas.find(x=>x.id===o.falhaId);
  if(resultado==='Conforme'){
    if(f){
      // Falha original marcada como resolvida em Em operação — evita duplicar registro em db.falhas.
      f.status='Em operação'; f.resolvidaEm=dataConclusao; f.atualizadoEm=dataConclusao;
      let itemId=f.itemId||'';let isFlm=String(itemId).startsWith('flm:');let item=isFlm?flmById(String(itemId).slice(4)):db.equipamentos.find(e=>e.id===itemId);let loc=localById(f.localId||'');
      if(item){item.status='Em operação';item.ultimaAlteracao=dataConclusao} if(loc){loc.status='Em operação';loc.ultimaAlteracao=dataConclusao}
    }
    logLocal('plano',o.id,'concluir_conforme','Plano de ação concluído (Conforme): '+(o.local||'')+' — '+(o.item||''));
    closeModal(); save(); render();
    alert('Plano concluído. Status do equipamento e da loja atualizado para Em operação.');
  } else {
    if(f){f.atualizadoEm=dataConclusao}
    if(!o.direcionamento||!/notificar lojista/i.test(o.direcionamento)){
      o.direcionamento=o.direcionamento?(o.direcionamento+' | Notificar lojista'):'Notificar lojista';
    }
    // Campos estruturados (além do direcionamento em texto livre, mantido por compatibilidade de
    // exibição): permitem consultar/filtrar sem depender de regex sobre texto livre.
    o.falhaPermaneceAtiva=true;
    o.statusTecnicoFinal=(f&&f.status)||o.statusFalha||'';
    o.encaminhamento='Notificar lojista';
    o.conclusaoTecnica=execucao||obsTecnica||'';
    logLocal('plano',o.id,'concluir_nao_conforme','Plano de ação concluído (Não Conforme): '+(o.local||'')+' — '+(o.item||''));
    closeModal(); save(); render();
    alert('Plano concluído como Não Conforme. A falha permanece ativa e o lojista será notificado.');
  }
}

   MIGRAÇÃO DE BASE LEGADA (single-tenant → cliente multi-tenant)
   ========================================================================= */
let _baseLegadaCarregadaDeArquivo=null;
const _MIGRACAO_ENTIDADES=['paineis','lacos','flms','portas','locais','equipamentos','falhas','planos','testes','historico','plantas','baseLojas','conflitosAssociacao'];

function _classificarBaseLegada(dbObj,origem){
  if(!dbObj||typeof dbObj!=='object')return{encontrada:false};
  const contagens={};
  _MIGRACAO_ENTIDADES.forEach(k=>{contagens[k]=Array.isArray(dbObj[k])?dbObj[k].length:0});
  let anexos=0;
  ['planos','falhas'].forEach(k=>{(dbObj[k]||[]).forEach(r=>{if(r&&Array.isArray(r.fotos))anexos+=r.fotos.length})});
  contagens.anexos=anexos;
  const estruturais=['paineis','lacos','flms','portas','locais','equipamentos'];
  const totalEstrutural=estruturais.reduce((t,k)=>t+(contagens[k]||0),0);
  const totalRegistros=['paineis','lacos','flms','portas','locais','equipamentos','falhas','planos','testes','plantas','baseLojas','conflitosAssociacao'].reduce((t,k)=>t+(contagens[k]||0),0);
  if(totalEstrutural<=0&&totalRegistros<=0)return{encontrada:false};
  // Verifica se já existe algum cliente cuja base tem assinatura de contagem idêntica
  let provavelJaMigrada=false;
  try{
    const clientes=loadClientes();
    for(const c of clientes){
      const cdb=loadClienteDb(c.id);
      const sameAll=_MIGRACAO_ENTIDADES.every(k=>(Array.isArray(cdb[k])?cdb[k].length:0)===(contagens[k]||0));
      if(sameAll&&totalRegistros>0){provavelJaMigrada=true;break}
    }
  }catch(e){}
  return{
    encontrada:true,
    provavelJaMigrada,
    origem,
    versaoDetectada:(dbObj.config&&dbObj.config.appName?dbObj.config.appName:'')+' / '+(dbObj._revision?('rev '+dbObj._revision):'sem controle de revisão'),
    ultimaAtualizacao:dbObj._updatedAt||null,
    contagens,
    totalRegistros,
    raw:dbObj
  };
}
function detectarBaseLegada(){
  try{
    const raw=localStorage.getItem(KEY);
    if(!raw)return{encontrada:false};
    const parsed=JSON.parse(raw);
    return _classificarBaseLegada(parsed,'localStorage legado ('+KEY+')');
  }catch(e){return{encontrada:false}}
}
function detectarBaseLegadaDeArquivo(parsedJson){
  try{return _classificarBaseLegada(parsedJson,'arquivo de backup JSON');}catch(e){return{encontrada:false}}
}
function carregarBaseLegadaDeArquivo(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const parsed=JSON.parse(reader.result);
      const res=detectarBaseLegadaDeArquivo(parsed);
      if(!res.encontrada){alert('Nenhuma base legada com dados SDAI foi encontrada neste arquivo.');return}
      _baseLegadaCarregadaDeArquivo=res;
      renderSistema();
    }catch(e){alert('Arquivo inválido: '+e.message)}
  };
  reader.readAsText(file);
}
function renderPainelMigracaoLegado(){
  const det=detectarBaseLegada();
  const res=(det.encontrada?det:null)||_baseLegadaCarregadaDeArquivo;
  if(!res||!res.encontrada){
    return `<h3>Migração de banco antigo</h3>
    <p class="mutedLine">Nenhuma base legada detectada no armazenamento local deste navegador.</p>
    <p class="mutedLine" style="margin-top:10px">Também é possível carregar uma base antiga a partir de um arquivo de backup JSON:</p>
    <div class="premiumActions"><input type="file" id="migArquivoInput" accept="application/json,.json" onchange="carregarBaseLegadaDeArquivo(this.files[0])"></div>`;
  }
  const c=res.contagens;
  return `<h3>Migração de banco antigo</h3>
  <p class="mutedLine">Base legada detectada. Origem: ${esc(res.origem)}. Versão: ${esc(res.versaoDetectada)}. Última atualização: ${res.ultimaAtualizacao?esc(res.ultimaAtualizacao):'não disponível'}.</p>
  ${res.provavelJaMigrada?'<p class="msg warn">Atenção: esta base já pode ter sido migrada anteriormente — verifique antes de migrar novamente.</p>':''}
  <div class="premiumGrid" style="margin-top:12px">
    ${premiumStat('Painéis',c.paineis)}${premiumStat('Laços',c.lacos)}${premiumStat('Módulos (FLMs)',c.flms)}${premiumStat('Portas',c.portas)}
    ${premiumStat('Equipamentos',c.equipamentos)}${premiumStat('Lojas/Áreas',c.locais)}${premiumStat('Falhas',c.falhas)}${premiumStat('Planos',c.planos)}
    ${premiumStat('Testes',c.testes)}${premiumStat('Históricos',c.historico)}${premiumStat('Plantas',c.plantas)}${premiumStat('Anexos',c.anexos)}
  </div>
  <div class="premiumActions" style="margin-top:14px"><button class="btn" onclick="abrirMigracaoModal()">Migrar base antiga para cliente</button></div>`;
}

function avancarParaPreviaMigracao(){
  const det=_baseLegadaAtual();
  if(!det.encontrada){alert('Base legada não encontrada.');return}
  const tipo=(document.querySelector('input[name="migDestinoTipo"]:checked')||{}).value;
  const modo=(document.getElementById('migModoSelect')||{}).value;
  const motivo=(document.getElementById('migMotivoTexto')||{}).value||'';
  if(modo==='substituir_completo'){
    if(!isMaster(currentUserSafe())){alert('Somente o perfil Master pode usar o modo de substituição completa.');return}
    if(!motivo.trim()){alert('Informe o motivo da substituição completa.');return}
  }
  let destinoClienteId=null, novoClienteData=null;
  if(tipo==='existente'){
    destinoClienteId=(document.getElementById('migClienteSelect')||{}).value;
    if(!destinoClienteId){alert('Selecione um cliente.');return}
    const c=loadClientes().find(x=>x.id===destinoClienteId);
    if(!c){alert('Cliente não encontrado.');return}
    if(!(c.modulos||[]).includes('sdai')){
      const habilitar=(document.getElementById('migHabilitarSdai')||{}).checked;
      if(!habilitar){alert('O módulo SDAI precisa estar habilitado no cliente para migrar.');return}
      const clientes=loadClientes(); const idx=clientes.findIndex(x=>x.id===destinoClienteId);
      clientes[idx].modulos=[...new Set([...(clientes[idx].modulos||[]),'sdai'])];
      saveClientes(clientes);
    }
  } else {
    const nome=(document.getElementById('cliNome')||{}).value;
    if(!nome||!nome.trim()){alert('Informe o nome do novo cliente.');return}
    salvarCliente(); // reaproveita fluxo existente (fecha o modal, mas recuperamos o id abaixo)
    const clientes=loadClientes();
    const criado=clientes.find(x=>x.nome.trim()===nome.trim());
    if(!criado){alert('Falha ao criar o novo cliente.');return}
    destinoClienteId=criado.id;
    novoClienteData=criado;
  }
  montarPreviaMigracao(det.raw,destinoClienteId,novoClienteData,modo,motivo,det);
}

function _norm(s){return String(s||'').trim().toLowerCase()}
function detectarConflitosMigracao(origemDb,destinoDb){
  const resultado={};
  const mapId={}; // origemId -> destinoId resolvido, por entidade
  const orfaos=[];
  const registrar=(ent,novos,jaExistem,conflitos)=>{resultado[ent]={novos,jaExistem,conflitos}};

  // Painel: por nome normalizado
  const painelMapId={};
  const painelNovos=[],painelExistem=[],painelConflitos=[];
  (origemDb.paineis||[]).forEach(p=>{
    const match=(destinoDb.paineis||[]).find(d=>_norm(d.nome)===_norm(p.nome));
    if(match){painelExistem.push(p);painelMapId[p.id]=match.id;}
    else{painelNovos.push(p);painelMapId[p.id]=p.id;}
  });
  registrar('paineis',painelNovos,painelExistem,painelConflitos);

  // Laço: (painelId resolvido, nome)
  const lacoMapId={};
  const lacoNovos=[],lacoExistem=[],lacoConflitos=[];
  (origemDb.lacos||[]).forEach(l=>{
    if(!(origemDb.paineis||[]).some(p=>p.id===l.painelId))orfaos.push('Laço "'+(l.nome||l.id)+'" com painelId órfão na origem');
    const painelResolvido=painelMapId[l.painelId];
    const painelFoiReaproveitado=(destinoDb.paineis||[]).some(d=>d.id===painelResolvido);
    let match=null;
    if(painelFoiReaproveitado)match=(destinoDb.lacos||[]).find(d=>d.painelId===painelResolvido&&_norm(d.nome)===_norm(l.nome));
    if(match){lacoExistem.push(l);lacoMapId[l.id]=match.id;}
    else{lacoNovos.push(l);lacoMapId[l.id]=l.id;}
  });
  registrar('lacos',lacoNovos,lacoExistem,lacoConflitos);

  // FLM: (painelId resolvido, endereco)
  const flmMapId={};
  const flmNovos=[],flmExistem=[],flmConflitos=[];
  (origemDb.flms||[]).forEach(f=>{
    if(!(origemDb.paineis||[]).some(p=>p.id===f.painelId))orfaos.push('FLM "'+(f.endereco||f.id)+'" com painelId órfão na origem');
    const painelResolvido=painelMapId[f.painelId];
    const reaproveitado=(destinoDb.paineis||[]).some(d=>d.id===painelResolvido);
    let match=null;
    if(reaproveitado)match=(destinoDb.flms||[]).find(d=>d.painelId===painelResolvido&&_norm(d.endereco)===_norm(f.endereco));
    if(match){flmExistem.push(f);flmMapId[f.id]=match.id;}
    else{flmNovos.push(f);flmMapId[f.id]=f.id;}
  });
  registrar('flms',flmNovos,flmExistem,flmConflitos);

  // Porta: (flmId resolvido, numero)
  const portaMapId={};
  const portaNovos=[],portaExistem=[],portaConflitos=[];
  (origemDb.portas||[]).forEach(pt=>{
    if(!(origemDb.flms||[]).some(f=>f.id===pt.flmId))orfaos.push('Porta "'+(pt.numero||pt.id)+'" com flmId órfão na origem');
    const flmResolvido=flmMapId[pt.flmId];
    const reaproveitado=(destinoDb.flms||[]).some(d=>d.id===flmResolvido);
    let match=null;
    if(reaproveitado)match=(destinoDb.portas||[]).find(d=>d.flmId===flmResolvido&&String(d.numero)===String(pt.numero));
    if(match){portaExistem.push(pt);portaMapId[pt.id]=match.id;}
    else{portaNovos.push(pt);portaMapId[pt.id]=pt.id;}
  });
  registrar('portas',portaNovos,portaExistem,portaConflitos);

  // Loja/Área: (portaId resolvido, enderecoFisico) ou (portaId, nome normalizado); LUC mismatch -> conflito
  const locaisMapId={};
  const locaisNovos=[],locaisExistem=[],locaisConflitos=[];
  (origemDb.locais||[]).forEach(loc=>{
    const portaResolvida=portaMapId[loc.portaId];
    const reaproveitado=loc.portaId&&(destinoDb.portas||[]).some(d=>d.id===portaResolvida);
    let match=null;
    if(reaproveitado){
      match=(destinoDb.locais||[]).find(d=>d.portaId===portaResolvida&&(
        (loc.enderecoFisico&&d.enderecoFisico&&_norm(d.enderecoFisico)===_norm(loc.enderecoFisico))||
        (!loc.enderecoFisico&&_norm(d.nome)===_norm(loc.nome))
      ));
    }
    if(match){
      if(loc.luc&&match.luc&&String(loc.luc)!==String(match.luc)){
        locaisConflitos.push({registro:loc,motivo:`Loja "${loc.nome}": LUC diverge — origem tem LUC ${loc.luc}, destino já tem loja com LUC ${match.luc} no mesmo endereço físico.`});
      } else {
        locaisExistem.push(loc);
      }
      locaisMapId[loc.id]=match.id;
    } else {locaisNovos.push(loc);locaisMapId[loc.id]=loc.id;}
  });
  registrar('locais',locaisNovos,locaisExistem,locaisConflitos);

  // Equipamento: (painelId, lacoId, endereco, modelo, tipo) resolvidos
  const equipMapId={};
  const equipNovos=[],equipExistem=[],equipConflitos=[];
  (origemDb.equipamentos||[]).forEach(eq=>{
    const painelR=painelMapId[eq.painelId], lacoR=lacoMapId[eq.lacoId];
    const reaproveitado=(destinoDb.paineis||[]).some(d=>d.id===painelR)&&(destinoDb.lacos||[]).some(d=>d.id===lacoR);
    let match=null;
    if(reaproveitado)match=(destinoDb.equipamentos||[]).find(d=>d.painelId===painelR&&d.lacoId===lacoR&&_norm(d.endereco)===_norm(eq.endereco)&&_norm(d.modelo)===_norm(eq.modelo)&&_norm(d.tipo)===_norm(eq.tipo));
    if(match){equipExistem.push(eq);equipMapId[eq.id]=match.id;}
    else{equipNovos.push(eq);equipMapId[eq.id]=eq.id;}
  });
  registrar('equipamentos',equipNovos,equipExistem,equipConflitos);

  // Falha: (itemId resolvido, localId resolvido, dataAbertura||data)
  const falhaMapId={};
  const falhaNovos=[],falhaExistem=[],falhaConflitos=[];
  (origemDb.falhas||[]).forEach(fl=>{
    const itemR=equipMapId[fl.itemId]||flmMapId[fl.itemId]||fl.itemId;
    const localR=locaisMapId[fl.localId]||fl.localId;
    const dataFl=fl.dataAbertura||fl.data;
    const match=(destinoDb.falhas||[]).find(d=>{
      const dItem=equipMapId[d.itemId]||d.itemId, dLocal=locaisMapId[d.localId]||d.localId, dData=d.dataAbertura||d.data;
      return d.itemId===itemR&&d.localId===localR&&String(dData)===String(dataFl);
    });
    if(match){falhaExistem.push(fl);falhaMapId[fl.id]=match.id;}
    else{falhaNovos.push(fl);falhaMapId[fl.id]=fl.id;}
  });
  registrar('falhas',falhaNovos,falhaExistem,falhaConflitos);

  // Plano: falhaId resolvido
  const planoMapId={};
  const planoNovos=[],planoExistem=[],planoConflitos=[];
  (origemDb.planos||[]).forEach(pl=>{
    const falhaR=falhaMapId[pl.falhaId]||pl.falhaId;
    const match=(destinoDb.planos||[]).find(d=>d.falhaId===falhaR);
    if(match){planoExistem.push(pl);planoMapId[pl.id]=match.id;}
    else{planoNovos.push(pl);planoMapId[pl.id]=pl.id;}
  });
  registrar('planos',planoNovos,planoExistem,planoConflitos);

  return{buckets:resultado,orfaos,maps:{paineis:painelMapId,lacos:lacoMapId,flms:flmMapId,portas:portaMapId,locais:locaisMapId,equipamentos:equipMapId,falhas:falhaMapId,planos:planoMapId}};
}

let _migPreviaCtx=null;
function montarPreviaMigracao(origemDb,destinoClienteIdOuNull,novoClienteData,modo,motivo,detCache){
  const cliente=loadClientes().find(x=>x.id===destinoClienteIdOuNull);
  const destinoDb=loadClienteDb(destinoClienteIdOuNull);
  const conflitos=detectarConflitosMigracao(origemDb,destinoDb);
  _migPreviaCtx={origemDb,destinoClienteId:destinoClienteIdOuNull,modo,motivo,conflitos};
  const ordem=['paineis','lacos','flms','portas','locais','equipamentos','falhas','planos'];
  const labels={paineis:'Painéis',lacos:'Laços',flms:'FLMs',portas:'Portas',locais:'Lojas/Áreas',equipamentos:'Equipamentos',falhas:'Falhas',planos:'Planos'};
  let linhas=ordem.map(k=>{
    const b=conflitos.buckets[k];
    return `<tr><td>${labels[k]}</td><td>${b.novos.length}</td><td>${b.jaExistem.length}</td><td>${b.conflitos.length}</td></tr>`;
  }).join('');
  const conflitosDetalhe=ordem.flatMap(k=>conflitos.buckets[k].conflitos.map(c=>c.motivo||JSON.stringify(c))).join('<br>')||'Nenhum conflito detectado.';
  const orfaosDetalhe=conflitos.orfaos.length?conflitos.orfaos.join('<br>'):'Nenhuma relação órfã detectada na origem.';
  const html=`<h3 style="margin:0 0 12px">Prévia da migração</h3>
  <p class="mutedLine">Origem: ${esc((_migPreviaCtx.origemDb.config&&_migPreviaCtx.origemDb.config.appName)||'Base antiga')} — Destino: ${esc(cliente?cliente.nome:'')} (Subsistema: SDAI) — Modo: ${esc(modo)}</p>
  <div class="tableWrap"><table><thead><tr><th>Entidade</th><th>Novos</th><th>Já existem</th><th>Conflitos</th></tr></thead><tbody>${linhas}</tbody></table></div>
  <h4 style="margin-top:14px">Conflitos detectados</h4>
  <div style="max-height:160px;overflow:auto;font-size:12px" class="mutedLine">${conflitosDetalhe}</div>
  <h4 style="margin-top:14px">Relações órfãs na origem (informativo)</h4>
  <div style="max-height:120px;overflow:auto;font-size:12px" class="mutedLine">${orfaosDetalhe}</div>
  <div style="display:flex;gap:8px;margin-top:18px;justify-content:flex-end">
    <button class="btn secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn" onclick="executarMigracaoLegada(_migPreviaCtx.origemDb,_migPreviaCtx.destinoClienteId,_migPreviaCtx.modo,_migPreviaCtx.motivo)">Confirmar migração</button>
  </div>`;
  openModal(html);
}

function _sanitizaTimestamp(){return isoNow().replace(/[:.]/g,'-')}
function _campoRico(v){return v!==undefined&&v!==null&&v!==''}

function executarMigracaoLegada(origemDb,destinoClienteId,modo,motivoSubstituicao){
  if(!_migPreviaCtx){alert('Contexto de migração perdido. Reabra a migração.');return}
  const conflitos=_migPreviaCtx.conflitos;
  const cliente=loadClientes().find(x=>x.id===destinoClienteId);
  if(!cliente){alert('Cliente destino não encontrado.');return}

  // 1) Backup obrigatório
  let backupOrigemStr,backupDestinoStr;
  const destinoAntes=loadClienteDb(destinoClienteId);
  try{
    backupOrigemStr=JSON.stringify(origemDb,null,2);
    backupDestinoStr=JSON.stringify(destinoAntes,null,2);
  }catch(e){alert('Falha ao gerar backup de segurança. Migração abortada — nenhum dado foi alterado. ('+e.message+')');return}
  const ts=_sanitizaTimestamp();
  const nomeBackupOrigem='backup_origem_legado_'+ts+'.json';
  const nomeBackupDestino='backup_destino_'+(cliente.nome||'cliente').replace(/[^a-z0-9]+/gi,'_')+'_'+ts+'.json';
  download(backupOrigemStr,nomeBackupOrigem,'application/json');
  download(backupDestinoStr,nomeBackupDestino,'application/json');
  const checksumOrigem=(typeof checksumColecoes==='function')?checksumColecoes(origemDb):String(backupOrigemStr.length);
  const checksumDestino=(typeof checksumColecoes==='function')?checksumColecoes(destinoAntes):String(backupDestinoStr.length);

  // 2) Guardas do modo substituir_completo
  if(modo==='substituir_completo'){
    if(!isMaster(currentUserSafe())){alert('Somente o perfil Master pode executar a substituição completa.');return}
    if(!motivoSubstituicao||!motivoSubstituicao.trim()){alert('Informe o motivo da substituição completa.');return}
    if(!confirm('Isso vai APAGAR todo o SDAI atual do cliente e substituir pelos dados migrados. Esta ação não pode ser desfeita (mas você já baixou os backups). Confirma?'))return;
  }

  // 3) Migração propriamente dita
  const destino=loadClienteDb(destinoClienteId);
  const maps=conflitos.maps;
  const idColisao=new Map(); // (entidade->Map origemId->novoId) quando há colisão de id
  const stats={};
  const ordem=['paineis','lacos','flms','portas','locais','equipamentos','falhas','planos','testes','plantas'];

  if(modo==='substituir_completo'){
    ['paineis','lacos','flms','portas','locais','equipamentos','falhas','planos','testes','plantas','baseLojas','conflitosAssociacao'].forEach(k=>{destino[k]=[]});
  }

  const refFields={
    lacos:{painelId:'paineis'},
    flms:{painelId:'paineis'},
    portas:{flmId:'flms'},
    locais:{portaId:'portas',painelId:'paineis',lacoId:'lacos'},
    equipamentos:{painelId:'paineis',lacoId:'lacos',flmId:'flms',portaId:'portas',localId:'locais'},
    falhas:{itemId:'equipamentos',localId:'locais'},
    planos:{falhaId:'falhas'}
  };

  function migrarEntidade(ent){
    const bucket=conflitos.buckets[ent];
    const mapaEnt=maps[ent]||{};
    const arr=(origemDb[ent]||[]);
    let criados=0,atualizados=0,pulados=0;
    const idsColisaoEnt=new Map();
    const processa=(rec,isNovo)=>{
      const clone=JSON.parse(JSON.stringify(rec));
      // resolve referências usando os mapas já calculados na fase de conflito
      const refs=refFields[ent]||{};
      Object.keys(refs).forEach(campo=>{
        const entRef=refs[campo];
        const mapaRef=maps[entRef];
        if(mapaRef&&clone[campo]!==undefined&&mapaRef[clone[campo]]!==undefined){
          let resolvido=mapaRef[clone[campo]];
          const remap=idColisao.get(entRef);
          if(remap&&remap.has(resolvido))resolvido=remap.get(resolvido);
          clone[campo]=resolvido;
        }
      });
      // falha.itemId pode referenciar um equipamento OU um FLM (fallback quando não resolvido por equipamentos)
      if(ent==='falhas'&&maps.flms&&maps.flms[rec.itemId]!==undefined&&!(maps.equipamentos&&maps.equipamentos[rec.itemId]!==undefined)){
        let resolvido=maps.flms[rec.itemId];
        const remap=idColisao.get('flms');
        if(remap&&remap.has(resolvido))resolvido=remap.get(resolvido);
        clone.itemId=resolvido;
      }
      if(isNovo){
        let novoId=clone.id;
        const colideComOutro=(destino[ent]||[]).some(d=>d.id===novoId);
        if(colideComOutro){
          novoId=id();
          idsColisaoEnt.set(clone.id,novoId);
          clone.id=novoId;
        }
        clone.clienteId=destinoClienteId;clone.subsistema='sdai';clone.migradoEm=isoNow();
        clone.migradoPor=(currentUser().email||currentUser().nome||'sistema');
        clone.versaoOrigem=(origemDb.config&&origemDb.config.appName?origemDb.config.appName:'')+' '+(origemDb._revision?('rev '+origemDb._revision):'');
        clone.origemMigracao='base_legada';
        destino[ent]=destino[ent]||[];
        destino[ent].push(clone);
        criados++;
      } else {
        // atualizar_equivalentes: mescla no registro existente
        const destId=mapaEnt[rec.id];
        const existente=(destino[ent]||[]).find(d=>d.id===destId);
        if(!existente){pulados++;return}
        Object.assign(existente,{clienteId:destinoClienteId,subsistema:'sdai',migradoEm:isoNow(),migradoPor:(currentUser().email||currentUser().nome||'sistema'),versaoOrigem:clone.versaoOrigem,origemMigracao:'base_legada'});
        Object.keys(clone).forEach(campo=>{
          if(['id','clienteId','subsistema','migradoEm','migradoPor','versaoOrigem','origemMigracao'].includes(campo))return;
          if(!_campoRico(existente[campo])&&_campoRico(clone[campo]))existente[campo]=clone[campo];
        });
        atualizados++;
      }
    };
    if(modo==='substituir_completo'){
      arr.forEach(rec=>processa(rec,true));
    } else if(modo==='atualizar_equivalentes'){
      bucket.novos.forEach(rec=>processa(rec,true));
      bucket.jaExistem.forEach(rec=>processa(rec,false));
      pulados+=bucket.conflitos.length;
    } else { // apenas_novos
      bucket.novos.forEach(rec=>processa(rec,true));
      pulados+=bucket.jaExistem.length+bucket.conflitos.length;
    }
    if(idsColisaoEnt.size)idColisao.set(ent,idsColisaoEnt);
    stats[ent]={criados,atualizados,pulados};
  }
  ['paineis','lacos','flms','portas','locais','equipamentos','falhas','planos'].forEach(migrarEntidade);
  // testes/plantas: sem regra de dedup específica pedida — tratadas como "sempre novas" (apenas_novos/atualizar) ou substituídas (substituir_completo)
  ['testes','plantas'].forEach(ent=>{
    const arr=origemDb[ent]||[];
    let criados=0;
    arr.forEach(rec=>{
      const clone=JSON.parse(JSON.stringify(rec));
      const colide=(destino[ent]||[]).some(d=>d.id===clone.id);
      if(colide)clone.id=id();
      clone.clienteId=destinoClienteId;clone.subsistema='sdai';clone.migradoEm=isoNow();
      clone.migradoPor=(currentUser().email||currentUser().nome||'sistema');clone.origemMigracao='base_legada';
      destino[ent]=destino[ent]||[];destino[ent].push(clone);criados++;
    });
    stats[ent]={criados,atualizados:0,pulados:0};
  });
  // historico, baseLojas, conflitosAssociacao, configurações relevantes: copiadas como novas entradas informativas
  ['historico','baseLojas','conflitosAssociacao'].forEach(ent=>{
    const arr=origemDb[ent]||[];
    let criados=0;
    arr.forEach(rec=>{
      const clone=JSON.parse(JSON.stringify(rec));
      const colide=(destino[ent]||[]).some(d=>d.id===clone.id);
      if(colide)clone.id=id();
      destino[ent]=destino[ent]||[];destino[ent].push(clone);criados++;
    });
    stats[ent]={criados,atualizados:0,pulados:0};
  });

  // 4) Log de migração (grava direto na coleção historico do destino — não usa logLocal/persistLocal
  // aqui porque ambos dependem do cliente ATIVO em localStorage, que pode não ser o destino da migração)
  const resumoStr=Object.keys(stats).map(k=>`${k}: +${stats[k].criados} novos, ~${stats[k].atualizados} atualizados, ${stats[k].pulados} ignorados`).join(' | ');
  destino.historico=destino.historico||[];
  destino.historico.push({id:id(),data:isoNow(),usuario:(currentUser().email||currentUser().nome||'usuario'),entidade:'migracao',entidadeId:destinoClienteId,acao:'migrar_base_legada',descricao:`Modo: ${modo}. ${resumoStr}. Backups: ${nomeBackupOrigem}, ${nomeBackupDestino}. Checksum origem: ${checksumOrigem}. Checksum destino (antes): ${checksumDestino}.`});
  if(destino.historico.length>1000)destino.historico=destino.historico.slice(-1000);

  // 5) Validação pós-migração (roda sobre o objeto `destino` em memória, antes de persistir,
  // e grava a entrada de log direto nele — evita depender de loadClienteDb/logLocal que assumem
  // o cliente ATIVO em localStorage, que pode não ser o destino desta migração)
  const validacao=validarPosMigracao(destinoClienteId,destino);

  // 6) Persistência (única gravação, já com os históricos de migração e validação incluídos)
  const eraAtivo=(clienteAtivo()===destinoClienteId);
  if(eraAtivo){
    db=destino;persistLocal();render();
  } else {
    const _dbGuardado=db;
    db=destino;persistClienteDb(destinoClienteId);db=_dbGuardado;
  }

  let resumoFinal='Migração concluída.\n\n'+Object.keys(stats).map(k=>`${k}: +${stats[k].criados} novos, ~${stats[k].atualizados} atualizados, ${stats[k].pulados} ignorados`).join('\n');
  if(validacao.problemas.length)resumoFinal+='\n\nAtenção:\n'+validacao.problemas.join('\n');
  alert(resumoFinal);
  closeModal();
}

function validarPosMigracao(destinoClienteId,dbJaCarregado){
  const d=dbJaCarregado||loadClienteDb(destinoClienteId);
  const problemas=[];
  const lacosOrfaos=(d.lacos||[]).filter(l=>!(d.paineis||[]).some(p=>p.id===l.painelId)).length;
  if(lacosOrfaos)problemas.push(`Atenção: ${lacosOrfaos} laço(s) migrado(s) referenciam um painel que não foi encontrado — revise manualmente.`);
  const flmsOrfaos=(d.flms||[]).filter(f=>!(d.paineis||[]).some(p=>p.id===f.painelId)||(f.lacoId&&!(d.lacos||[]).some(l=>l.id===f.lacoId))).length;
  if(flmsOrfaos)problemas.push(`Atenção: ${flmsOrfaos} FLM(s) migrado(s) referenciam painel/laço que não foi encontrado — revise manualmente.`);
  const portasOrfas=(d.portas||[]).filter(pt=>!(d.flms||[]).some(f=>f.id===pt.flmId)).length;
  if(portasOrfas)problemas.push(`Atenção: ${portasOrfas} porta(s) migrada(s) referenciam um FLM que não foi encontrado — revise manualmente.`);
  const falhasOrfas=(d.falhas||[]).filter(fl=>{
    const itemOk=(d.equipamentos||[]).some(e=>e.id===fl.itemId)||(d.flms||[]).some(f=>f.id===fl.itemId);
    const localOk=(d.locais||[]).some(l=>l.id===fl.localId);
    return !itemOk||!localOk;
  }).length;
  if(falhasOrfas)problemas.push(`Atenção: ${falhasOrfas} falha(s) migrada(s) referenciam um item ou local que não foi encontrado — revise manualmente.`);
  const planosOrfaos=(d.planos||[]).filter(pl=>!(d.falhas||[]).some(f=>f.id===pl.falhaId)).length;
  if(planosOrfaos)problemas.push(`Atenção: ${planosOrfaos} plano(s) migrado(s) referenciam uma falha que não foi encontrada — revise manualmente.`);
  const resumo=`Validação pós-migração: laços órfãos=${lacosOrfaos}, flms órfãos=${flmsOrfaos}, portas órfãs=${portasOrfas}, falhas órfãs=${falhasOrfas}, planos órfãos=${planosOrfaos}.`;
  console.log(resumo);
  d.historico=d.historico||[];
  d.historico.push({id:id(),data:isoNow(),usuario:(currentUser().email||currentUser().nome||'usuario'),entidade:'migracao',entidadeId:destinoClienteId,acao:'validacao_pos_migracao',descricao:resumo});
  if(d.historico.length>1000)d.historico=d.historico.slice(-1000);
  if(!dbJaCarregado){
    // chamada standalone (fora do fluxo de executarMigracaoLegada): persiste imediatamente
    const _dbGuardado=db;db=d;
    if(clienteAtivo()===destinoClienteId)persistLocal();else persistClienteDb(destinoClienteId);
    db=_dbGuardado;
  }
  return{problemas,resumo};
}

/* SEGURANÇA (2026-07): único ponto do sistema autorizado a excluir uma falha.
   Restrito a Master (renderLogs só monta este painel para Master), exige motivo
   obrigatório e sempre grava log em db.historico antes de marcar o registro.

   (f.excluida=true + metadados) — o registro permanece em db.falhas para preservar histórico/
   fotos/rastreabilidade, mas some de toda tela operacional (Falhas, Dashboard, Relatórios,

function _auditoriaExclusaoFalhasPanel(){
  const verExcluidas=!!window._auditoriaVerExcluidas;
  const todas=(db.falhas||[]).slice().sort((a,b)=>String(b.data||'').localeCompare(String(a.data||'')));
  const falhas=verExcluidas?todas.filter(f=>f.excluida===true):todas.filter(f=>!f.excluida);
  const rows=falhas.slice(0,100).map(f=>{
    const acao=verExcluidas
      ?`<div><small class="mutedLine">Excluída em ${esc(dsDateHtml?dsDateHtml(f.excluidaEm):(f.excluidaEm||''))} por ${esc(f.excluidaPor||'—')}<br>Motivo: ${esc(f.motivoExclusao||'—')}</small>${(f.fotos&&f.fotos.length)?fotosThumbsHtml(f.fotos,48):''}</div>`
      :`<button class="btn small danger" onclick="excluirFalhaAuditoria('${f.id}')">Excluir com motivo</button>`;
    return `<tr><td>${dsDateHtml?dsDateHtml(f.data):esc(f.data||'')}</td><td>${esc(f.itemNome||f.tipo||'—')}</td><td>${esc(localById?.(f.localId)?.nome||'—')}</td><td>${esc(f.status||'')}</td><td>${f.resolvidaEm?'Resolvida':'Ativa'}</td><td>${acao}</td></tr>`;
  }).join('');
  if(!falhas.length&&!verExcluidas)return `<div class="premiumPanel" style="margin-top:16px"><h3>Auditoria — Exclusão de falhas</h3><p class="mutedLine">Sem falhas ativas para exibir.</p><button class="btn secondary small" onclick="window._auditoriaVerExcluidas=true;renderLogs()">Ver falhas excluídas</button></div>`;
  return `<div class="premiumPanel" style="margin-top:16px">
    <h3>Auditoria — Exclusão de falhas</h3>
    <p>Exclusão restrita ao perfil Master. Todo registro excluído aqui exige motivo obrigatório, gera log permanente em Histórico e é marcado como excluído (soft-delete) — não é apagado da base.</p>
    <button class="btn secondary small" onclick="window._auditoriaVerExcluidas=${!verExcluidas};renderLogs()">${verExcluidas?'← Ver falhas ativas':'Ver falhas excluídas'}</button>
    ${falhas.length>100?`<p style="color:var(--l3a-text-muted);font-size:12px">Mostrando as 100 mais recentes de ${falhas.length} registros.</p>`:''}
    <div class="softTable" style="margin-top:14px"><table class="tbl"><thead><tr><th>Data</th><th>Item</th><th>Local</th><th>Status</th><th>Situação</th><th>${verExcluidas?'Exclusão':'Ação'}</th></tr></thead><tbody>${rows}</tbody></table></div>
  </div>`;
}
function excluirFalhaAuditoria(id_){
  if(!isMaster(currentUserSafe())){alert('Somente o perfil Master pode excluir falhas.');return}
  const f=(db.falhas||[]).find(x=>x.id===id_); if(!f){alert('Falha não encontrada.');return}
  const motivo=prompt('Motivo obrigatório da exclusão desta falha (será registrado permanentemente no histórico):');
  if(motivo===null)return; // cancelado
  if(!motivo.trim()){alert('Motivo é obrigatório. Exclusão cancelada.');return}
  if(!confirm('Confirma a exclusão desta falha? Ela deixará de aparecer nas telas operacionais, mas o registro é preservado (soft-delete) e continua visível na Auditoria. Esta ação será registrada no histórico.'))return;
  logLocal('falha',f.id,'excluir_auditoria','Falha excluída (soft-delete) por '+(currentUser().nome||currentUser().email||'Master')+'. Motivo: '+motivo.trim());
  f.excluida=true;
  f.excluidaEm=isoNow();
  f.excluidaPor=(currentUser().email||currentUser().nome||'Master');
  f.motivoExclusao=motivo.trim();
  // Cascata: cancela (não apaga) o plano vinculado, se houver, registrando no histórico. O plano
  // permanece na base para rastreabilidade, mas falhaDeveTerPlano() já não o recria.
  const planoVinc=(db.planos||[]).find(p=>p.falhaId===id_);
  if(planoVinc&&planoVinc.situacao!=='Concluído'&&planoVinc.situacao!=='Cancelado'){
    logLocal('plano',planoVinc.id,'excluir_auditoria','Plano cancelado em cascata pela exclusão (soft-delete) da falha '+id_+' (auditoria Master).');
    planoVinc.situacao='Cancelado';
    planoVinc.providencia=(planoVinc.providencia?planoVinc.providencia+' | ':'')+'Cancelado automaticamente: falha de origem excluída na auditoria.';
    planoVinc.atualizadoEm=isoNow();
  }
  save(); render();
  alert('Falha excluída (soft-delete) e registrada no histórico de auditoria.');
}

function salvarCliente(eid){
  const nome=(document.getElementById('cliNome').value||'').trim();
  if(!nome){alert('Informe o nome do cliente.');return}
  const mods=[...document.querySelectorAll('.cliMod:checked')].map(x=>x.value);
  const clientes=loadClientes();
  if(eid){
    const idx=clientes.findIndex(x=>x.id===eid);
    if(idx>=0)Object.assign(clientes[idx],{nome,cnpj:document.getElementById('cliCnpj').value.trim(),email:document.getElementById('cliEmail').value.trim(),tel:document.getElementById('cliTel').value.trim(),endereco:document.getElementById('cliEnd').value.trim(),obs:document.getElementById('cliObs').value.trim(),modulos:mods,atualizadoEm:isoNow()});
  }else{
    clientes.push({id:id(),nome,cnpj:document.getElementById('cliCnpj').value.trim(),email:document.getElementById('cliEmail').value.trim(),tel:document.getElementById('cliTel').value.trim(),endereco:document.getElementById('cliEnd').value.trim(),obs:document.getElementById('cliObs').value.trim(),modulos:mods,criadoEm:isoNow()});
  }
  saveClientes(clientes);closeModal();renderClientes();updateClienteSideSelect();updateNavSubsistemas();
  // Sincroniza lista de clientes com Google e garante planilha do cliente
  try{syncClientesGoogle()}catch(e){}
  const novoId=eid||((clientes[clientes.length-1]||{}).id);
  if(novoId){try{ensureClienteSheet(novoId,nome)}catch(e){}}
}
function deleteCliente(id){
  if(!confirm('Excluir este cliente? A base de dados do cliente será removida permanentemente.'))return;
  let clientes=loadClientes(); clientes=clientes.filter(x=>x.id!==id);
  saveClientes(clientes); localStorage.removeItem(clienteDbKey(id));
  if(clienteAtivo()===id){setClienteAtivo('');db=load();}
  renderClientes();updateClienteSideSelect();updateNavSubsistemas();
}

/* =========================================================================
   V8.1 — Dashboard orientado a "onde/quem", não só "quanto".
   Bloco 100% ADITIVO: nenhuma função existente foi alterada ou removida.
   Reaproveita os campos já existentes (piso, painelId, lacoId, status,
   ultimaAlteracao) — nenhuma mudança de schema, nenhuma mudança no Code.gs.
   ========================================================================= */
function pisoSortKey(p){const m=String(p||'').match(/\d+/);return m?parseInt(m[0],10):999}
/* =========================================================================
   TASK 1 (auditoria de estabilização 2026-07) — SEPARAÇÃO ARQUITETURAL:
   INDICADOR OPERACIONAL (estado atual) × INDICADOR HISTÓRICO (eventos no tempo)
   -------------------------------------------------------------------------
   O cliente pediu explicitamente que Dashboard e Relatórios NÃO mostrem os
   mesmos números — eles respondem perguntas diferentes:

   • OPERACIONAL ("como está o sistema agora?"): Falhas Ativas, Equipamentos em
     Teste, Equipamentos Desativados, Disponibilidade, Lojas Operacionais.
     Fonte ÚNICA e obrigatória: o STATUS ATUAL gravado em db.equipamentos,
     db.flms e db.locais, lido via dashStatusBucket()/normalizeStatus() (esta
     função, logo abaixo). NUNCA deve ler db.falhas (log de eventos) — um
     equipamento com status "Em operação" hoje conta como operacional mesmo
     que tenha tido 10 falhas registradas no histórico.

   • HISTÓRICO ("o que aconteceu no período?"): Falhas abertas no período,
     Falhas resolvidas, Tempo médio de solução, SLA, Reincidência, Quantidade
     de ocorrências. Fonte ÚNICA e obrigatória: os REGISTROS de db.falhas
     (log de eventos), filtrados por isFalhaStatus() (ver definição abaixo) e
     por período (relNoPeriodo()). NUNCA deve re-derivar do status atual do
     equipamento — um evento de falha permanece no histórico mesmo depois do
     equipamento voltar a "Em operação".

   Por que a discrepância entre os dois números é ESPERADA e não é bug: um
   equipamento pode estar operacional AGORA (bucket operacional) mas ter tido
   3 falhas HISTÓRICAS no período filtrado (bucket histórico) — os dois
   números corretos, ao mesmo tempo, por definição. Não "conserte" isso
   tentando fazer os dois baterem — funções auditadas em 2026-07: renderDashboard,
   dashPisoStats, dashLojasComFalha, dashPorLaco, dashPanoramaLacos,
   renderVisaoGeral (operacionais, só status) e relFalhasResumo,
   relTempoMedioFalhasHoras, relFalhasPorPrioridade, relPlanoResumo
   (históricos, só db.falhas/db.planos) — todas já respeitavam esta separação
   nesta auditoria; nenhuma mistura de fonte foi encontrada.
   ========================================================================= */
function dashStatusBucket(st){const s=up(normalizeStatus(st||''));if(s.includes('INCEND')||s.includes('DISPAR'))return 'falha';if(s.includes('ABERT')||s.includes('CURTO'))return 'falha';if(s.includes('TESTE'))return 'teste';if(s.includes('DESATIV'))return 'desativada';return 'operacao'}
// Piso efetivo: o piso OFICIAL definido no Laço (tela Painéis → Piso por Laço) manda
// mais que o piso gravado solto no próprio equipamento/loja/FLM — que pode estar
// vazio ou desatualizado em registros antigos. Só cai para o piso do próprio
// registro se o laço dele ainda não tiver piso oficial definido.
function pisoEfetivo(obj){
  if(!obj)return '';
  const lacoId=obj.lacoId;
  const l=lacoId?(db.lacos||[]).find(x=>x.id===lacoId):null;
  let piso=n(l&&l.piso);
  if(!piso&&lacoId){
    // Cobre o caso de Laços duplicados/órfãos (mesmo nome, ID diferente) deixados
    // por uma reconstrução antiga da base — procura outro registro de Laço com o
    // MESMO NOME que já tenha o piso oficial definido, em vez de mostrar "Sem piso".
    const nomeAtual=l?l.nome:lacName(lacoId);
    if(nomeAtual){
      const irmao=(db.lacos||[]).find(x=>up(x.nome)===up(nomeAtual)&&x.piso);
      if(irmao)piso=n(irmao.piso);
    }
  }
  return piso||n(obj.piso)||'';
}
function timeSince(isoStr){if(!isoStr)return '—';const then=new Date(isoStr).getTime();if(isNaN(then))return '—';const diffMs=Math.max(0,Date.now()-then);const h=diffMs/3600000;if(h<1)return Math.max(1,Math.round(diffMs/60000))+' min';if(h<24)return Math.round(h)+'h';return Math.round(h/24)+'d'}
function dashPisoStats(){const map={};const bump=(obj)=>{const p=pisoEfetivo(obj)||'Sem piso';if(!map[p])map[p]={piso:p,operacao:0,teste:0,falha:0,desativada:0};map[p][dashStatusBucket(obj.status)]++};(db.equipamentos||[]).forEach(bump);(db.flms||[]).forEach(bump);return Object.values(map).sort((a,b)=>pisoSortKey(a.piso)-pisoSortKey(b.piso)||a.piso.localeCompare(b.piso,'pt-BR'))}
function dashLojasComFalha(){return (db.locais||[]).filter(l=>dashStatusBucket(l.status)==='falha').map(l=>({nome:l.nome||'—',piso:pisoEfetivo(l)||'—',laco:lacName(l.lacoId)||'—',desde:l.ultimaAlteracao||'',status:l.status})).sort((a,b)=>(a.desde||'').localeCompare(b.desde||''))}
function dashPorLaco(){const map={};(db.locais||[]).filter(l=>dashStatusBucket(l.status)==='falha').forEach(l=>{const key=(paiName(l.painelId)||'—')+' · '+(lacName(l.lacoId)||'—');map[key]=(map[key]||0)+1});return Object.entries(map).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value).slice(0,8)}
// Panorama completo: TODOS os laços da central (não só os com falha), com
// quantidade de dispositivos (FLM+Equipamento), piso, sistema e disponibilidade —
// para dar uma leitura completa da central só pelo Dashboard.
function dashPanoramaLacos(){
  return (db.lacos||[]).map(l=>{
    const fl=db.flms.filter(f=>f.lacoId===l.id);
    const eq=db.equipamentos.filter(e=>e.lacoId===l.id);
    const dev=[...fl,...eq];
    const total=dev.length;
    const falha=dev.filter(x=>dashStatusBucket(x.status)==='falha').length;
    const teste=dev.filter(x=>dashStatusBucket(x.status)==='teste').length;
    const op=total-falha-teste;
    return {
      painel:paiName(l.painelId)||'—',
      laco:l.nome||'—',
      pisoDisplay:l.piso||'—',
      sistema:l.sistema||sistemaAutoDetect(l.nome),
      flms:fl.length,
      equip:eq.length,
      total,op,falha,teste,
      disp:total?Math.round((op/total)*100):0
    };
  }).sort((a,b)=>a.painel.localeCompare(b.painel,'pt-BR')||pisoSortKey(a.pisoDisplay)-pisoSortKey(b.pisoDisplay)||a.laco.localeCompare(b.laco,'pt-BR',{numeric:true}));
}

  const s=(status||'').toLowerCase();

  if(s.includes('teste'))return 'test';
  if(s.includes('incêndio')||s.includes('disparado'))return 'fire';
  if(s.includes('curto')||s.includes('falha')||s.includes('aberto'))return 'fail';
  if(s.includes('desativação')||s.includes('desativado'))return 'off';
  if(s.includes('aguardando'))return 'wait';

  if(s==='sem plano')return 'noplan';

function buildPlanoRowsBase(){

  let planos=db.planos||[];

  });
  falhas.forEach(f=>{

function inPeriodoPlano(x,ini,fim){if(!ini&&!fim)return true;let datas=[x.desde,x.criadoEm,x.concluidoEm].filter(Boolean).map(String);return datas.some(d=>(!ini||d>=ini)&&(!fim||d<=fim+'T23:59'))}
function situacaoPesoPlano(s){return {'Sem plano':0,'Aberto':1,'Em andamento':2,'Concluído':3}[s]??9}
function planoRowsFiltrados(fx,{ignorarSituacao=false,ignorarCategoria=false,ignorarPrioridade=false}={}){
  // Aplica os filtros (exceto os overrides explícitos acima, usados pelos cards de KPI clicáveis e
  // pelos PDFs, que precisam de variações do mesmo filtro base) sobre a base de linhas.
  let rows=buildPlanoRowsBase();
  // Busca única (normalizarBusca/filtrarRegistrosPorBusca) — mesma lógica de Lojas/Áreas e Falhas.
  // Antes esta função comparava fx.q (só toUpperCase, sem remover acento) com x._q (normalizado com
  // up(), que remove acento) — a comparação nunca batia direito para termos acentuados, e mesmo sem
  // acento exigia substring contígua (não aceitava múltiplas palavras em qualquer ordem).
  rows=filtrarRegistrosPorBusca(rows,fx.q,x=>[x.local,x.painel,x.laco,x.piso,x.itemNome,x.statusFalha,x.categoria,x.responsavel,x.situacao,x.direcionamento,x.desde].filter(Boolean).join(' '));
  return rows.filter(x=>
    (ignorarCategoria||!fx.cat||(x.categoria||'Sem categoria')===fx.cat)&&
    (ignorarPrioridade||!fx.prio||x.prioridade===fx.prio)&&
    (ignorarSituacao||!fx.sit||x.situacao===fx.sit)&&
    (!fx.resp||x.responsavel===fx.resp)&&
    (!fx.painel||x.painel===fx.painel)&&
    (!fx.laco||x.laco===fx.laco)&&
    (!fx.piso||x.piso===fx.piso)&&
    (!fx.loja||x.local===fx.loja)&&
    (!fx.statusTec||normalizeStatus(x.statusFalha)===fx.statusTec)&&
    inPeriodoPlano(x,fx.ini,fx.fim)
  );
}

function togglePlanoFiltrosAvancados(){filters.plano={...(filters.plano||{}),avancado:!(filters.plano||{}).avancado};render()}

function itemEnderecoOrdenavel(itemId){
  if(!itemId)return 9999;
  let raw='';
  if(String(itemId).startsWith('flm:')){
    const flmId=String(itemId).split(':')[1];
    const f=flmById(flmId);
    raw=f?f.endereco:'';
  } else {
    const e=db.equipamentos.find(x=>x.id===itemId);
    raw=e?e.endereco:'';
  }
  const num=parseFloat(String(raw||'').replace(',','.'));
  return isNaN(num)?9999:num;
}
function planoRowsParaPdf(modo){
  // Reaproveita a MESMA base e os MESMOS filtros da tela (planoFiltrosAtuais + planoRowsFiltrados),
  // aplicando por cima apenas a restrição de Situação do modo do PDF. Isso corrige o item 3/6 do
  // pedido do usuário: antes o PDF usava sua própria lógica de filtragem (só respeitava Período e um
  // dropdown "pdfSituacao" isolado) e ignorava Categoria/Prioridade/Responsável/Piso/Busca/etc. que
  // estivessem aplicados na tela.
  const fx=planoFiltrosAtuais();
  let rows=planoRowsFiltrados(fx,{ignorarSituacao:true});
  rows=rows.filter(r=>modo==='concluidos'?r.situacao==='Concluído':r.situacao!=='Concluído');
  rows=rows.map(r=>({...r,endereco:itemEnderecoOrdenavel(r.itemId||''),concluidoEmFmt:r.concluidoEm?fmtDateSimple(r.concluidoEm):''}));
  rows.sort((a,b)=>pisoSortKey(a.piso)-pisoSortKey(b.piso)||String(a.laco).localeCompare(String(b.laco),'pt-BR',{numeric:true})||a.endereco-b.endereco);
  return {rows,fx};
}

// ---- Resumo geral: reaproveita counts() e dashPisoStats() (mesmas do Dashboard) ----
function relResumoGeral(){
  const c=counts();
  const pisos=dashPisoStats();
  const totalEquip=(db.equipamentos||[]).length+(db.flms||[]).length;
  const op=pisos.reduce((a,p)=>a+p.operacao,0);
  const teste=pisos.reduce((a,p)=>a+p.teste,0);
  const desativado=pisos.reduce((a,p)=>a+p.desativada,0);
  const falha=pisos.reduce((a,p)=>a+p.falha,0);
  const disponibilidade=totalEquip?Math.round((op/totalEquip)*100):0;
  const lojasFalha=dashLojasComFalha();
  const planosAbertos=(db.planos||[]).filter(p=>p.situacao!=='Concluído').length;
  const planosConcluidos=(db.planos||[]).filter(p=>p.situacao==='Concluído').length;
  return {c,pisos,totalEquip,op,teste,desativado,falha,disponibilidade,lojasFalha,planosAbertos,planosConcluidos};
}
// ---- Tempo médio das falhas em aberto (novo indicador; reaproveita a mesma lógica de data usada em timeSince) ----
function relTempoMedioFalhasHoras(){
  // CORREÇÃO: só considera lançamentos que são realmente falha — um "Em teste" aguardando
  // confirmação não é uma falha em aberto para efeito de tempo médio de atendimento.
  const abertas=(db.falhas||[]).filter(f=>!f.resolvidaEm&&!f.excluida&&isFalhaStatus(f.status));
  if(!abertas.length)return 0;
  const soma=abertas.reduce((a,f)=>{const t=new Date(f.data).getTime();return a+(isNaN(t)?0:Math.max(0,(Date.now()-t)/3600000))},0);
  return Math.round(soma/abertas.length);
}
// ---- Falhas por prioridade — junta Falha ao Plano via planoForFalha() já existente (não duplica cadastro de prioridade) ----
function relFalhasPorPrioridade(){
  const map={'Crítica':0,'Alta':0,'Média':0,'Baixa':0,'Sem plano':0};
  // CORREÇÃO: só considera lançamentos que são realmente falha (isFalhaStatus) — antes contava
  // qualquer lançamento (inclusive "Em teste"/"Desativação") na prioridade do plano.
  (db.falhas||[]).filter(f=>!f.excluida&&isFalhaStatus(f.status)).forEach(f=>{const p=planoForFalha(f.id);const k=p?(p.prioridade||'Sem plano'):'Sem plano';map[k]=(map[k]||0)+1});
  return map;
}
function relPorCampoGenerico(arr,getter,fallback){
  const map={};arr.forEach(x=>{const k=getter(x)||fallback;map[k]=(map[k]||0)+1});
  return Object.entries(map).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value);
}
// ---- Falhas: dashboard executivo (novo; reaproveita paiName/lacName/locName/isFalhaStatus já existentes) ----
// FILTRO DE PERÍODO DA ABA RELATÓRIOS (2026-07): os campos repIni/repFim tinham sumido da tela em
// alguma reforma antiga, mas funções continuavam tentando lê-los — ou seja, "período" nunca
// funcionava. Este helper volta a ser a fonte única do período e as seções temporais do relatório
// executivo (Falhas e Plano de Ação) passam a respeitá-lo. Vazio = sem recorte (comportamento atual).
function relPeriodoAtual(){return {ini:document.getElementById('repIni')?.value||'',fim:document.getElementById('repFim')?.value||''}}
function relNoPeriodo(dataStr){const {ini,fim}=relPeriodoAtual();if(!ini&&!fim)return true;if(!dataStr)return false;const d=String(dataStr);return (!ini||d>=ini)&&(!fim||d<=fim+'T23:59')}
function relFalhasResumo(){
  // CORREÇÃO (relatório contabilizava teste como falha): a seção "Falhas" do relatório deve
  // refletir apenas lançamentos que são realmente falha (Laço aberto/Módulo aberto/Módulo em
  // curto/Incêndio disparado). "Em teste" e "Desativação" são lançamentos válidos e continuam
  // aparecendo normalmente na tela de Falhas do sistema — só não entram mais nestes indicadores/
  // rankings de falha do relatório executivo.
  const rows=(db.falhas||[]).filter(f=>!f.excluida&&isFalhaStatus(f.status)&&relNoPeriodo(f.data)).map(f=>({...f,painel:paiName(f.painelId),laco:lacName(f.lacoId),loja:locName(f.localId)}));
  const abertas=rows.filter(r=>!r.resolvidaEm);
  return {
    total:rows.length,abertas:abertas.length,concluidas:rows.length-abertas.length,
    prioridade:relFalhasPorPrioridade(),
    porTipo:relPorCampoGenerico(rows,r=>r.tipo,'Não classificada'),
    porPainel:relPorCampoGenerico(rows,r=>r.painel,'Sem painel'),
    porLaco:relPorCampoGenerico(rows,r=>r.laco,'Sem laço'),
    porPiso:relPorCampoGenerico(rows,r=>r.piso,'Sem piso'),
    porLoja:relPorCampoGenerico(rows,r=>r.loja,'Sem loja/área').slice(0,10),
    tempoMedioHoras:relTempoMedioFalhasHoras()
  };
}
// ---- Plano de Ação: dashboard executivo (novo; reaproveita planoCategorias/prioridadePeso já existentes) ----
function relPlanoResumo(){
  const planos=(db.planos||[]).filter(p=>relNoPeriodo(p.criadoEm||p.atualizadoEm));

    atrasados:planos.filter(p=>p.situacao!=='Concluído'&&p.prazo&&p.prazo<hojeIso).length,
    porPrioridade:relPorCampoGenerico(planos,p=>p.prioridade,'Não definida'),

// ---- Lojas/Áreas: indicadores executivos (novo; reaproveita dashLojasComFalha/dashStatusBucket/pisoEfetivo) ----
function relLojasResumo(){
  const locais=db.locais||[];
  const comFalha=dashLojasComFalha();
  const semDispositivo=locais.filter(l=>!l.flmId&&!l.portaId&&!(db.equipamentos||[]).some(e=>e.localId===l.id)).length;
  // CORREÇÃO: ranking de "lojas com mais falhas" só conta lançamentos que são realmente falha —
  // antes contava também "Em teste"/"Desativação", fazendo lojas só testadas aparecerem como se
  // tivessem falha.
  const rankingFalhas=(()=>{const map={};(db.falhas||[]).filter(f=>!f.excluida&&isFalhaStatus(f.status)).forEach(f=>{if(!f.localId)return;const nome=locName(f.localId)||'—';map[nome]=(map[nome]||0)+1});return Object.entries(map).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value).slice(0,10)})();
  return {
    total:locais.length,
    porPiso:relPorCampoGenerico(locais,l=>pisoEfetivo(l)||l.piso,'Sem piso').sort((a,b)=>pisoSortKey(a.label)-pisoSortKey(b.label)),
    monitoradas:locais.filter(l=>l.flmId||l.portaId||l.lacoId).length,
    comFalha:comFalha.length,
    emTeste:locais.filter(l=>dashStatusBucket(l.status)==='teste').length,
    semDispositivo,
    rankingFalhas
  };
}
// ---- Inventário hierárquico Painel→Laço (novo agrupamento; reaproveita dashPanoramaLacos() do Dashboard, sem recalcular status) ----
function relInventarioPorPainel(){
  const panorama=dashPanoramaLacos();
  const map={};
  panorama.forEach(r=>{
    map[r.painel]=map[r.painel]||{painel:r.painel,lacos:[],total:0,op:0,falha:0,teste:0};
    map[r.painel].lacos.push(r);
    map[r.painel].total+=r.total;map[r.painel].op+=r.op;map[r.painel].falha+=r.falha;map[r.painel].teste+=r.teste;
  });
  return Object.values(map).map(p=>({...p,disp:p.total?Math.round((p.op/p.total)*100):0}));
}
// ---- Detalhe por tipo de dispositivo dentro de um laço (novo; complementa dashPanoramaLacos, que não abre por tipo) ----
function relLacoTiposDetalhe(lacoId){
  const map={};
  (db.equipamentos||[]).filter(e=>e.lacoId===lacoId).forEach(e=>{
    const k=e.tipo||'Não classificado';map[k]=map[k]||{tipo:k,op:0,falha:0,teste:0,total:0};
    const b=dashStatusBucket(e.status);map[k][b==='teste'?'teste':(b==='falha'?'falha':'op')]++;map[k].total++;
  });
  (db.flms||[]).filter(f=>f.lacoId===lacoId).forEach(f=>{
    const k='Módulo';map[k]=map[k]||{tipo:k,op:0,falha:0,teste:0,total:0};
    const b=dashStatusBucket(f.status);map[k][b==='teste'?'teste':(b==='falha'?'falha':'op')]++;map[k].total++;
  });
  return Object.values(map);
}

async function verificarBaseAoAbrir(){
  if(!isLoggedIn())return;
  const c=syncCfg();
  if(!baseParecevazia())return; // banco local ok, nada a fazer
  if(!c.configured){alert('A base local está vazia e o banco Google ainda não foi configurado neste sistema. Vá em Administração \u2192 Gestão de Dados \u2192 "Inicializar/validar" e depois "Carregar base Google".');return}
  _recuperandoBaseInicial=true;
  updateSyncFooter('saving');
  const dEl=document.getElementById('dashboard');
  if(dEl)dEl.innerHTML='<div class="card"><p class="msg warn">Banco local vazio — recarregando automaticamente do Google Sheets, aguarde alguns segundos...</p></div>';
  try{
    const r=await jsonp('load');
    if(r.ok && r.db && Object.keys(r.db).length){
      db=normalizeAllStatuses(Object.assign(emptyDB(),r.db));
      persistLocal();
      setSyncCfg({dirty:false,lastSync:new Date().toLocaleTimeString('pt-BR')});
      _recuperandoBaseInicial=false;
      render();
      alert('A base local estava vazia (provável falha ao salvar no navegador). Os dados foram recarregados automaticamente do Google Sheets — nada foi perdido.');
    } else {
      _recuperandoBaseInicial=false;
      updateSyncFooter();
      render();
      alert('A base local está vazia e a base no Google também não retornou dados. Verifique manualmente em Administração \u2192 Gestão de Dados antes de sincronizar ou continuar usando o sistema, para não gravar uma base vazia por cima da planilha.');
    }
  }catch(e){
    _recuperandoBaseInicial=false;
    updateSyncFooter('error');
    render();
    alert('A base local está vazia e não foi possível recarregar automaticamente do Google (' + e.message + '). Vá em Administração \u2192 Gestão de Dados \u2192 "Carregar base Google" manualmente antes de continuar.');
  }
}

  // e exige nova validação — evita gravar dados de um arquivo validado para o cliente A dentro
  // da base do cliente B.
  if(w.clienteIdValidado&&w.clienteIdValidado!==clienteAtivo()){
    const m=document.getElementById('impMsg')||document.getElementById('lucImportMsg');
    if(m)m.innerHTML='<div class="msg err">O cliente ativo foi alterado após a validação deste arquivo. Por segurança, a importação foi bloqueada. Selecione novamente o cliente de destino e valide o arquivo de novo.</div>';
    filters.impWizard={...impW(),validado:false,passo:2};render();
    return;
  }
  let exec;
  if(w.tipo==='tecnica'){
    const modo=document.getElementById('modeImp')?.value;
    if(modo==='replace'){
      if(!confirm('ATENÇÃO: o modo "Apagar dados atuais e importar do zero" DESTRÓI toda a base atual (painéis, laços, equipamentos, lojas, falhas, planos) e recomeça só com o arquivo. Tem certeza?'))return;
      if(!confirm('Segunda confirmação: essa ação é IRREVERSÍVEL depois de sincronizada com o Google. Confirmar a substituição total da base?'))return;
    }
    exec=importFile();
  } else {
    exec=importLucLojas();
  }
  // CAUSA RAIZ (2026-07): o reset do assistente rodava de forma síncrona ANTES de importFile()
  // (async) terminar — qualquer render disparado em seguida apagava o diagnóstico/erro da tela.
  // Agora o reset (e a limpeza do arquivo em cache) só acontecem quando a importação conclui.
  Promise.resolve(exec).finally(()=>{_impFileCache=null; if(typeof _lucFileCache!=='undefined')_lucFileCache=null; filters.impWizard={tipo:'',passo:1,validado:false};});
}

function normalizarNomeCabecalho(h){

  const isHeaderRow=arr=>{

    return joined.includes('LUC') || joined.includes('TIPODELOJA') || joined.includes('LOJA') || joined.includes('AREACONTRATO');
  };
  while(start<matrix.length && !(matrix[start]||[]).some(v=>n(v))) start++;
  if(start<matrix.length && isHeaderRow(matrix[start])) start++;
  for(let i=start;i<matrix.length;i++){
    const r=matrix[i]||[];
    if(!r.some(v=>n(v))) continue;
    rows.push({
      LUC:n(r[0]),
      'Tipo de Loja':n(r[1]),
      Loja:n(r[2]),
      'Área Contrato (m²)':n(r[3]),

/* ===== Correção V8.6 — Leitura robusta de acentuação LUC/Loja =====
   Corrige CSV salvo em UTF-8, Windows-1252/ANSI e mojibake comum de Excel.
   A importação continua fixa por posição: A=LUC, B=Tipo, C=Loja, D=Área. */
function lucDecodeArrayBufferSmart(buffer){
  const tryDecode=(enc,fatal=false)=>{try{return new TextDecoder(enc,{fatal}).decode(buffer)}catch(e){return ''}};
  let utf=tryDecode('utf-8',true);
  if(utf) return utf.replace(/^\uFEFF/,'');
  let win=tryDecode('windows-1252',false) || tryDecode('iso-8859-1',false);
  return (win||'').replace(/^\uFEFF/,'');
}
function lucRepairMojibake(s){
  s=String(s??'');
  if(!s)return '';
  // Repara texto UTF-8 lido como Windows-1252: SoluÃ§Ã£o -> Solução.
  if(/[ÃÂâ€]/.test(s)){
    try{
      const bytes=Uint8Array.from([...s].map(ch=>ch.charCodeAt(0)&255));
      const fixed=new TextDecoder('utf-8',{fatal:true}).decode(bytes);
      if(fixed && (fixed.match(/[�]/g)||[]).length <= (s.match(/[�]/g)||[]).length) s=fixed;
    }catch(e){}
  }
  const map={
    '�':'', 'Â':'',
    'Ã¡':'á','Ã¢':'â','Ã£':'ã','Ãª':'ê','Ã©':'é','Ã­':'í','Ã³':'ó','Ã´':'ô','Ãµ':'õ','Ãº':'ú','Ã§':'ç',
    'Ã�':'Á','Ã‚':'Â','Ãƒ':'Ã','Ã‰':'É','ÃŠ':'Ê','Ã“':'Ó','Ã”':'Ô','Ã•':'Õ','Ãš':'Ú','Ã‡':'Ç',
    'â€“':'-','â€”':'-','â€˜':'\'','â€™':'\'','â€œ':'"','â€�':'"','Âº':'º','Âª':'ª','Â²':'²','Â³':'³'
  };
  Object.entries(map).forEach(([a,b])=>{s=s.split(a).join(b)});
  return s.normalize('NFC').replace(/[\u0000-\u001F\u007F]/g,' ').replace(/\s+/g,' ').trim();
}
function lucCleanField(v){return lucRepairMojibake(n(v));}
function lucCleanName(v){
  let s=lucCleanField(v);
  // Mantém siglas usuais e melhora apenas apresentação básica.
  if(!s)return '';
  return s.replace(/\s+([,.;:/])/g,'$1').replace(/([(/-])\s+/g,'$1').replace(/\s+([)/-])/g,'$1').trim();
}
/* MESMA CAUSA RAIZ da importação técnica (2026-07): o render() do assistente após "Validar" recria
   o <input id="fileLucImp"> vazio e o arquivo era perdido antes do "Confirmar". Mesmo fallback de
   cache — a lógica de leitura/normalização/associação LUC permanece 100% intacta. */
let _lucFileCache=null;
async function readLucRowsFile(){
  const input=document.getElementById('fileLucImp');
  const f=(input&&input.files&&input.files[0])||_lucFileCache;
  if(!f)throw new Error('Selecione um arquivo XLSX ou CSV para Importação LUC/Loja.');
  _lucFileCache=f;
  const ext=f.name.split('.').pop().toLowerCase();
  const data=await f.arrayBuffer();
  if(ext==='csv'){
    const txt=lucDecodeArrayBufferSmart(data);
    const first=(txt.split(/\r?\n/).find(x=>x.trim())||'');
    const sep=(first.match(/;/g)||[]).length>=(first.match(/,/g)||[]).length?';':',';
    const matrix=txt.split(/\r?\n/).filter(x=>x.trim()).map(l=>splitCSV(l,sep).map(lucCleanField));
    return lucMatrixToRows(matrix);
  }
  if(!['xls','xlsx'].includes(ext))throw new Error('Formato não aceito. Use XLSX, XLS ou CSV.');
  if(typeof XLSX==='undefined')throw new Error('Biblioteca XLSX não carregada. Para XLS/XLSX, abra com internet ou use CSV.');
  const wb=XLSX.read(data,{type:'array',cellText:false,cellDates:false});
  let rows=[];
  wb.SheetNames.forEach(sn=>{
    const matrix=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:'',raw:false}).map(row=>row.map(lucCleanField));
    rows=rows.concat(lucMatrixToRows(matrix));
  });
  return rows;
}
function normalizeLucImportRows(rows){
  const out=[],errors=[]; const dt=isoNow();
  rows.forEach((r,i)=>{
    const linha=r.__linha||i+2;
    const raw=Array.isArray(r.__raw)?r.__raw:[];
    const luc=lucCleanField(raw.length?raw[0]:r.LUC);
    const tipo=lucCleanName(raw.length?raw[1]:r['Tipo de Loja']);
    const loja=lucCleanName(raw.length?raw[2]:r.Loja);
    const area=lucCleanField(raw.length?raw[3]:r['Área Contrato (m²)']);
    if(up(luc)==='LUC' || up(tipo)==='TIPO DE LOJA' || up(loja)==='LOJA')return;
    if(!luc&&!loja){errors.push({linha,motivo:'Registro sem LUC e sem Loja',registro:JSON.stringify(raw.length?raw:r)});return}
    if(!loja){errors.push({linha,motivo:'Coluna C (Loja oficial) vazia. Registro não importado para evitar loja com nome igual ao LUC.',registro:JSON.stringify(raw.length?raw:r)});return}
    if(up(loja)===up(luc)){errors.push({linha,motivo:'Coluna C veio igual ao LUC. Confira se o arquivo possui a Loja oficial na coluna C. Registro não importado.',registro:JSON.stringify(raw.length?raw:r)});return}
    out.push({id:id(),luc,tipo,nome:loja,areaContrato:area,piso:pisoFromLuc(luc,tipo),origem:'IMPORTACAO_LUC',dataImportacao:dt,ultimaAtualizacao:dt,statusAssociacao:'Pendente',observacoes:''});
  });
  return {lojas:out,errors};
}

  if(outraBaseMesmoLocal)return `Bloqueado: a loja cadastrada já está vinculada à LUC ${outraBaseMesmoLocal.luc} - ${outraBaseMesmoLocal.nome}.`;

  }
  const outroLocalMesmaBase=(db.locais||[]).find(l=>l.id!==local.id && l.baseLojaId===base.id);
