<!doctype html>
<!-- build: 2026-07-06 v6.29 - Endereços completos e rotulados em "Ver endereços" (Endereço lógico p/ módulos, Endereço completo p/ detectores/acionadores) -->
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contratos L3A — Gestão Operacional SDAI</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* =========================================================================
   CONTRATOS L3A — SDAI MANAGER
   Design System v8.0 — fonte única de verdade para cores, tipografia,
   espaçamento, elevação e componentes. Substitui as camadas V5–V7
   acumuladas em versões anteriores (que conviviam com --blue, --premium-blue
   e --brand-blue simultaneamente). Nenhuma classe, id ou atributo usado
   pelo JavaScript foi removido ou renomeado — apenas a aparência.
   ========================================================================= */

/* ---------- 1. TOKENS ---------------------------------------------------- */
:root{
  /* Marca */
  --l3a-primary:#0B5FAD;        --l3a-primary-600:#0A4F92;   --l3a-primary-700:#073A6E;
  --l3a-primary-50:#EAF3FC;     --l3a-primary-100:#D3E7FA;
  --l3a-secondary:#0E2A44;      --l3a-secondary-700:#081A2C; --l3a-secondary-900:#050F1B;
  --l3a-accent:#0EA5B7;

  /* Semântica de status */
  --l3a-success:#15803D;   --l3a-success-bg:#E7F7EC;   --l3a-success-line:#BEE8C9;
  --l3a-warning:#B45309;   --l3a-warning-bg:#FDF3DF;   --l3a-warning-line:#F3DDA6;
  --l3a-danger:#B42318;    --l3a-danger-bg:#FCEAE9;    --l3a-danger-line:#F3C6C2;
  --l3a-info:#1D4ED8;      --l3a-info-bg:#EAF1FE;      --l3a-info-line:#C9DBFB;
  --l3a-neutral:#475569;   --l3a-neutral-bg:#EEF1F5;   --l3a-neutral-line:#D8DEE7;

  /* Superfícies e texto */
  --l3a-bg:#F3F6FA; --l3a-bg-soft:#EBF0F6; --l3a-surface:#FFFFFF;
  --l3a-border:#E2E8F1; --l3a-border-strong:#CBD6E4; --l3a-hover:#F2F6FB;
  --l3a-text:#101828; --l3a-text-soft:#51617A; --l3a-text-muted:#8695AB;
  --l3a-focus:#0B5FAD;

  /* Escala */
  --l3a-radius-sm:8px; --l3a-radius-md:12px; --l3a-radius-lg:18px; --l3a-radius-pill:999px;
  --l3a-shadow-sm:0 1px 2px rgba(16,24,40,.05),0 1px 1px rgba(16,24,40,.04);
  --l3a-shadow-md:0 8px 22px rgba(16,24,40,.08);
  --l3a-shadow-lg:0 22px 48px rgba(16,24,40,.14);
  --l3a-ease:cubic-bezier(.4,0,.2,1); --l3a-dur:160ms;
  --l3a-font:'Plus Jakarta Sans',Inter,'Segoe UI',Roboto,Arial,sans-serif;

  /* Aliases de compatibilidade — mantêm qualquer var(--x) legado apontando
     para o novo sistema, sem precisar tocar em nenhuma linha de JS */
  --bg:var(--l3a-bg); --panel:var(--l3a-secondary); --panel2:var(--l3a-secondary-700);
  --card:var(--l3a-surface); --line:var(--l3a-border); --text:var(--l3a-text);
  --muted:var(--l3a-text-muted); --blue:var(--l3a-primary); --blue2:var(--l3a-primary-700);
  --ok:var(--l3a-success); --bad:var(--l3a-danger); --warn:var(--l3a-warning);
  --chip:var(--l3a-primary-50); --gold:#C79A38; --shadow:var(--l3a-shadow-lg); --radius:var(--l3a-radius-lg);
  --brand-dark:var(--l3a-secondary); --brand-mid:var(--l3a-secondary-700); --brand-blue:var(--l3a-primary);
  --brand-soft:var(--l3a-bg); --brand-line:var(--l3a-border); --brand-text:var(--l3a-text);
  --brand-muted:var(--l3a-text-muted); --brand-radius:var(--l3a-radius-lg); --brand-shadow:var(--l3a-shadow-md);
  --brand-accent:var(--l3a-accent); --brand-primary:var(--l3a-primary); --brand-gold:#C79A38;
  --premium-blue:var(--l3a-primary); --premium-line:var(--l3a-border); --premium-muted:var(--l3a-text-muted);
  --premium-text:var(--l3a-text); --premium-navy:var(--l3a-secondary); --premium-surface:var(--l3a-surface);
  --premium-gold:#C79A38; --surface:var(--l3a-surface); --surface-2:var(--l3a-bg-soft); --text-main:var(--l3a-text);
}

/* ---------- 2. RESET & TIPOGRAFIA ---------------------------------------- */
*{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact}
html{-webkit-text-size-adjust:100%}
body{margin:0;font-family:var(--l3a-font);background:var(--l3a-bg);color:var(--l3a-text);
  font-size:14px;line-height:1.5;letter-spacing:-.011em;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer}
h1,h2,h3,h4{margin:0;font-family:var(--l3a-font);letter-spacing:-.02em;color:var(--l3a-text)}
p{margin:0}
a{color:var(--l3a-primary)}
::selection{background:var(--l3a-primary-100)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#c7d3e2;border-radius:99px}
::-webkit-scrollbar-track{background:transparent}

/* Foco de teclado visível + respeito a "reduzir movimento" */
a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,[tabindex]:focus-visible{
  outline:2px solid var(--l3a-focus);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion: reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}}

/* ---------- 3. LAYOUT — CASCA DO APP -------------------------------------- */
.app{display:grid;grid-template-columns:272px 1fr;min-height:100vh;transition:grid-template-columns var(--l3a-dur) var(--l3a-ease)}
.main{min-width:0;display:flex;flex-direction:column}
.content{padding:28px 32px 64px;max-width:1440px;width:100%;margin:0 auto}

/* ---------- 4. BARRA LATERAL ---------------------------------------------- */
.side{background:linear-gradient(190deg,var(--l3a-secondary) 0%,var(--l3a-secondary-700) 62%,var(--l3a-secondary-900) 100%);
  color:#e7eefb;padding:18px 12px 24px;position:sticky;top:0;height:100vh;overflow-y:auto;overflow-x:hidden;
  display:flex;flex-direction:column;gap:2px;box-shadow:6px 0 30px rgba(5,15,27,.18)}
.side::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14)}
.brand{display:flex;align-items:center;gap:12px;padding:8px 8px 18px;border-bottom:1px solid rgba(255,255,255,.10);margin-bottom:6px}
.logo{width:46px;height:46px;flex:0 0 46px;border-radius:var(--l3a-radius-md);background:linear-gradient(150deg,#fff,#eaf2fc);
  color:var(--l3a-primary-700);font-weight:800;font-size:13px;letter-spacing:.01em;display:grid;place-items:center;
  box-shadow:var(--l3a-shadow-sm);overflow:hidden}
.logo.hasImg{background-size:contain!important;background-position:center!important;background-repeat:no-repeat!important;
  background-color:#fff!important;color:transparent!important}
.brand b{display:block;font-size:15px;font-weight:800;letter-spacing:-.02em;color:#fff}
.brand span{display:block;margin-top:2px;font-size:11.5px;color:#8fa8c6;line-height:1.3}

.sideToggle{display:flex;align-items:center;justify-content:center;gap:8px;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);color:#dce8f8;border-radius:var(--l3a-radius-md);padding:9px 10px;margin:2px 4px 10px;
  width:calc(100% - 8px);font-weight:700;font-size:12.5px;transition:background var(--l3a-dur) var(--l3a-ease)}
.sideToggle:hover{background:rgba(255,255,255,.12)}
.sideToggle i{display:inline-flex;color:#fff}
.app.sideCollapsed .sideToggle span{display:none}
.app.sideCollapsed .sideToggle:before{content:none!important}

.profileBadge{margin:4px 4px 12px;padding:11px 12px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.045);
  border-radius:var(--l3a-radius-md);font-size:12px;color:#c3d4ea}
.profileBadge b{display:block;color:#fff;font-size:13px;font-weight:750}

.navTitle{display:none!important} /* substituído pelo acordeão .navGroup/.navTitleBtn gerado via JS */
.navGroup{margin:10px 2px 2px}
.navTitleBtn{width:100%;border:0;background:transparent;color:#7f9dbe;text-transform:uppercase;letter-spacing:.11em;
  font-size:10.5px;font-weight:800;display:flex;align-items:center;justify-content:space-between;padding:10px 10px 6px;
  transition:color var(--l3a-dur) var(--l3a-ease)}
.navTitleBtn:hover{color:#b7cbe3}
.navTitleBtn b{font-size:10px;font-weight:900;transition:transform var(--l3a-dur) var(--l3a-ease)}
.navGroup:not(.open) .navTitleBtn b{transform:rotate(-90deg)}
.navItems{display:grid;gap:2px}
.navGroup:not(.open) .navItems{display:none}

.nav{display:flex;flex-direction:column}
.nav button{width:100%;border:0;background:transparent;color:#c3d4ea;text-align:left;padding:10.5px 12px;
  border-radius:var(--l3a-radius-md);margin:1px 0;font-weight:650;font-size:13.5px;display:flex;align-items:center;gap:11px;
  transition:background var(--l3a-dur) var(--l3a-ease),color var(--l3a-dur) var(--l3a-ease),transform var(--l3a-dur) var(--l3a-ease)}
.nav button i{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;flex:0 0 20px;
  color:#7f9dbe;transition:color var(--l3a-dur) var(--l3a-ease)}
.nav button i svg{display:block}
.nav button:hover{background:rgba(255,255,255,.07);color:#fff;transform:translateX(1px)}
.nav button:hover i{color:#fff}
.nav button.active{background:linear-gradient(120deg,var(--l3a-primary-600),var(--l3a-primary));color:#fff;
  box-shadow:0 8px 20px rgba(11,95,173,.35),inset 0 0 0 1px rgba(255,255,255,.12)}
.nav button.active i{color:#fff}

.app.sideCollapsed{grid-template-columns:76px 1fr}
.app.sideCollapsed .brand div:not(.logo),.app.sideCollapsed .navTitleBtn,.app.sideCollapsed .navGroup,
.app.sideCollapsed .nav button span,.app.sideCollapsed .profileBadge{display:none}
.app.sideCollapsed .side{padding-left:10px;padding-right:10px}
.app.sideCollapsed .nav button{justify-content:center;gap:0}
.app.sideCollapsed .nav{gap:6px}
.app.sideCollapsed .nav > button{display:flex} /* mantém acesso visível mesmo com grupos ocultos */

/* ---------- 5. CABEÇALHO --------------------------------------------------- */
.top{height:72px;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--l3a-border);
  display:flex;align-items:center;justify-content:space-between;gap:16px;padding:0 28px;position:sticky;top:0;z-index:40}
.pageHead{display:flex;align-items:center;gap:12px;min-width:0}
.pageTitleWrap{min-width:0}
.top h1{font-size:20px;font-weight:800;letter-spacing:-.03em;line-height:1.1}
.top p{margin:4px 0 0;color:var(--l3a-text-muted);font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topMeta{display:flex;align-items:center;gap:10px;margin-left:auto}
.menuToggle{display:none;border:0;background:var(--l3a-primary);color:#fff;border-radius:var(--l3a-radius-md);
  padding:9px 11px;align-items:center;justify-content:center}

.syncFooter{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--l3a-border);background:var(--l3a-surface);
  border-radius:var(--l3a-radius-pill);padding:7px 12px;font-size:11.5px;font-weight:700;color:var(--l3a-text-soft);
  box-shadow:var(--l3a-shadow-sm)}
.syncDot{width:8px;height:8px;border-radius:50%;background:#9aa8bb;flex:0 0 8px}
.syncDot.ok{background:var(--l3a-success)} .syncDot.warn{background:var(--l3a-warning)} .syncDot.bad{background:var(--l3a-danger)}

.datetimePill{height:42px;min-width:104px;border:1px solid var(--l3a-border);background:var(--l3a-surface);
  border-radius:var(--l3a-radius-pill);padding:6px 14px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;line-height:1.1;box-shadow:var(--l3a-shadow-sm)}
.datetimePill span{font-size:10px;color:var(--l3a-text-muted);font-weight:750;text-transform:uppercase;letter-spacing:.03em}
.datetimePill b{font-size:13.5px;color:var(--l3a-text);letter-spacing:-.01em}

.topUser{cursor:pointer;display:flex;align-items:center;gap:9px;border:1px solid var(--l3a-border);background:var(--l3a-surface);
  border-radius:var(--l3a-radius-pill);padding:5px 12px 5px 6px;box-shadow:var(--l3a-shadow-sm);font-size:12px;
  color:var(--l3a-text-muted);max-width:200px;transition:box-shadow var(--l3a-dur) var(--l3a-ease)}
.topUser:hover{box-shadow:var(--l3a-shadow-md)}
.topUser:after{content:'▾';font-size:11px;color:var(--l3a-primary);font-weight:900;margin-left:2px}
.topUser b{display:block;color:var(--l3a-text);font-size:12.5px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topUser .uText{min-width:0;display:flex;flex-direction:column}
.topUser .uText small{font-size:10.5px;color:var(--l3a-text-muted);white-space:nowrap}
.avatar{width:30px;height:30px;flex:0 0 30px;border-radius:50%;display:inline-grid;place-items:center;
  background:linear-gradient(135deg,var(--l3a-primary),var(--l3a-accent));color:#fff;font-size:12px;font-weight:800}

.userMenu{position:fixed;right:28px;top:70px;z-index:100;background:var(--l3a-surface);border:1px solid var(--l3a-border);
  border-radius:var(--l3a-radius-md);box-shadow:var(--l3a-shadow-lg);display:none;min-width:220px;overflow:hidden}
.userMenu.show{display:block}
.userMenu button{display:flex;align-items:center;gap:9px;width:100%;border:0;background:var(--l3a-surface);text-align:left;
  padding:12px 14px;font-weight:700;font-size:13px;color:var(--l3a-text);transition:background var(--l3a-dur) var(--l3a-ease)}
.userMenu button:hover{background:var(--l3a-hover)}

/* ---------- 6. CARDS E KPIs ------------------------------------------------ */
.card,.premiumPanel{background:var(--l3a-surface);border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-lg);
  padding:20px;box-shadow:var(--l3a-shadow-md);margin-bottom:18px}
.premiumPanel h3{margin:0 0 4px;font-size:15.5px;font-weight:800;letter-spacing:-.02em;color:var(--l3a-text)}
.premiumPanel p{margin:0;color:var(--l3a-text-muted);font-size:13px;line-height:1.5}
.sectionTitle{font-size:12px;text-transform:uppercase;letter-spacing:.09em;color:var(--l3a-text-soft);font-weight:800;margin:0 0 14px}

.grid{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:14px}
.metric{background:var(--l3a-surface);border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-lg);padding:16px 18px;
  position:relative;overflow:hidden;box-shadow:var(--l3a-shadow-sm);transition:box-shadow var(--l3a-dur) var(--l3a-ease),transform var(--l3a-dur) var(--l3a-ease)}
.metric:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--l3a-primary),var(--l3a-accent))}
.metric:hover{box-shadow:var(--l3a-shadow-md);transform:translateY(-1px)}
.metric small{display:block;color:var(--l3a-text-muted);font-weight:800;text-transform:uppercase;font-size:10.5px;letter-spacing:.06em}
.metric strong{display:block;margin-top:6px;font-size:26px;font-weight:800;letter-spacing:-.02em;color:var(--l3a-text)}

.premiumGrid{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:14px}
.premiumStat{border:1px solid var(--l3a-border);background:linear-gradient(180deg,#fff,var(--l3a-bg-soft));
  border-radius:var(--l3a-radius-md);padding:14px 15px;min-height:80px;box-shadow:var(--l3a-shadow-sm)}
.premiumStat small{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--l3a-text-muted);font-weight:800}
.premiumStat b{display:block;margin-top:7px;font-size:22px;font-weight:800;letter-spacing:-.02em;color:var(--l3a-text)}
.premiumActions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.split2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.systemHero,.configHero{display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap}
.systemHeroBox p{margin:4px 0 0;color:var(--l3a-text-muted);font-size:13px}
.systemInfo{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:12px}
.softCard{border:1px solid var(--l3a-border);background:var(--l3a-bg-soft);border-radius:var(--l3a-radius-md);padding:12px 14px}
.softCard small{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--l3a-text-muted);font-weight:800}
.softCard b{display:block;margin-top:6px;font-size:19px;font-weight:800;color:var(--l3a-text)}
.systemHeaderSlim{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.titleBlock h3{font-size:15.5px;margin:0 0 3px;font-weight:800;letter-spacing:-.02em}
.titleBlock p{font-size:12.5px;color:var(--l3a-text-muted);margin:0}

.diag{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.diagItem{border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);padding:12px;background:var(--l3a-bg-soft)}
.diagItem b{font-size:21px;display:block;font-weight:800}
.systemStatusGrid{display:grid;grid-template-columns:repeat(3,minmax(160px,1fr));gap:12px}
.systemBox{border:1px solid var(--l3a-border);background:var(--l3a-surface);border-radius:var(--l3a-radius-md);padding:14px}
.systemBox b{display:block;font-size:19px;font-weight:800}
.systemBox small{color:var(--l3a-text-muted);font-weight:800;text-transform:uppercase;font-size:10.5px}

.identityCard{display:grid;grid-template-columns:112px 1fr;gap:18px;align-items:center}
.logoPreviewBox{width:104px;height:104px;border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-lg);background:#fff;
  display:grid;place-items:center;overflow:hidden;box-shadow:var(--l3a-shadow-sm)}
.logoPreviewBox img{width:100%;height:100%;object-fit:contain;padding:8px}
.logoPreviewBox span{font-weight:800;color:var(--l3a-primary)}
.logoPreviewWrap{margin-top:14px;display:flex;align-items:center;gap:14px}
.logoPreview{max-width:180px;max-height:90px;border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);
  background:#fff;padding:8px;object-fit:contain}
.logoPreview.empty{width:72px;height:72px;display:grid;place-items:center;border:1px dashed var(--l3a-border-strong);
  border-radius:var(--l3a-radius-md);color:var(--l3a-primary);font-weight:800}

.userRoleCard{background:var(--l3a-surface);border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);
  padding:15px;box-shadow:var(--l3a-shadow-sm)}
.userRoleCard h4{margin:0 0 6px;font-size:13.5px;font-weight:800}
.userRoleCard p{margin:0;font-size:12.5px;color:var(--l3a-text-muted);line-height:1.5}
.userGrid{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:12px}
.accessCard{border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);background:var(--l3a-surface);padding:14px}
.accessCard h4{margin:0 0 8px;font-size:13.5px;font-weight:800}
.accessMuted{color:var(--l3a-text-muted);font-size:12px;line-height:1.5}
.compactHelp{background:var(--l3a-bg-soft);border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);
  padding:10px 12px;color:var(--l3a-text-muted);font-size:12.5px}
.mutedLine,.note{color:var(--l3a-text-muted);font-size:12.5px;line-height:1.5}
.emptyState{background:var(--l3a-bg-soft);border:1px dashed var(--l3a-border-strong);border-radius:var(--l3a-radius-md);
  padding:22px;color:var(--l3a-text-muted);font-weight:700;text-align:center}
.check{display:inline-flex;gap:7px;align-items:center;background:var(--l3a-bg-soft);border:1px solid var(--l3a-border);
  border-radius:var(--l3a-radius-pill);padding:8px 10px;font-weight:800;font-size:12px}
.permGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px 14px}
.permCheck{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--l3a-text-soft)}

/* ---------- 7. BOTÕES ------------------------------------------------------ */
.btn{border:0;border-radius:var(--l3a-radius-md);padding:10px 16px;font-weight:750;font-size:13.5px;background:var(--l3a-primary);
  color:#fff;box-shadow:0 6px 16px rgba(11,95,173,.20);display:inline-flex;align-items:center;gap:7px;line-height:1;

<div class="modal" id="modal"><button class="drawerClose" onclick="closeModal()" type="button" aria-label="Fechar"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 5l14 14M19 5 5 19"/></svg></button><div class="drawer" id="drawer"></div></div>
<script>
const KEY='sdai_bosch_manager_v4_flm_portas';
const API_URL='https://script.google.com/macros/s/AKfycby45dTdw4g-pkcvY9sys3_gmvVcmnSyf6PZzJbRsbSFjhtuWbV1D5XSBEc-J1UtOBYftA/exec';
const SYNC_KEY=KEY+':syncConfig';
const emptyDB=()=>({empreendimento:{nome:'Empreendimento',cliente:'Cliente'},config:{appName:'Contratos L3A',subtitle:'Gestão operacional • SDAI • Contratos',logoData:''},usuarios:[{id:'admin-default',nome:'Administrador',email:'admin@local',perfil:'Administrador',senha:'1234',ativo:'Sim',criadoEm:''}],paineis:[],lacos:[],flms:[],portas:[],locais:[],equipamentos:[],falhas:[],planos:[],inconsistencias:[],imports:[]});
let db=load(); let currentView='dashboard'; let filters={};
let searchRenderTimer=null;
let lastSearchFocus=null;
function onSearchInput(el){
  const val=el.value;
  const group=el.dataset.filterGroup;
  const key=el.dataset.filterKey;
  const path=el.dataset.filterPath;
  if(group && key){ filters[group]={...(filters[group]||{}),[key]:val}; }
  else if(path){ filters[path]=val; }
  lastSearchFocus={key:el.dataset.focusKey||path||((group||'')+'.'+(key||'')),start:el.selectionStart??val.length,end:el.selectionEnd??val.length};
  clearTimeout(searchRenderTimer);
  searchRenderTimer=setTimeout(()=>render(),120);
}
function attachSearchInputs(){
  document.querySelectorAll('[data-filter-input="1"]').forEach(el=>{
    if(el.dataset.boundSearch==='1')return;
    el.dataset.boundSearch='1';
    el.addEventListener('input',()=>onSearchInput(el));
  });
}
function restoreSearchFocus(){
  if(!lastSearchFocus)return;
  const f=lastSearchFocus;
  setTimeout(()=>{
    const el=document.querySelector(`[data-focus-key="${CSS.escape(f.key)}"]`);
    if(el){el.focus();try{el.setSelectionRange(f.start,f.end)}catch(e){}}
  },0);
}

function load(){try{return normalizeAllStatuses(Object.assign(emptyDB(),JSON.parse(localStorage.getItem(KEY))||{}))}catch(e){return emptyDB()}}
function syncCfg(){try{return Object.assign({configured:false,auto:true,intervalSec:30,lastSync:'',sheetUrl:'',dirty:false},JSON.parse(localStorage.getItem(SYNC_KEY)||'{}'))}catch(e){return {configured:false,auto:true,intervalSec:30,lastSync:'',sheetUrl:'',dirty:false}}}
function setSyncCfg(o){localStorage.setItem(SYNC_KEY,JSON.stringify(Object.assign(syncCfg(),o))); updateSyncFooter()}
let _persistLocalFalhouAvisado=false;
function persistLocal(){try{localStorage.setItem(KEY,JSON.stringify(db));return true}catch(e){alert('ATENÇÃO: não foi possível salvar localmente ('+e.message+'). Isso costuma acontecer em navegação privada ou quando o armazenamento do navegador está cheio. Sua última alteração NÃO foi salva — não feche esta aba agora, ou você vai perder o que fez. Sincronize com o Google (Sistema → Banco de Dados → Sincronizar agora) assim que possível.');return false}}
function markDirty(reason='alteração'){persistLocal(); setSyncCfg({dirty:true,lastReason:reason}); scheduleAutoSync(1500)}
function save(){markDirty('salvamento');render()}
function updateSyncFooter(status){const c=syncCfg(); const dot=document.getElementById('syncDot'), txt=document.getElementById('syncText'); if(!dot||!txt)return; dot.className='syncDot '+(status==='saving'?'warn':status==='error'?'bad':(!c.configured?'warn':c.dirty?'warn':'ok')); txt.textContent=status==='saving'?'Sincronizando...':status==='error'?'Falha ao sincronizar':(!c.configured?'Banco Google não configurado':c.dirty?'Alterações pendentes':'Sincronizado '+(c.lastSync||''));}
let autoSyncTimer=null; let _recuperandoBaseInicial=false; function scheduleAutoSync(ms){const c=syncCfg(); if(!c.configured||!c.auto||_recuperandoBaseInicial)return; clearTimeout(autoSyncTimer); autoSyncTimer=setTimeout(()=>syncNow(false),ms||((c.intervalSec||30)*1000));}
const API_TOKEN_KEY=KEY+':apiToken';
function getApiToken(){return localStorage.getItem(API_TOKEN_KEY)||''}
function setApiToken(t){localStorage.setItem(API_TOKEN_KEY,String(t||''))}
function jsonp(action, params={}){return new Promise((resolve,reject)=>{const cb='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2); window[cb]=(data)=>{delete window[cb]; s.remove(); resolve(data)}; const q=new URLSearchParams({action,callback:cb,token:getApiToken(),...params}); const s=document.createElement('script'); s.src=API_URL+'?'+q.toString(); s.onerror=()=>{delete window[cb]; s.remove(); reject(new Error('Falha de comunicação com Apps Script'))}; document.body.appendChild(s); setTimeout(()=>{if(window[cb]){delete window[cb]; try{s.remove()}catch(e){} reject(new Error('Tempo esgotado na API'))}},30000)})}
async function apiPost(action,payload){return fetch(API_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,payload,token:getApiToken()})})}
async function setupGoogle(){try{updateSyncFooter('saving'); const r=await jsonp('setup'); if(!r.ok)throw new Error(r.error||'Erro ao configurar banco'); setSyncCfg({configured:true,sheetUrl:r.sheetUrl||'',dirty:true}); renderSistema(); updateSyncFooter(); alert('Banco Google configurado/validado.');}catch(e){updateSyncFooter('error'); alert('Falha ao configurar banco: '+e.message)}}
async function loadGoogle(){try{updateSyncFooter('saving'); const r=await jsonp('load'); if(!r.ok)throw new Error(r.error||'Erro ao carregar'); if(r.db && Object.keys(r.db).length){
  const atual=lucContagemDB(db); const novo=lucContagemDB(r.db);
  const chaves=Object.keys(atual); const riscoPerda=chaves.some(k=>(atual[k]||0)>0 && (novo[k]||0) < (atual[k]||0));
  if(riscoPerda){
    const detalhe=chaves.filter(k=>(novo[k]||0)<(atual[k]||0)).map(k=>`${k}: local ${atual[k]} → Google ${novo[k]}`).join('\\n');
    if(!confirm('ATENÇÃO: a base do Google tem MENOS registros do que a sua base local atual em pelo menos um item:\\n\\n'+detalhe+'\\n\\nCarregar agora vai SUBSTITUIR seus dados locais pelos do Google, podendo apagar alterações recentes ainda não sincronizadas. Deseja continuar mesmo assim?')){
      updateSyncFooter(); return;
    }
  }
  db=normalizeAllStatuses(Object.assign(emptyDB(),r.db)); persistLocal(); setSyncCfg({configured:true,dirty:false,lastSync:new Date().toLocaleTimeString('pt-BR')}); render();
} else { alert('Banco Google vazio. Dados locais preservados. Use Sincronizar agora para enviar sua base.'); setSyncCfg({configured:true}); renderSistema(); }}catch(e){updateSyncFooter('error'); alert('Falha ao carregar Google: '+e.message)}}
function baseParecevazia(){return !(db.paineis||[]).length && !(db.equipamentos||[]).length && !(db.locais||[]).length && !(db.flms||[]).length}
function lucContagemDB(d){return {locais:(d?.locais||[]).length,paineis:(d?.paineis||[]).length,equipamentos:(d?.equipamentos||[]).length,baseLojas:(d?.baseLojas||[]).length,flms:(d?.flms||[]).length}}
async function verificarSyncSalvou(esperado){try{const r=await jsonp('load'); if(!r.ok||!r.db)return {ok:false,motivo:r.error||'Resposta inválida do Google ao conferir'}; const atual=lucContagemDB(r.db); const chaves=Object.keys(esperado); for(const k of chaves){if((atual[k]||0)!==(esperado[k]||0))return {ok:false,motivo:`Divergência em "${k}": local tinha ${esperado[k]}, Google Sheets tem ${atual[k]}`}} return {ok:true}}catch(e){return {ok:false,motivo:'Não foi possível conferir: '+e.message}}}
async function syncNow(showAlert=true){const c=syncCfg(); if(!c.configured){ if(showAlert) alert('Configure/valide o banco Google primeiro.'); return; } if(baseParecevazia()){ if(!showAlert){updateSyncFooter();return} if(!confirm('ATENÇÃO: a base local está vazia (sem painéis, laços, FLMs, equipamentos ou lojas). Sincronizar agora vai SUBSTITUIR os dados no Google Sheets por uma base vazia — isso pode apagar tudo que já está lá. Use "Carregar base Google" antes, a menos que você realmente queira começar do zero. Deseja continuar mesmo assim?'))return } try{updateSyncFooter('saving'); persistLocal(); const esperado=lucContagemDB(db); await apiPost('save',{db}); await new Promise(r=>setTimeout(r,1200)); const verif=await verificarSyncSalvou(esperado); if(!verif.ok){updateSyncFooter('error'); if(showAlert) alert('ATENÇÃO: o envio foi disparado, mas a conferência mostra que o Google Sheets NÃO foi atualizado corretamente.\n\nMotivo: '+verif.motivo+'\n\nIsso costuma indicar problema no deploy/permissão do Apps Script (Code.gs), não no app. Seus dados continuam salvos localmente neste navegador. Recomenda-se verificar a implantação do Apps Script antes de sair da página.'); setSyncCfg({dirty:true,lastReason:'falha confirmada na sincronização'}); renderSistema(); return;} setSyncCfg({dirty:false,lastSync:new Date().toLocaleTimeString('pt-BR')}); if(showAlert) alert('Sincronização confirmada: os dados foram lidos de volta do Google Sheets e conferem com o local.'); renderSistema();}catch(e){updateSyncFooter('error'); if(showAlert) alert('Falha ao sincronizar: '+e.message)}}
function setAutoInterval(sec){setSyncCfg({intervalSec:Number(sec)||30,dirty:syncCfg().dirty}); scheduleAutoSync((Number(sec)||30)*1000); renderSistema()}
function setAutoEnabled(v){setSyncCfg({auto:!!v}); if(v) scheduleAutoSync(1000); renderSistema()}

async function sha256Hex(text){const enc=new TextEncoder().encode(String(text||'')); const buf=await crypto.subtle.digest('SHA-256',enc); return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('')}
function looksHashed(s){return /^[a-f0-9]{64}$/i.test(String(s||''))}
async function senhaConfere(senhaDigitada,senhaArmazenada){
  if(looksHashed(senhaArmazenada))return (await sha256Hex(senhaDigitada))===senhaArmazenada;
  return String(senhaArmazenada||'')===String(senhaDigitada||''); // compat com senhas antigas em texto puro
}
const id=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const n=s=>String(s??'').trim(); const up=s=>n(s).toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
const STATUS_SISTEMA_OPTIONS=['Em operação','Laço aberto','Módulo aberto','Módulo em curto','Incêndio disparado','Desativação','Em teste'];
function normalizeStatus(st){const raw=n(st); const x=up(raw); if(!x||x==='ATIVO'||x==='OK'||x==='NORMAL'||x.includes('OPERACAO')||x.includes('FUNCION'))return 'Em operação'; if(x.includes('INCEND')||x.includes('DISPAR')||x.includes('ALARME'))return 'Incêndio disparado'; if((x.includes('MODULO')||x.includes('MÓDULO'))&&x.includes('CURTO'))return 'Módulo em curto'; if((x.includes('MODULO')||x.includes('MÓDULO'))&&x.includes('ABERT'))return 'Módulo aberto'; if(x.includes('CURTO'))return 'Módulo em curto'; if((x.includes('LACO')||x.includes('LAÇO'))&&x.includes('ABERT'))return 'Laço aberto'; if(x.includes('ABERT'))return 'Laço aberto'; if(x.includes('LOGISTA')||x.includes('SISTEMA')||x.includes('FALHA'))return 'Laço aberto'; if(x.includes('DESATIV')||x==='INATIVO')return 'Desativação'; if(x.includes('TESTE'))return 'Em teste'; return raw||'Em operação'}
function normalizeAllStatuses(base){['equipamentos','flms','locais','falhas'].forEach(k=>(base[k]||[]).forEach(o=>{if(o.status)o.status=normalizeStatus(o.status)}));return base}

function classifyDevice(model,tipo,local){const m=up(model+' '+tipo); if(/FLM4204CONS|FLM420I2WE|FLM/.test(m))return 'Módulo'; if(/FAP|DFO/.test(m))return 'Detector de Fumaça'; if(/FAH/.test(m))return 'Detector Térmico'; if(/ACM|DM210|SM210|FMC210|FMC420RW|ACIONADOR/.test(m))return 'Acionador Manual'; if(/FNM|FNS|SIRENE|SINALIZ/.test(m))return 'Sirene / Sinalizador'; if(/DETECTOR/.test(m))return 'Detector'; return n(tipo)||'Não classificado'}
function localClass(name){const x=up(name); if(!x)return ''; if(/AREA COMUM|MALL|CORREDOR|HALL|PRACA|CIRCULACAO|ACESSO/.test(x))return 'Área Comum'; if(/TECNIC|CASA|SALA|BARRILETE|SUBEST|SHAFT|DML|DOCAS|DEPOSITO|SEGURANCA|ADMIN|CPD|TI|BOMBA|GERADOR/.test(x))return 'Área Técnica'; return 'Loja'}

function ensureFlm(painelId,lacoId,endereco,modelo,piso){
  // Identidade do FLM = Painel + Endereço físico do módulo (nunca muda).
  // O Laço é só um dado associado — atualizamos ele aqui, mas NUNCA o usamos
  // para decidir se o FLM "já existe". Isso evita que o FLM (e tudo que
  // depende dele: Porta → Loja → LUC) fique órfão quando o cadastro de Laço
  // é reconstruído e ganha um ID novo.
  let r=findOrCreate(db.flms,x=>x.painelId===painelId&&up(x.endereco)===up(endereco),{painelId,lacoId,endereco:endereco||'S/E',modelo:modelo||'FLM',piso,obs:'Importado'});

    if(lacoId)r.obj.lacoId=lacoId;

  }

}

function ensureLocal(nome,tipo,painelId,lacoId,piso,flmId,portaId,sistema){
  // Chave de casamento: se existe um endereço físico (porta de FLM), usamos ELE como
  // identidade estável da loja/área — não mais o nome técnico. Isso evita duplicar
  // registros quando o nome muda um pouco na central, e permite atualizar de verdade
  // piso/painel/laço/porta quando isso muda de fato na reimportação diária.
  const match = portaId ? (x=>x.portaId===portaId) : (x=>up(x.nome)===up(nome));
  let r=findOrCreate(db.locais,match,{nome,tipo:tipo||localClass(nome),painelId,lacoId,piso,flmId,portaId,sistema:sistema||'SDAI',status:'Em operação',ultimaAlteracao:isoNow(),obs:'Importado'});
  if(!r.created){
    const nomeAnterior=r.obj.nome;
    const trocouNome=nomeAnterior && nome && up(nomeAnterior)!==up(nome);
    const tinhaLuc=!!(r.obj.luc||r.obj.baseLojaId);
    // Atualiza de verdade os dados físicos/técnicos vindos da central (antes ficavam
    // travados no primeiro valor cadastrado e nunca eram atualizados).
    r.obj.nome=nome||r.obj.nome;
    r.obj.tipo=tipo||r.obj.tipo||localClass(nome);
    r.obj.painelId=painelId||r.obj.painelId;
    r.obj.lacoId=lacoId||r.obj.lacoId;
    r.obj.piso=piso||r.obj.piso;
    r.obj.flmId=flmId||r.obj.flmId;
    r.obj.portaId=portaId||r.obj.portaId;
    r.obj.sistema=sistema||r.obj.sistema||'SDAI';
    r.obj.ultimaAlteracao=isoNow();
    // Se o nome técnico mudou nesse mesmo endereço físico e já havia LUC vinculado,
    // NÃO herdamos automaticamente o vínculo antigo pro novo nome — sinalizamos como
    // conflito para conferência manual (mesma tela de Conflitos de Associação).
    if(trocouNome&&tinhaLuc){
      db.conflitosAssociacao=db.conflitosAssociacao||[];
      db.conflitosAssociacao.push({id:id(),lojaCadastrada:r.obj.nomeOficial||nomeAnterior,lojaCadastradaAtual:nome,lojaBaseLuc:r.obj.nomeOficial||'',motivo:`Reimportação técnica: mesma porta física, nome mudou de "${nomeAnterior}" para "${nome}". Confirme se o LUC/associação ainda é o correto.`,percentualSimilaridade:0,data:isoNow(),localId:r.obj.id,baseLojaId:r.obj.baseLojaId||'',pisoCadastro:r.obj.piso||'',pisoBaseLuc:''});
    }
  }
  return r.obj;

function isOperacaoStatus(st){st=up(normalizeStatus(st||'Em operação'));return st.includes('OPER')}

function isDesativadoStatus(st){st=up(normalizeStatus(st||''));return st.includes('DESATIV')}

function statusClass(st){st=normalizeStatus(st); if(isFogoStatus(st))return 'fire'; if(isFalhaStatus(st))return 'bad'; if(isOperacaoStatus(st))return 'ok'; if(isTesteStatus(st))return 'warn'; if(isDesativadoStatus(st))return 'off'; return ''}

function renderDashboard(){

  const total=allDevices.length;
  const op=allDevices.filter(x=>isOperacaoStatus(x.status)).length;
  const lacoAberto=allDevices.filter(x=>up(normalizeStatus(x.status))==='LAÇO ABERTO').length;
  const moduloAberto=allDevices.filter(x=>up(normalizeStatus(x.status))==='MÓDULO ABERTO').length;
  const moduloCurto=allDevices.filter(x=>up(normalizeStatus(x.status))==='MÓDULO EM CURTO').length;
  const incendio=allDevices.filter(x=>isFogoStatus(x.status)).length;
  const desativados=allDevices.filter(x=>isDesativadoStatus(x.status)).length;
  const teste=allDevices.filter(x=>isTesteStatus(x.status)).length;
  const falhas=allDevices.filter(x=>isFalhaStatus(x.status)).length;
  const disponibilidade=total?Math.round((op/total)*100):0;
  const falhaPct=total?Math.round((falhas/total)*100):0;
  const deg=Math.max(0,Math.min(360,Math.round((falhas/Math.max(1,total))*360)));

  const tipoRows=Object.entries(c.tipos).map(([tipo,qtd])=>({tipo,qtd,pct:total?Math.round((qtd/total)*100):0}));
  const tipoTable=table(tipoRows,[['Tipo','tipo'],['Qtd.','qtd'],['Participação','pct',r=>dashBar('',r.qtd,total)]]);
  const statusRows=Object.entries(c.status).map(([status,qtd])=>({status:status||'Sem status',qtd,pct:total?Math.round((qtd/total)*100):0}));
  const statusTable=table(statusRows,[['Status','status',r=>`<span class="pill ${statusClass(r.status)}">${esc(r.status)}</span>`],['Qtd.','qtd'],['Participação','pct',r=>dashBar('',r.qtd,total,statusClass(r.status))]]);

    const eq=db.equipamentos.filter(e=>e.painelId===p.id);
    const dev=[...fl.map(f=>({...f,tipo:'Módulo'})),...eq];
    const totalP=dev.length;

    return {painel:p.nome,total:totalP,flms:fl.length,equip:eq.length,operacao:opP,falhas:falP,ef:totalP?Math.round((opP/totalP)*100):0};
  });
  const painelTable=table(painelRows,[['Painel','painel'],['Total','total'],['FLMs','flms'],['Equip.','equip'],['Em operação','operacao'],['Falhas','falhas'],['Eficiência','ef',r=>dashBar('',r.operacao,r.total,'ok')]]);

  const painelBlocks=db.paineis.map(p=>{
    const lac=db.lacos.filter(l=>l.painelId===p.id);
    const rows=lac.map(l=>{
      const fl=db.flms.filter(f=>f.lacoId===l.id);
      const eq=db.equipamentos.filter(e=>e.lacoId===l.id);
      const dev=[...fl.map(f=>({...f,tipo:'Módulo'})),...eq];
      const totalL=dev.length;
      const opL=dev.filter(x=>isOperacaoStatus(x.status)).length;

      return {laco:l.nome,piso:l.piso,total:totalL,operacao:opL,falhas:falL,ef:totalL?Math.round((opL/totalL)*100):0,tipos:Object.entries(porTipo).map(([k,v])=>`${k}: ${v}`).join(' • ')};
    });
    return `<div class="card"><h3 class="sectionTitle">${esc(p.nome)} — Laços, tipos e performance</h3>${table(rows,[['Laço','laco'],['Piso','piso'],['Total','total'],['Tipos cadastrados','tipos'],['Em operação','operacao'],['Falhas','falhas'],['Eficiência','ef',r=>dashBar('',r.operacao,r.total,'ok')]])}</div>`
  }).join('');

  document.getElementById('dashboard').innerHTML=`
    <div class="card">
      <h3 class="sectionTitle">Base configurada no sistema</h3>
      <div class="grid">
        ${kpi('Painéis',c.paineis)}${kpi('Laços',c.lacos)}${kpi('FLMs físicos',c.flms)}${kpi('Portas',c.portas)}
        ${kpi('Lojas / áreas',c.locais)}${kpi('Equipamentos',c.equipamentos)}${kpi('Total dispositivos',c.totalDispositivos)}${kpi('Tipos distintos',Object.keys(c.tipos).length)}
      </div>
    </div>
    <div class="chartGrid">
      <div class="chartPanel">
        <h4>Distribuição por tipo cadastrado</h4>
        <div class="chartBars">${tipoRows.map(r=>dashBar(r.tipo,r.qtd,total)).join('')||'<p class="msg warn">Sem dados.</p>'}</div>
      </div>
      <div class="chartPanel">
        <h4>Resumo técnico por painel</h4>
        ${painelTable}
      </div>
    </div>
    <div class="card">
      <h3 class="sectionTitle">Eficiência e performance operacional</h3>
      <div class="grid">
        ${kpi('Disponibilidade',disponibilidade+'%')}${kpi('Em operação',op)}${kpi('Laço aberto',lacoAberto)}${kpi('Módulo aberto',moduloAberto)}${kpi('Módulo em curto',moduloCurto)}${kpi('Incêndio disparado',incendio)}
        ${kpi('Falhas totais',falhas)}${kpi('Taxa de falha',falhaPct+'%')}${kpi('Em teste',teste)}${kpi('Desativados',desativados)}
      </div>
    </div>
    <div class="chartGrid">
      <div class="chartPanel">
        <h4>Disponibilidade operacional</h4>
        <div class="donutWrap"><div class="donut" style="--deg:${deg}deg"></div><div class="legend"><span><i class="dot ok"></i>Em operação: ${op}</span><span><i class="dot bad"></i>Falhas: ${falhas}</span><span><i class="dot"></i>Outros status: ${Math.max(0,total-op-falhas)}</span></div></div>
      </div>
      <div class="chartPanel">
        <h4>Status operacional por quantidade</h4>
        <div class="chartBars">${statusRows.map(r=>dashBar(r.status,r.qtd,total,statusClass(r.status))).join('')||'<p class="msg warn">Sem status.</p>'}</div>
      </div>
    </div>
    <div class="card">
      <h3 class="sectionTitle">Tabela consolidada por status</h3>

    <h3 class="sectionTitle">Compilado por Painel → Laço</h3>
    ${painelBlocks||'<div class="card"><p class="msg warn">Importe uma base para iniciar.</p></div>'}
  `
}

function sistemaAutoDetect(nome){return /CO2/i.test(nome||'')?'CO2':'SDAI'}
function setLacoPiso(lacoId,piso){const l=(db.lacos||[]).find(x=>x.id===lacoId); if(!l)return; l.piso=piso; markDirty('piso oficial do laço definido'); renderPaineis();}
function setLacoSistema(lacoId,sistema){const l=(db.lacos||[]).find(x=>x.id===lacoId); if(!l)return; l.sistema=sistema; const afetadas=(db.locais||[]).filter(x=>x.lacoId===lacoId); afetadas.forEach(x=>{x.sistema=sistema; x.ultimaAlteracao=isoNow()}); markDirty('sistema do laço definido (SDAI/CO2)'); renderPaineis(); if(document.getElementById('locais'))renderLocais(); if(afetadas.length)alert(`Sistema "${sistema}" aplicado ao laço e às ${afetadas.length} loja(s)/área(s) já cadastradas nele.`);}
function pisoPorLacoHtml(){
  const paineisComLacos=db.paineis.filter(p=>(db.lacos||[]).some(l=>l.painelId===p.id));
  if(!paineisComLacos.length)return '';
  const blocos=paineisComLacos.map(p=>{
    const lacos=(db.lacos||[]).filter(l=>l.painelId===p.id).slice().sort((a,b)=>(a.nome||'').localeCompare(b.nome||'',"pt-BR",{numeric:true}));
    const linhas=lacos.map(l=>{
      const qtd=db.flms.filter(f=>f.lacoId===l.id).length+db.equipamentos.filter(e=>e.lacoId===l.id).length;
      const sistemaAtual=l.sistema||sistemaAutoDetect(l.nome);
      return `<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.08)"><div><b>${esc(l.nome)}</b><span class="mutedLine" style="margin-left:8px">${qtd} disp.</span></div><div style="display:flex;gap:8px"><select onchange="setLacoSistema('${l.id}',this.value)" title="Sistema atendido por este laço">${SISTEMA_LACO_OPTIONS.map(op=>`<option value="${esc(op)}" ${sistemaAtual===op?'selected':''}>${op}</option>`).join('')}</select><select onchange="setLacoPiso('${l.id}',this.value)">${PISO_LACO_OPTIONS.map(op=>`<option value="${esc(op)}" ${(l.piso||'')===op?'selected':''}>${op||'— Não definido —'}</option>`).join('')}</select></div></div>`;
    }).join('');
    return `<div class="premiumPanel"><h3>Piso e Sistema por Laço — ${esc(p.nome)}</h3><p class="msg warn">Defina o piso oficial e o sistema (SDAI ou CO2) de cada laço. Alguns pisos têm dois laços atendendo a mesma loja — um SDAI (detecção) e outro CO2 (descarga) — o que é normal e não é cadastro duplicado; a etiqueta de Sistema deixa isso claro nas telas de Lojas/Áreas. Uma vez definido, o piso passa a valer para FLMs, Lojas/Áreas e Equipamentos desse laço em toda futura importação, mesmo que a central mande piso diferente ou em branco.</p>${linhas}</div>`;
  }).join('');
  return `<div class="split2" style="margin-top:14px;display:grid;gap:14px">${blocos}</div>`;
}
function sistemaPorPainelHtml(){const blocos=db.paineis.map(p=>{const lacosP=db.lacos.filter(l=>l.painelId===p.id);if(!lacosP.length)return '';const rows=lacosP.map(l=>{const sistemaAtual=l.sistema||sistemaAutoDetect(l.nome);return `<div class="sistemaLacoRow"><span class="sistemaLacoNome">Laço ${esc(l.nome)}${l.piso?` <small>(Piso ${esc(l.piso)})</small>`:''}</span><select onchange="setLacoSistema('${l.id}',this.value)" title="Aplica a todas as lojas deste laço">${SISTEMA_LACO_OPTIONS.map(op=>`<option value="${esc(op)}" ${sistemaAtual===op?'selected':''}>${op}</option>`).join('')}</select></div>`}).join('');return `<div class="sistemaPainelBlock"><h4>${esc(p.nome)}</h4>${rows}</div>`}).join(''); return blocos||'<p class="msg warn">Cadastre um laço antes de definir o Sistema.</p>'}

function planoCategorias(){return ['Substituição de material','Manutenção corretiva','Refazer teste','Reconfiguração de nome','Notificar logista']}
function planoPrioridades(){return ['Crítica','Alta','Média','Baixa']}
function planoResponsaveis(){return ['L3A Engenharia','Brigada','Logista','Shopping','Terceiro / Fornecedor']}
function prioridadePeso(p){return {'Crítica':1,'Alta':2,'Média':3,'Baixa':4}[p]||9}
function isFalhaStatus(s){s=up(normalizeStatus(s));return s.includes('ABERT')||s.includes('CURTO')||s.includes('INCEND')||s.includes('DISPAR')||s.includes('DESATIV')||s.includes('TESTE')}
function itemInfoFromFalha(f){
  let isFlm=String(f.itemId||'').startsWith('flm:'), item=isFlm?flmById(String(f.itemId).slice(4)):db.equipamentos.find(e=>e.id===f.itemId);
  let localId=f.localId||item?.localId||'';
  const lacoId=f.lacoId||item?.lacoId||'';

    rows.push({
      origemLinha:'Falha sem plano',
      falhaId:f.id,
      planoId:'',
      prioridade:'Média',
      painel:inf.painel||'',
      laco:inf.laco||'',

    <div class="card"><h3 class="sectionTitle">Lançamentos e acompanhamento</h3>${table(filtrados,[['Prioridade','prioridade'],['Painel','painel'],['Laço','laco'],['Piso','piso'],['Loja / Área','local'],['Item','itemNome'],['Falha','statusFalha',r=>`<span class="pill ${statusClass(r.statusFalha)}">${esc(r.statusFalha)}</span>`],['Categoria','categoria'],['Responsável','responsavel'],['Desde','desde'],['Situação','situacao',r=>`<span class="pill ${r.situacao==='Concluído'?'ok':r.situacao==='Sem plano'?'warn':''}">${esc(r.situacao)}</span>`],['Concluído em','concluidoEm']],r=>`${r.planoId?`<button class="btn small secondary" onclick="formPlano('${r.planoId}')"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20l1-4.2L15.5 5.3a1.5 1.5 0 0 1 2.1 0l1.1 1.1a1.5 1.5 0 0 1 0 2.1L8.2 19 4 20Z"/><path d="M13.8 7 17 10.2"/></svg> Editar</button>`:`<button class="btn small" onclick="formPlano('', '${r.falhaId}')">+ Criar</button>`} ${r.planoId&&r.situacao!=='Concluído'?`<button class="btn small" onclick="concluirPlano('${r.planoId}')"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12.5 9 17l10.5-10.5"/></svg> Concluir</button>`:''}`)}</div>`;

function currentUserId(){return localStorage.getItem(KEY+':currentUserId') || ''}
function ensureDefaultUsers(){

  const jaTeveUsuarios=localStorage.getItem(KEY+':usersEverExisted')==='1';
  if(!db.usuarios.length){
    if(jaTeveUsuarios&&!window._avisoUsuariosVazioMostrado){
      window._avisoUsuariosVazioMostrado=true;
      alert('ATENÇÃO: a lista de usuários está vazia, mas este sistema já teve usuários cadastrados antes. Isso indica que a base carregou incompleta (falha de sincronização ou armazenamento cheio). Um Administrador temporário (admin@local / 1234) foi criado para você conseguir entrar — recomenda-se ir em Sistema → Banco de Dados → "Carregar base Google" para recuperar os usuários reais antes de continuar usando o sistema.');
    }
    db.usuarios.push({id:'admin-default',nome:'Administrador',email:'admin@local',perfil:'Administrador',senha:'1234',ativo:'Sim',criadoEm:isoNow()});
  }
  if(db.usuarios.length)localStorage.setItem(KEY+':usersEverExisted','1');

async function saveSenha(){let u=currentUser(); if(!(await senhaConfere(n(pwOld.value),u.senha))){alert('Senha atual inválida.');return} if(!n(pwNew.value)||n(pwNew.value)!==n(pwNew2.value)){alert('Confirmação de senha não confere.');return} u.senha=await sha256Hex(n(pwNew.value));closeModal();markDirty('senha');alert('Senha alterada.')}
function logLocal(entidade,entidadeId,acao,descricao){db.historico=db.historico||[];db.historico.push({id:id(),data:isoNow(),usuario:(currentUser().email||currentUser().nome||'usuario'),entidade,entidadeId,acao,descricao}); if(db.historico.length>1000)db.historico=db.historico.slice(-1000); persistLocal()}
function perfilAtual(){return currentUser().perfil||'Administrador'}
function can(action){const p=perfilAtual(); if(p==='Administrador')return true; if(p==='Supervisor')return !['importar','cadastro'].includes(action); if(p==='Operacional')return ['operacao','status','planoStatus','visualizar'].includes(action); return false}
function requireAccess(action,msg){if(can(action))return true; alert(msg||'Seu perfil não possui permissão para esta ação.'); return false}
function applyBrand(){const cfg=db.config||{}; const name=cfg.appName||'Contratos L3A'; const sub=cfg.subtitle||'Gestão operacional • SDAI'; const logo=cfg.logoData||''; const bn=document.getElementById('brandName'), bs=document.getElementById('brandSub'), bl=document.getElementById('brandLogo'); if(bn)bn.textContent=name; if(bs)bs.textContent=sub; if(bl){ if(logo){bl.classList.add('hasImg'); bl.style.backgroundImage=`url(${logo})`; bl.textContent='';} else {bl.classList.remove('hasImg'); bl.style.backgroundImage=''; bl.textContent='L3A';}} const pb=document.getElementById('profileBadge'); const u=currentUser(); if(pb){pb.innerHTML=`<b>${esc(u.nome||'Usuário')}</b><span>${esc(u.perfil||'Administrador')} • Online</span>`} const tu=document.getElementById('topUser'); if(tu){tu.setAttribute('onclick','toggleUserMenu()');tu.innerHTML=`<span class="avatar">${esc((u.nome||'U').slice(0,1).toUpperCase())}</span><span class="uText"><b>${esc(u.nome||'Usuário')}</b><small>${esc(u.perfil||'Administrador')}</small></span>`}}

function logoToBase64(file){return new Promise((res,rej)=>{const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file)})}

async function readRows(){let f=document.getElementById('fileImp').files[0]; if(!f)throw new Error('Selecione um arquivo.'); let ext=f.name.split('.').pop().toLowerCase(); let data=await f.arrayBuffer(); if(ext==='csv'){let txt=new TextDecoder('utf-8').decode(data); return parseCSV(txt)} if(typeof XLSX==='undefined')throw new Error('Biblioteca XLSX não carregada. Para XLS/XLSX, abra com internet ou use CSV.'); let wb=XLSX.read(data,{type:'array'}); let rows=[]; wb.SheetNames.forEach(sn=>{rows=rows.concat(XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:''}))}); return rows}
function parseCSV(txt){let sep=(txt.split('\n')[0].match(/;/g)||[]).length>=(txt.split('\n')[0].match(/,/g)||[]).length?';':','; let lines=txt.split(/\r?\n/).filter(x=>x.trim()); if(!lines.length)return []; let headers=splitCSV(lines[0],sep); return lines.slice(1).map(l=>{let vals=splitCSV(l,sep),o={};headers.forEach((h,i)=>o[h]=vals[i]||'');return o})}
function splitCSV(line,sep){let out=[],cur='',q=false; for(let i=0;i<line.length;i++){let ch=line[i]; if(ch==='"'){if(q&&line[i+1]==='"'){cur+='"';i++}else q=!q}else if(ch===sep&&!q){out.push(cur);cur=''}else cur+=ch} out.push(cur); return out}
async function previewImport(){try{let rows=await readRows(); let v=validateRows(rows); document.getElementById('previewBox').innerHTML=`<div class="msg ${v.ok?'ok':'err'}">${v.ok?'Arquivo validado':'Arquivo com inconsistências'}: ${rows.length} registros lidos.</div>${table(rows.slice(0,20),Object.keys(rows[0]||{}).map(k=>[k,k]))}${v.errors.length?table(v.errors,[['Linha','linha'],['Motivo','motivo'],['Registro','registro']]):''}`}catch(e){document.getElementById('impMsg').innerHTML=`<div class="msg err">${esc(e.message)}</div>`}}
function validateRows(rows){let errors=[]; if(!rows.length)errors.push({linha:0,motivo:'Arquivo vazio',registro:''}); let cols=Object.keys(rows[0]||{}).map(normKey); ['PAINEL','LACO','TIPO','MODELO'].forEach(c=>{if(!cols.some(x=>x.includes(c)))errors.push({linha:1,motivo:'Coluna obrigatória ausente: '+c,registro:Object.keys(rows[0]||{}).join(', ')})}); return {ok:!errors.length,errors}}
async function importFile(){try{let rows=await readRows(); let mode=document.getElementById('modeImp').value; let v=validateRows(rows); if(!v.ok)throw new Error(v.errors.map(e=>e.motivo).join(' | ')); if(mode==='replace')db=emptyDB(); let stats={registrosLidos:rows.length,paineis:0,lacos:0,flms:0,portas:0,lojasCriadas:0,areasTecnicas:0,areasComuns:0,detectores:0,acionadores:0,modulos:0,ignorados:0,desativadosNaoEncontrados:0}; let errors=[],rom={ok:false,msg:'Não localizada no arquivo.'}; const equipIdsTocados=new Set(),flmIdsTocados=new Set(),paineisTocados=new Set(); rows.forEach((r,i)=>{let linha=i+2; try{let painel=get(r,['Painel','Central']); let laco=get(r,['Laço','Laco','Loop']); let piso=get(r,['Piso','Pavimento']); let endFlm=get(r,['Endereço FLM','Endereco FLM','FLM','Módulo','Modulo']); let porta=get(r,['Porta','Canal','Porta / Ligação','Porta Ligação']); let loja=get(r,['Loja','Local','Área','Area','Ambiente']); let tipo=get(r,['Tipo','Classificação','Classificacao']); let modelo=get(r,['Modelo','Dispositivo','Nome do dispositivo']); let endereco=get(r,['Endereço','Endereco','Zona','Endereço Equipamento']); let fab=get(r,['Fabricante']); let status=normalizeStatus(get(r,['Status'])||'Em operação'); let obs=get(r,['Observação','Observacao','Obs']); if(!painel||!laco){stats.ignorados++; errors.push({linha,motivo:'Painel ou laço ausente',registro:JSON.stringify(r)}); return} let p0=db.paineis.length,l0=db.lacos.length,f0=db.flms.length,pt0=db.portas.length,loc0=db.locais.length; let p=ensurePanel(painel); paineisTocados.add(p.id); let l=ensureLaco(p.id,laco,piso); const pisoResolvido=n(l.piso)||piso; const sistemaResolvido=l.sistema||sistemaAutoDetect(l.nome); stats.paineis+=db.paineis.length>p0?1:0; stats.lacos+=db.lacos.length>l0?1:0; let classe=classifyDevice(modelo,tipo,loja); let isModulo=classe==='Módulo'; let flm=null,portaObj=null,local=null; if(isModulo||endFlm){flm=ensureFlm(p.id,l.id,endFlm||endereco||modelo,modelo||'FLM',pisoResolvido); flmIdsTocados.add(flm.id); stats.flms+=db.flms.length>f0?1:0; stats.modulos+=db.flms.length>f0?1:0; if(porta||loja){portaObj=ensurePorta(flm.id,porta||'1'); stats.portas+=db.portas.length>pt0?1:0} if(loja){local=ensureLocal(loja,localClass(loja),p.id,l.id,pisoResolvido,flm.id,portaObj?.id,sistemaResolvido); if(portaObj)local.portaId=portaObj.id, portaObj.localId=local.id; let created=db.locais.length>loc0; if(created){if(local.tipo==='Loja')stats.lojasCriadas++; if(local.tipo==='Área Técnica')stats.areasTecnicas++; if(local.tipo==='Área Comum')stats.areasComuns++} if(up(loja).includes('ROMANNEL'))rom={ok:true,msg:`Importada/vinculada ao ${painel} • ${laco} • FLM ${flm.endereco} • Porta ${portaObj?.numero||porta||'1'}.`}} } else { if(loja){local=db.locais.find(x=>up(x.nome)===up(loja)); if(!local){let areaTipo=equipAreaClass(loja,modelo,tipo); if(areaTipo){local=ensureLocal(loja,areaTipo,p.id,l.id,pisoResolvido,'','',sistemaResolvido); if(up(loja).includes('ROMANNEL'))rom={ok:false,msg:'ROMANNEL apareceu em registro de equipamento/área. Não foi criada como loja; foi tratada como '+areaTipo+'.'} } else { if(up(loja).includes('ROMANNEL'))rom={ok:false,msg:'ROMANNEL apareceu em registro de equipamento, mas loja só é criada por porta de FLM. Registro não criou loja.'}; errors.push({linha,motivo:'Equipamento não cria loja. Loja informada não existe por porta de FLM: '+loja,registro:JSON.stringify(r)}) }}} let res=ensureEquip({painelId:p.id,lacoId:l.id,piso:pisoResolvido,tipo:classe,endereco:endereco||get(r,['Zona'])||'',modelo,fabricante:fab,localId:local?.id||'',flmId:flm?.id||'',portaId:portaObj?.id||'',status,ultimaAlteracao:isoNow(),obs},mode); equipIdsTocados.add(res.obj.id); if(res.created){if(classe.includes('Detector'))stats.detectores++; else if(classe.includes('Acionador'))stats.acionadores++;} }
      }catch(e){stats.ignorados++; errors.push({linha,motivo:e.message,registro:JSON.stringify(r)})}});
      // Equipamentos/módulos "fantasma": existiam no painel antes desta importação mas
      // não apareceram desta vez (provável remoção física na central) — marca como
      // Desativada em vez de deixar "Em operação" pra sempre, sem excluir o histórico.
      if(mode!=='replace'){
        db.equipamentos.forEach(e=>{
          if(paineisTocados.has(e.painelId)&&!equipIdsTocados.has(e.id)&&!up(e.status||'').includes('DESATIV')){
            const statusAnterior=e.status; e.status='Desativação'; e.ultimaAlteracao=isoNow();
            db.falhas.push({id:id(),data:isoNow(),painelId:e.painelId,lacoId:e.lacoId,piso:e.piso,tipo:e.tipo,itemId:e.id,itemNome:(e.tipo||'')+' '+(e.endereco||e.modelo||''),localId:e.localId,status:'Desativação',statusAnterior,responsavel:'',origem:'Importação',motivo:'Não encontrado na última importação técnica — pode ter sido removido fisicamente na central',obs:''});
            stats.desativadosNaoEncontrados++;
            // Evita "arquivo morto": se havia Plano de Ação aberto ligado a este
            // equipamento, cancela automaticamente em vez de deixar preso pra sempre.
            (db.planos||[]).forEach(pl=>{const fl=db.falhas.find(x=>x.id===pl.falhaId); if(fl&&fl.itemId===e.id&&pl.situacao!=='Concluído'&&pl.situacao!=='Cancelado'){pl.situacao='Cancelado'; pl.providencia=(pl.providencia?pl.providencia+' | ':'')+'Cancelado automaticamente: equipamento não encontrado na última importação técnica.'; pl.atualizadoEm=isoNow()}});
          }
        });
        db.flms.forEach(f=>{
          if(paineisTocados.has(f.painelId)&&!flmIdsTocados.has(f.id)&&!up(f.status||'').includes('DESATIV')){
            f.status='Desativação'; f.ultimaAlteracao=isoNow(); stats.desativadosNaoEncontrados++;
          }
        });
      }

function ensurePhotoUploadFrame(){
  if(document.getElementById('photoUploadFrame'))return;
  const iframe=document.createElement('iframe');
  iframe.name='photoUploadFrame'; iframe.id='photoUploadFrame'; iframe.style.display='none';
  document.body.appendChild(iframe);
  window.addEventListener('message',e=>{if(e.data&&e.data.type==='fotoUploadResult')handleFotoUploadResult(e.data)});
}
function compressImageFile(file,maxWidth=1200,quality=0.72){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxWidth){h=Math.round(h*maxWidth/w);w=maxWidth}
        const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.onerror=reject; img.src=ev.target.result;
    };
    reader.onerror=reject; reader.readAsDataURL(file);
  });
}
let _fotoUploadQueue=[]; let _fotoUploadBusy=false; const _fotoUploadPending={};
function queueFotoUploads(planoId,files){
  ensurePhotoUploadFrame();
  const LIMITE_REJEITAR=30*1024*1024, LIMITE_AVISAR=8*1024*1024;
  let avisouGrande=false, rejeitadas=0;
  [...files].forEach(file=>{
    if(file.size>LIMITE_REJEITAR){rejeitadas++; return}
    if(file.size>LIMITE_AVISAR&&!avisouGrande){avisouGrande=true; alert('Uma ou mais fotos são grandes — o navegador pode levar alguns segundos pra comprimir antes de enviar. Aguarde sem fechar a janela.')}
    _fotoUploadQueue.push({planoId,file});
  });
  if(rejeitadas)alert(`${rejeitadas} foto(s) maior(es) que 30MB foram ignoradas — tire uma foto nova ou reduza o tamanho antes de anexar.`);
  updateFotoUploadStatus(); processFotoQueue();
}
function updateFotoUploadStatus(){
  const el=document.getElementById('mFotoStatus'); if(!el)return;
  const pend=_fotoUploadQueue.length+Object.keys(_fotoUploadPending).length;
  el.textContent=pend?`Enviando ${pend} foto(s)... não feche esta janela.`:'';
}
async function processFotoQueue(){
  if(_fotoUploadBusy||!_fotoUploadQueue.length)return;
  _fotoUploadBusy=true;
  const job=_fotoUploadQueue.shift();
  try{
    const dataUrl=await compressImageFile(job.file);
    const reqId=id();
    _fotoUploadPending[reqId]={planoId:job.planoId};
    updateFotoUploadStatus();
    const form=document.createElement('form');
    form.method='POST'; form.action=API_URL; form.target='photoUploadFrame'; form.style.display='none';
    const fields={action:'uploadFoto',token:getApiToken(),reqId,planoId:job.planoId,filename:job.file.name||'foto.jpg',imageData:dataUrl};
    Object.entries(fields).forEach(([k,v])=>{const inp=document.createElement('input');inp.type='hidden';inp.name=k;inp.value=v;form.appendChild(inp)});
    document.body.appendChild(form); form.submit(); setTimeout(()=>form.remove(),1500);
  }catch(e){
    alert('Não foi possível preparar a foto: '+e.message);
    _fotoUploadBusy=false; processFotoQueue();
  }
}
function handleFotoUploadResult(data){
  _fotoUploadBusy=false;
  const pend=_fotoUploadPending[data.reqId];
  if(pend){
    if(data.ok&&data.url){
      const plano=(db.planos||[]).find(p=>p.id===pend.planoId);
      if(plano){plano.fotos=plano.fotos||[];plano.fotos.push(data.url);markDirty('foto anexada ao plano');renderPlano();const grid=document.getElementById('mFotoGrid');if(grid)grid.innerHTML=fotosThumbsHtml(plano.fotos)}
    } else {
      alert('Falha ao enviar uma foto: '+(data.error||'erro desconhecido no Apps Script'));
    }
    delete _fotoUploadPending[data.reqId];
  }
  updateFotoUploadStatus();
  processFotoQueue();
}

  nodes.forEach(node=>{

}

/* =========================================================================
   V8.1 — Dashboard orientado a "onde/quem", não só "quanto".
   Bloco 100% ADITIVO: nenhuma função existente foi alterada ou removida.
   Reaproveita os campos já existentes (piso, painelId, lacoId, status,
   ultimaAlteracao) — nenhuma mudança de schema, nenhuma mudança no Code.gs.
   ========================================================================= */
function pisoSortKey(p){const m=String(p||'').match(/\d+/);return m?parseInt(m[0],10):999}
function dashStatusBucket(st){const s=up(normalizeStatus(st||''));if(s.includes('INCEND')||s.includes('DISPAR'))return 'falha';if(s.includes('ABERT')||s.includes('CURTO'))return 'falha';if(s.includes('TESTE'))return 'teste';if(s.includes('DESATIV'))return 'desativada';return 'operacao'}
// Piso efetivo: o piso OFICIAL definido no Laço (tela Painéis → Piso por Laço) manda
// mais que o piso gravado solto no próprio equipamento/loja/FLM — que pode estar
// vazio ou desatualizado em registros antigos. Só cai para o piso do próprio
// registro se o laço dele ainda não tiver piso oficial definido.
function pisoEfetivo(obj){
  if(!obj)return '';
  const lacoId=obj.lacoId;
  const l=lacoId?(db.lacos||[]).find(x=>x.id===lacoId):null;
  let piso=n(l&&l.piso);
  if(!piso&&lacoId){
    // Cobre o caso de Laços duplicados/órfãos (mesmo nome, ID diferente) deixados
    // por uma reconstrução antiga da base — procura outro registro de Laço com o
    // MESMO NOME que já tenha o piso oficial definido, em vez de mostrar "Sem piso".
    const nomeAtual=l?l.nome:lacName(lacoId);
    if(nomeAtual){
      const irmao=(db.lacos||[]).find(x=>up(x.nome)===up(nomeAtual)&&x.piso);
      if(irmao)piso=n(irmao.piso);
    }
  }
  return piso||n(obj.piso)||'';
}
function timeSince(isoStr){if(!isoStr)return '—';const then=new Date(isoStr).getTime();if(isNaN(then))return '—';const diffMs=Math.max(0,Date.now()-then);const h=diffMs/3600000;if(h<1)return Math.max(1,Math.round(diffMs/60000))+' min';if(h<24)return Math.round(h)+'h';return Math.round(h/24)+'d'}
function dashPisoStats(){const map={};const bump=(obj)=>{const p=pisoEfetivo(obj)||'Sem piso';if(!map[p])map[p]={piso:p,operacao:0,teste:0,falha:0,desativada:0};map[p][dashStatusBucket(obj.status)]++};(db.equipamentos||[]).forEach(bump);(db.flms||[]).forEach(bump);return Object.values(map).sort((a,b)=>pisoSortKey(a.piso)-pisoSortKey(b.piso)||a.piso.localeCompare(b.piso,'pt-BR'))}
function dashLojasComFalha(){return (db.locais||[]).filter(l=>dashStatusBucket(l.status)==='falha').map(l=>({nome:l.nome||'—',piso:pisoEfetivo(l)||'—',laco:lacName(l.lacoId)||'—',desde:l.ultimaAlteracao||'',status:l.status})).sort((a,b)=>(a.desde||'').localeCompare(b.desde||''))}
function dashPorLaco(){const map={};(db.locais||[]).filter(l=>dashStatusBucket(l.status)==='falha').forEach(l=>{const key=(paiName(l.painelId)||'—')+' · '+(lacName(l.lacoId)||'—');map[key]=(map[key]||0)+1});return Object.entries(map).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value).slice(0,8)}
// Panorama completo: TODOS os laços da central (não só os com falha), com
// quantidade de dispositivos (FLM+Equipamento), piso, sistema e disponibilidade —
// para dar uma leitura completa da central só pelo Dashboard.
function dashPanoramaLacos(){
  return (db.lacos||[]).map(l=>{
    const fl=db.flms.filter(f=>f.lacoId===l.id);
    const eq=db.equipamentos.filter(e=>e.lacoId===l.id);
    const dev=[...fl,...eq];
    const total=dev.length;
    const falha=dev.filter(x=>dashStatusBucket(x.status)==='falha').length;
    const teste=dev.filter(x=>dashStatusBucket(x.status)==='teste').length;
    const op=total-falha-teste;
    return {
      painel:paiName(l.painelId)||'—',
      laco:l.nome||'—',
      pisoDisplay:l.piso||'—',
      sistema:l.sistema||sistemaAutoDetect(l.nome),
      flms:fl.length,
      equip:eq.length,
      total,op,falha,teste,
      disp:total?Math.round((op/total)*100):0
    };
  }).sort((a,b)=>a.painel.localeCompare(b.painel,'pt-BR')||pisoSortKey(a.pisoDisplay)-pisoSortKey(b.pisoDisplay)||a.laco.localeCompare(b.laco,'pt-BR',{numeric:true}));
}

datas, responsável) e as fotos anexadas.</p></div>

function itemEnderecoOrdenavel(itemId){
  if(!itemId)return 9999;
  let raw='';
  if(String(itemId).startsWith('flm:')){
    const flmId=String(itemId).split(':')[1];
    const f=flmById(flmId);
    raw=f?f.endereco:'';
  } else {
    const e=db.equipamentos.find(x=>x.id===itemId);
    raw=e?e.endereco:'';
  }
  const num=parseFloat(String(raw||'').replace(',','.'));
  return isNaN(num)?9999:num;
}
function gerarPdfPlanoAcao(){
  const situacaoPdf=document.getElementById('pdfSituacao')?.value||'Aberto';
  const ini=document.getElementById('plIni')?.value||'';
  const fim=document.getElementById('plFim')?.value||'';
  const iniT=ini?new Date(ini+'T00:00:00').getTime():null;
  const fimT=fim?new Date(fim+'T23:59:59').getTime():null;
  const dentroPeriodo=(dataStr)=>{ if(!iniT&&!fimT)return true; if(!dataStr)return false; const t=new Date(dataStr).getTime(); if(isNaN(t))return true; if(iniT&&t<iniT)return false; if(fimT&&t>fimT)return false; return true; };
  let planos=db.planos||[];
  let falhas=falhasAtivasParaPlano();
  let rows=[];
  planos.forEach(p=>{
    const concluido=p.situacao==='Concluído';
    if(situacaoPdf==='Aberto'&&concluido)return;
    if(situacaoPdf==='Concluído'&&!concluido)return;
    const dataRef=concluido?(p.concluidoEm||p.atualizadoEm||p.criadoEm):p.criadoEm;
    if(!dentroPeriodo(dataRef))return;
    let f=db.falhas.find(x=>x.id===p.falhaId)||{};
    let inf=f.id?itemInfoFromFalha(f):{};
    rows.push({prioridade:p.prioridade||'Média',painel:inf.painel||p.painel||'',laco:inf.laco||p.laco||'',piso:inf.piso||p.piso||'',local:inf.local||p.local||'',itemNome:inf.itemNome||p.item||'',categoria:p.categoria||'',responsavel:p.responsavel||'',situacao:p.situacao||'Aberto',concluidoEm:p.concluidoEm?fmtDateSimple(p.concluidoEm):'',endereco:itemEnderecoOrdenavel(f.itemId||'')});
  });
  if(situacaoPdf!=='Concluído'){
    falhas.forEach(f=>{
      if(planoForFalha(f.id))return;
      if(!dentroPeriodo(f.data))return;
      let inf=itemInfoFromFalha(f);
      rows.push({prioridade:'Média',painel:inf.painel||'',laco:inf.laco||'',piso:inf.piso||'',local:inf.local||'',itemNome:inf.itemNome||'',categoria:'',responsavel:'',situacao:'Sem plano',concluidoEm:'',endereco:itemEnderecoOrdenavel(f.itemId||'')});
    });
  }
  rows.sort((a,b)=>pisoSortKey(a.piso)-pisoSortKey(b.piso)||String(a.laco).localeCompare(String(b.laco),'pt-BR',{numeric:true})||a.endereco-b.endereco);

  const incluiConcluido=situacaoPdf!=='Aberto';
  const cols=[['Prioridade','prioridade'],['Loja / Área','local'],['Item','itemNome'],['Categoria','categoria'],['Responsável','responsavel'],['Situação','situacao',r=>`<span class="pill ${r.situacao==='Sem plano'?'warn':r.situacao==='Concluído'?'ok':''}">${esc(r.situacao)}</span>`]];
  if(incluiConcluido)cols.push(['Concluído em','concluidoEm']);
  const grupos={};
  rows.forEach(r=>{const k=(r.piso||'Sem piso')+' | '+(r.laco||'Sem laço');grupos[k]=grupos[k]||{piso:r.piso||'Sem piso',laco:r.laco||'Sem laço',itens:[]};grupos[k].itens.push(r)});
  const blocos=Object.values(grupos).map(g=>`<div class="reportBlock"><h3>${esc(g.piso)} — ${esc(g.laco)}</h3>${table(g.itens,cols)}</div>`).join('');

async function verificarBaseAoAbrir(){
  if(!isLoggedIn())return;
  const c=syncCfg();
  if(!baseParecevazia())return; // banco local ok, nada a fazer
  if(!c.configured){alert('A base local está vazia e o banco Google ainda não foi configurado neste sistema. Vá em Sistema \u2192 Banco de Dados \u2192 "Inicializar/validar" e depois "Carregar base Google".');return}
  _recuperandoBaseInicial=true;
  updateSyncFooter('saving');
  const dEl=document.getElementById('dashboard');
  if(dEl)dEl.innerHTML='<div class="card"><p class="msg warn">Banco local vazio — recarregando automaticamente do Google Sheets, aguarde alguns segundos...</p></div>';
  try{
    const r=await jsonp('load');
    if(r.ok && r.db && Object.keys(r.db).length){
      db=normalizeAllStatuses(Object.assign(emptyDB(),r.db));
      persistLocal();
      setSyncCfg({dirty:false,lastSync:new Date().toLocaleTimeString('pt-BR')});
      _recuperandoBaseInicial=false;
      render();
      alert('A base local estava vazia (provável falha ao salvar no navegador). Os dados foram recarregados automaticamente do Google Sheets — nada foi perdido.');
    } else {
      _recuperandoBaseInicial=false;
      updateSyncFooter();
      render();
      alert('A base local está vazia e a base no Google também não retornou dados. Verifique manualmente em Sistema \u2192 Banco de Dados antes de sincronizar ou continuar usando o sistema, para não gravar uma base vazia por cima da planilha.');
    }
  }catch(e){
    _recuperandoBaseInicial=false;
    updateSyncFooter('error');
    render();
    alert('A base local está vazia e não foi possível recarregar automaticamente do Google (' + e.message + '). Vá em Sistema \u2192 Banco de Dados \u2192 "Carregar base Google" manualmente antes de continuar.');
  }
}

function ensureLucSchema(){
  db.baseLojas=db.baseLojas||[];
  db.conflitosAssociacao=db.conflitosAssociacao||[];
  (db.baseLojas||[]).forEach(l=>{if(!l.id)l.id=id(); if(!l.origem)l.origem='IMPORTACAO_LUC'; if(!l.statusAssociacao)l.statusAssociacao='Pendente';});
}
function lucNormText(s){return up(s).replace(/&/g,' E ').replace(/[^A-Z0-9 ]/g,' ').replace(/\b(LTDA|ME|EPP|LOJA|STORE|QUIOSQUE|SHOP|SHOPPING|PISO|P[123]|PAVIMENTO|UNIDADE|RESTAURANTE|ALIMENTACAO)\b/g,' ').replace(/\b(O|A|OS|AS|DA|DE|DO|DAS|DOS)\b/g,' ').replace(/\s+/g,' ').trim()}
function lucCompactText(s){return lucNormText(s).replace(/\s+/g,'')}
function lucTokenSet(s){return lucNormText(s).split(' ').filter(Boolean)}
function lucEditDistance(a,b){a=lucCompactText(a);b=lucCompactText(b); if(!a||!b)return 99; const m=[]; for(let i=0;i<=a.length;i++){m[i]=[i]} for(let j=0;j<=b.length;j++){m[0][j]=j} for(let i=1;i<=a.length;i++){for(let j=1;j<=b.length;j++){m[i][j]=Math.min(m[i-1][j]+1,m[i][j-1]+1,m[i-1][j-1]+(a[i-1]===b[j-1]?0:1))}} return m[a.length][b.length]}
function lucSimilarity(a,b){const A=lucTokenSet(a),B=lucTokenSet(b); const sa=lucNormText(a),sb=lucNormText(b),ca=lucCompactText(a),cb=lucCompactText(b); if(!ca||!cb)return 0; if(ca===cb||sa===sb)return 100; let common=A.filter(x=>B.includes(x)).length; let j=common/Math.max(1,new Set([...A,...B]).size); let inc=(ca.includes(cb)||cb.includes(ca)||sa.includes(sb)||sb.includes(sa))?0.30:0; let prefix=ca.slice(0,5)===cb.slice(0,5)?0.12:0; let dist=lucEditDistance(a,b), maxLen=Math.max(ca.length,cb.length,1); let edit=Math.max(0,1-(dist/maxLen)); return Math.round(Math.max(Math.min(1,j+inc+prefix),edit)*100)}
function lucPisoKey(v){const x=up(v); if(/(^|\D)1(\D|$)|PISO 1|P1/.test(x))return '1'; if(/(^|\D)2(\D|$)|PISO 2|P2/.test(x))return '2'; if(/(^|\D)3(\D|$)|PISO 3|P3/.test(x))return '3'; return ''}
function lucPisosCompat(localPiso,basePiso){const a=lucPisoKey(localPiso),b=lucPisoKey(basePiso); return !!a&&!!b&&a===b}
function pisoFromLuc(luc,tipo){const first=(n(luc).match(/[0-9]/)||[''])[0]; if(first==='1')return 'Piso 1'; if(first==='2')return 'Piso 2'; if(first==='3')return 'Piso 3'; return up(tipo)==='ALIMENTACAO'?'Piso 3':'Conferir'}
async function readRowsFromFile(f){let ext=f.name.split('.').pop().toLowerCase(); let data=await f.arrayBuffer(); if(ext==='csv'){let txt=new TextDecoder('utf-8').decode(data); return parseCSV(txt)} if(!['xls','xlsx'].includes(ext))throw new Error('Formato não aceito. Use XLSX, XLS ou CSV.'); if(typeof XLSX==='undefined')throw new Error('Biblioteca XLSX não carregada. Para XLS/XLSX, abra com internet ou use CSV.'); let wb=XLSX.read(data,{type:'array'}); let rows=[]; wb.SheetNames.forEach(sn=>{rows=rows.concat(XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:''}))}); return rows}
function readLucRowsFile(){const input=document.getElementById('fileLucImp'); if(!input||!input.files||!input.files[0])throw new Error('Selecione um arquivo XLSX ou CSV para Importação LUC/Loja.'); return readRowsFromFile(input.files[0])}
function normalizeLucImportRows(rows){const out=[],errors=[]; const dt=isoNow(); rows.forEach((r,i)=>{const linha=i+2; const luc=get(r,['LUC','LC','Código LUC','Codigo LUC','Luc']); const tipo=get(r,['Tipo de Loja','Tipo','Categoria']); const loja=get(r,['Loja','Nome da Loja','Nome','Razão Social','Razao Social']); const area=get(r,['Área Contrato (m²)','Area Contrato (m2)','Área Contrato','Area Contrato','Área','Area']); if(!luc&&!loja){errors.push({linha,motivo:'Registro sem LUC e sem Loja',registro:JSON.stringify(r)});return} out.push({id:id(),luc:n(luc),nome:n(loja)||n(luc),tipo:n(tipo),areaContrato:n(area),piso:pisoFromLuc(luc,tipo),origem:'IMPORTACAO_LUC',dataImportacao:dt,ultimaAtualizacao:dt,statusAssociacao:'Pendente',observacoes:''})}); return {lojas:out,errors}}
function lucFindBestLocal(base){let best={local:null,score:0,motivo:''}; (db.locais||[]).forEach(l=>{let score=lucSimilarity(l.nomeOficial||l.nome,base.nome); let motivo='Similaridade textual'; if(l.luc&&base.luc&&String(l.luc)===String(base.luc)){score=100; motivo='Mesmo LUC'} else if(lucPisosCompat(l.piso,base.piso)&&score>=55){score=Math.max(score,90); motivo='Mesmo piso + nome compatível; prevalece nome oficial da Base LUC'} else if(lucPisosCompat(l.piso,base.piso)&&score>=40){score=Math.max(score,70); motivo='Mesmo piso, mas nome exige conferência'} if(score>best.score)best={local:l,score,motivo}}); return best}

function lucConfirmarConflito(conflitoId){ensureLucSchema(); const c=(db.conflitosAssociacao||[]).find(x=>x.id===conflitoId); if(!c)return; const local=(db.locais||[]).find(x=>x.id===c.localId); const base=(db.baseLojas||[]).find(x=>x.id===c.baseLojaId); if(!local||!base){alert('Conflito sem vínculo válido.');return} applyLucToLocal(local,base,c.percentualSimilaridade||0,true); db.conflitosAssociacao=(db.conflitosAssociacao||[]).filter(x=>x.id!==conflitoId); markDirty('confirmação conflito LUC'); renderImportacao()}
function lucIgnorarConflito(conflitoId){ensureLucSchema(); const c=(db.conflitosAssociacao||[]).find(x=>x.id===conflitoId); if(c){const base=(db.baseLojas||[]).find(x=>x.id===c.baseLojaId); if(base){base.statusAssociacao='Pendente'; base.observacoes='Conflito ignorado manualmente em '+isoNow()}} db.conflitosAssociacao=(db.conflitosAssociacao||[]).filter(x=>x.id!==conflitoId); markDirty('conflito LUC ignorado'); renderImportacao()}

/* ===== Correção V8.4 — Importação LUC/Loja por posição fixa A-D =====
   Regra operacional: A=LUC, B=Tipo de Loja, C=Loja oficial, D=Área Contrato.
   Isso evita que cabeçalhos diferentes façam a loja virar o próprio número do LUC. */
function lucMatrixToRows(matrix){
  const rows=[];
  let start=0;
  const normCell=v=>normKey(String(v??''));
  const isHeaderRow=arr=>{
    const joined=(arr||[]).map(normCell).join('|');
    return joined.includes('LUC') || joined.includes('TIPODELOJA') || joined.includes('LOJA') || joined.includes('AREACONTRATO');
  };
  while(start<matrix.length && !(matrix[start]||[]).some(v=>n(v))) start++;
  if(start<matrix.length && isHeaderRow(matrix[start])) start++;
  for(let i=start;i<matrix.length;i++){
    const r=matrix[i]||[];
    if(!r.some(v=>n(v))) continue;
    rows.push({
      LUC:n(r[0]),
      'Tipo de Loja':n(r[1]),
      Loja:n(r[2]),
      'Área Contrato (m²)':n(r[3]),
      __linha:i+1,
      __raw:r
    });
  }
  return rows;
}
async function readLucRowsFile(){
  const input=document.getElementById('fileLucImp');
  if(!input||!input.files||!input.files[0])throw new Error('Selecione um arquivo XLSX ou CSV para Importação LUC/Loja.');
  const f=input.files[0];
  const ext=f.name.split('.').pop().toLowerCase();
  const data=await f.arrayBuffer();
  if(ext==='csv'){
    const txt=new TextDecoder('utf-8').decode(data);
    const sep=(txt.split('\n')[0].match(/;/g)||[]).length>=(txt.split('\n')[0].match(/,/g)||[]).length?';':',';
    const matrix=txt.split(/\r?\n/).filter(x=>x.trim()).map(l=>splitCSV(l,sep));
    return lucMatrixToRows(matrix);
  }
  if(!['xls','xlsx'].includes(ext))throw new Error('Formato não aceito. Use XLSX, XLS ou CSV.');
  if(typeof XLSX==='undefined')throw new Error('Biblioteca XLSX não carregada. Para XLS/XLSX, abra com internet ou use CSV.');
  const wb=XLSX.read(data,{type:'array'});
  let rows=[];
  wb.SheetNames.forEach(sn=>{
    const matrix=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:''});
    rows=rows.concat(lucMatrixToRows(matrix));
  });
  return rows;
}
function normalizeLucImportRows(rows){
  const out=[],errors=[]; const dt=isoNow();
  rows.forEach((r,i)=>{
    const linha=r.__linha||i+2;
    /* Regra definitiva da Importação LUC/Loja:
       leitura por posição física da planilha, sem depender do nome do cabeçalho.
       A=luc | B=tipo | C=nome oficial da loja | D=área contrato */
    const raw=Array.isArray(r.__raw)?r.__raw:[];
    const luc=n(raw.length?raw[0]:r.LUC);
    const tipo=n(raw.length?raw[1]:r['Tipo de Loja']);
    const loja=n(raw.length?raw[2]:r.Loja);
    const area=n(raw.length?raw[3]:r['Área Contrato (m²)']);
    if(up(luc)==='LUC' || up(tipo)==='TIPO DE LOJA' || up(loja)==='LOJA')return;
    if(!luc&&!loja){errors.push({linha,motivo:'Registro sem LUC e sem Loja',registro:JSON.stringify(raw.length?raw:r)});return}
    if(!loja){errors.push({linha,motivo:'Coluna C (Loja oficial) vazia. Registro não importado para evitar loja com nome igual ao LUC.',registro:JSON.stringify(raw.length?raw:r)});return}
    if(up(loja)===up(luc)){errors.push({linha,motivo:'Coluna C veio igual ao LUC. Confira se o arquivo possui a Loja oficial na coluna C. Registro não importado.',registro:JSON.stringify(raw.length?raw:r)});return}
    out.push({
      id:id(),luc,tipo,nome:loja,areaContrato:area,
      piso:pisoFromLuc(luc,tipo),origem:'IMPORTACAO_LUC',dataImportacao:dt,ultimaAtualizacao:dt,
      statusAssociacao:'Pendente',observacoes:''
    })
  });
  return {lojas:out,errors};
}
