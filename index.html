      ]}
    ]
  },
  { key:'cftv', label:'CFTV', modulo:'cftv',
    groups:[
      {key:'gestao',label:'Gestão',items:[{view:'cftvDashboard',label:'Dashboard CFTV'}]},
      {key:'baseTecnica',label:'Base Técnica',items:[
        {view:'cftvCameras',label:'Câmeras'},{view:'cftvGravadores',label:'Gravadores'},
        {view:'cftvSwitches',label:'Switches'},{view:'cftvRede',label:'Pontos de rede'}
      ]},
      {key:'operacao',label:'Operação',items:[
        {view:'cftvLocais',label:'Locais'},{view:'cftvOcorrencias',label:'Ocorrências'},
        {view:'cftvPlano',label:'Plano de Ação'},{view:'cftvTestes',label:'Testes'},
        {view:'cftvPlantas',label:'Plantas'}
      ]},
      {key:'dados',label:'Dados',items:[
        {view:'cftvRelatorios',label:'Relatórios CFTV'},{view:'cftvImportacao',label:'Importação CFTV'},
        {view:'cftvExportacao',label:'Exportação CFTV'}
      ]}
    ]
  },
  { key:'acesso', label:'Controle de Acesso', modulo:'acesso',
    groups:[
      {key:'gestao',label:'Gestão',items:[{view:'acessoDashboard',label:'Dashboard de Acesso'}]},
      {key:'baseTecnica',label:'Base Técnica',items:[
        {view:'acessoPortas',label:'Portas'},{view:'acessoCatracas',label:'Catracas'},
        {view:'acessoLeitores',label:'Leitores'},{view:'acessoControladoras',label:'Controladoras'}
      ]},
      {key:'operacao',label:'Operação',items:[
        {view:'acessoOcorrencias',label:'Ocorrências'},{view:'acessoPlano',label:'Plano de Ação'},
        {view:'acessoTestes',label:'Testes'},{view:'acessoPlantas',label:'Plantas'}
      ]},
      {key:'dados',label:'Dados',items:[
        {view:'acessoRelatorios',label:'Relatórios de Acesso'},
        {view:'acessoImportacao',label:'Importação de Acesso'},
        {view:'acessoExportacao',label:'Exportação de Acesso'}
      ]}
    ]
  },
  { key:'ambiente', label:'Ambiente / Som', modulo:'ambiente',
    groups:[
      {key:'gestao',label:'Gestão',items:[{view:'ambienteDashboard',label:'Dashboard Ambiente / Som'}]},
      {key:'baseTecnica',label:'Base Técnica',items:[
        {view:'ambienteSensores',label:'Sensores'},{view:'ambienteAmplificadores',label:'Amplificadores'},
        {view:'ambienteAltfalantes',label:'Alto-falantes'},{view:'ambienteControladores',label:'Controladores'},
        {view:'ambienteEquipamentos',label:'Equip. Ambientais'}
      ]},
      {key:'operacao',label:'Operação',items:[
        {view:'ambienteAmbientes',label:'Ambientes'},{view:'ambienteOcorrencias',label:'Ocorrências'},
        {view:'ambientePlano',label:'Plano de Ação'},{view:'ambienteTestes',label:'Testes'},
        {view:'ambientePlantas',label:'Plantas'}
      ]},
      {key:'dados',label:'Dados',items:[
        {view:'ambienteRelatorios',label:'Relatórios Ambiente'},
        {view:'ambienteImportacao',label:'Importação Ambiente'},
        {view:'ambienteExportacao',label:'Exportação Ambiente'}
      ]}
    ]
  }
];
const MENU_SISTEMA_ITEMS=[
  {view:'clientes',label:'Clientes'},{view:'sistema',label:'Gestão de Dados'},
  {view:'usuarios',label:'Usuários e Acessos'},{view:'configuracoes',label:'Configurações'},
  {view:'backup',label:'Backup'},{view:'logs',label:'Logs'},{view:'sobre',label:'Sobre'}
];
/* Separação de escopo Cliente × Plataforma (2026-07, auditoria de navegação/governança):
   MENU_SISTEMA_ITEMS acima é preservado INTOCADO (mesmas views, mesmos labels, mesma checagem de
   permissão userViews) — item 8 do pedido do usuário ("preservar MENU_SISTEMA_ITEMS original, caso
   outras funções dependam dele"). MENU_ADMINISTRACAO_ITEMS ("Gestão do Cliente") e
   MENU_PLATAFORMA_ITEMS ("Administração Global") abaixo são estruturas NOVAS, usadas só por
   buildNavTree() para desenhar dois blocos com escopos diferentes — nenhuma view foi criada,
   removida ou teve sua lógica de permissão alterada.
   Classificação (auditada função a função — ver relatório de entrega):
   - 'sistema' (Gestão de Dados), 'configuracoes', 'backup', 'logs': todas leem/gravam o objeto `db`
     em memória, que é TROCADO por switchCliente()/loadClienteDb(cid) a cada troca de cliente — ou
     seja, são genuinamente dados/config DO CLIENTE ATIVO. Ficam em "Gestão do Cliente".
   - 'clientes', 'usuarios', 'sobre': 'clientes' lista todos os clientes (não faz sentido "dentro" de
     um cliente); 'usuarios' lê db.usuarios, que é injetado a partir de loadUsuariosGlobais()/salvo em
     saveUsuariosGlobais() na chave GLOBAL (não na chave por-cliente — ver persistClienteDb, que
     explicitamente exclui `usuarios` do blob do cliente) — logo usuários são globais, não do cliente,
     e SÓ POR ISSO estavam mal posicionados antes; 'sobre' é informação da instalação. Ficam em
     "Administração Global". O bloco "Segurança da API" (token, também 100% global — getApiToken/
     setApiToken usam localStorage[API_TOKEN_KEY], fora de qualquer clienteDbKey) foi movido de dentro
     de renderSistema() (tela do cliente) para dentro de renderUsuarios() (tela global) — ver essa
     função para o código movido. */
const MENU_ADMINISTRACAO_ITEMS=[
  {view:'sistema',label:'Gestão de Dados'},
  {view:'configuracoes',label:'Configurações do Cliente'},{view:'backup',label:'Backup do Cliente'},{view:'logs',label:'Logs do Cliente'}
];
const MENU_PLATAFORMA_ITEMS=[
  {view:'clientes',label:'Clientes'},{view:'usuarios',label:'Usuários e Permissões'},{view:'sobre',label:'Sobre'}
];
const VIEW_TO_SECTION={
  visaoGeral:'visaoGeral',
  dashboard:'dashboard',paineis:'paineis',lacos:'lacos',flms:'flms',
  locais:'locais',equipamentos:'equipamentos',falhas:'falhas',plano:'plano',
  plantas:'plantas',relatorios:'relatorios',importacao:'importacao',exportacao:'exportacao',
  cftv:'cftv',cftvDashboard:'cftv',cftvCameras:'cftv',cftvGravadores:'cftv',
  cftvSwitches:'cftv',cftvRede:'cftv',cftvLocais:'cftv',cftvOcorrencias:'cftv',
  cftvPlano:'cftv',cftvTestes:'cftv',cftvPlantas:'cftv',
  cftvRelatorios:'cftv',cftvImportacao:'cftv',cftvExportacao:'cftv',
  acesso:'acesso',acessoDashboard:'acesso',acessoPortas:'acesso',acessoCatracas:'acesso',
  acessoLeitores:'acesso',acessoControladoras:'acesso',acessoOcorrencias:'acesso',
  acessoPlano:'acesso',acessoTestes:'acesso',acessoPlantas:'acesso',
  acessoRelatorios:'acesso',acessoImportacao:'acesso',acessoExportacao:'acesso',
  ambiente:'ambiente',ambienteDashboard:'ambiente',ambienteSensores:'ambiente',
  ambienteAmplificadores:'ambiente',ambienteAltfalantes:'ambiente',ambienteControladores:'ambiente',
  ambienteEquipamentos:'ambiente',ambienteAmbientes:'ambiente',ambienteOcorrencias:'ambiente',
  ambientePlano:'ambiente',ambienteTestes:'ambiente',ambientePlantas:'ambiente',
  ambienteRelatorios:'ambiente',ambienteImportacao:'ambiente',ambienteExportacao:'ambiente',
  clientes:'clientes',sistema:'sistema',usuarios:'usuarios',
  configuracoes:'configuracoes',backup:'backup',logs:'logs',sobre:'sobre'
};
function viewLocation(view){
  for(const s of MENU_TREE_SUBSYS){
    for(const g of s.groups){
      if(g.items.some(i=>i.view===view))return{subsys:s.key,group:g.key};
    }
  }
  return null;
}

const API_URL='https://script.google.com/macros/s/AKfycby45dTdw4g-pkcvY9sys3_gmvVcmnSyf6PZzJbRsbSFjhtuWbV1D5XSBEc-J1UtOBYftA/exec';
const SYNC_KEY=KEY+':syncConfig';
const emptyDB=()=>({empreendimento:{nome:'Empreendimento',cliente:'Cliente'},config:{appName:'Contratos L3A',subtitle:'Gestão operacional • SDAI • Contratos',logoData:''},usuarios:[{id:'admin-default',nome:'Administrador',email:'admin@local',perfil:'Administrador',senha:'1234',ativo:'Sim',criadoEm:''}],paineis:[],lacos:[],flms:[],portas:[],locais:[],equipamentos:[],falhas:[],planos:[],testes:[],inconsistencias:[],imports:[],plantas:[],notificacoes:[],cftv:[],acessoPontos:[],ambienteEquip:[]});

/* ── MULTI-CLIENTE ─────────────────────────────────────────────────────── */
const MODULOS_DISPONIVEIS=['sdai','cftv','acesso','ambiente'];
const MODULOS_LABELS={sdai:'SDAI',cftv:'CFTV',acesso:'Controle de Acesso',ambiente:'Ambiente / Som'};

function loadClientes(){try{return JSON.parse(localStorage.getItem(KEY_CLIENTES)||'[]')}catch(e){return[]}}
function saveClientes(arr){localStorage.setItem(KEY_CLIENTES,JSON.stringify(arr))}
function clienteAtivo(){try{return localStorage.getItem(KEY_CLIENTE_ATIVO)||''}catch(e){return''}}
function setClienteAtivo(id){localStorage.setItem(KEY_CLIENTE_ATIVO,String(id||''))}
function clienteAtivoObj(){const id=clienteAtivo(); return loadClientes().find(c=>c.id===id)||null}
function clienteDbKey(cid){return KEY+'__c__'+cid}

/* Carregar DB do cliente ativo (se houver), senão fallback para KEY principal */
/* Usuários são GLOBAIS — ficam no KEY principal, não por cliente.
   Ao carregar um cliente, injeta os usuários globais no db.
   Ao salvar um cliente, grava os usuários de volta no global. */
function loadUsuariosGlobais(){
  try{const g=JSON.parse(localStorage.getItem(KEY)||'{}');return g.usuarios||null}catch(e){return null}}
function saveUsuariosGlobais(usuarios){
  try{const g=JSON.parse(localStorage.getItem(KEY)||'{}');g.usuarios=usuarios;localStorage.setItem(KEY,JSON.stringify(g))}catch(e){}}

function loadClienteDb(cid){
  if(!cid)return load();
  try{const raw=localStorage.getItem(clienteDbKey(cid));
    const base=raw?normalizeAllStatuses(Object.assign(emptyDB(),JSON.parse(raw))):emptyDB();
    // Injeta usuários globais para que login/perfis funcionem em todos os clientes
    const globais=loadUsuariosGlobais();
    if(globais)base.usuarios=globais;
    return base;
  }catch(e){return emptyDB()}}

function persistClienteDb(cid){
  if(!cid){persistLocal();return}
  try{
    // Salva usuários de volta no global antes de gravar o cliente
    saveUsuariosGlobais(db.usuarios||[]);
    // Item 7 (isolamento): usuários NUNCA ficam gravados dentro do blob localStorage do cliente —
    // eles já vivem exclusivamente na chave global (acima) e são reinjetados em memória por
    // loadClienteDb() a cada carregamento. Gravá-los aqui também duplicaria dados sensíveis (hash de
    // senha) em toda base de cliente sem necessidade.
    const {usuarios,...dbSemUsuarios}=db;
    localStorage.setItem(clienteDbKey(cid),JSON.stringify(dbSemUsuarios));
  }catch(e){console.warn('persist cliente',e)}}

/* ---- Menu tree state ---- */
/* Estado do menu POR CLIENTE: qual subsistema está aberto, qual grupo dentro de
   cada subsistema, e a última tela acessada. Tudo persistido em
   localStorage['sdai_menu_v1__<clienteId>'] — isolado por cliente. */
let menuState={openSubsys:'sdai',openGroups:{},lastView:'',openSistemaGrp:null};
function menuStateKey(){return 'sdai_menu_v1__'+(clienteAtivo()||'global')}
function loadMenuStateLocal(){try{return Object.assign({openSubsys:'sdai',openGroups:{},lastView:'',openSistemaGrp:null},JSON.parse(localStorage.getItem(menuStateKey())||'{}'))}catch(e){return{openSubsys:'sdai',openGroups:{},lastView:'',openSistemaGrp:null}}}
function saveMenuStateLocal(){try{localStorage.setItem(menuStateKey(),JSON.stringify(menuState))}catch(e){}}
/* Estado do bloco "Administração Global" (auditoria de navegação, 2026-07): item 7 do pedido do
   usuário — estado global NÃO pode ser salvo dentro da chave por-cliente (menuStateKey(), que já
   varia por clienteId). Guardado numa chave própria, fixa, independente do cliente ativo. */
const MENU_GLOBAL_STATE_KEY='sdai_menu_global_v1';
function loadMenuGlobalState(){try{return Object.assign({open:false},JSON.parse(localStorage.getItem(MENU_GLOBAL_STATE_KEY)||'{}'))}catch(e){return{open:false}}}
function saveMenuGlobalState(st){try{localStorage.setItem(MENU_GLOBAL_STATE_KEY,JSON.stringify(st))}catch(e){}}

/* Módulos habilitados do cliente ativo (SDAI por padrão quando não há cliente). */
function modulosClienteAtivo(){const c=clienteAtivoObj();return c?(c.modulos&&c.modulos.length?c.modulos:['sdai']):[];}
/* Uma view é válida para o cliente se:
   - for tela de Sistema (clientes, banco, usuários…) ou Visão Geral → sempre válida;
   - for de um subsistema cujo módulo está habilitado no cliente. */
function viewValidaParaCliente(view){
  if(view==='visaoGeral')return true;
  if(MENU_SISTEMA_ITEMS.some(i=>i.view===view))return true;
  const loc=viewLocation(view);
  if(!loc)return false; // view desconhecida
  return modulosClienteAtivo().includes(loc.subsys);
}
/* Primeira view disponível para o cliente: Visão Geral (sempre existe). */
function primeiraViewCliente(){return 'visaoGeral';}
/* Decide a view de entrada ao (re)abrir um cliente, na ordem de prioridade pedida:
   1) última view salva daquele cliente, se ainda válida;
   2) senão, Visão Geral;
   3) nunca abre o Dashboard SDAI para cliente sem SDAI. */
function viewInicialCliente(){
  const st=loadMenuStateLocal();
  const last=st.lastView;
  if(last&&viewValidaParaCliente(last))return last;
  return primeiraViewCliente();
}
/* ACCORDION VERDADEIRO entre os blocos de topo (causa raiz do "grupo não recolhe": openSubsys,
   openSistemaGrp e o estado global viviam soltos, sem se excluírem — dava pra ter um subsistema E
   Administração Global abertos ao mesmo tempo. Agora toda troca de bloco de topo passa por
   fecharOutrosBlocosDeTopo(), que fecha explicitamente os outros dois grupos antes de abrir o novo:
   abrir SDAI fecha Gestão do Cliente e Administração Global; abrir Gestão do Cliente fecha os
   subsistemas e Administração Global; abrir Administração Global fecha subsistemas e Gestão do
   Cliente. Clicar de novo no bloco já aberto recolhe (mesmo comportamento de antes). Estado dos
   subsistemas/Gestão do Cliente continua por-cliente (menuState/menuStateKey); o estado do bloco
   global fica na chave própria MENU_GLOBAL_STATE_KEY (não é gravado dentro da chave do cliente). */
function fecharOutrosBlocosDeTopo(){
  menuState.openSubsys=null;
  menuState.openSistemaGrp=null;
  const g=loadMenuGlobalState(); g.open=false; saveMenuGlobalState(g);
}
function toggleSubsys(key){
  const abrindo=menuState.openSubsys!==key;
  fecharOutrosBlocosDeTopo();
  menuState.openSubsys=abrindo?key:null;
  saveMenuStateLocal(); buildNavTree();
}
function toggleGrp(subsysKey,grpKey){
  const cur=menuState.openGroups[subsysKey];
  menuState.openGroups[subsysKey]=(cur===grpKey?null:grpKey);
  saveMenuStateLocal(); buildNavTree();
}
/* Bloco "Gestão do Cliente" (funções que operam sobre o cliente ativo: Gestão de Dados,
   Configurações, Backup, Logs — todas leem/gravam o `db` em memória, trocado por cliente) — estado
   por-cliente, mesma chave já usada por openSubsys/openGroups. */
function toggleSistemaGrp(key){
  const abrindo=menuState.openSistemaGrp!==key;
  fecharOutrosBlocosDeTopo();
  menuState.openSistemaGrp=abrindo?key:null;
  saveMenuStateLocal(); buildNavTree();
}
/* Bloco "Administração Global" (Clientes/Usuários e Permissões/Sobre — nenhum depende do cliente
   ativo) — estado guardado FORA da chave por-cliente (ver MENU_GLOBAL_STATE_KEY), justamente para
   não ser perdido/duplicado ao trocar de cliente. */
function toggleAdministracaoGlobal(){
  const g=loadMenuGlobalState();
  const abrindo=!g.open;
  fecharOutrosBlocosDeTopo();
  saveMenuGlobalState({open:abrindo});
  saveMenuStateLocal();
  buildNavTree();
}
function buildNavTree(){
  const tree=document.getElementById('navTree'); if(!tree)return;
  menuState=loadMenuStateLocal();
  let globalState=loadMenuGlobalState();
  const c=clienteAtivoObj();
  const modulos=modulosClienteAtivo();
  const u=currentUserSafe();
  const uvs=userViews(u);
  const loc=viewLocation(currentView);
  const emGestaoCliente=MENU_ADMINISTRACAO_ITEMS.some(i=>i.view===currentView);
  const emAdmGlobal=MENU_PLATAFORMA_ITEMS.some(i=>i.view===currentView);
  // Sincroniza o bloco de topo com a tela atual, sempre respeitando a exclusividade mútua (item 6):
  // a tela atual dita QUAL bloco deve estar aberto, e os outros dois são fechados junto — nunca dois
  // blocos de topo abertos ao mesmo tempo, seja por clique do usuário, seja por navegação direta
  // (ex.: abrir um link para "Usuários" com o SDAI previamente aberto).
  if(loc){
    if(menuState.openSubsys!==loc.subsys||menuState.openSistemaGrp||globalState.open){
      menuState.openSubsys=loc.subsys; menuState.openSistemaGrp=null;
      if(globalState.open){globalState={open:false}; saveMenuGlobalState(globalState);}
      saveMenuStateLocal();
    }
    if(!menuState.openGroups[loc.subsys]){menuState.openGroups[loc.subsys]=loc.group;saveMenuStateLocal();}
  } else if(emGestaoCliente){
    if(menuState.openSistemaGrp!=='gestaoCliente'||menuState.openSubsys||globalState.open){
      menuState.openSubsys=null; menuState.openSistemaGrp='gestaoCliente';
      if(globalState.open){globalState={open:false}; saveMenuGlobalState(globalState);}
      saveMenuStateLocal();
    }
  } else if(emAdmGlobal){
    if(!globalState.open||menuState.openSubsys||menuState.openSistemaGrp){
      menuState.openSubsys=null; menuState.openSistemaGrp=null; saveMenuStateLocal();
      globalState={open:true}; saveMenuGlobalState(globalState);
    }
  }

  let html='';
  html+=`<div class="navSectionLabel">Gestão Geral</div>`;
  html+=`<button class="navFlatItem${currentView==='visaoGeral'?' active':''}" title="Visão Geral do Cliente" onclick="navigate('visaoGeral')"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="3.5" width="7" height="7" rx="1.5"/><rect x="13.5" y="3.5" width="7" height="7" rx="1.5"/><rect x="3.5" y="13.5" width="7" height="7" rx="1.5"/><rect x="13.5" y="13.5" width="7" height="7" rx="1.5"/></svg><span>Visão Geral do Cliente</span></button>`;

  html+=`<div class="navSectionLabel" style="margin-top:8px">Subsistemas</div>`;
  for(const s of MENU_TREE_SUBSYS){
    if(!modulos.includes(s.modulo))continue;
    const isOpen=menuState.openSubsys===s.key;
    html+=`<div class="navSubsysBlock">`;
    html+=`<button class="navSubsysHead${isOpen?' open':''}" title="${esc(s.label)}" onclick="toggleSubsys('${s.key}')"><span>${s.label}</span><span class="navChevron">▾</span></button>`;
    html+=`<div class="navSubsysBody${isOpen?' open':''}">`;
    for(const g of s.groups){
      const isGrpOpen=menuState.openGroups[s.key]===g.key;
      const hasActive=g.items.some(i=>i.view===currentView);
      const grpOpen=isGrpOpen||hasActive;
      html+=`<div class="navGrpBlock">`;
      html+=`<button class="navGrpHead${grpOpen?' open':''}" title="${esc(g.label)}" onclick="toggleGrp('${s.key}','${g.key}')">${g.label}<span class="navChevron">▾</span></button>`;
      html+=`<div class="navGrpBody${grpOpen?' open':''}">`;
      for(const item of g.items){
        html+=`<button class="navLeaf${currentView===item.view?' active':''}" title="${esc(item.label)}" onclick="navigate('${item.view}')">${item.label}</button>`;
      }
      html+=`</div></div>`;
    }
    html+=`</div></div>`;
  }

  // "Gestão do Cliente" (Gestão de Dados/Configurações/Backup/Logs — operam sobre o `db` do cliente
  // ativo, trocado a cada switchCliente()) e "Administração Global" (Clientes/Usuários e Permissões/
  // Sobre — não dependem de nenhum cliente) — mesma checagem de permissão de sempre (uvs), agora com
  // abertura mutuamente exclusiva entre os três blocos de topo (subsistema / Gestão do Cliente /
  // Administração Global), sincronizada acima.
  const admItems=MENU_ADMINISTRACAO_ITEMS.filter(i=>uvs.includes(i.view));
  if(admItems.length){
    const admOpen=menuState.openSistemaGrp==='gestaoCliente';
    html+=`<div class="navSectionLabel" style="margin-top:8px">Gestão do Cliente</div>`;
    html+=`<div class="navGrpBlock">`;
    html+=`<button class="navGrpHead${admOpen?' open':''}" title="Gestão do Cliente" onclick="toggleSistemaGrp('gestaoCliente')">Gestão do Cliente<span class="navChevron">▾</span></button>`;
    html+=`<div class="navGrpBody${admOpen?' open':''}">`;
    for(const item of admItems){
      html+=`<button class="navLeaf${currentView===item.view?' active':''}" title="${esc(item.label)}" onclick="navigate('${item.view}')">${item.label}</button>`;
    }
    html+=`</div></div>`;
  }
  const platItems=MENU_PLATAFORMA_ITEMS.filter(i=>uvs.includes(i.view));
  if(platItems.length){
    const platOpen=globalState.open;
    html+=`<div class="navSectionLabel" style="margin-top:8px">Administração Global</div>`;
    html+=`<div class="navGrpBlock">`;
    html+=`<button class="navGrpHead${platOpen?' open':''}" title="Administração Global" onclick="toggleAdministracaoGlobal()">Administração Global<span class="navChevron">▾</span></button>`;
    html+=`<div class="navGrpBody${platOpen?' open':''}">`;
    for(const item of platItems){
      html+=`<button class="navLeaf${currentView===item.view?' active':''}" title="${esc(item.label)}" onclick="navigate('${item.view}')">${item.label}</button>`;
    }
    html+=`</div></div>`;
  }
  tree.innerHTML=html;
}
function navigate(view){
  currentView=view;
  // Persiste a última tela acessada para este cliente (exceto Clientes, que é
  // ponto de partida quando ainda não há cliente selecionado).
  try{menuState=loadMenuStateLocal();menuState.lastView=view;saveMenuStateLocal();}catch(e){}
  render();
  // A classe .side.open só tem efeito visual no layout mobile (overlay — ver
  // media query max-width:768px); em desktop a lateral é fixa e nunca controlada
  // por essa classe. Fechamos o overlay apenas em telas pequenas, para "liberar
  // espaço" após escolher uma tela no celular, sem qualquer efeito em desktop.
  if(window.matchMedia&&window.matchMedia('(max-width:768px)').matches){
    document.querySelector('.side')?.classList.remove('open');
  }
}
/* Breadcrumb navegável (2026-07): cada segmento (Cliente / Subsistema / Grupo / Tela) vira um
   botão clicável. Cliente leva à Visão Geral; Subsistema leva ao Dashboard daquele subsistema (ou à
   primeira tela do grupo "Gestão", que é onde o dashboard de cada subsistema mora); Grupo abre o
   subsistema com aquele grupo em foco (reaproveita toggleGrp/menuState, sem duplicar estado); a Tela
   atual não é clicável (já é onde o usuário está). Puramente de exibição — não altera currentView,
   viewLocation, MENU_TREE_SUBSYS nem nenhuma lógica de permissão/navegação já existente.*/
function breadcrumbGo(view){navigate(view)}
function breadcrumbAbrirGrupo(subsysKey,grpKey){
  menuState=loadMenuStateLocal();
  menuState.openSubsys=subsysKey;
  menuState.openGroups[subsysKey]=grpKey;
  saveMenuStateLocal();
  const g=MENU_TREE_SUBSYS.find(s=>s.key===subsysKey)?.groups.find(x=>x.key===grpKey);
  const first=g?.items?.[0]?.view;
  if(first)navigate(first); else buildNavTree();
}
function updateBreadcrumb(){
  const el=document.getElementById('breadcrumb'); if(!el)return;
  const c=clienteAtivoObj();
  const cName=c?c.nome:'';
  const loc=viewLocation(currentView);
  const admItem=MENU_ADMINISTRACAO_ITEMS.find(i=>i.view===currentView); // "Gestão do Cliente" — escopo cliente
  const platItem=MENU_PLATAFORMA_ITEMS.find(i=>i.view===currentView);   // "Administração Global" — escopo plataforma
  const escopoGlobal=!!platItem; // item 10/11: telas globais NÃO mostram o cliente no breadcrumb
  const parts=[];
  if(escopoGlobal){
    parts.push('<span class="crumb">Plataforma</span>',`<span class="crumb current">${esc(platItem.label)}</span>`);
  } else {
    if(cName)parts.push(`<button class="crumb" onclick="breadcrumbGo('visaoGeral')">${esc(cName)}</button>`);
    if(loc){
      const s=MENU_TREE_SUBSYS.find(x=>x.key===loc.subsys);
      const g=s?.groups.find(x=>x.key===loc.group);
      const item=g?.items.find(x=>x.view===currentView);
      const dash=s?.groups[0]?.items?.[0]?.view;
      const naDashboard=currentView===dash;
      parts.push(naDashboard?`<span class="crumb current">${esc(s.label)}</span>`:`<button class="crumb" onclick="breadcrumbGo('${dash}')">${esc(s.label)}</button>`);
      if(g&&!naDashboard)parts.push(`<button class="crumb" onclick="breadcrumbAbrirGrupo('${s.key}','${g.key}')">${esc(g.label)}</button>`);
      if(item&&!naDashboard)parts.push(`<span class="crumb current">${esc(item.label)}</span>`);
    } else if(currentView==='visaoGeral'){
      parts.push('<span class="crumb current">Visão Geral do Cliente</span>');
    } else if(admItem){
      parts.push('<span class="crumb">Gestão do Cliente</span>',`<span class="crumb current">${esc(admItem.label)}</span>`);
    } else {
      parts.push(`<span class="crumb current">${esc(L3A_VIEWS[currentView]||currentView)}</span>`);
    }
  }
  el.innerHTML=parts.filter(Boolean).join('<span class="crumbSep">›</span>');
  // Badge discreto de escopo (item 11) — não é um cartão grande, é um selo pequeno ao lado do
  // breadcrumb, só para deixar explícito se a tela atual pertence ao cliente ativo ou é global.
  const badge=document.getElementById('escopoBadge');
  if(badge){
    if(escopoGlobal)badge.innerHTML=`<span class="scopeBadge scopeGlobal" title="Esta tela não pertence a nenhum cliente — é configuração da plataforma">Escopo: Plataforma</span>`;
    else if(cName)badge.innerHTML=`<span class="scopeBadge scopeCliente" title="Esta tela mostra/altera somente dados do cliente ativo">Escopo: ${esc(cName)}</span>`;
    else badge.innerHTML='';
  }
}
function renderVisaoGeral(){
  const el=document.getElementById('visaoGeral'); if(!el)return;
  const c=clienteAtivoObj();
  if(!c){el.innerHTML='<div class="premiumPanel"><p style="color:var(--l3a-text-muted)">Selecione um cliente para ver a visão geral.</p></div>';return;}
  const mods=c.modulos||[];
  const totalFalhas=(db.falhas||[]).filter(f=>isFalhaStatus(f.status)&&!f.resolvidaEm&&!f.excluida).length;
  const planosAbertos=(db.planos||[]).filter(p=>p.situacao!=='Concluído'&&p.situacao!=='Cancelado').length;
  el.innerHTML=`<div class="premiumPanel">
    <div class="systemHeaderSlim">
      <div class="titleBlock"><h3>Visão Geral — ${esc(c.nome)}</h3><p>Consolidado de todos os módulos ativos do cliente.</p></div>
    </div>
    <div class="premiumGrid">
      <div class="premiumStat"><small>Módulos ativos</small><b>${mods.length}</b></div>
      <div class="premiumStat"><small>Falhas abertas</small><b style="color:var(--l3a-danger)">${totalFalhas}</b></div>
      <div class="premiumStat"><small>Planos pendentes</small><b style="color:var(--l3a-warning)">${planosAbertos}</b></div>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:20px">
    ${mods.includes('sdai')?`<div class="premiumPanel" style="cursor:pointer" onclick="navigate('dashboard')"><h4 style="margin-bottom:12px">SDAI — Detecção de Incêndio</h4><div class="premiumGrid" style="grid-template-columns:1fr 1fr">${premiumStat('Painéis',(db.paineis||[]).length)}${premiumStat('Falhas ativas',totalFalhas)}</div></div>`:''}
    ${mods.includes('cftv')?`<div class="premiumPanel" style="cursor:pointer" onclick="navigate('cftvDashboard')"><h4 style="margin-bottom:12px">CFTV — Câmeras</h4><div class="premiumGrid" style="grid-template-columns:1fr 1fr">${premiumStat('Câmeras',(db.cftv||[]).length)}${premiumStat('Operando',(db.cftv||[]).filter(x=>x.status==='ok').length)}</div></div>`:''}
    ${mods.includes('acesso')?`<div class="premiumPanel" style="cursor:pointer" onclick="navigate('acessoDashboard')"><h4 style="margin-bottom:12px">Controle de Acesso</h4><div class="premiumGrid" style="grid-template-columns:1fr 1fr">${premiumStat('Pontos',(db.acessoPontos||[]).length)}${premiumStat('Operando',(db.acessoPontos||[]).filter(x=>x.status==='ok').length)}</div></div>`:''}
    ${mods.includes('ambiente')?`<div class="premiumPanel" style="cursor:pointer" onclick="navigate('ambienteDashboard')"><h4 style="margin-bottom:12px">Ambiente / Som</h4><div class="premiumGrid" style="grid-template-columns:1fr 1fr">${premiumStat('Equipamentos',(db.ambienteEquip||[]).length)}${premiumStat('Operando',(db.ambienteEquip||[]).filter(x=>x.status==='ok').length)}</div></div>`:''}
  </div>`;
}

/* Trocar cliente ativo.
   Ao entrar em um cliente NÃO abre mais o Dashboard SDAI cegamente. Aplica a
   prioridade: última view válida daquele cliente → senão Visão Geral. Se a última
   view pertencer a um módulo agora desabilitado, cai para Visão Geral. */
function switchCliente(cid,reload=true){
  const prevCid=clienteAtivo();
  if(prevCid)persistClienteDb(prevCid); // salva DB do cliente atual antes de trocar
  setClienteAtivo(cid);
  db=loadClienteDb(cid);
  menuState=loadMenuStateLocal();
  updateClienteSideSelect();
  if(reload){
    currentView = cid ? viewInicialCliente() : 'clientes';
    // Abre no menu o subsistema/grupo correspondente à view de entrada
    const loc=viewLocation(currentView);
    if(loc){menuState.openSubsys=loc.subsys;menuState.openGroups[loc.subsys]=loc.group;saveMenuStateLocal();}
    render();
  }
}

function switchClienteSide(cid){switchCliente(cid)}

function updateClienteSideSelect(){
  const sel=document.getElementById('clienteSideSelect'); if(!sel)return;
  const clientes=loadClientes(); const ativo=clienteAtivo();
  const options=clientes.map(c=>`<option value="${esc(c.id)}" ${c.id===ativo?'selected':''}>${esc(c.nome)}</option>`).join('');
  sel.innerHTML=`<option value="">— Sem cliente selecionado —</option>${options}`;
}

/* Mostrar/ocultar botões de subsistemas conforme módulos do cliente ativo */
function updateNavSubsistemas(){try{buildNavTree()}catch(e){}}

let db=load(); let currentView='dashboard'; let filters={};
let searchRenderTimer=null;
let lastSearchFocus=null;
function onSearchInput(el){
  const val=el.value;
  const group=el.dataset.filterGroup;
  const key=el.dataset.filterKey;
  const path=el.dataset.filterPath;
  if(group && key){ filters[group]={...(filters[group]||{}),[key]:val}; }
  else if(path){ filters[path]=val; }
  lastSearchFocus={key:el.dataset.focusKey||path||((group||'')+'.'+(key||'')),start:el.selectionStart??val.length,end:el.selectionEnd??val.length};
  clearTimeout(searchRenderTimer);
  // Debounce ajustado de 120ms para 300ms (seção 6/14): 120ms era curto demais para o custo de um
  // render() completo (recria toda a tela, KPIs, filtros e árvore de menu) a cada tecla, o que dava
  // sensação de travamento/redesenho constante. Preserva foco/cursor via lastSearchFocus+restoreSearchFocus.
  searchRenderTimer=setTimeout(()=>render(),300);
}
function attachSearchInputs(){
  document.querySelectorAll('[data-filter-input="1"]').forEach(el=>{
    if(el.dataset.boundSearch==='1')return;
    el.dataset.boundSearch='1';
    el.addEventListener('input',()=>onSearchInput(el));
  });
}
function restoreSearchFocus(){
  if(!lastSearchFocus)return;
  const f=lastSearchFocus;
  setTimeout(()=>{
    const el=document.querySelector(`[data-focus-key="${CSS.escape(f.key)}"]`);
    if(el){el.focus();try{el.setSelectionRange(f.start,f.end)}catch(e){}}
  },0);
}

function load(){try{return normalizeAllStatuses(Object.assign(emptyDB(),JSON.parse(localStorage.getItem(KEY))||{}))}catch(e){return emptyDB()}}

function checksumColecoes(d){
  // Item 8 (cobertura de checksum): expandido para cobrir também os cadastros técnicos e demais
  // coleções em array que hoje ficam fora da conferência pós-sync (antes só falhas/planos/testes/
  // equipamentos/flms/locais eram cobertos — uma sobrescrita silenciosa em, por exemplo, painéis ou
  // histórico não era detectada). O algoritmo de hash em si não foi alterado, só a lista de chaves.
  const colecoes=['falhas','planos','testes','equipamentos','flms','locais','paineis','lacos','portas','historico','plantas','cftv','acessoPontos','ambienteEquip'];
  let h=0;
  colecoes.forEach(k=>{
    const arr=d[k]||[];
    if(!Array.isArray(arr))return; // defensivo: ignora chaves que não sejam array nesta base
    h=(h*31 + arr.length) >>> 0;
    arr.forEach(o=>{
      const chave=String(o.id||'')+'|'+String(o.status||o.situacao||'')+'|'+String(o.atualizadoEm||o.data||o.criadoEm||'');
      for(let c=0;c<chave.length;c++){h=((h<<5)-h+chave.charCodeAt(c))>>>0;}
    });
  });
  if(d.config)h=(h*31+JSON.stringify(d.config).length)>>>0;
  return h.toString(16);
}

async function apiPost(action,payload){
  const cid=clienteAtivo();
  // Item 10 (usuários globais): usuários NUNCA viajam dentro da base de um cliente — eles são
  // injetados em memória só para permissões locais (ver loadClienteDb/persistClienteDb) e devem
  // ficar exclusivamente na base administrativa (master). Ao enviar saveClienteDb/save com um
  // cliente ativo, removemos `usuarios` do payload antes de serializar, para nunca poluir a
  // planilha do cliente nem depender de o backend simplesmente ignorar o campo.
  let finalPayload=payload;
  if(cid && payload && payload.db && Object.prototype.hasOwnProperty.call(payload.db,'usuarios')){
    const {usuarios,...dbSemUsuarios}=payload.db;
    finalPayload=Object.assign({},payload,{db:dbSemUsuarios});
  }
  const body=Object.assign({action,payload:finalPayload,token:getApiToken()},cid?{clienteId:cid}:{});
  // Task 3 (estabilização 2026-07): antes, este fetch usava SEMPRE mode:'no-cors', o que torna a
  // resposta opaca — o navegador nunca deixava o JS ler o corpo, então o frontend não conseguia
  // saber, em tempo real, se o Code.gs rejeitou a gravação por conflito de revisão
  // (revisaoConflita_/registrarRevisao_, já existentes no backend). Content-Type
  // 'text/plain;charset=utf-8' já era usado (compatível com "simple request" do CORS — não dispara
  // preflight OPTIONS, que o Apps Script não trata), então basta tentar sem no-cors primeiro.
  // Se este deployment específico do Apps Script não permitir leitura cross-origin (comportamento
  // pode variar por implantação/navegador — não há como testar isso a partir deste ambiente sandbox
  // sem um deployment real), o fetch decolagem lança e caímos de volta no comportamento antigo
  // (fire-and-forget com no-cors) — ou seja, no pior caso, o sistema volta a se comportar
  // EXATAMENTE como antes desta mudança; a checagem pós-sync por checksum continua sendo a rede de
  // segurança nesse caso.
  try{
    const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body)});
    let parsed=null;
    try{parsed=await res.json();}catch(e){/* resposta não é JSON (ou vazia) — segue com parsed=null */}
    return {httpOk:res.ok,data:parsed};
  }catch(e){
    console.warn('apiPost: fetch com CORS falhou, usando fallback no-cors (fire-and-forget). Detalhe:',e && e.message);
    try{
      await fetch(API_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body)});
    }catch(e2){console.warn('apiPost: fallback no-cors também falhou:',e2 && e2.message);}
    return {httpOk:null,data:null};
  }
}

async function sha256Hex(text){const enc=new TextEncoder().encode(String(text||'')); const buf=await crypto.subtle.digest('SHA-256',enc); return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('')}

async function senhaConfere(senhaDigitada,senhaArmazenada){
  if(looksHashed(senhaArmazenada))return (await sha256Hex(senhaDigitada))===senhaArmazenada;
  return String(senhaArmazenada||'')===String(senhaDigitada||''); // compat com senhas antigas em texto puro
}
const id=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);

/* =========================================================================
   BUSCA \u2014 normaliza\u00e7\u00e3o e filtragem \u00fanicas (2026-07), reutilizadas por
   Lojas/\u00c1reas, Falhas e Plano de A\u00e7\u00e3o (e por Equipamentos, que j\u00e1 seguia
   padr\u00e3o parecido). Substitui as 3 implementa\u00e7\u00f5es divergentes que existiam
   (JSON.stringify em Locais, string \u00fanica sem separar termos em Falhas,
   compara\u00e7\u00e3o com toUpperCase() sem remover acento em Plano).
   ------------------------------------------------------------------------
   normalizarBusca(valor): mai\u00fasculas, sem acento/diacr\u00edtico, sem ap\u00f3strofo/
   h\u00edfen/pontua\u00e7\u00e3o (mas mant\u00e9m n\u00fameros e letras), espa\u00e7os colapsados e sem

function auditoriaSanearFalhasPlanos(base){
  base=base||db;
  base.falhas=base.falhas||[]; base.planos=base.planos||[]; base.historico=base.historico||[];
  const backup=JSON.parse(JSON.stringify({falhas:base.falhas,planos:base.planos}));
  const logSaneamento=(entidade,entidadeId,acao,descricao)=>{
    base.historico.push({id:id(),data:isoNow(),usuario:(typeof currentUser==='function'?(currentUser().email||currentUser().nome||'sistema'):'sistema'),entidade,entidadeId,acao,descricao});
    if(base.historico.length>1000)base.historico=base.historico.slice(-1000);
  };
  // 1) Falhas sintéticas criadas pelo antigo concluirPlano (assinatura exata, ver FIX 1).
  let falhasSinteticasRemovidas=0;
  const sinteticas=base.falhas.filter(f=>f&&f.origem==='Plano de Ação'&&f.status==='Em operação'&&f.motivo==='Plano de ação concluído');
  if(sinteticas.length){
    const idsSint=new Set(sinteticas.map(f=>f.id));
    sinteticas.forEach(f=>logSaneamento('falha',f.id,'saneamento','Falha sintética removida (criada indevidamente pela conclusão de plano). Dados migrados para histórico.'));
    base.falhas=base.falhas.filter(f=>!idsSint.has(f.id));
    falhasSinteticasRemovidas=sinteticas.length;
  }
  // 2) Planos duplicados por falhaId — mantém o mais avançado (Concluído > Em andamento > Aberto).
  let planosDuplicadosRemovidos=0;
  const pesoSit=s=>({'Concluído':3,'Em andamento':2,'Aberto':1}[s]||0);
  const porFalha={};
  base.planos.forEach(p=>{if(p&&p.falhaId)(porFalha[p.falhaId]=porFalha[p.falhaId]||[]).push(p)});
  const idsRemoverPlanos=new Set();
  Object.values(porFalha).forEach(lista=>{
    if(lista.length<=1)return;
    lista.sort((a,b)=>pesoSit(b.situacao)-pesoSit(a.situacao)||String(a.criadoEm||'').localeCompare(String(b.criadoEm||'')));
    lista.slice(1).forEach(p=>{logSaneamento('plano',p.id,'saneamento','Plano duplicado removido (mesma falha já possuía plano mais avançado).');idsRemoverPlanos.add(p.id)});
  });
  if(idsRemoverPlanos.size){base.planos=base.planos.filter(p=>!idsRemoverPlanos.has(p.id)); planosDuplicadosRemovidos=idsRemoverPlanos.size}
  // 3) Planos órfãos (falhaId que não corresponde a nenhuma falha em base.falhas) — Task 4 da
  //    auditoria de concorrência/estabilização 2026-07. Podem ter sobrado de bugs históricos (ex.:
  //    falha removida por um caminho que não passou pelo soft-delete). Deliberadamente NÃO
  //    removidos automaticamente aqui (risco de perda de dado real sem certeza da causa) — apenas
  //    contados e logados no histórico para visibilidade, para uma decisão humana futura.
  const falhaIdsValidos=new Set(base.falhas.map(f=>f&&f.id).filter(Boolean));
  const planosOrfaos=base.planos.filter(p=>p&&p.falhaId&&!falhaIdsValidos.has(p.falhaId));
  if(planosOrfaos.length){
    logSaneamento('plano','','saneamento','Detectados '+planosOrfaos.length+' plano(s) órfão(s) (falhaId sem falha correspondente em db.falhas). Nenhum removido automaticamente — revisão manual recomendada. IDs: '+planosOrfaos.map(p=>p.id).slice(0,20).join(', '));
    console.warn('[SDAI] Planos órfãos detectados (não removidos):', planosOrfaos.map(p=>({id:p.id,falhaId:p.falhaId})));
  }
  const resumo={falhasSinteticasRemovidas,planosDuplicadosRemovidos,planosOrfaosDetectados:planosOrfaos.length,backup};
  console.log('[SDAI] Auditoria de saneamento (falhas sintéticas / planos duplicados / planos órfãos):',resumo);
  return resumo;
}

/* =========================================================================
   AUDITORIA E SINCRONIZAÇÃO ESTRUTURAL: Falhas ⇄ Plano de Ação (2026-07)
   -------------------------------------------------------------------------
   CAUSA RAIZ investigada (caso real: falha "MCDONALD'S", Status Técnico "Em
   teste", Situação "Em aberto", visível em Falhas mas ausente no Plano de
   Ação): o sistema tinha TRÊS pontos de criação de falha em db.falhas, com
   regras de criação de Plano de Ação DIFERENTES entre si:
     1) saveFalha()        (cadastro manual, tela "+ Registrar" de Falhas)
        — antes só criava Plano quando isFalhaStatus(status) era verdadeiro,
          e essa função (ver comentário em isFalhaStatus) NÃO considera "Em
          teste" como falha — logo um registro manual "Em teste" NUNCA virava
          Plano. Já corrigido nesta sessão (agora sempre cria).
     2) quickStatusChange() (edição rápida de status em Módulos/Equipamentos)
        — sempre criava Plano para qualquer status != "Em operação",
          incluindo "Em teste". É por isso que Giraffas/SushiBox (lançados
          por essa via) aparecem normalmente no Plano, enquanto MCDONALD'S
          (lançado pela via 1) não aparecia.
     3) importFile()       (falha automática de "Desativação" quando um
          equipamento some da planilha importada) — nunca criava Plano.
          Corrigido nesta sessão (ver comentário junto ao trecho).
   Ou seja, a inconsistência NÃO é um bug de UI nem está ligada ao valor
   "Em teste" em si — é a falta de uma garantia estrutural única de que toda
   falha em db.falhas possua um Plano correspondente em db.planos. As 3 vias
   de criação foram corrigidas, mas isso não repara bases JÁ salvas (local,
   Google Sheets, backups) que acumularam falhas órfãs enquanto a via 1/3
   estavam com o bug.
   CORREÇÃO ESTRUTURAL: sincronizarPlanosFalhas() é chamada de dentro de
   normalizeAllStatuses(), que é o único ponto por onde QUALQUER carga de
   base passa antes de virar o `db` ativo — load() local (boot), pull do
   Google Sheets e restauração de backup (ver todas as chamadas de
   normalizeAllStatuses no arquivo). Isso garante que a auditoria rode
   automaticamente sempre que o sistema abre ou troca de base, sem exigir
   ação manual e sem depender de qual tela o usuário abrir primeiro.
   Não altera arquitetura, não remove dados, não modifica o formato do
   banco — só garante 1 falha ⇄ 1 plano.
   ========================================================================= */
function sincronizarPlanosFalhas(base){
  base.falhas=base.falhas||[]; base.planos=base.planos||[];
  const relatorio={
    totalFalhas:base.falhas.length,
    totalPlanosAntes:base.planos.length,
    falhasSemPlano:0,
    planosCriados:0,
    duplicidadesRemovidas:0,
    totalPlanosDepois:0,
    executadoEm:isoNow()
  };

  // Lookups feitos diretamente sobre `base` (e não via paiName/lacName/locName, que leem o `db`
  // global) porque esta rotina roda inclusive ANTES do `db` global existir/ser reatribuído — ver
  // `let db=load()` e o pull do Google, onde normalizeAllStatuses(base) processa o objeto recebido
  // antes dele virar `db`.
  const painelNomeBase=pid=>(base.paineis||[]).find(p=>p.id===pid)?.nome||'';
  const lacoNomeBase=lid=>(base.lacos||[]).find(l=>l.id===lid)?.nome||'';
  const localNomeBase=lid=>(base.locais||[]).find(l=>l.id===lid)?.nome||'';

  // 1) Nunca 2 planos para a mesma falha. Agrupa por falhaId; onde houver mais de um, preserva o
  //    plano mais avançado (Concluído > Em andamento > Aberto) e, em empate, o mais antigo —
  //    preservando integralmente os dados de progresso já registrados (providência, fotos, datas).
  //    Nenhum dado de um plano "vencedor" é descartado; só o(s) duplicado(s) redundante(s) somem.
  const porFalha={};
  base.planos.forEach(p=>{if(p&&p.falhaId)(porFalha[p.falhaId]=porFalha[p.falhaId]||[]).push(p)});
  const pesoSituacaoDup=s=>({'Concluído':3,'Em andamento':2,'Aberto':1}[s]||0);
  const idsRemover=new Set();
  Object.values(porFalha).forEach(lista=>{
    if(lista.length<=1)return;
    lista.sort((a,b)=>pesoSituacaoDup(b.situacao)-pesoSituacaoDup(a.situacao)||String(a.criadoEm||'').localeCompare(String(b.criadoEm||'')));
    lista.slice(1).forEach(p=>idsRemover.add(p.id));
  });
  if(idsRemover.size){base.planos=base.planos.filter(p=>!idsRemover.has(p.id)); relatorio.duplicidadesRemovidas=idsRemover.size}

  // 2) Toda falha com id válido precisa ter exatamente 1 plano vinculado (falhaId). Cria
  //    automaticamente o que faltar — Situação sempre "Aberto" na criação — preservando todos os
  //    dados já existentes da falha (nada em db.falhas é alterado). Confere antes de criar, então
  //    rodar esta rotina várias vezes seguidas NUNCA duplica.
  const comPlano=new Set(base.planos.map(p=>p&&p.falhaId).filter(Boolean));
  base.falhas.forEach(f=>{
    if(!falhaDeveTerPlano(f))return;
    if(comPlano.has(f.id))return;
    base.planos.push({
      id:id(),falhaId:f.id,criadoEm:f.data||isoNow(),
      categoria:'Manutenção corretiva',prioridade:'Média',responsavel:'L3A Engenharia',situacao:'Aberto',
      painel:painelNomeBase(f.painelId),laco:lacoNomeBase(f.lacoId),piso:f.piso,local:localNomeBase(f.localId),
      item:f.itemNome,statusFalha:f.status,justificativa:f.motivo||f.obs||'',providencia:'',necessitaCompra:false,
      origemSincronizacao:true
    });
    comPlano.add(f.id);
    relatorio.falhasSemPlano++; relatorio.planosCriados++;
  });

  relatorio.totalPlanosDepois=base.planos.length;
  base._ultimaAuditoriaPlanos=relatorio;
  window._ultimaAuditoriaPlanos=relatorio;
  if(relatorio.falhasSemPlano||relatorio.duplicidadesRemovidas){
    console.warn('[SDAI] Sincronização Falhas↔Plano de Ação:',relatorio);
  }
  return relatorio;
}

function renderFalhas(){
  let f=filters.falhas||{};
  // CORREÇÃO (busca não encontrava a loja): antes o filtro de busca rodava em cima do registro
  // "cru" de Falha (que só tem localId, um id interno) e SÓ DEPOIS o .map() resolvia o nome da
  // loja/painel/laço — ou seja, era estruturalmente impossível a busca por nome de loja encontrar
  // qualquer coisa, porque o nome ainda não existia no objeto no momento em que o filtro rodava.
  // Agora resolve painel/laço/loja PRIMEIRO e só então filtra — a busca passa a considerar também
  // o nome da loja, não só os campos internos do lançamento.
  const situacaoFiltro=f.situacao||'Em aberto';
  // Item 13 (soft-delete): falhas excluídas pela Auditoria (Master) somem da operação normal, mas
  // continuam em db.falhas — só visíveis no painel de Auditoria.
  let baseRowsSemBusca=(db.falhas||[]).filter(x=>!x.excluida)
   .map(x=>{const loc=localById(x.localId); return {...x,painel:paiName(x.painelId),laco:lacName(x.lacoId),loja:loc?.nome||'',nomeOficial:loc?.nomeOficial||'',luc:loc?.luc||''}})
   // Filtros de select (Tipo/Status) continuam aplicados em AND com a busca textual (seção 9).
   .filter(x=>(!f.status||normalizeStatus(x.status)===f.status)&&(!f.tipo||x.tipo===f.tipo))
   .sort((a,b)=>String(b.data).localeCompare(String(a.data)));
  // Busca única (normalizarBusca/filtrarRegistrosPorBusca) — mesma lógica de Lojas/Áreas e Plano.
  let baseRows=filtrarRegistrosPorBusca(baseRowsSemBusca,f.q,x=>[x.loja,x.nomeOficial,x.luc,x.itemNome,x.tipo,x.itemId,x.painel,x.laco,x.piso,x.status,x.situacao,x.responsavel,x.motivo,x.obs,x.data].filter(Boolean).join(' '));

  let rows=baseRows.filter(x=>situacaoFiltro==='Todos'||(situacaoFiltro==='Resolvida'?!!x.resolvidaEm:!x.resolvidaEm));

  const totalFalhas=baseRows.length;
  const abertas=baseRows.filter(r=>!r.resolvidaEm).length;
  const criticas=baseRows.filter(r=>isFalhaStatus(r.status)&&!r.resolvidaEm).length;
  const hoje=baseRows.filter(r=>r.data&&r.data.startsWith(new Date().toISOString().slice(0,10))).length;
  const semResultado=f.q&&!rows.length&&baseRowsSemBusca.length>0;

  const trs=rows.map(r=>{
    const loc=dsLocHtml({painel:r.painel,piso:r.piso,laco:r.laco,tipo:r.tipo,endereco:r.itemNome});
    const situacao=r.resolvidaEm?'Resolvida':'Em aberto';
    return `<tr>
      <td>${dsDateHtml(r.data)}</td>
      <td><div style="font-weight:700;font-size:13px">${esc(r.loja||'—')}</div></td>
      <td>${loc}</td>
      <td>${dsBadgeHtml(r.status)}</td>
      <td><span class="dsBadge ${r.resolvidaEm?'done':'open'}">${esc(situacao)}</span></td>
      <td style="font-size:12px">${esc(r.responsavel||'—')}</td>
      <td><div class="dsIcoGroup">
        <button class="dsIco" onclick="formFalha('${r.id}')" title="Editar">✏️</button>
      </div></td>
    </tr>`;
  }).join('');
  // SEGURANÇA (2026-07): exclusão de falha removida desta aba. Falhas só podem ser
  // excluídas em Sistema → Auditoria, por Master, com motivo obrigatório e log.

  document.getElementById('falhas').innerHTML=`
    ${dsKpiStrip([
      ['Total de registros',totalFalhas,''],
      ['Em aberto',abertas,abertas>0?'warn':'ok'],
      ['Críticas (sem plano)',criticas,criticas>0?'bad':'ok'],
      ['Hoje',hoje,'info']
    ])}
    <div class="dsFilters">
      <div class="field"><label>Tipo</label><select onchange="filters.falhas={...filters.falhas,tipo:this.value};render()">${selectOpts(unique(db.falhas.map(x=>x.tipo)),f.tipo)}</select></div>
      <div class="field"><label>Status</label><select onchange="filters.falhas={...filters.falhas,status:this.value};render()">${selectOpts(unique(db.falhas.map(x=>normalizeStatus(x.status))),f.status)}</select></div>
      <div class="field"><label>Situação</label><select onchange="filters.falhas={...filters.falhas,situacao:this.value};render()">${['Em aberto','Resolvida','Todos'].map(v=>`<option value="${v}" ${v===situacaoFiltro?'selected':''}>${v}</option>`).join('')}</select></div>
      <div class="field searchField"><label>Busca</label><div class="searchBox"><input value="${escSearchVal(f.q||'')}" data-filter-input="1" data-filter-group="falhas" data-filter-key="q" data-focus-key="falhasBusca" placeholder="Loja, item, endereço, status ou responsável..." autocomplete="off">${f.q?`<button type="button" class="searchClear" title="Limpar busca" onclick="filters.falhas={...filters.falhas,q:''};render()">×</button>`:''}</div></div>
      <div class="dsFilterActions"><button class="btn secondary small" onclick="limparFiltrosTela('falhas')">Limpar filtros</button><button class="dsIco prim" onclick="formFalha()">+ Registrar</button></div>
    </div>
    <div class="searchResultCount">${resultCountLabel(rows.length,baseRowsSemBusca.length,semResultado)}</div>
    ${situacaoFiltro==='Em aberto'&&(totalFalhas-abertas)>0?`<div class="emptyState" style="padding:10px 14px;font-size:12.5px;text-align:left">${totalFalhas-abertas} falha(s) já resolvida(s) (plano de ação concluído) estão ocultas. Use o filtro "Situação" para ver o histórico.</div>`:''}
    <div class="dsTableWrap">
      <table class="dsTable">

        </tr></thead>
        <tbody>${trs||`<tr><td colspan="7"><div class="emptyState">${baseRowsSemBusca.length?'Nenhum registro corresponde aos filtros aplicados.':'Nenhuma falha registrada.'}</div></td></tr>`}</tbody>
      </table>
    </div>`;
}

function prioridadePeso(p){return {'Crítica':1,'Alta':2,'Média':3,'Baixa':4}[p]||9}
// isFalhaStatus: predicado canônico "este STATUS TÉCNICO conta como falha real em aberto?" — usado
// pelo lado HISTÓRICO (db.falhas) dos relatórios/KPIs. Ver bloco de comentário grande em
// dashStatusBucket() (acima de sua definição) para a separação completa operacional × histórico.
function isFalhaStatus(s){s=up(normalizeStatus(s));return s.includes('ABERT')||s.includes('CURTO')||s.includes('INCEND')||s.includes('DISPAR')}
// GATE ÚNICO de criação automática de Plano de Ação (Task 2, estabilização 2026-07).
// Antes desta consolidação, esta função só retornava true para isFalhaStatus(f.status) (ABERT/
// CURTO/INCEND/DISPAR) — mas os 3 pontos de criação AUTOMÁTICA de plano (importação/desativação
// ~2365, alteração de status ~2523, cadastro de nova falha ~2688) NUNCA checavam isFalhaStatus:
// eles criavam plano para QUALQUER falha nova (inclusive "Em teste"/"Desativação"/"Em operação"),
// só evitando duplicidade (`!db.planos.find(p=>p.falhaId===...)`). Ou seja, a regra real já em
// produção sempre foi "toda falha nova, não excluída e não resolvida, ganha 1 plano" — não a regra
// mais estreita que esta função tinha. Para não regredir esse comportamento (que foi pedido
// explicitamente pelo usuário — ver comentário em ~2684), a função foi reescrita para refletir a
// regra REAL, e os 3 pontos automáticos + sincronizarPlanosFalhas() agora chamam só esta função —
// um único lugar decide "esta falha deve ter plano?". A checagem de duplicidade
// (`!db.planos.find(...)`) continua separada, ao lado de cada chamada, porque depende de db.planos
// no momento da chamada (não é uma propriedade da própria falha).
function falhaDeveTerPlano(f){
  if(!f||!f.id)return false;
  if(f.excluida===true)return false; // item 13: falha excluída (soft-delete) nunca gera/mantém plano
  if(f.resolvidaEm)return false; // já resolvida
  return true;
}
// TODO (futuro): UI dedicada (ex.: renderSDAITestes) para listar/registrar testes formais de
// SDAI/CO2 diretamente pela tela — por ora só a função de dados está disponível.
// STATUS_TECNICO_VALIDOS: conjunto fechado de status técnicos aceitos para uma falha gerada a
// partir de um teste Não Conforme — nunca um placeholder genérico como "Em Aberto".
const STATUS_TECNICO_VALIDOS=['Laço aberto','Módulo aberto','Módulo em curto','Detector','Acionador','Incêndio disparado','Desativação'];
function criarTeste({localId,itemId,responsavel,data,resultado,observacao,fotos,statusTecnico}){
  db.testes=db.testes||[];
  const novoTeste={id:id(),localId:localId||'',itemId:itemId||'',responsavel:responsavel||'',data:data||isoNow(),resultado:resultado||'Conforme',observacao:observacao||'',fotos:fotos||[],criadoEm:isoNow()};
  db.testes.push(novoTeste);
  logLocal('teste',novoTeste.id,'registrar','Teste registrado: '+(resultado||'Conforme')+' — '+(localId||itemId||''));
  if(resultado==='Não Conforme'){
    const item=String(itemId||'').startsWith('flm:')?flmById(String(itemId).slice(4)):db.equipamentos.find(e=>e.id===itemId);
    const loc=localById(localId||'');
    // Exige um Status Técnico real (nunca "Em Aberto" genérico). Aceita os valores fechados da lista
    // ou qualquer valor customizado não vazio informado explicitamente pelo chamador ("outro").
    const statusFinal=(statusTecnico&&String(statusTecnico).trim())||'Laço aberto';
    const dataOcorrencia=data||isoNow();
    const rec={id:id(),data:dataOcorrencia,dataAbertura:dataOcorrencia,painelId:(item&&item.painelId)||'',lacoId:(item&&item.lacoId)||'',piso:(item&&item.piso)||'',tipo:(item&&item.tipo)||'',itemId:itemId||'',itemNome:(item&&(item.endereco||item.modelo))||'',localId:localId||'',status:statusFinal,statusAnterior:(item&&item.status)||'',responsavel:responsavel||'',origem:'Teste',motivo:observacao||'Não conformidade identificada em teste',obs:observacao||'',resolvidaEm:''};
    db.falhas.push(rec);
    sincronizarPlanosFalhas(db);
  }
  return novoTeste;
}
// CORREÇÃO (bug reportado): esta era a definição de isFalhaStatus() que REALMENTE valia em todo o
// sistema (a última declaração de uma função sobrepõe as anteriores em JavaScript), e ela incluía
// erroneamente 'TESTE' e 'DESATIV' como falha. Por isso um lançamento em "Em teste" contabilizava

async function importFile(){try{if(!clienteAtivoObj())throw new Error('Nenhum cliente selecionado. Selecione um cliente antes de importar.'); let rows=await readRows(); let mode=document.getElementById('modeImp').value; let v=validateRows(rows); if(!v.ok)throw new Error(v.errors.map(e=>e.motivo).join(' | ')); if(mode==='replace')db=emptyDB(); let stats={registrosLidos:rows.length,paineis:0,lacos:0,flms:0,portas:0,lojasCriadas:0,areasTecnicas:0,areasComuns:0,detectores:0,acionadores:0,modulos:0,ignorados:0,desativadosNaoEncontrados:0,registrosAtualizados:0,registrosComInconsistencia:0}; let errors=[],rom={ok:false,msg:'Não localizada no arquivo.'}; const equipIdsTocados=new Set(),flmIdsTocados=new Set(),paineisTocados=new Set(); rows.forEach((r,i)=>{let linha=i+2; try{let painel=get(r,['Painel','Central']); let laco=get(r,['Laço','Laco','Loop']); let piso=get(r,['Piso','Pavimento']); let endFlm=get(r,['Endereço FLM','Endereco FLM','FLM','Módulo','Modulo']); let porta=get(r,['Porta','Canal','Porta / Ligação','Porta Ligação']); let loja=get(r,['Loja','Local','Área','Area','Ambiente','Loja_Area']); let tipo=get(r,['Tipo','Classificação','Classificacao','Tipo_Dispositivo']); let modelo=get(r,['Modelo','Dispositivo','Nome do dispositivo','Modelo_Dispositivo','Nome_Dispositivo']); let endereco=get(r,['Endereço','Endereco','Zona','Endereço Equipamento','Endereco_Fisico']); let fab=get(r,['Fabricante']); let status=normalizeStatus(get(r,['Status'])||'Em operação'); let obs=get(r,['Observação','Observacao','Obs']); if(!painel||!laco){stats.ignorados++; errors.push({linha,motivo:'Painel ou laço ausente',registro:JSON.stringify(r)}); return} let p0=db.paineis.length,l0=db.lacos.length,f0=db.flms.length,pt0=db.portas.length,loc0=db.locais.length; let p=ensurePanel(painel); paineisTocados.add(p.id); let l=ensureLaco(p.id,laco,piso); const pisoResolvido=n(l.piso)||piso; const sistemaResolvido=l.sistema||sistemaAutoDetect(l.nome); stats.paineis+=db.paineis.length>p0?1:0; stats.lacos+=db.lacos.length>l0?1:0; let classe=classifyDevice(modelo,tipo,loja); let isModulo=classe==='Módulo'; let flm=null,portaObj=null,local=null; if(isModulo||endFlm){flm=ensureFlm(p.id,l.id,endFlm||endereco||modelo,modelo||'FLM',pisoResolvido); flmIdsTocados.add(flm.id); let flmCriado=db.flms.length>f0; stats.flms+=flmCriado?1:0; stats.modulos+=flmCriado?1:0; if(!flmCriado)stats.registrosAtualizados++; if(porta||loja){portaObj=ensurePorta(flm.id,porta||'1'); let portaCriada=db.portas.length>pt0; stats.portas+=portaCriada?1:0; if(!portaCriada)stats.registrosAtualizados++} if(loja){local=ensureLocal(loja,localClass(loja),p.id,l.id,pisoResolvido,flm.id,portaObj?.id,sistemaResolvido); if(portaObj)local.portaId=portaObj.id, portaObj.localId=local.id; let created=db.locais.length>loc0; if(created){if(local.tipo==='Loja')stats.lojasCriadas++; if(local.tipo==='Área Técnica')stats.areasTecnicas++; if(local.tipo==='Área Comum')stats.areasComuns++} else stats.registrosAtualizados++; if(up(loja).includes('ROMANNEL'))rom={ok:true,msg:`Importada/vinculada ao ${painel} • ${laco} • FLM ${flm.endereco} • Porta ${portaObj?.numero||porta||'1'}.`}} } else { if(loja){local=db.locais.find(x=>up(x.nome)===up(loja)); if(!local){let areaTipo=equipAreaClass(loja,modelo,tipo); if(areaTipo){local=ensureLocal(loja,areaTipo,p.id,l.id,pisoResolvido,'','',sistemaResolvido); stats.registrosComInconsistencia++; if(up(loja).includes('ROMANNEL'))rom={ok:false,msg:'ROMANNEL apareceu em registro de equipamento/área. Não foi criada como loja; foi tratada como '+areaTipo+'.'} } else { if(up(loja).includes('ROMANNEL'))rom={ok:false,msg:'ROMANNEL apareceu em registro de equipamento, mas loja só é criada por porta de FLM. Registro não criou loja.'}; stats.registrosComInconsistencia++; errors.push({linha,motivo:'Equipamento não cria loja. Loja informada não existe por porta de FLM: '+loja,registro:JSON.stringify(r)}) }}} let res=ensureEquip({painelId:p.id,lacoId:l.id,piso:pisoResolvido,tipo:classe,endereco:endereco||get(r,['Zona'])||'',modelo,fabricante:fab,localId:local?.id||'',flmId:flm?.id||'',portaId:portaObj?.id||'',status,ultimaAlteracao:isoNow(),obs},mode); equipIdsTocados.add(res.obj.id); if(res.created){if(classe.includes('Detector'))stats.detectores++; else if(classe.includes('Acionador'))stats.acionadores++;} else {stats.registrosAtualizados++} }
      }catch(e){stats.ignorados++; errors.push({linha,motivo:e.message,registro:JSON.stringify(r)})}});
      // Equipamentos/módulos "fantasma": existiam no painel antes desta importação mas
      // não apareceram desta vez (provável remoção física na central) — marca como
      // Desativada em vez de deixar "Em operação" pra sempre, sem excluir o histórico.
      if(mode!=='replace'){
        db.equipamentos.forEach(e=>{
          if(paineisTocados.has(e.painelId)&&!equipIdsTocados.has(e.id)&&!up(e.status||'').includes('DESATIV')){
            const statusAnterior=e.status; e.status='Desativação'; e.ultimaAlteracao=isoNow();
            const recDesat={id:id(),data:isoNow(),dataAbertura:isoNow(),painelId:e.painelId,lacoId:e.lacoId,piso:e.piso,tipo:e.tipo,itemId:e.id,itemNome:(e.tipo||'')+' '+(e.endereco||e.modelo||''),localId:e.localId,status:'Desativação',statusAnterior,responsavel:'',origem:'Importação',motivo:'Não encontrado na última importação técnica — pode ter sido removido fisicamente na central',obs:''};
            db.falhas.push(recDesat);
            stats.desativadosNaoEncontrados++;
            // Evita "arquivo morto": se havia Plano de Ação aberto ligado a este
            // equipamento, cancela automaticamente em vez de deixar preso pra sempre.
            (db.planos||[]).forEach(pl=>{const fl=db.falhas.find(x=>x.id===pl.falhaId); if(fl&&fl.itemId===e.id&&pl.situacao!=='Concluído'&&pl.situacao!=='Cancelado'){pl.situacao='Cancelado'; pl.providencia=(pl.providencia?pl.providencia+' | ':'')+'Cancelado automaticamente: equipamento não encontrado na última importação técnica.'; pl.atualizadoEm=isoNow()}});
            // CORREÇÃO (auditoria falhas↔planos, 2026-07): este era o único ponto de criação de falha
            // no sistema que nunca gerava Plano de Ação (nem antes nem depois da correção do item 1
            // anterior, que só tratou o cadastro manual em saveFalha). Uma falha de "Desativação"
            // gerada pela importação ficava sem plano vinculado — mesma causa-raiz do caso reportado
            // (falha existe em db.falhas, sem registro correspondente em db.planos). Mantém 1 falha ⇄
            // 1 plano também nesta via.
            if(falhaDeveTerPlano(recDesat)&&!db.planos.find(p=>p.falhaId===recDesat.id)){db.planos.push({id:id(),falhaId:recDesat.id,criadoEm:isoNow(),categoria:'Manutenção corretiva',prioridade:'Média',responsavel:'L3A Engenharia',situacao:'Aberto',painel:paiName(recDesat.painelId),laco:lacName(recDesat.lacoId),piso:recDesat.piso,local:locName(recDesat.localId),item:recDesat.itemNome,statusFalha:recDesat.status,justificativa:recDesat.motivo,providencia:'',necessitaCompra:false});}
          }
        });
        db.flms.forEach(f=>{
          if(paineisTocados.has(f.painelId)&&!flmIdsTocados.has(f.id)&&!up(f.status||'').includes('DESATIV')){
            f.status='Desativação'; f.ultimaAlteracao=isoNow(); stats.desativadosNaoEncontrados++;
          }
        });
      }
      // (correção 2026-07, seção 12 do plano) as linhas abaixo antes SUBSTITUÍAM as contagens
      // incrementais (criados NESTA importação) pelos totais acumulados de toda a base do
      // cliente — isso fazia o resumo mostrar "quantidade de lojas" como se fosse a
      // quantidade de linhas/registros totais do cliente, e não o resultado real desta
      // importação. Mantemos apenas as contagens acumuladas durante o loop acima.
      db.inconsistencias=errors; db.imports.push({data:isoNow(),stats,errors,romannel:rom}); if(db.imports.length>10)db.imports=db.imports.slice(-10);
      // Rastreabilidade (auditoria 2026-07, item 12): a importação em massa só gravava em db.imports,
      // sem deixar rastro em db.historico — registra 1 entrada agregada (não 1 por linha, para não
      // estourar o cap de 1000 do histórico) com o resumo de criados/atualizados/ignorados.
      logLocal('importação',clienteAtivo(),'importar',`Importação técnica: ${stats.paineis} painel(is), ${stats.lacos} laço(s), ${stats.modulos} módulo(s), ${stats.portas} porta(s), ${stats.lojasCriadas+stats.areasTecnicas+stats.areasComuns} loja(s)/área(s), ${stats.detectores+stats.acionadores} equipamento(s) criados; ${stats.registrosAtualizados} atualizados; ${stats.ignorados} ignorados; ${stats.registrosComInconsistencia} com inconsistência.`);
      persistLocal(); markDirty('importação'); render(); _impFileCache=null;
      const resumoHtml=`<div class="msg ok"><b>Importação concluída para o cliente ${esc(clienteAtivoObj()?.nome||'')}.</b><br>`+
        `Painéis criados: ${stats.paineis} · Laços criados: ${stats.lacos} · Módulos (FLM) criados: ${stats.modulos} · Portas criadas: ${stats.portas} · Lojas/Áreas criadas: ${stats.lojasCriadas+stats.areasTecnicas+stats.areasComuns} (Lojas: ${stats.lojasCriadas}, Área Técnica: ${stats.areasTecnicas}, Área Comum: ${stats.areasComuns}) · Equipamentos criados: ${stats.detectores+stats.acionadores} (Detectores: ${stats.detectores}, Acionadores: ${stats.acionadores})<br>`+
        `Registros atualizados: ${stats.registrosAtualizados} · Registros ignorados: ${stats.ignorados} · Registros com inconsistência: ${stats.registrosComInconsistencia} · Linhas lidas no arquivo: ${stats.registrosLidos}<br>`+
        `DFO/FAP/ACM/DM210/SM210/FMC são importados como equipamentos vinculados a Área Comum/Técnica, sem criar loja.</div>`;
      document.getElementById('impMsg').innerHTML=resumoHtml}catch(e){document.getElementById('impMsg').innerHTML=`<div class="msg err">${esc(e.message)}</div>`}}
function openModal(html){document.getElementById('drawer').innerHTML=html;document.getElementById('modal').classList.add('show')} function openModalWide(html){document.getElementById('drawer').classList.add('wide');openModal(html)} function closeModal(){document.getElementById('modal').classList.remove('show');document.getElementById('drawer').classList.remove('wide')} document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()})

function savePainel(i){let o=i?db.paineis.find(x=>x.id===i):{id:id()}; o.nome=n(mNome.value);o.modelo=n(mModelo.value);o.localizacao=n(mLoc.value);o.obs=n(mObs.value); if(!i){db.paineis.push(o); logLocal('painel',o.id,'criar','Painel criado manualmente: '+o.nome)} closeModal(); save()}
function openLacoDetalhes(lacoId){
  const laco=db.lacos.find(x=>x.id===lacoId); if(!laco)return;
  const flms=db.flms.filter(f=>f.lacoId===lacoId).map(f=>{
    const portas=db.portas.filter(p=>p.flmId===f.id);
    return {tipo:'Módulo',endereco:f.endereco?`Endereço lógico ${f.endereco}`:'Sem endereço lógico',modelo:f.modelo||'FLM',porta:portas.length?portas.map(p=>`${p.numero}${locName(p.localId)?' ('+locName(p.localId)+')':''}`).join(' / '):'—',loja:portas.map(p=>locName(p.localId)).filter(Boolean).join(' / ')||'—',status:f.status||'Em operação',ordenacao:Number(f.endereco)||0};
  });
  const eqs=db.equipamentos.filter(e=>e.lacoId===lacoId).map(e=>({tipo:e.tipo||'Equipamento',endereco:e.endereco?`Endereço ${e.endereco}`:'Sem endereço',modelo:e.modelo||'—',porta:'—',loja:locName(e.localId)||'Sem vínculo',status:e.status||'Em operação',ordenacao:parseFloat((e.endereco||'0').toString().replace(/[^\d.]/g,''))||0}));
  const rows=flms.concat(eqs).sort((a,b)=>a.ordenacao-b.ordenacao);
  const list=rows.length?rows.map(r=>`<div class="endRow">
    <span class="endTipo">${esc(r.tipo)}</span>
    <div class="endMain">${esc(r.endereco)}${r.modelo&&r.modelo!=='—'?` <span class="mutedLine">• ${esc(r.modelo)}</span>`:''}</div>
    <div class="endMeta">${r.porta&&r.porta!=='—'?`<span><b>Porta:</b> ${esc(r.porta)}</span>`:''}<span><b>Loja/Área:</b> ${esc(r.loja)}</span><span class="pill ${statusClass(r.status)}">${esc(normalizeStatus(r.status))}</span></div>
  </div>`).join(''):'<p class="msg warn">Sem registros neste laço.</p>';
  openModalWide(`<h2>${esc(paiName(laco.painelId))} — Laço ${esc(laco.nome)} — Endereços cadastrados</h2>
  <p class="msg warn">Lista individual de todos os equipamentos e módulos deste laço. Detectores/Acionadores usam o endereçamento completo Laço.Grupo.Zona.Sub-endereço; Módulos (FLM) usam o Endereço lógico do barramento LSN — os dois esquemas são do próprio painel Bosch e coexistem normalmente no mesmo laço.</p>
  <div class="endList">${list}</div>
  <br><button class="btn secondary" onclick="closeModal()">Fechar</button>`);
}

function falhaItems(){
  const eq=db.equipamentos.map(e=>({id:e.id,n:`${e.tipo} • ${e.endereco||'sem endereço'} • ${locName(e.localId)||'Sem vínculo'}`,tipo:e.tipo,painelId:e.painelId,lacoId:e.lacoId,piso:e.piso,localId:e.localId,kind:'equip'}));
  const fl=[];
  db.flms.forEach(f=>{
    const ps=db.portas.filter(p=>p.flmId===f.id);
    if(ps.length){
      // Uma entrada por PORTA — evita ambiguidade de qual loja a falha se refere.
      ps.forEach(p=>{
        fl.push({id:'flm:'+f.id+':porta:'+p.id,n:`Módulo ${f.endereco||f.modelo||'S/E'} • Porta ${p.numero} • ${locName(p.localId)||'Sem vínculo'}`,tipo:'Módulo',painelId:f.painelId,lacoId:f.lacoId,piso:f.piso,localId:p.localId||'',portaId:p.id,kind:'flm'});

    }
  });

}

function itemMatchesFalhaFilters(it,f){
  if(f.painel && paiName(it.painelId)!==f.painel)return false;
  if(f.laco && lacName(it.lacoId)!==f.laco)return false;
  if(f.piso && n(it.piso)!==f.piso)return false;
  if(f.local && it.localId!==f.local)return false;
  return true;
}
function falhaFilteredItems(ignoreField=''){

function fmtDataHoraTexto(raw){
  if(!raw)return '';
  const d=new Date(raw); if(isNaN(d.getTime()))return raw;
  const dd=String(d.getDate()).padStart(2,'0'),mm=String(d.getMonth()+1).padStart(2,'0'),yy=String(d.getFullYear()).slice(-2);
  const hh=String(d.getHours()).padStart(2,'0'),mi=String(d.getMinutes()).padStart(2,'0');
  return `${dd}/${mm}/${yy} ${hh}:${mi}`;
}

function quickStatusChange(itemSel,newStatus){
  const isFlm=itemSel.startsWith('flm:');
  const flmId=isFlm?itemSel.split(':')[1]:'';
  const portaId=isFlm&&itemSel.includes(':porta:')?itemSel.split(':porta:')[1]:'';
  const flm=isFlm?flmById(flmId):null;
  const porta=portaId?db.portas.find(p=>p.id===portaId):null;
  const equip=!isFlm?db.equipamentos.find(x=>x.id===itemSel):null;
  const alvo=porta||flm||equip; if(!alvo)return;
  const statusAnterior=alvo.status||'Em operação';
  alvo.status=newStatus; alvo.ultimaAlteracao=isoNow();
  if(porta&&flm)flm.status=flmStatusAgregado(flm.id);
  if(newStatus!=='Em operação'){
    // CORREÇÃO: antes disparava só quando isFalhaStatus(newStatus) era verdadeiro — e a versão de
    // isFalhaStatus() que valia (ver correção acima) tratava "Em teste"/"Desativação" como falha.
    // Trocado para "qualquer status diferente de Em operação" para manter EXATAMENTE o mesmo
    // comportamento de antes (lançamento continua sendo criado e aparecendo em Falhas para
    // Em teste/Desativação também) — só a contagem de falha em si é que ficou correta agora.
    const existente=findFalhaAbertaPorItem(itemSel);
    if(existente){save();formFalha(existente.id);return}
    const localId=porta?.localId||equip?.localId||'';
    const painelId=isFlm?flm.painelId:equip.painelId;
    const lacoId=isFlm?flm.lacoId:equip.lacoId;
    const piso=isFlm?flm.piso:equip.piso;
    const itemNome=isFlm?`Módulo ${flm.endereco||flm.modelo}${porta?' • Porta '+porta.numero:''}`:(equip.endereco||equip.modelo);
    const rec={id:id(),data:isoNow(),dataAbertura:isoNow(),painelId,lacoId,piso,tipo:isFlm?'Módulo':equip.tipo,itemId:itemSel,itemNome,localId,status:newStatus,statusAnterior,responsavel:'',origem:'Inspeção',motivo:'',obs:'',resolvidaEm:''};
    db.falhas.push(rec);
    if(falhaDeveTerPlano(rec)&&!db.planos.find(p=>p.falhaId===rec.id)){db.planos.push({id:id(),falhaId:rec.id,criadoEm:isoNow(),categoria:'Manutenção corretiva',prioridade:'Média',responsavel:'L3A Engenharia',situacao:'Aberto',painel:paiName(painelId),laco:lacName(lacoId),piso,local:locName(localId),item:itemNome,statusFalha:newStatus,justificativa:'',providencia:'',necessitaCompra:false})}
    save();
    formFalha(rec.id);
  } else {
    save();render();
  }
}
function falhaSelectItem(itemId,editingId=''){
  const item=falhaItems().find(x=>x.id===itemId);
  const hid=document.getElementById('mItem');
  const box=document.getElementById('mItemConfirm');
  if(!box)return;
  if(!item){if(hid)hid.value='';box.innerHTML='<span class="mutedLine">Nenhum item selecionado ainda — digite acima para buscar ou use os campos Central / Laço / Dispositivo / Porta abaixo.</span>';return}
  const dup=findFalhaAbertaPorItem(itemId,editingId);
  if(dup){
    if(hid)hid.value=''; // impede salvar como novo lançamento duplicado
    box.innerHTML=`<div class="msg warn" style="margin-bottom:8px">Este item já tem um lançamento registrado — <b>${esc(normalizeStatus(dup.status))}</b> em ${fmtDataHora(dup.data)}. Não é permitido duplicar; edite o status do lançamento existente.</div><button type="button" class="btn small" onclick="formFalha('${dup.id}')">Abrir e editar este lançamento</button>`;
    return;
  }
  if(hid)hid.value=itemId||'';
  box.innerHTML=`<div class="check" style="width:100%;justify-content:flex-start;gap:10px"><span class="pill ok">Selecionado</span><b>${esc(item.n)}</b></div><p class="mutedLine" style="margin-top:6px">${esc(paiName(item.painelId)||'—')} · ${esc(lacName(item.lacoId)||'—')} · Piso ${esc(item.piso||'—')}</p>`;
  // Auto-preenche Central, Laço, Piso e Loja com base no item selecionado
  const painelNome=paiName(item.painelId)||'';
  const lacoNome=lacName(item.lacoId)||'';
  const pisoVal=item.piso||'';
  const localVal=item.localId||'';
  // Atualiza os filtros do modal sem disparar refresh (para não perder a seleção)
  const setSelect=(id,val)=>{const el=document.getElementById(id);if(!el)return;const opt=[...el.options].find(o=>o.value===val);if(opt)el.value=val;};
  setSelect('mFiltroPainel',painelNome);
  setSelect('mFiltroLaco',lacoNome);
  setSelect('mFiltroPiso',pisoVal);
  setSelect('mFiltroLocal',localVal);
  // Dispara refresh pra popular dispositivo/porta com os valores do item
  setTimeout(()=>refreshFalhaFilters('laco'),0);
}

function refreshFalhaFilters(changed=''){
  const f=getFalhaFilterValues();
  const fill=(id,vals,sel,allLabel='Todos')=>{const el=document.getElementById(id); if(!el)return; const keep=vals.includes(sel)?sel:''; el.innerHTML=`<option value="">${allLabel}</option>`+vals.map(v=>`<option value="${esc(v)}" ${v===keep?'selected':''}>${esc(v)}</option>`).join('')};
  fill('mFiltroPainel',unique(falhaFilteredItems('painel').map(it=>paiName(it.painelId))),f.painel,'Todas as centrais');
  fill('mFiltroLaco',unique(falhaFilteredItems('laco').map(it=>lacName(it.lacoId))),f.laco,'Todos os laços');
  fill('mFiltroPiso',unique(falhaFilteredItems('piso').map(it=>it.piso)),f.piso,'Todos os pisos');
  const localIds=unique(falhaFilteredItems('local').map(it=>it.localId));
  const localOpts=localIds.map(id=>({id,nome:locName(id)})).filter(x=>x.id&&x.nome).sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'));
  const locEl=document.getElementById('mFiltroLocal'); if(locEl){const keep=localIds.includes(f.local)?f.local:''; locEl.innerHTML='<option value="">Todas as lojas/áreas</option>'+localOpts.map(x=>`<option value="${x.id}" ${x.id===keep?'selected':''}>${esc(x.nome)}</option>`).join('')}
  if(changed==='painel'||changed==='laco'||changed==='local'){
    const dispSel=document.getElementById('mFiltroDispositivo');
    if(dispSel){
      // Filtra dispositivos pela loja selecionada, se houver
      const lojaId=f.local||'';
      let disps=falhaDispositivosForFilter();
      if(lojaId){
        const flmsLoja=db.flms.filter(fm=>db.portas.some(p=>p.flmId===fm.id&&p.localId===lojaId));
        const eqsLoja=db.equipamentos.filter(e=>e.localId===lojaId);
        const idsLoja=new Set([...flmsLoja.map(fm=>fm.id),...eqsLoja.map(e=>e.id)]);
        const filtrado=disps.filter(d=>{
          const id=d.value.split(':')[1];
          return idsLoja.has(id);
        });
        if(filtrado.length)disps=filtrado;
      }
      dispSel.innerHTML='<option value="">Selecione o dispositivo/módulo...</option>'+disps.map(d=>`<option value="${esc(d.value)}">${esc(d.label)}</option>`).join('');
      // Auto-seleciona se houver só um dispositivo para a loja
      if(lojaId&&disps.length===1){
        dispSel.value=disps[0].value;
        onFalhaDispositivoChange();
      }
    }
    const portaWrap=document.getElementById('mFiltroPortaWrap'); if(portaWrap&&(changed==='painel'||changed==='laco'))portaWrap.style.display='none';
  }
  onFalhaSearchInput();
}

function saveFalha(i){

  const preserveData=i?rec.data:isoNow();

    // REGRA (item 1 do pedido do usuário, 2026-07): toda NOVA falha deve gerar automaticamente um

    if(falhaDeveTerPlano(rec)&&!db.planos.find(p=>p.falhaId===rec.id)){
      // Se o cadastro veio de "Duplicar" (aba Plano de Ação), aplica o molde copiado do plano de
      // origem — só nos campos descritivos, nunca na Situação (que é sempre "Aberto" para plano novo).

    }
  } closeModal(); save()
}

function normalizeFotoUrl(u){
  if(!u)return '';
  const s=String(u);
  const m=s.match(/[?&]id=([a-zA-Z0-9_-]+)/)||s.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m)return 'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w800';
  return s;
}
/* [removido na limpeza 2026-07: versão antiga substituída pela declaração final desta função] */
function fotoHref(u){
  if(!u)return '#';
  const s=String(u);
  const m=s.match(/[?&]id=([a-zA-Z0-9_-]+)/)||s.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m)return 'https://drive.google.com/file/d/'+m[1]+'/view';
  return s;
}
function normalizeFotos(f){
  if(!f)return [];
  if(Array.isArray(f))return f.filter(Boolean);
  if(typeof f==='string'){
    const s=f.trim(); if(!s)return [];
    if(s.startsWith('[')){try{const a=JSON.parse(s);return Array.isArray(a)?a.filter(Boolean):[]}catch(e){return []}}
    if(s.startsWith('http'))return [s];
  }
  return [];
}
function fotosThumbsHtml(fotos,tamanho=38,planoId=''){
  const lista=normalizeFotos(fotos);
  if(!lista.length)return '<span class="mutedLine">—</span>';
  const thumbs=lista.map((u,idx)=>{
    const src=normalizeFotoUrl(u);
    const href=fotoHref(u);
    const delBtn=planoId?`<button onclick="excluirFoto('${planoId}',${idx})" title="Excluir foto" style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);border:none;border-radius:50%;width:18px;height:18px;cursor:pointer;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1">✕</button>`:'';
    return `<div style="position:relative;display:inline-block"><a href="${esc(href)}" target="_blank" rel="noopener" title="Abrir foto em tamanho maior"><img src="${esc(src)}" alt="Foto do serviço" loading="lazy" style="width:${tamanho}px;height:${tamanho}px;object-fit:cover;border-radius:6px;border:1px solid var(--l3a-border);display:block" onerror="this.style.display='none';this.nextSibling&&(this.nextSibling.style.display='inline')"><span style="display:none;font-size:11px;padding:4px;background:var(--l3a-neutral-bg,#eef0f3);border-radius:6px">🔗 foto</span></a>${delBtn}</div>`;
  }).join('');
  return `<div style="display:flex;flex-direction:column;gap:4px"><small class="note"><b>${lista.length}</b> foto${lista.length===1?'':'s'}</small><div style="display:flex;gap:5px;flex-wrap:wrap">${thumbs}</div></div>`;
}
function excluirFoto(planoId,idx){
