/* =========================================================================
   AUDITORIA E SINCRONIZAÇÃO ESTRUTURAL: Falhas ⇄ Plano de Ação (2026-07)
   -------------------------------------------------------------------------
   CAUSA RAIZ investigada (caso real: falha "MCDONALD'S", Status Técnico "Em
   teste", Situação "Em aberto", visível em Falhas mas ausente no Plano de
   Ação): o sistema tinha TRÊS pontos de criação de falha em db.falhas, com
   regras de criação de Plano de Ação DIFERENTES entre si:
     1) saveFalha()        (cadastro manual, tela "+ Registrar" de Falhas)
        — antes só criava Plano quando isFalhaStatus(status) era verdadeiro,
          e essa função (ver comentário em isFalhaStatus) NÃO considera "Em
          teste" como falha — logo um registro manual "Em teste" NUNCA virava
          Plano. Já corrigido nesta sessão (agora sempre cria).
     2) quickStatusChange() (edição rápida de status em Módulos/Equipamentos)
        — sempre criava Plano para qualquer status != "Em operação",
          incluindo "Em teste". É por isso que Giraffas/SushiBox (lançados
          por essa via) aparecem normalmente no Plano, enquanto MCDONALD'S
          (lançado pela via 1) não aparecia.
     3) importFile()       (falha automática de "Desativação" quando um
          equipamento some da planilha importada) — nunca criava Plano.
          Corrigido nesta sessão (ver comentário junto ao trecho).
   Ou seja, a inconsistência NÃO é um bug de UI nem está ligada ao valor
   "Em teste" em si — é a falta de uma garantia estrutural única de que toda
   falha em db.falhas possua um Plano correspondente em db.planos. As 3 vias
   de criação foram corrigidas, mas isso não repara bases JÁ salvas (local,
   Google Sheets, backups) que acumularam falhas órfãs enquanto a via 1/3
   estavam com o bug.
   CORREÇÃO ESTRUTURAL: sincronizarPlanosFalhas() é chamada de dentro de
   normalizeAllStatuses(), que é o único ponto por onde QUALQUER carga de
   base passa antes de virar o `db` ativo — load() local (boot), pull do
   Google Sheets e restauração de backup (ver todas as chamadas de
   normalizeAllStatuses no arquivo). Isso garante que a auditoria rode
   automaticamente sempre que o sistema abre ou troca de base, sem exigir
   ação manual e sem depender de qual tela o usuário abrir primeiro.
   Não altera arquitetura, não remove dados, não modifica o formato do
   banco — só garante 1 falha ⇄ 1 plano.
   ========================================================================= */
function sincronizarPlanosFalhas(base){
  base.falhas=base.falhas||[]; base.planos=base.planos||[];
  const relatorio={
    totalFalhas:base.falhas.length,
    totalPlanosAntes:base.planos.length,
    falhasSemPlano:0,
    planosCriados:0,
    duplicidadesRemovidas:0,
    totalPlanosDepois:0,
    executadoEm:isoNow()
  };

  // Lookups feitos diretamente sobre `base` (e não via paiName/lacName/locName, que leem o `db`
  // global) porque esta rotina roda inclusive ANTES do `db` global existir/ser reatribuído — ver
  // `let db=load()` e o pull do Google, onde normalizeAllStatuses(base) processa o objeto recebido
  // antes dele virar `db`.
  const painelNomeBase=pid=>(base.paineis||[]).find(p=>p.id===pid)?.nome||'';
  const lacoNomeBase=lid=>(base.lacos||[]).find(l=>l.id===lid)?.nome||'';
  const localNomeBase=lid=>(base.locais||[]).find(l=>l.id===lid)?.nome||'';

  // 1) Nunca 2 planos para a mesma falha. Agrupa por falhaId; onde houver mais de um, preserva o
  //    plano mais avançado (Concluído > Em andamento > Aberto) e, em empate, o mais antigo —
  //    preservando integralmente os dados de progresso já registrados (providência, fotos, datas).
  //    Nenhum dado de um plano "vencedor" é descartado; só o(s) duplicado(s) redundante(s) somem.
  const porFalha={};
  base.planos.forEach(p=>{if(p&&p.falhaId)(porFalha[p.falhaId]=porFalha[p.falhaId]||[]).push(p)});
  const pesoSituacaoDup=s=>({'Concluído':3,'Em andamento':2,'Aberto':1}[s]||0);
  const idsRemover=new Set();
  Object.values(porFalha).forEach(lista=>{
    if(lista.length<=1)return;
    lista.sort((a,b)=>pesoSituacaoDup(b.situacao)-pesoSituacaoDup(a.situacao)||String(a.criadoEm||'').localeCompare(String(b.criadoEm||'')));
    lista.slice(1).forEach(p=>idsRemover.add(p.id));
  });
  if(idsRemover.size){base.planos=base.planos.filter(p=>!idsRemover.has(p.id)); relatorio.duplicidadesRemovidas=idsRemover.size}

  // 2) Toda falha com id válido precisa ter exatamente 1 plano vinculado (falhaId). Cria
  //    automaticamente o que faltar — Situação sempre "Aberto" na criação — preservando todos os
  //    dados já existentes da falha (nada em db.falhas é alterado). Confere antes de criar, então
  //    rodar esta rotina várias vezes seguidas NUNCA duplica.
  const comPlano=new Set(base.planos.map(p=>p&&p.falhaId).filter(Boolean));
  base.falhas.forEach(f=>{
    if(!f||!f.id)return;
    if(comPlano.has(f.id))return;
    base.planos.push({
      id:id(),falhaId:f.id,criadoEm:f.data||isoNow(),
      categoria:'Manutenção corretiva',prioridade:'Média',responsavel:'L3A Engenharia',situacao:'Aberto',
      painel:painelNomeBase(f.painelId),laco:lacoNomeBase(f.lacoId),piso:f.piso,local:localNomeBase(f.localId),
      item:f.itemNome,statusFalha:f.status,justificativa:f.motivo||f.obs||'',providencia:'',necessitaCompra:false,
      origemSincronizacao:true
    });
    comPlano.add(f.id);
    relatorio.falhasSemPlano++; relatorio.planosCriados++;
  });

  relatorio.totalPlanosDepois=base.planos.length;
  base._ultimaAuditoriaPlanos=relatorio;
  window._ultimaAuditoriaPlanos=relatorio;
  if(relatorio.falhasSemPlano||relatorio.duplicidadesRemovidas){
    console.warn('[SDAI] Sincronização Falhas↔Plano de Ação:',relatorio);
  }
  return relatorio;
}

  // rotina que já roda sozinha no boot/pull/restore. Útil para conferir o estado a qualquer momento
  // sem precisar recarregar a página, e para validar que 1 falha ⇄ 1 plano depois de importações.
  const rel=sincronizarPlanosFalhas(db);

function classifyDevice(model,tipo,local){const m=up(model+' '+tipo); if(/FLM4204CONS|FLM420I2WE|FLM/.test(m))return 'Módulo'; if(/FAP|DFO/.test(m))return 'Detector de Fumaça'; if(/FAH/.test(m))return 'Detector Térmico'; if(/ACM|DM210|SM210|FMC210|FMC420RW|ACIONADOR/.test(m))return 'Acionador Manual'; if(/FNM|FNS|SIRENE|SINALIZ/.test(m))return 'Sirene / Sinalizador'; if(/DETECTOR/.test(m))return 'Detector'; return n(tipo)||'Não classificado'}

function ensureLocal(nome,tipo,painelId,lacoId,piso,flmId,portaId,sistema){

function subTipos(match){let map={}; db.flms.filter(match).forEach(f=>{let k='Módulo • '+(f.modelo||'FLM');map[k]=(map[k]||0)+1}); db.equipamentos.filter(match).forEach(e=>{let k=(e.tipo||'Equipamento')+' • '+(e.modelo||'S/modelo');map[k]=(map[k]||0)+1}); let entries=Object.entries(map).sort((a,b)=>b[1]-a[1]); if(!entries.length)return '<span class="mutedLine">Sem dispositivos cadastrados</span>'; return '<div class="subTipoGrid">'+entries.map(([k,v])=>{const [cat,modelo]=k.split(' • '); return `<div class="subTipoRow"><span class="subTipoDot cat-${subTipoCatClass(cat)}"></span><span class="subTipoLabel"><b>${esc(cat)}</b><small>${esc(modelo||'')}</small></span><span class="subTipoCount">${v}</span></div>`}).join('')+'</div>'}

function ultimaInspecaoLoja(l){
  const insp=(l&&l.inspecoes)||[];
  if(!insp.length)return null;
  return insp.slice().sort((a,b)=>String(b.data||'').localeCompare(String(a.data||'')))[0];
}
// ---- Parte A: filtro de período por loja/área (2026-07) ----
// dataEventoPorTipo(): função central que decide qual campo de data real usar para cada tipo de
// evento, com fallback de prioridade para registros antigos. NUNCA usa a data atual como
// substituto de data ausente — só os campos abaixo, na ordem de prioridade indicada.
function dataEventoPorTipo(tipoEvento,obj){
  if(!obj)return '';
  switch(tipoEvento){
    case 'teste': return obj.dataHora||obj.data||obj.criadoEm||obj.executadoEm||'';
    case 'falhaAbertura': return obj.data||obj.criadoEm||obj.abertaEm||'';
    case 'falhaResolucao': return obj.resolvidaEm||'';
    case 'planoAbertura': return obj.criadoEm||obj.iniciadoEm||'';
    case 'planoConclusao': return obj.concluidoEm||obj.atualizadoEm||obj.criadoEm||'';
    default: return obj.data||obj.criadoEm||'';
  }
}
// textoConclusaoPlano(): texto fixo de conclusão do Plano de Ação, gerado dinamicamente conforme
// o resultado real salvo (Conforme/Não Conforme) — nunca inventa dado, usa os campos reais do
// plano/falha (p.statusFalha ou f.status como status técnico original quando Não Conforme).
function textoConclusaoPlano(plano,falha){
  const p=plano||{}; const f=falha||{};
  if(p.resultado==='Conforme'){
    return {
      conclusao:'Atendimento concluído. Falha resolvida e sistema restabelecido para Em operação.',
      statusTecnicoFinal:'Em operação', situacaoFalha:'Resolvida', situacaoPlano:'Concluído'
    };
  }
  if(p.resultado==='Não Conforme'){
    return {
      conclusao:'Atendimento realizado. A falha permanece tecnicamente ativa e foi encaminhada para Notificar lojista.',
      statusTecnicoFinal:f.status||p.statusFalha||'Não informado', situacaoFalha:'Ativa',
      situacaoPlano:'Concluído', encaminhamento:'Notificar lojista'
    };
  }
  return {conclusao:'',statusTecnicoFinal:'',situacaoFalha:'',situacaoPlano:p.situacao||'Não informado'};
}
// textoConclusaoTeste(): texto fixo de conclusão do teste/inspeção conforme resultado real salvo.
function textoConclusaoTeste(insp){
  const i=insp||{};
  if(i.resultado==='Conforme')return 'Teste realizado com resultado Conforme. Loja/área mantida em operação.';
  if(i.resultado==='Ajustado')return 'Teste realizado com ajuste executado. Sistema mantido em operação.';
  if(i.resultado==='Não Conforme')return 'Teste realizado com resultado Não Conforme. Falha e Plano de Ação gerados automaticamente.';
  return 'Não informado';
}
// obterAnexosEvento(): consolida anexos de todos os campos compatíveis já usados no sistema
// (fotos/videos/documentos de teste; atendimentoFotos/atendimentoVideos/atendimentoDocumentos de
// plano) num único array padronizado, deduplicando por nome+dataUrl e inferindo tipo (foto/vídeo/
// documento) pelo campo `tipo` (mime) salvo por readFilesAsDataUrls() ou, na ausência dele, pela
// extensão do nome do arquivo. Nunca quebra em registros antigos sem esses campos.
function obterAnexosEvento(origemTipo,origem,vinculo){
  const o=origem||{};
  const grupos=[];
  if(origemTipo==='teste'){
    grupos.push(['foto',o.fotos],['video',o.videos],['documento',o.documentos]);
  } else if(origemTipo==='plano'){
    grupos.push(['foto',o.atendimentoFotos],['video',o.atendimentoVideos],['documento',o.atendimentoDocumentos]);
  } else {
    grupos.push(['foto',o.fotos],['video',o.videos],['documento',o.documentos],
      ['foto',o.evidencias],['documento',o.anexos],['documento',o.arquivos]);
  }
  const inferirTipoPorNome=(nome)=>{
    const ext=String(nome||'').toLowerCase().split('.').pop();
    if(['jpg','jpeg','png','gif','webp','bmp'].includes(ext))return 'foto';
    if(['mp4','mov','avi','webm','mkv'].includes(ext))return 'video';
    return 'documento';
  };
  const vistos=new Set();
  const out=[];
  grupos.forEach(([tipoPadrao,lista])=>{
    (lista||[]).forEach(a=>{
      if(!a)return;
      let tipo=tipoPadrao;
      if(a.tipo&&a.tipo.startsWith('image/'))tipo='foto';
      else if(a.tipo&&a.tipo.startsWith('video/'))tipo='video';
      else if(!a.tipo||!a.tipo.startsWith('image/')&&!a.tipo.startsWith('video/')){
        if(tipoPadrao==='documento'||!a.tipo)tipo=inferirTipoPorNome(a.name);
      }
      const chave=(a.name||'')+'|'+(a.dataUrl||a.url||'')+'|'+(a.data||'');
      if(vistos.has(chave))return;
      vistos.add(chave);
      out.push({
        nome:a.name||'Não informado',tipo,url:a.dataUrl||a.url||'',
        data:a.data||(vinculo&&vinculo.data)||'',responsavel:(vinculo&&vinculo.responsavel)||'',
        tamanho:a.size||a.tamanho||'',origem:origemTipo,
        planoId:(vinculo&&vinculo.planoId)||'',falhaId:(vinculo&&vinculo.falhaId)||'',
        testeId:(vinculo&&vinculo.testeId)||'',localId:(vinculo&&vinculo.localId)||''
      });
    });
  });
  return out;
}
// obterHistoricoLojaNoPeriodo(): junta, para UMA loja/área, todos os eventos reais (testes,
// falhas abertas/resolvidas, planos abertos/concluídos) cuja data real caia dentro do intervalo
// [dataInicial,dataFinal] (qualquer um dos dois pode ser vazio = sem limite naquele lado; "Até" é
// tratado por comparação de data — YYYY-MM-DD — portanto já cobre o dia inteiro até 23:59:59.999).
// Nunca duplica o mesmo evento vindo de fontes diferentes: cada evento é gerado uma única vez a
// partir da sua fonte de origem (inspeção, falha ou plano), e uma chave tipoEvento+origemId+data é
// usada para eliminar qualquer duplicidade remanescente, mantendo a ocorrência mais completa.
function obterHistoricoLojaNoPeriodo(localId,dataInicial,dataFinal){
  const l=db.locais.find(x=>x.id===localId);
  const de=(dataInicial||'').slice(0,10), ate=(dataFinal||'').slice(0,10);
  function inRange(dataStr){
    if(!dataStr)return false;
    const d=String(dataStr).slice(0,10);
    if(de&&d<de)return false;
    if(ate&&d>ate)return false;
    return true;
  }
  const eventos=[];
  ((l&&l.inspecoes)||[]).forEach(insp=>{
    const d=dataEventoPorTipo('teste',insp);
    if(inRange(d)){
      const anexos=obterAnexosEvento('teste',insp,{data:d,responsavel:insp.responsavel,testeId:insp.id,localId});
      eventos.push({id:'teste:'+insp.id,data:d,tipoEvento:'Teste',titulo:`Teste — ${insp.resultado||'Não informado'}`,
        descricao:insp.observacoes||'',status:insp.resultado||'Não informado',responsavel:insp.responsavel||'Não informado',
        fotos:anexos.length,anexos,origem:'Inspeção',origemId:insp.id,
        conclusao:textoConclusaoTeste(insp),falhaGeradaId:insp.falhaGeradaId||'',
        planoGeradoId:insp.falhaGeradaId?((db.planos||[]).find(p=>p.falhaId===insp.falhaGeradaId)||{}).id||'':''});
    }
  });
  const falhasLoja=(db.falhas||[]).filter(f=>f.localId===localId);
  falhasLoja.forEach(f=>{
    const dAb=dataEventoPorTipo('falhaAbertura',f);
    if(inRange(dAb)){
      eventos.push({id:'falhaAb:'+f.id,data:dAb,tipoEvento:'Falha aberta',titulo:`Falha — ${f.status||'Não informado'}`,descricao:f.motivo||f.obs||'',status:f.status||'Não informado',responsavel:f.responsavel||'Não informado',fotos:0,anexos:[],origem:f.origem||'Falha',origemId:f.id});
    }
    const dRes=dataEventoPorTipo('falhaResolucao',f);
    if(dRes&&inRange(dRes)){
      eventos.push({id:'falhaRes:'+f.id,data:dRes,tipoEvento:'Falha resolvida',titulo:'Falha resolvida',descricao:f.motivo||f.obs||'',status:'Resolvida',responsavel:f.responsavel||'Não informado',fotos:0,anexos:[],origem:f.origem||'Falha',origemId:f.id});
    }
  });
  const planosLoja=(db.planos||[]).filter(p=>falhasLoja.some(f=>f.id===p.falhaId));
  planosLoja.forEach(p=>{
    const falhaDoPlano=falhasLoja.find(f=>f.id===p.falhaId);
    const dAb=dataEventoPorTipo('planoAbertura',p);
    if(inRange(dAb)){
      eventos.push({id:'planoAb:'+p.id,data:dAb,tipoEvento:'Plano aberto',titulo:`Plano de Ação — ${p.categoria||'Não informado'}`,descricao:p.justificativa||'',status:p.situacao||'Não informado',responsavel:p.responsavel||'Não informado',fotos:0,anexos:[],origem:'Plano de Ação',origemId:p.id});
    }
    if(p.situacao==='Concluído'){
      const dCo=dataEventoPorTipo('planoConclusao',p);
      if(dCo&&inRange(dCo)){
        const anexos=obterAnexosEvento('plano',p,{data:dCo,responsavel:p.responsavel,planoId:p.id,falhaId:p.falhaId,localId});
        const conc=textoConclusaoPlano(p,falhaDoPlano);
        eventos.push({id:'planoCo:'+p.id,data:dCo,tipoEvento:'Plano concluído',
          titulo:'Plano de Ação concluído'+(p.resultado?` — ${p.resultado}`:'')+(p.encaminhamento?` (${p.encaminhamento})`:''),
          descricao:p.providencia||'',status:'Concluído',responsavel:p.responsavel||'Não informado',
          fotos:anexos.length,anexos,origem:'Plano de Ação',origemId:p.id,
          plano:p,falha:falhaDoPlano,conclusaoPlano:conc,
          dataAbertura:p.criadoEm||'',dataConclusao:p.concluidoEm||'',resultado:p.resultado||'Não informado',
          statusTecnicoInicial:p.statusFalha||'Não informado',categoria:p.categoria||'Não informado',
          execucaoRealizada:p.providencia||'',encaminhamentoFinal:p.encaminhamento||conc.encaminhamento||'Não informado'});
      }
    }
  });
  const porChave=new Map();
  eventos.forEach(ev=>{
    const chave=ev.tipoEvento+'|'+ev.origemId+'|'+String(ev.data||'').slice(0,16);
    const atual=porChave.get(chave);
    if(!atual||Object.keys(ev).length>Object.keys(atual).length)porChave.set(chave,ev);
  });
  const eventosUnicos=Array.from(porChave.values());
  eventosUnicos.sort((a,b)=>String(a.data||'').localeCompare(String(b.data||'')));
  const totais={
    testes:eventosUnicos.filter(e=>e.tipoEvento==='Teste').length,
    falhasAbertas:eventosUnicos.filter(e=>e.tipoEvento==='Falha aberta').length,
    falhasResolvidas:eventosUnicos.filter(e=>e.tipoEvento==='Falha resolvida').length,
    planosAbertos:eventosUnicos.filter(e=>e.tipoEvento==='Plano aberto').length,
    planosConcluidos:eventosUnicos.filter(e=>e.tipoEvento==='Plano concluído').length,
    evidencias:eventosUnicos.reduce((s,e)=>s+(e.fotos||0),0)
  };
  return {localId,eventos:eventosUnicos,totais};
}
function localPossuiFalhaAberta(l){
  if(isFalhaStatus(l.status))return true;
  return (db.falhas||[]).some(f=>f.localId===l.id&&isFalhaStatus(f.status)&&!f.resolvidaEm);
}
function locaisResponsaveisDisponiveis(){
  const s1=(db.locais||[]).flatMap(l=>(l.inspecoes||[]).map(x=>x.responsavel)).filter(Boolean);
  const s2=(db.usuarios||[]).map(u=>u.nome).filter(Boolean);
  return unique(s1.concat(s2));
}
// CORREÇÃO (busca de Lojas/Áreas travando/perdendo foco): renderLocais() foi dividida em duas
// funções. renderLocais() monta a ESTRUTURA (KPIs, filtros, cabeçalho da tabela e o próprio
// <input> de busca) uma única vez — ao entrar na aba, ou quando um filtro dropdown muda (o que já
// dispara um render() completo do sistema). renderLocaisResultado() apenas recalcula a lista
// filtrada e atualiza o conteúdo dos KPIs e do <tbody> da tabela, sem tocar no <input> nem em
// nenhuma outra parte da tela — assim o campo de busca nunca é destruído/recriado enquanto o
// usuário digita, e a digitação nunca dispara o render() do sistema inteiro (menu, dashboard,
// gráficos, outras abas).
function locaisRowsFiltradas(){
  let q=filters.locaisQ||'';
  let f=filters.locaisF||{};
  const periodoAtivo=!!(f.periodoDe||f.periodoAte);
  let rows0=db.locais.map(l=>({
    ...l,
    painel:paiName(l.painelId),laco:lacName(l.lacoId),
    flmEndereco:flmById(l.flmId)?.endereco||'',
    portaNum:db.portas.find(p=>p.id===l.portaId)?.numero||'',
    qtd:db.equipamentos.filter(e=>e.localId===l.id).length,
    _ultimaInspecao:ultimaInspecaoLoja(l),
    _possuiFalha:localPossuiFalhaAberta(l),
    _periodo:periodoAtivo?obterHistoricoLojaNoPeriodo(l.id,f.periodoDe,f.periodoAte):null
  }));
  const termo=normalizarBusca(q);
  let rows=rows0.filter(r=>{
    if(termo){
      const texto=normalizarBusca([
        r.nome,r.nomeOficial,r.luc,r.tipo,r.painel,r.laco,r.piso,
        r.flmEndereco,r.portaNum,r.status,r.endereco
      ].filter(v=>v!==undefined&&v!==null).join(' | '));
      if(!texto.includes(termo))return false;
    }
    if(f.status&&normalizeStatus(r.status)!==f.status)return false;
    if(f.piso&&(r.piso||'')!==f.piso)return false;
    if(f.painel&&r.painel!==f.painel)return false;
    if(f.laco&&r.laco!==f.laco)return false;
    if(f.tipo&&r.tipo!==f.tipo)return false;
    if(f.responsavel&&(r._ultimaInspecao?.responsavel||'')!==f.responsavel)return false;
    if(f.falha==='sim'&&!r._possuiFalha)return false;
    if(f.falha==='nao'&&r._possuiFalha)return false;
    if(f.dataDe&&(!r._ultimaInspecao||String(r._ultimaInspecao.data||'').slice(0,10)<f.dataDe))return false;
    if(f.dataAte&&(!r._ultimaInspecao||String(r._ultimaInspecao.data||'').slice(0,10)>f.dataAte))return false;
    // Filtro de período (Parte A): a loja só aparece se tiver PELO MENOS UM evento real (teste,
    // falha aberta/resolvida, plano aberto/concluído) dentro do intervalo — nunca filtra pelo
    // status atual da loja. Combina em AND com todos os demais filtros acima.
    if(periodoAtivo&&(!r._periodo||!r._periodo.eventos.length))return false;
    return true;
  });
  return rows;
}
function renderLocaisResultado(){
  const kpiEl=document.getElementById('locaisKpis');
  const tbodyEl=document.getElementById('locaisTbody');
  if(!kpiEl||!tbodyEl)return; // estrutura ainda não montada (aba não está ativa) - renderLocais() cuida disso
  const f=filters.locaisF||{};
  const periodoAtivo=!!(f.periodoDe||f.periodoAte);
  const rows=locaisRowsFiltradas();
  const total=rows.length;
  if(periodoAtivo){
    const testes=rows.reduce((s,r)=>s+(r._periodo?.totais.testes||0),0);

// BACKUP LÓGICA ANTERIOR: renderFalhas() fazia um render() completo da tabela a cada tecla digitada
// na busca (via data-filter-input genérico), filtrava só por tipo/status(bruto)/JSON.stringify(x)
// e mostrava colunas Data/Loja/Localização/Status/Situação/Responsável/Ações sem paginação, sem
// filtros de Painel/Laço/Piso/Loja/Período e sem separar Tipo/Criticidade/Situação da falha do
// status técnico do item. Reescrita abaixo segue o MESMO padrão visual/estrutural já usado em
// renderLocais()/renderLocaisResultado() (estrutura montada 1x, resultado recalculado via debounce,
// nunca dispara render() completo ao digitar) e em renderPlano() (filtros compactos, cards de ação).
let _falhasSearchIndex=null,_falhasSearchIndexVersion='';
function falhasSearchIndexVersion(){
  const fs=db.falhas||[];
  return fs.length+':'+(fs[fs.length-1]||{}).id+':'+(db.locais||[]).length+':'+(db.equipamentos||[]).length+':'+(db.flms||[]).length+':'+(db.portas||[]).length;
}
function buildFalhasSearchIndex(){
  const v=falhasSearchIndexVersion();
  if(_falhasSearchIndex&&_falhasSearchIndexVersion===v)return _falhasSearchIndex;
  const idx=new Map();
  (db.falhas||[]).forEach(f=>{
    const loc=localById(f.localId)||{};
    const isFlm=String(f.itemId||'').startsWith('flm:');
    const flm=isFlm?flmById(String(f.itemId).slice(4)):null;
    const equip=!isFlm?(db.equipamentos||[]).find(e=>e.id===f.itemId):null;
    const porta=(db.portas||[]).find(p=>p.id===loc.portaId)||null;
    const enderecoRaw=f.itemNome||(flm&&flm.endereco)||(equip&&equip.endereco)||loc.endereco||'';
    const partes=[
      loc.nome,loc.nomeOriginalCadastro,loc.nomeOficial,loc.luc,loc.tipo,
      paiName(f.painelId),lacName(f.lacoId),loc.piso,f.piso,
      f.itemNome,flm&&flm.endereco,flm&&flm.modelo,equip&&equip.endereco,equip&&equip.modelo,
      porta&&porta.numero,enderecoRaw,tipoFalhaEfetivo(f),f.motivo,f.responsavel
    ];
    const texto=normalizeSearchText(partes.filter(x=>x!==undefined&&x!==null&&x!=='').join(' | '));
    const enderecoNorm=normalizePhysicalAddress(enderecoRaw);
    idx.set(f.id,texto+' '+enderecoNorm+' '+enderecoNorm.replace(/-/g,''));
  });
  _falhasSearchIndex=idx;_falhasSearchIndexVersion=v;
  return idx;
}
function falhasRowsFiltradas(){
  const f=filters.falhas||{};
  const idx=buildFalhasSearchIndex();
  const termoBusca=normalizeSearchText(f.q||'');
  const termoEndereco=termoBusca?normalizePhysicalAddress(f.q||''):'';
  let rows=(db.falhas||[]).map(x=>({
    ...x,
    painel:paiName(x.painelId),laco:lacName(x.lacoId),loja:locName(x.localId),
    piso:x.piso||'',
    tipoEfetivo:tipoFalhaEfetivo(x),
    situacaoEfetiva:situacaoFalhaEfetiva(x),
    criticidadeEfetiva:criticidadeFalhaEfetiva(x),
    planoVinculado:planoForFalha(x.id)
  })).filter(r=>{
    if(termoBusca){
      const texto=idx.get(r.id)||'';
      if(!texto.includes(termoBusca)&&!(termoEndereco&&texto.includes(termoEndereco)))return false;
    }
    if(f.painel&&r.painel!==f.painel)return false;
    if(f.laco&&r.laco!==f.laco)return false;
    if(f.piso&&(r.piso||'')!==f.piso)return false;
    if(f.loja&&r.localId!==f.loja)return false;
    if(f.tipo&&r.tipoEfetivo!==f.tipo)return false;
    // BACKUP LOGICA ANTERIOR: quando filters.falhas.situacao vinha vazio, a tabela mostrava TODAS as
    // falhas (inclusive Resolvidas/Canceladas), exigindo filtro manual para ver so as ativas. NOVA
    // LOGICA (item 6, 2026-07): sem filtro explicito de Situacao, mostra so falhas ativas
    // (situacaoEfetiva != Resolvida/Cancelada). O valor especial 'Todas' (nova opcao no filtro)
    // mostra tudo; qualquer valor especifico de SITUACAO_FALHA_OPTIONS filtra normalmente.
    if(f.situacao){ if(f.situacao!=='Todas'&&r.situacaoEfetiva!==f.situacao)return false; }
    else { if(!falhaSituacaoAtiva(r))return false; }
    if(f.periodoDe&&String(r.data||'').slice(0,10)<f.periodoDe)return false;
    if(f.periodoAte&&String(r.data||'').slice(0,10)>f.periodoAte)return false;
    return true;
  });
  rows.sort((a,b)=>String(b.data||'').localeCompare(String(a.data||'')));
  return rows;
}

function planoCategorias(){return ['Substituição de material','Manutenção corretiva','Refazer teste','Reconfiguração de nome','Notificar logista']}
function planoPrioridades(){return ['Crítica','Alta','Média','Baixa']}
function planoResponsaveis(){return ['L3A Engenharia','Brigada','Logista','Shopping','Terceiro / Fornecedor']}
function prioridadePeso(p){return {'Crítica':1,'Alta':2,'Média':3,'Baixa':4}[p]||9}
function isFalhaStatus(s){s=up(normalizeStatus(s));return s.includes('ABERT')||s.includes('CURTO')||s.includes('INCEND')||s.includes('DISPAR')}
// CORREÇÃO (bug reportado): esta era a definição de isFalhaStatus() que REALMENTE valia em todo o
// sistema (a última declaração de uma função sobrepõe as anteriores em JavaScript), e ela incluía
// erroneamente 'TESTE' e 'DESATIV' como falha. Por isso um lançamento em "Em teste" contabilizava
// como falha (abria Plano de Ação automaticamente, marcava equipamento/loja como falha no Dashboard,
// Relatório e telas de Painéis/Laços/Equipamentos). Agora só ABERT/CURTO/INCEND/DISPAR contam como
// falha — "Em teste" e "Desativação" continuam sendo lançamentos normais na tela de Falhas, só que
// contabilizados nos buckets corretos (isTesteStatus/isDesativadoStatus, dashStatusBucket), igual ao
// que o Dashboard já fazia. Nenhum outro comportamento foi alterado.
function itemInfoFromFalha(f){
  let isFlm=String(f.itemId||'').startsWith('flm:'), item=isFlm?flmById(String(f.itemId).slice(4)):db.equipamentos.find(e=>e.id===f.itemId);
  let localId=f.localId||item?.localId||'';
  const lacoId=f.lacoId||item?.lacoId||'';
  const pisoResolvido=pisoEfetivo({lacoId,piso:f.piso||item?.piso||''});
  return {painel:paiName(f.painelId||item?.painelId),laco:lacName(lacoId),piso:pisoResolvido,tipo:f.tipo||(isFlm?'Módulo':item?.tipo)||'',itemNome:f.itemNome||(isFlm?'Módulo ':'')+(item?.endereco||item?.modelo||''),local:locName(localId),localId,itemId:f.itemId||item?.id||'',falhaId:f.id||''}
}
function falhasAtivasParaPlano(){
  let map={}; db.falhas.slice().sort((a,b)=>String(a.data).localeCompare(String(b.data))).forEach(f=>{let k=f.itemId||f.localId||f.id; map[k]=f});
  return Object.values(map).filter(f=>isFalhaStatus(f.status));
}
function planoForFalha(fid){return db.planos.find(p=>p.falhaId===fid)}
function renderPlano(){
  let planos=db.planos||[];

  let falhas=falhasAtivasParaPlano();
  let rows=[];

  // 1) Planos já criados: nunca somem da base, mesmo concluídos.
  planos.forEach(p=>{
    let f=db.falhas.find(x=>x.id===p.falhaId)||{};
    let inf=f.id?itemInfoFromFalha(f):{};
    rows.push({
      origemLinha:'Plano',
      falhaId:p.falhaId||'',
      planoId:p.id,
      prioridade:p.prioridade||'Média',
      painel:inf.painel||p.painel||'',
      laco:inf.laco||p.laco||'',
      piso:inf.piso||p.piso||'',
      local:inf.local||p.local||'',
      itemNome:inf.itemNome||p.item||'',
      statusFalha:f.status||p.statusFalha||'',
      categoria:p.categoria||'',
      responsavel:p.responsavel||'',

      concluidoEm:p.concluidoEm||'',

      providencia:p.providencia||'',
      necessitaCompra:p.necessitaCompra?'Sim':'Não'
    });
  });

  // 2) Falhas ativas sem plano: aparecem para permitir criar plano.
  falhas.forEach(f=>{
    if(planoForFalha(f.id)) return;
    let inf=itemInfoFromFalha(f);
    rows.push({
      origemLinha:'Falha sem plano',
      falhaId:f.id,
      planoId:'',
      prioridade:'Média',
      painel:inf.painel||'',
      laco:inf.laco||'',
      piso:inf.piso||'',
      local:inf.local||'',
      itemNome:inf.itemNome||'',
      statusFalha:f.status||'',
      categoria:'',
      responsavel:'',
      desde:f.data||'',
      criadoEm:'',
      concluidoEm:'',
      situacao:'Sem plano',
      justificativa:f.motivo||f.obs||'',
      providencia:'',
      necessitaCompra:'Não'
    });
  });

  function inPeriodo(x){
    if(!ini&&!fim) return true;
    let datas=[x.desde,x.criadoEm,x.concluidoEm].filter(Boolean).map(String);
    return datas.some(d=>(!ini||d>=ini)&&(!fim||d<=fim+'T23:59'));
  }
  function situacaoPeso(s){return {'Sem plano':0,'Aberto':1,'Em andamento':2,'Concluído':3}[s]??9}
  let filtrados=rows.filter(x=>(!q||JSON.stringify(x).toUpperCase().includes(q))&&(!fcat||x.categoria===fcat)&&(!fprio||x.prioridade===fprio)&&(!fsit||x.situacao===fsit)&&(!fresp||x.responsavel===fresp)&&inPeriodo(x))
    .sort((a,b)=>situacaoPeso(a.situacao)-situacaoPeso(b.situacao)||prioridadePeso(a.prioridade)-prioridadePeso(b.prioridade)||String(a.desde||a.criadoEm).localeCompare(String(b.desde||b.criadoEm)));

  document.getElementById('plano').innerHTML=`
    <div class="card"><h3 class="sectionTitle">Filtros do Plano de Ação</h3><div class="toolbar"><div class="field"><label>Busca</label><input id="plBuscaPlano" placeholder="Loja, laço, item, motivo..." value="${esc(document.getElementById('plBuscaPlano')?.value||'')}"></div><div class="field"><label>Categoria</label><select id="plCat">${selectOpts(planoCategorias(),fcat)}</select></div><div class="field"><label>Prioridade</label><select id="plPrio">${selectOpts(planoPrioridades(),fprio)}</select></div><div class="field"><label>Situação</label><select id="plSit">${selectOpts(['Sem plano','Aberto','Em andamento','Concluído'],fsit)}</select></div><div class="field"><label>Responsável</label><select id="plResp">${selectOpts(planoResponsaveis(),fresp)}</select></div><div class="field"><label>Inicial</label><input id="plIni" type="date" value="${esc(ini)}"></div><div class="field"><label>Final</label><input id="plFim" type="date" value="${esc(fim)}"></div><button class="btn" onclick="renderPlano()">Filtrar</button></div><p class="msg warn">Planos concluídos permanecem registrados para relatório e rastreabilidade.</p></div>
    <div class="card"><h3 class="sectionTitle">Lançamentos e acompanhamento</h3>${table(filtrados,[['Prioridade','prioridade'],['Painel','painel'],['Laço','laco'],['Piso','piso'],['Loja / Área','local'],['Item','itemNome'],['Falha','statusFalha',r=>`<span class="pill ${statusClass(r.statusFalha)}">${esc(r.statusFalha)}</span>`],['Categoria','categoria'],['Responsável','responsavel'],['Desde','desde'],['Situação','situacao',r=>`<span class="pill ${r.situacao==='Concluído'?'ok':r.situacao==='Sem plano'?'warn':''}">${esc(r.situacao)}</span>`],['Concluído em','concluidoEm']],r=>`${r.planoId?`<button class="btn small secondary" onclick="formPlano('${r.planoId}')"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20l1-4.2L15.5 5.3a1.5 1.5 0 0 1 2.1 0l1.1 1.1a1.5 1.5 0 0 1 0 2.1L8.2 19 4 20Z"/><path d="M13.8 7 17 10.2"/></svg> Editar</button>`:`<button class="btn small" onclick="formPlano('', '${r.falhaId}')">+ Criar</button>`} ${r.planoId&&r.situacao!=='Concluído'?`<button class="btn small" onclick="concluirPlano('${r.planoId}')"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12.5 9 17l10.5-10.5"/></svg> Concluir</button>`:''}`)}</div>`;
  ['plBuscaPlano','plCat','plPrio','plSit','plResp','plIni','plFim'].forEach(id=>{let el=document.getElementById(id); if(el)el.onchange=renderPlano});
}

function reportData(){let ini=document.getElementById('repIni')?.value||'',fim=document.getElementById('repFim')?.value||'',painel=document.getElementById('repPainel')?.value||''; let fal=db.falhas.filter(f=>(!painel||paiName(f.painelId)===painel)&&(!ini||f.data>=ini)&&(!fim||f.data<=fim+'T23:59')); let lanc=fal.filter(f=>isFalhaStatus(f.status)).length; let resol=fal.filter(f=>up(f.status).includes('OPER')||f.resolvidaEm).length; let byPainel={}; db.paineis.filter(p=>!painel||p.nome===painel).forEach(p=>{byPainel[p.nome]={op:0,falha:0,tipos:{}}}); db.equipamentos.forEach(e=>{let pn=paiName(e.painelId); if(!byPainel[pn])return; let st=isFalhaStatus(e.status)?'falha':'op'; byPainel[pn][st]++; byPainel[pn].tipos[e.tipo]=(byPainel[pn].tipos[e.tipo]||{op:0,falha:0}); byPainel[pn].tipos[e.tipo][st]++}); db.flms.forEach(f=>{let pn=paiName(f.painelId); if(!byPainel[pn])return; let st=isFalhaStatus(f.status)?'falha':'op'; byPainel[pn][st]++; byPainel[pn].tipos['Módulo']=(byPainel[pn].tipos['Módulo']||{op:0,falha:0}); byPainel[pn].tipos['Módulo'][st]++}); return {ini,fim,painel,fal,lanc,resol,byPainel}}

function donutChart(ok,bad){let total=ok+bad,deg=total?Math.round((bad/total)*360):0;return `<div class="donutWrap"><div class="donut" style="--deg:${deg}deg"></div><div class="legend"><span><i class="dot ok"></i>Em operação: ${ok}</span><span><i class="dot bad"></i>Em falha: ${bad}</span><span>Total: ${total}</span></div></div>`}

function reportPlanoBlock(r){let ini=r.ini||'',fim=r.fim||'';let plans=(db.planos||[]).filter(p=>(!r.painel||p.painel===r.painel)&&(!ini||String(p.criadoEm||p.atualizadoEm)>=ini)&&(!fim||String(p.criadoEm||p.atualizadoEm)<=fim+'T23:59'));let ab=plans.filter(p=>p.situacao!=='Concluído').length, co=plans.filter(p=>p.situacao==='Concluído').length;let cat=planoCategorias().map(c=>({label:c,value:plans.filter(p=>p.categoria===c).length})).filter(x=>x.value);let pend=plans.filter(p=>p.situacao!=='Concluído').sort((a,b)=>prioridadePeso(a.prioridade)-prioridadePeso(b.prioridade)||String(a.criadoEm).localeCompare(String(b.criadoEm))).slice(0,20);return `<div class="reportBlock"><h3>Plano de Ação</h3><div class="grid">${kpi('Planos criados',plans.length)}${kpi('Planos concluídos',co)}${kpi('Planos em aberto',ab)}${kpi('Pendências críticas',plans.filter(p=>p.prioridade==='Crítica'&&p.situacao!=='Concluído').length)}</div><div class="chartGrid"><div class="chartPanel"><h4>Plano por categoria</h4>${chartBarRows(cat,Math.max(1,...cat.map(x=>x.value)))}</div><div class="chartPanel"><h4>Situação dos planos</h4>${chartBarRows([{label:'Aberto',value:plans.filter(p=>p.situacao==='Aberto').length},{label:'Em andamento',value:plans.filter(p=>p.situacao==='Em andamento').length},{label:'Concluído',value:co,cls:'ok'}],Math.max(1,plans.length))}</div></div><h4>Pendências abertas</h4>${table(pend,[['Prioridade','prioridade'],['Local','local'],['Item','item'],['Categoria','categoria'],['Responsável','responsavel'],['Situação','situacao'],['Criado em','criadoEm']])}</div>`}

function drawReport(){let r=reportData(); let geral=Object.values(r.byPainel).reduce((a,d)=>{a.op+=d.op;a.falha+=d.falha;Object.entries(d.tipos).forEach(([t,v])=>{a.tipos[t]=a.tipos[t]||{op:0,falha:0};a.tipos[t].op+=(v.op||0);a.tipos[t].falha+=(v.falha||0)});return a},{op:0,falha:0,tipos:{}});let maxPain=Math.max(1,...Object.values(r.byPainel).map(d=>d.op+d.falha));let painelChart=chartBarRows(Object.entries(r.byPainel).map(([pn,d])=>({label:pn,value:d.op+d.falha})),maxPain);let tipoRows=Object.entries(geral.tipos).map(([t,v])=>({label:t,value:(v.op||0)+(v.falha||0)}));let tipoChart=chartBarRows(tipoRows,Math.max(1,...tipoRows.map(x=>x.value)));let painBlocks=Object.entries(r.byPainel).map(([pn,d])=>{let lacos=db.lacos.filter(l=>paiName(l.painelId)===pn).map(l=>{let eq=db.equipamentos.filter(e=>e.lacoId===l.id);let fl=db.flms.filter(f=>f.lacoId===l.id);let tipos={}; eq.forEach(e=>{tipos[e.tipo]=tipos[e.tipo]||{op:0,falha:0}; tipos[e.tipo][isFalhaStatus(e.status)?'falha':'op']++}); fl.forEach(f=>{tipos['Módulo']=tipos['Módulo']||{op:0,falha:0}; tipos['Módulo'][isFalhaStatus(f.status)?'falha':'op']++});let totalL=Object.values(tipos).reduce((a,v)=>a+(v.op||0)+(v.falha||0),0);let falhaL=Object.values(tipos).reduce((a,v)=>a+(v.falha||0),0);return `<div class="reportBlock"><b>${esc(l.nome)} — ${totalL} itens / ${falhaL} em falha</b><div class="premiumTable">${table(Object.entries(tipos).map(([t,v])=>({tipo:t,operacao:v.op||0,falha:v.falha||0,total:(v.op||0)+(v.falha||0)})),[['Tipo','tipo'],['Em operação','operacao'],['Falha','falha'],['Total','total']])}</div></div>`}).join('');let rowsTipo=Object.entries(d.tipos).map(([t,v])=>({tipo:t,operacao:v.op||0,falha:v.falha||0,total:(v.op||0)+(v.falha||0)}));return `<div class="reportBlock"><h3>${esc(pn)}</h3><div class="miniChart"><div class="chartCard"><h4>Em operação</h4><b>${d.op}</b></div><div class="chartCard"><h4>Em falha</h4><b>${d.falha}</b></div><div class="chartCard"><h4>Disponibilidade</h4><b>${pct(d.op,d.op+d.falha)}%</b></div></div><div class="chartPanel"><h4>Status do painel</h4>${donutChart(d.op,d.falha)}</div><h4>Compilado por tipo</h4><div class="premiumTable">${table(rowsTipo,[['Tipo','tipo'],['Em operação','operacao'],['Falha','falha'],['Total','total']])}</div><h4>Por laço</h4>${lacos}</div>`}).join('');document.getElementById('reportOut').innerHTML=`<div class="card"><div class="reportCover"><h2>Relatório Técnico L3A</h2><p>L3A Engenharia • Diagnóstico operacional do sistema de detecção e alarme de incêndio</p><div class="reportMeta"><span>Período: ${esc(r.ini||'início')} até ${esc(r.fim||'atual')}</span><span>Painel: ${esc(r.painel||'Todos')}</span><span>Gerado em: ${now()}</span></div></div><div class="grid">${kpi('Falhas lançadas no período',r.lanc)}${kpi('Falhas resolvidas no período',r.resol)}${kpi('Itens em operação',geral.op)}${kpi('Itens em falha',geral.falha)}${kpi('Disponibilidade',pct(geral.op,geral.op+geral.falha)+'%')}${kpi('Total avaliado',geral.op+geral.falha)}</div><div class="chartGrid"><div class="chartPanel"><h4>Status geral do sistema</h4>${donutChart(geral.op,geral.falha)}</div><div class="chartPanel"><h4>Dispositivos por tipo</h4>${tipoChart}</div><div class="chartPanel"><h4>Total por painel</h4>${painelChart}</div><div class="chartPanel"><h4>Movimentação no período</h4>${chartBarRows([{label:'Falhas lançadas',value:r.lanc,cls:'bad'},{label:'Falhas resolvidas',value:r.resol,cls:'ok'}],Math.max(1,r.lanc,r.resol))}</div></div><div class="reportBlock"><h3>Compilado geral por tipo</h3><div class="premiumTable">${table(Object.entries(geral.tipos).map(([t,v])=>({tipo:t,operacao:v.op||0,falha:v.falha||0,total:(v.op||0)+(v.falha||0)})),[['Tipo','tipo'],['Em operação','operacao'],['Falha','falha'],['Total','total']])}</div></div>${painBlocks}${reportPlanoBlock(r)}<div class="reportBlock"><h3>Conclusão técnica</h3><p>Relatório compilado sem listagem nominal de todas as lojas, priorizando indicadores por painel, laço, tipo de dispositivo e status operacional. A base segue a estrutura Empreendimento → Painel → Laço → FLM físico → Porta → Loja/Área → Equipamentos → Histórico de falhas.</p></div><div class="reportFooter"><span>L3A Engenharia</span><span>Documento técnico gerado pelo SDAI Bosch Manager</span></div></div>`}


function currentUserId(){return localStorage.getItem(KEY+':currentUserId') || ''}
function ensureDefaultUsers(){
  db.usuarios=db.usuarios||[];
  const jaTeveUsuarios=localStorage.getItem(KEY+':usersEverExisted')==='1';
  if(!db.usuarios.length){
    if(jaTeveUsuarios&&!window._avisoUsuariosVazioMostrado){
      window._avisoUsuariosVazioMostrado=true;
      alert('ATENÇÃO: a lista de usuários está vazia, mas este sistema já teve usuários cadastrados antes. Isso indica que a base carregou incompleta (falha de sincronização ou armazenamento cheio). Um Administrador temporário (admin@local / 1234) foi criado para você conseguir entrar — recomenda-se ir em Sistema → Banco de Dados → "Carregar base Google" para recuperar os usuários reais antes de continuar usando o sistema.');
    }
    db.usuarios.push({id:'admin-default',nome:'Administrador',email:'admin@local',perfil:'Administrador',senha:'1234',ativo:'Sim',criadoEm:isoNow()});
  }
  if(db.usuarios.length)localStorage.setItem(KEY+':usersEverExisted','1');
  db.usuarios.forEach(u=>{if(!u.senha)u.senha='1234'; if(!u.ativo)u.ativo='Sim'});
}
function isLoggedIn(){return !!currentUserId() && (db.usuarios||[]).some(u=>u.id===currentUserId()&&u.ativo!=='Não')}
function currentUser(){ensureDefaultUsers(); let u=(db.usuarios||[]).find(x=>x.id===currentUserId()) || (db.usuarios||[])[0]; return u||{id:'admin-default',nome:'Administrador',email:'admin@local',perfil:'Administrador',senha:'1234',ativo:'Sim'}}
function showLogin(){ensureDefaultUsers(); const ls=document.getElementById('loginScreen'); if(ls)ls.classList.add('show'); const lt=document.getElementById('loginTitle'); if(lt)lt.textContent=(db.config&&db.config.appName)||'Contratos L3A'; const logo=document.getElementById('loginLogo'); if(logo){if(db.config&&db.config.logoData){logo.style.backgroundImage=`url(${db.config.logoData})`;logo.style.backgroundSize='cover';logo.textContent=''}else{logo.style.backgroundImage='';logo.textContent='L3A'}}}
function hideLogin(){const ls=document.getElementById('loginScreen'); if(ls)ls.classList.remove('show')}
async function login(){ensureDefaultUsers(); const user=n(document.getElementById('loginUser').value).toLowerCase(); const pass=n(document.getElementById('loginPass').value); const u=(db.usuarios||[]).find(x=>x.ativo!=='Não' && (String(x.email||'').toLowerCase()===user || String(x.nome||'').toLowerCase()===user)); const msg=document.getElementById('loginMsg'); if(!u||!(await senhaConfere(pass,u.senha))){if(msg){msg.style.display='block';msg.textContent='Usuário ou senha inválidos.'}return} if(!looksHashed(u.senha)){u.senha=await sha256Hex(pass); markDirty('migração de senha para hash')} localStorage.setItem(KEY+':currentUserId',u.id); if(!document.getElementById('loginRemember').checked) sessionStorage.setItem(KEY+':sessionOnly','1'); hideLogin(); logLocal('Sessão',u.id,'login','Usuário entrou no sistema'); render()}
function logout(){const u=currentUser(); localStorage.removeItem(KEY+':currentUserId'); sessionStorage.removeItem(KEY+':sessionOnly'); document.getElementById('userMenu')?.classList.remove('show'); logLocal('Sessão',u.id,'logout','Usuário saiu do sistema'); showLogin(); render()}
function toggleUserMenu(){document.getElementById('userMenu')?.classList.toggle('show')}
function openMeuPerfil(){const u=currentUser(); openModal(`<h2>Meu Perfil</h2><div class="formGrid"><div class="field"><label>Nome</label><input id="pfNome" value="${esc(u.nome)}"></div><div class="field"><label>E-mail</label><input id="pfEmail" value="${esc(u.email)}"></div><div class="field"><label>Perfil</label><input value="${esc(u.perfil)}" disabled></div></div><br><button class="btn" onclick="saveMeuPerfil()">Salvar perfil</button> <button class="btn secondary" onclick="closeModal()">Cancelar</button>`); document.getElementById('userMenu')?.classList.remove('show')}
function saveMeuPerfil(){let u=currentUser();u.nome=n(pfNome.value);u.email=n(pfEmail.value);closeModal();markDirty('perfil');render()}
function openAlterarSenha(){openModal(`<h2>Alterar Senha</h2><div class="formGrid"><div class="field"><label>Senha atual</label><input id="pwOld" type="password"></div><div class="field"><label>Nova senha</label><input id="pwNew" type="password"></div><div class="field"><label>Confirmar nova senha</label><input id="pwNew2" type="password"></div></div><br><button class="btn" onclick="saveSenha()">Alterar senha</button> <button class="btn secondary" onclick="closeModal()">Cancelar</button>`); document.getElementById('userMenu')?.classList.remove('show')}
async function saveSenha(){let u=currentUser(); if(!(await senhaConfere(n(pwOld.value),u.senha))){alert('Senha atual inválida.');return} if(!n(pwNew.value)||n(pwNew.value)!==n(pwNew2.value)){alert('Confirmação de senha não confere.');return} u.senha=await sha256Hex(n(pwNew.value));closeModal();markDirty('senha');alert('Senha alterada.')}
function logLocal(entidade,entidadeId,acao,descricao){db.historico=db.historico||[];db.historico.push({id:id(),data:isoNow(),usuario:(currentUser().email||currentUser().nome||'usuario'),entidade,entidadeId,acao,descricao}); if(db.historico.length>1000)db.historico=db.historico.slice(-1000); persistLocal()}
function perfilAtual(){return currentUser().perfil||'Administrador'}
function can(action){const p=perfilAtual(); if(p==='Administrador')return true; if(p==='Supervisor')return !['importar','cadastro'].includes(action); if(p==='Operacional')return ['operacao','status','planoStatus','visualizar'].includes(action); return false}
function requireAccess(action,msg){if(can(action))return true; alert(msg||'Seu perfil não possui permissão para esta ação.'); return false}
function applyBrand(){const cfg=db.config||{}; const name=cfg.appName||'Contratos L3A'; const sub=cfg.subtitle||'Gestão operacional • SDAI'; const logo=cfg.logoData||''; const bn=document.getElementById('brandName'), bs=document.getElementById('brandSub'), bl=document.getElementById('brandLogo'); if(bn)bn.textContent=name; if(bs)bs.textContent=sub; if(bl){ if(logo){bl.classList.add('hasImg'); bl.style.backgroundImage=`url(${logo})`; bl.textContent='';} else {bl.classList.remove('hasImg'); bl.style.backgroundImage=''; bl.textContent='L3A';}} const pb=document.getElementById('profileBadge'); const u=currentUser(); if(pb){pb.innerHTML=`<b>${esc(u.nome||'Usuário')}</b><span>${esc(u.perfil||'Administrador')} • Online</span>`} const tu=document.getElementById('topUser'); if(tu){tu.setAttribute('onclick','toggleUserMenu()');tu.innerHTML=`<span class="avatar">${esc((u.nome||'U').slice(0,1).toUpperCase())}</span><span class="uText"><b>${esc(u.nome||'Usuário')}</b><small>${esc(u.perfil||'Administrador')}</small></span>`}}
function applyRoleUI(){const p=perfilAtual(); document.querySelectorAll('[data-role-action]').forEach(el=>{const a=el.dataset.roleAction; const ok=can(a); el.classList.toggle('disabledByRole',!ok); el.title=ok?'':'Sem permissão para '+a});}
function logoToBase64(file){return new Promise((res,rej)=>{const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file)})}
async function saveIdentity(){db.config=db.config||{}; db.config.appName=n(document.getElementById('cfgAppName').value)||'Contratos L3A'; db.config.subtitle=n(document.getElementById('cfgSub').value)||'SDAI • Contratos • Operação'; const f=document.getElementById('cfgLogo').files[0]; if(f) db.config.logoData=await logoToBase64(f); markDirty('identidade'); render();}

function addUser(){if(currentUser().perfil!=='Administrador'){alert('Somente administrador pode cadastrar usuários.');return} openModal(`<h2>Novo usuário</h2><div class="formGrid"><div class="field"><label>Nome</label><input id="uNome"></div><div class="field"><label>E-mail / login</label><input id="uEmail" placeholder="nome@empresa.com"></div><div class="field"><label>Perfil</label><select id="uPerfil"><option>Administrador</option><option>Supervisor</option><option>Operacional</option></select></div><div class="field"><label>Senha inicial</label><input id="uSenha" type="password" placeholder="Defina a senha"></div><div class="field"><label>Ativo</label><select id="uAtivo"><option>Sim</option><option>Não</option></select></div></div><br><button class="btn" onclick="saveUser('')">Salvar usuário</button> <button class="btn secondary" onclick="closeModal()">Cancelar</button>`)}
function editUser(i){if(currentUser().perfil!=='Administrador'){alert('Somente administrador pode editar usuários.');return} let u=(db.usuarios||[]).find(x=>x.id===i)||{}; openModal(`<h2>Editar usuário</h2><div class="formGrid"><div class="field"><label>Nome</label><input id="uNome" value="${esc(u.nome)}"></div><div class="field"><label>E-mail / login</label><input id="uEmail" value="${esc(u.email)}"></div><div class="field"><label>Perfil</label><select id="uPerfil">${['Administrador','Supervisor','Operacional'].map(p=>`<option ${u.perfil===p?'selected':''}>${p}</option>`).join('')}</select></div><div class="field"><label>Nova senha</label><input id="uSenha" type="password" placeholder="Deixe em branco para manter"></div><div class="field"><label>Ativo</label><select id="uAtivo"><option ${u.ativo!=='Não'?'selected':''}>Sim</option><option ${u.ativo==='Não'?'selected':''}>Não</option></select></div></div><br><button class="btn" onclick="saveUser('${i}')">Salvar usuário</button> <button class="btn secondary" onclick="closeModal()">Cancelar</button>`)}
function saveUser(i){let u=i?(db.usuarios||[]).find(x=>x.id===i):{id:id(),criadoEm:isoNow()}; u.nome=n(uNome.value);u.email=n(uEmail.value);u.perfil=uPerfil.value;u.ativo=uAtivo.value; if(n(uSenha.value))u.senha=n(uSenha.value); if(!u.senha)u.senha='1234'; if(!i){db.usuarios=db.usuarios||[];db.usuarios.push(u)} closeModal(); markDirty('usuários'); render()}
function delUser(i){if(!requireAccess('cadastro','Somente administrador pode excluir usuários.'))return; if(!confirm('Excluir usuário?'))return; db.usuarios=(db.usuarios||[]).filter(x=>x.id!==i); markDirty('usuários'); render()}
function renderUsuarios(){const el=document.getElementById('usuarios'); if(!el)return; const us=db.usuarios||[]; el.innerHTML=`<div class="card"><h3 class="sectionTitle">Controle de acesso</h3><div class="grid">${kpi('Usuários',us.length)}${kpi('Administradores',us.filter(u=>u.perfil==='Administrador').length)}${kpi('Supervisores',us.filter(u=>u.perfil==='Supervisor').length)}${kpi('Operacionais',us.filter(u=>u.perfil==='Operacional').length)}</div><p class="msg warn">Cada usuário possui login e senha. O acesso ao sistema exige autenticação local; os perfis limitam alterações cadastrais, importação e operação.</p><button class="btn" onclick="addUser()" data-role-action="cadastro">+ Criar usuário</button></div><div class="card"><h3 class="sectionTitle">Perfis de acesso</h3><div class="userGrid"><div class="accessCard"><h4>Administrador</h4><p class="accessMuted">Acesso total: usuários, banco, importação, cadastros, operação e relatórios.</p></div><div class="accessCard"><h4>Supervisor</h4><p class="accessMuted">Consulta e operação geral. Não importa base, não exclui e não altera cadastro técnico.</p></div><div class="accessCard"><h4>Operacional</h4><p class="accessMuted">Atualiza status, registra falhas, observações e conclui plano de ação. Não altera cadastros.</p></div></div></div><div class="card"><h3 class="sectionTitle">Usuários cadastrados</h3>${table(us,[['Nome','nome'],['E-mail / login','email'],['Perfil','perfil'],['Ativo','ativo']],u=>`<button class="btn small secondary" onclick="editUser('${u.id}')"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20l1-4.2L15.5 5.3a1.5 1.5 0 0 1 2.1 0l1.1 1.1a1.5 1.5 0 0 1 0 2.1L8.2 19 4 20Z"/><path d="M13.8 7 17 10.2"/></svg></button> <button class="btn small danger" onclick="delUser('${u.id}')"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7h14M9.5 7V5a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1v2"/><path d="M6.5 7 7.3 19a1.5 1.5 0 0 0 1.5 1.4h6.4a1.5 1.5 0 0 0 1.5-1.4L17.5 7"/><path d="M10 11v6M14 11v6"/></svg></button>`)}</div>`}

async function readRows(){let f=document.getElementById('fileImp').files[0]; if(!f)throw new Error('Selecione um arquivo.'); let ext=f.name.split('.').pop().toLowerCase(); let data=await f.arrayBuffer(); if(ext==='csv'){let txt=new TextDecoder('utf-8').decode(data); return parseCSV(txt)} if(typeof XLSX==='undefined')throw new Error('Biblioteca XLSX não carregada. Para XLS/XLSX, abra com internet ou use CSV.'); let wb=XLSX.read(data,{type:'array'}); let rows=[]; wb.SheetNames.forEach(sn=>{rows=rows.concat(XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:''}))}); return rows}
function parseCSV(txt){let sep=(txt.split('\n')[0].match(/;/g)||[]).length>=(txt.split('\n')[0].match(/,/g)||[]).length?';':','; let lines=txt.split(/\r?\n/).filter(x=>x.trim()); if(!lines.length)return []; let headers=splitCSV(lines[0],sep); return lines.slice(1).map(l=>{let vals=splitCSV(l,sep),o={};headers.forEach((h,i)=>o[h]=vals[i]||'');return o})}
function splitCSV(line,sep){let out=[],cur='',q=false; for(let i=0;i<line.length;i++){let ch=line[i]; if(ch==='"'){if(q&&line[i+1]==='"'){cur+='"';i++}else q=!q}else if(ch===sep&&!q){out.push(cur);cur=''}else cur+=ch} out.push(cur); return out}

function validateRows(rows){let errors=[]; if(!rows.length)errors.push({linha:0,motivo:'Arquivo vazio',registro:''}); let cols=Object.keys(rows[0]||{}).map(normKey); ['PAINEL','LACO','TIPO','MODELO'].forEach(c=>{if(!cols.some(x=>x.includes(c)))errors.push({linha:1,motivo:'Coluna obrigatória ausente: '+c,registro:Object.keys(rows[0]||{}).join(', ')})}); return {ok:!errors.length,errors}}
async function importFile(){try{let rows=await readRows(); let mode=document.getElementById('modeImp').value; let v=validateRows(rows); if(!v.ok)throw new Error(v.errors.map(e=>e.motivo).join(' | ')); if(mode==='replace')db=emptyDB(); let stats={registrosLidos:rows.length,paineis:0,lacos:0,flms:0,portas:0,lojasCriadas:0,areasTecnicas:0,areasComuns:0,detectores:0,acionadores:0,modulos:0,ignorados:0,desativadosNaoEncontrados:0}; let errors=[],rom={ok:false,msg:'Não localizada no arquivo.'}; const equipIdsTocados=new Set(),flmIdsTocados=new Set(),paineisTocados=new Set(); rows.forEach((r,i)=>{let linha=i+2; try{let painel=get(r,['Painel','Central']); let laco=get(r,['Laço','Laco','Loop']); let piso=get(r,['Piso','Pavimento']); let endFlm=get(r,['Endereço FLM','Endereco FLM','FLM','Módulo','Modulo']); let porta=get(r,['Porta','Canal','Porta / Ligação','Porta Ligação']); let loja=get(r,['Loja','Local','Área','Area','Ambiente']); let tipo=get(r,['Tipo','Classificação','Classificacao']); let modelo=get(r,['Modelo','Dispositivo','Nome do dispositivo']); let endereco=get(r,['Endereço','Endereco','Zona','Endereço Equipamento']); let fab=get(r,['Fabricante']); let status=normalizeStatus(get(r,['Status'])||'Em operação'); let obs=get(r,['Observação','Observacao','Obs']); if(!painel||!laco){stats.ignorados++; errors.push({linha,motivo:'Painel ou laço ausente',registro:JSON.stringify(r)}); return} let p0=db.paineis.length,l0=db.lacos.length,f0=db.flms.length,pt0=db.portas.length,loc0=db.locais.length; let p=ensurePanel(painel); paineisTocados.add(p.id); let l=ensureLaco(p.id,laco,piso); const pisoResolvido=n(l.piso)||piso; const sistemaResolvido=l.sistema||sistemaAutoDetect(l.nome); stats.paineis+=db.paineis.length>p0?1:0; stats.lacos+=db.lacos.length>l0?1:0; let classe=classifyDevice(modelo,tipo,loja); let isModulo=classe==='Módulo'; let flm=null,portaObj=null,local=null; if(isModulo||endFlm){flm=ensureFlm(p.id,l.id,endFlm||endereco||modelo,modelo||'FLM',pisoResolvido); flmIdsTo       }catch(e){stats.ignorados++; errors.push({linha,motivo:e.message,registro:JSON.stringify(r)})}});

      if(mode!=='replace'){
        db.equipamentos.forEach(e=>{
          if(paineisTocados.has(e.painelId)&&!equipIdsTocados.has(e.id)&&!up(e.status||'').includes('DESATIV')){
            const statusAnterior=e.status; e.status='Desativação'; e.ultimaAlteracao=isoNow();
            const recDesat={id:id(),data:isoNow(),painelId:e.painelId,lacoId:e.lacoId,piso:e.piso,tipo:e.tipo,itemId:e.id,itemNome:(e.tipo||'')+' '+(e.endereco||e.modelo||''),localId:e.localId,status:'Desativação',statusAnterior,responsavel:'',origem:'Importação',motivo:'Não encontrado na última importação técnica — pode ter sido removido fisicamente na central',obs:''};

function formLocal(i=''){if(!requireAccess('cadastro','Seu perfil não pode criar/editar lojas/áreas.'))return; let o=db.locais.find(x=>x.id===i)||{};openModal(`<h2>${i?'Editar':'Nova'} Loja / Área</h2><div class="formGrid"><div class="field"><label>Nome</label><input id="mNome" value="${esc(o.nome)}"></div><div class="field"><label>Classificação</label><select id="mTipo"><option ${o.tipo==='Loja'?'selected':''}>Loja</option><option ${o.tipo==='Área Técnica'?'selected':''}>Área Técnica</option><option ${o.tipo==='Área Comum'?'selected':''}>Área Comum</option></select></div><div class="field"><label>Piso</label><input id="mPiso" value="${esc(o.piso)}"></div><div class="field"><label>Status</label><select id="mStatus">${STATUS_SISTEMA_OPTIONS.map(st=>`<option ${normalizeStatus(o.status)===st?'selected':''}>${st}</option>`).join('')}</select></div></div><br><button class="btn" onclick="saveLocal('${i}')">Salvar</button>`)}

function saveEquip(i){let o=i?db.equipamentos.find(x=>x.id===i):{id:id(),ultimaAlteracao:isoNow()}; o.painelId=mPainel.value;o.lacoId=mLaco.value;o.tipo=n(mTipo.value);o.endereco=n(mEnd.value);o.modelo=n(mModelo.value);o.piso=n(mPiso.value);o.localId=mLocal.value;o.status=normalizeStatus(mStatus.value);o.ultimaAlteracao=isoNow(); if(!i)db.equipamentos.push(o);closeModal();save()}
function falhaItems(){
  const eq=db.equipamentos.map(e=>({id:e.id,n:`${e.tipo} • ${e.endereco||'sem endereço'} • ${locName(e.localId)||'Sem vínculo'}`,tipo:e.tipo,painelId:e.painelId,lacoId:e.lacoId,piso:e.piso,localId:e.localId,kind:'equip'}));
  const fl=[];
  db.flms.forEach(f=>{
    const ps=db.portas.filter(p=>p.flmId===f.id);
    if(ps.length){
      // Uma entrada por PORTA — evita ambiguidade de qual loja a falha se refere.
      ps.forEach(p=>{
        fl.push({id:'flm:'+f.id+':porta:'+p.id,n:`Módulo ${f.endereco||f.modelo||'S/E'} • Porta ${p.numero} • ${locName(p.localId)||'Sem vínculo'}`,tipo:'Módulo',painelId:f.painelId,lacoId:f.lacoId,piso:f.piso,localId:p.localId||'',portaId:p.id,kind:'flm'});
      });
    } else {
      fl.push({id:'flm:'+f.id,n:`Módulo • ${f.endereco||f.modelo||'sem endereço'} • Sem portas cadastradas`,tipo:'Módulo',painelId:f.painelId,lacoId:f.lacoId,piso:f.piso,localId:'',kind:'flm'});
    }
  });
  return eq.concat(fl);
}

  const fl=db.flms.filter(fl=>(!f.painel||paiName(fl.painelId)===f.painel)&&(!f.laco||lacName(fl.lacoId)===f.laco)).map(fl=>({value:'flm:'+fl.id,label:`Módulo ${fl.endereco||fl.modelo||'S/E'}`})).sort((a,b)=>a.label.localeCompare(b.label,'pt-BR'));

function falhaPortasParaModulo(flmId){return db.portas.filter(p=>p.flmId===flmId)}
function onFalhaDispositivoChange(){
  const sel=document.getElementById('mFiltroDispositivo'); if(!sel)return;
  const v=sel.value; const portaWrap=document.getElementById('mFiltroPortaWrap'); const portaSel=document.getElementById('mFiltroPorta');
  if(!v){if(portaWrap)portaWrap.style.display='none'; return}
  if(v.startsWith('eq:')){
    if(portaWrap)portaWrap.style.display='none';
    selecionarItemDireto(v.slice(3));
    return;
  }
  const flmId=v.slice(4);
  const portas=falhaPortasParaModulo(flmId);
  if(!portas.length){
    if(portaWrap)portaWrap.style.display='none';
    selecionarItemDireto('flm:'+flmId);
    return;
  }
  if(portaWrap)portaWrap.style.display='';
  if(portaSel)portaSel.innerHTML='<option value="">Selecione a porta...</option>'+portas.map(p=>`<option value="${p.id}">Porta ${p.numero}${locName(p.localId)?' • '+esc(locName(p.localId)):''}</option>`).join('');
}
function onFalhaPortaChange(){
  const flmSel=document.getElementById('mFiltroDispositivo'); const portaSel=document.getElementById('mFiltroPorta');
  if(!flmSel||!portaSel||!portaSel.value)return;

function getFalhaFilterValues(){return {
  painel:document.getElementById('mFiltroPainel')?.value||'',
  laco:document.getElementById('mFiltroLaco')?.value||'',
  piso:document.getElementById('mFiltroPiso')?.value||'',
  local:document.getElementById('mFiltroLocal')?.value||'',
  item:document.getElementById('mItem')?.value||''
}}
function itemMatchesFalhaFilters(it,f){
  if(f.painel && paiName(it.painelId)!==f.painel)return false;
  if(f.laco && lacName(it.lacoId)!==f.laco)return false;
  if(f.piso && n(it.piso)!==f.piso)return false;
  if(f.local && it.localId!==f.local)return false;
  return true;
}
function falhaFilteredItems(ignoreField=''){
  const f=getFalhaFilterValues(); if(ignoreField)f[ignoreField]='';
  return falhaItems().filter(it=>itemMatchesFalhaFilters(it,f));
}
function fmtDataHoraTexto(raw){
  if(!raw)return '';
  const d=new Date(raw); if(isNaN(d.getTime()))return raw;
  const dd=String(d.getDate()).padStart(2,'0'),mm=String(d.getMonth()+1).padStart(2,'0'),yy=String(d.getFullYear()).slice(-2);
  const hh=String(d.getHours()).padStart(2,'0'),mi=String(d.getMinutes()).padStart(2,'0');
  return `${dd}/${mm}/${yy} ${hh}:${mi}`;
}
function findFalhaAbertaPorItem(itemId,ignoreId=''){return itemId?db.falhas.find(x=>x.itemId===itemId&&x.id!==ignoreId):null}

function quickStatusChange(itemSel,newStatus){
  const isFlm=itemSel.startsWith('flm:');
  const flmId=isFlm?itemSel.split(':')[1]:'';
  const portaId=isFlm&&itemSel.includes(':porta:')?itemSel.split(':porta:')[1]:'';
  const flm=isFlm?flmById(flmId):null;
  const porta=portaId?db.portas.find(p=>p.id===portaId):null;
  const equip=!isFlm?db.equipamentos.find(x=>x.id===itemSel):null;
  const alvo=porta||flm||equip; if(!alvo)return;
  const statusAnterior=alvo.status||'Em operação';
  alvo.status=newStatus; alvo.ultimaAlteracao=isoNow();
  if(porta&&flm)flm.status=flmStatusAgregado(flm.id);
  if(newStatus!=='Em operação'){
    // CORREÇÃO: antes disparava só quando isFalhaStatus(newStatus) era verdadeiro — e a versão de
    // isFalhaStatus() que valia (ver correção acima) tratava "Em teste"/"Desativação" como falha.
    // Trocado para "qualquer status diferente de Em operação" para manter EXATAMENTE o mesmo
    // comportamento de antes (lançamento continua sendo criado e aparecendo em Falhas para
    // Em teste/Desativação também) — só a contagem de falha em si é que ficou correta agora.
    const existente=findFalhaAbertaPorItem(itemSel);
    if(existente){save();formFalha(existente.id);return}
    const localId=porta?.localId||equip?.localId||'';
    const painelId=isFlm?flm.painelId:equip.painelId;
    const lacoId=isFlm?flm.lacoId:equip.lacoId;
    const piso=isFlm?flm.piso:equip.piso;
    const itemNome=isFlm?`Módulo ${flm.endereco||flm.modelo}${porta?' • Porta '+porta.numero:''}`:(equip.endereco||equip.modelo);
    const rec={id:id(),data:isoNow(),painelId,lacoId,piso,tipo:isFlm?'Módulo':equip.tipo,itemId:itemSel,itemNome,localId,status:newStatus,statusAnterior,responsavel:'',origem:'Inspeção',motivo:'',obs:'',resolvidaEm:''};
    db.falhas.push(rec);
    if(!db.planos.find(p=>p.falhaId===rec.id)){db.planos.push({id:id(),falhaId:rec.id,criadoEm:isoNow(),categoria:'Manutenção corretiva',prioridade:'Média',responsavel:'L3A Engenharia',situacao:'Aberto',painel:paiName(painelId),laco:lacName(lacoId),piso,local:locName(localId),item:itemNome,statusFalha:newStatus,justificativa:'',providencia:'',necessitaCompra:false})}
    save();
    formFalha(rec.id);
  } else {
    save();render();
  }
}
function falhaSelectItem(itemId,editingId=''){
  const item=falhaItems().find(x=>x.id===itemId);
  const hid=document.getElementById('mItem');
  const box=document.getElementById('mItemConfirm');
  if(!box)return;
  if(!item){if(hid)hid.value='';box.innerHTML='<span class="mutedLine">Nenhum item selecionado ainda — digite acima para buscar ou use os campos Central / Laço / Dispositivo / Porta abaixo.</span>';return}
  const dup=findFalhaAbertaPorItem(itemId,editingId);
  if(dup){
    if(hid)hid.value=''; // impede salvar como novo lançamento duplicado
    box.innerHTML=`<div class="msg warn" style="margin-bottom:8px">Este item já tem um lançamento registrado — <b>${esc(normalizeStatus(dup.status))}</b> em ${fmtDataHora(dup.data)}. Não é permitido duplicar; edite o status do lançamento existente.</div><button type="button" class="btn small" onclick="formFalha('${dup.id}')">Abrir e editar este lançamento</button>`;
    return;
  }
  if(hid)hid.value=itemId||'';
  box.innerHTML=`<div class="check" style="width:100%;justify-content:flex-start;gap:10px"><span class="pill ok">Selecionado</span><b>${esc(item.n)}</b></div><p class="mutedLine" style="margin-top:6px">${esc(paiName(item.painelId)||'—')} · ${esc(lacName(item.lacoId)||'—')} · Piso ${esc(item.piso||'—')}</p>`;
  // Auto-preenche Central, Laço, Piso e Loja com base no item selecionado
  const painelNome=paiName(item.painelId)||'';
  const lacoNome=lacName(item.lacoId)||'';
  const pisoVal=item.piso||'';
  const localVal=item.localId||'';
  // Atualiza os filtros do modal sem disparar refresh (para não perder a seleção)
  const setSelect=(id,val)=>{const el=document.getElementById(id);if(!el)return;const opt=[...el.options].find(o=>o.value===val);if(opt)el.value=val;};
  setSelect('mFiltroPainel',painelNome);
  setSelect('mFiltroLaco',lacoNome);
  setSelect('mFiltroPiso',pisoVal);
  setSelect('mFiltroLocal',localVal);
  // Dispara refresh pra popular dispositivo/porta com os valores do item
  setTimeout(()=>refreshFalhaFilters('laco'),0);
}
function falhaSearchPool(){return falhaFilteredItems()}
function onFalhaSearchInput(){
  const inputEl=document.getElementById('mItemSearch'); if(!inputEl)return;
  const q=up(inputEl.value);
  const pool=falhaSearchPool();
  const matches=q?pool.filter(it=>up(it.n).includes(q)):pool;
  const list=document.getElementById('mItemDatalist');
  if(list)list.innerHTML=matches.slice(0,40).map(it=>`<option value="${esc(it.n)}"></option>`).join('');
  const hint=document.getElementById('mFalhaHint'); if(hint)hint.textContent=`${matches.length} item(ns) encontrado(s)${q?' para "'+inputEl.value+'"':''}.`;
  const exact=pool.find(it=>it.n===inputEl.value);
  const editingId=document.getElementById('mEditingId')?.value||'';
  falhaSelectItem(exact?exact.id:'',editingId);
}
function refreshFalhaFilters(changed=''){
  const f=getFalhaFilterValues();
  const fill=(id,vals,sel,allLabel='Todos')=>{const el=document.getElementById(id); if(!el)return; const keep=vals.includes(sel)?sel:''; el.innerHTML=`<option value="">${allLabel}</option>`+vals.map(v=>`<option value="${esc(v)}" ${v===keep?'selected':''}>${esc(v)}</option>`).join('')};
  fill('mFiltroPainel',unique(falhaFilteredItems('painel').map(it=>paiName(it.painelId))),f.painel,'Todas as centrais');
  fill('mFiltroLaco',unique(falhaFilteredItems('laco').map(it=>lacName(it.lacoId))),f.laco,'Todos os laços');
  fill('mFiltroPiso',unique(falhaFilteredItems('piso').map(it=>it.piso)),f.piso,'Todos os pisos');
  const localIds=unique(falhaFilteredItems('local').map(it=>it.localId));
  const localOpts=localIds.map(id=>({id,nome:locName(id)})).filter(x=>x.id&&x.nome).sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'));
  const locEl=document.getElementById('mFiltroLocal'); if(locEl){const keep=localIds.includes(f.local)?f.local:''; locEl.innerHTML='<option value="">Todas as lojas/áreas</option>'+localOpts.map(x=>`<option value="${x.id}" ${x.id===keep?'selected':''}>${esc(x.nome)}</option>`).join('')}
  if(changed==='painel'||changed==='laco'||changed==='local'){
    const dispSel=document.getElementById('mFiltroDispositivo');
    if(dispSel){
      // Filtra dispositivos pela loja selecionada, se houver
      const lojaId=f.local||'';
      let disps=falhaDispositivosForFilter();
      if(lojaId){
        const flmsLoja=db.flms.filter(fm=>db.portas.some(p=>p.flmId===fm.id&&p.localId===lojaId));
        const eqsLoja=db.equipamentos.filter(e=>e.localId===lojaId);
        const idsLoja=new Set([...flmsLoja.map(fm=>fm.id),...eqsLoja.map(e=>e.id)]);
        const filtrado=disps.filter(d=>{
          const id=d.value.split(':')[1];
          return idsLoja.has(id);
        });
        if(filtrado.length)disps=filtrado;
      }
      dispSel.innerHTML='<option value="">Selecione o dispositivo/módulo...</option>'+disps.map(d=>`<option value="${esc(d.value)}">${esc(d.label)}</option>`).join('');
      // Auto-seleciona se houver só um dispositivo para a loja
      if(lojaId&&disps.length===1){
        dispSel.value=disps[0].value;
        onFalhaDispositivoChange();
      }
    }
    const portaWrap=document.getElementById('mFiltroPortaWrap'); if(portaWrap&&(changed==='painel'||changed==='laco'))portaWrap.style.display='none';
  }
  onFalhaSearchInput();
}
function bindFalhaModal(){
  ['mFiltroPainel','mFiltroLaco','mFiltroPiso','mFiltroLocal'].forEach(id=>{const el=document.getElementById(id); if(el)el.addEventListener('change',()=>refreshFalhaFilters(id.replace('mFiltro','').toLowerCase()))});
  const search=document.getElementById('mItemSearch'); if(search)search.addEventListener('input',onFalhaSearchInput);
  const disp=document.getElementById('mFiltroDispositivo'); if(disp)disp.addEventListener('change',onFalhaDispositivoChange);
  const porta=document.getElementById('mFiltroPorta'); if(porta)porta.addEventListener('change',onFalhaPortaChange);
  document.querySelectorAll('input[name="mStatusCheck"]').forEach(ch=>ch.addEventListener('change',e=>{if(e.target.checked)document.querySelectorAll('input[name="mStatusCheck"]').forEach(o=>{if(o!==e.target)o.checked=false})}));
  refreshFalhaFilters('painel');
}
function formFalha(i=''){
  // BACKUP LÓGICA ANTERIOR: formFalha(i='') abria um único bloco "Registrar Falha / Operação" com
  // busca + passo-a-passo sempre visíveis lado a lado, um checklist "Status do sistema" com TODAS
  // as opções (inclusive "Em operação"/"Em teste"/"Renomear") disponíveis também para cadastro novo,
  // sem campos de Tipo/Criticidade/Situação da ocorrência, e responsável em texto livre sem vínculo
  // com o usuário logado. Mantida a MESMA assinatura formFalha(i) e os MESMOS ids usados por
  // bindFalhaModal()/falhaSelectItem()/onFalhaSearchInput()/refreshFalhaFilters() para não quebrar
  // nenhuma chamada existente (quickStatusChange, duplicarPlano, etc.).
  let o=db.falhas.find(x=>x.id===i)||{};
  const item=falhaItems().find(it=>it.id===o.itemId);
  const fp=item?paiName(item.painelId):''; const fl=item?lacName(item.lacoId):''; const fpi=item?item.piso:''; const flo=o.localId||item?.localId||'';
  const statusAtual=o.status||'Em operação';
  let statusOptsFalha=STATUS_SISTEMA_OPTIONS.filter(s=>s!=='__renomear__');
  if(!i)statusOptsFalha=statusOptsFalha.filter(s=>s!=='Em operação'&&s!=='Em teste');
  if(i&&statusAtual&&!statusOptsFalha.includes(statusAtual))statusOptsFalha=[statusAtual,...statusOptsFalha];
  // BACKUP LOGICA ANTERIOR: formFalha sempre exibia o status tecnico como checkboxes editaveis e a
  // Situacao como select editavel para qualquer falha existente, mesmo com Plano de Acao ativo
  // vinculado — permitindo concluir/alterar status final pela aba Falhas, o que a aba Plano de Acao
  // ja faz de forma correta e auditada (item 1, 2026-07). NOVA LOGICA: se ha um plano vinculado ainda
  // ativo (nao Concluido/Cancelado), status tecnico e situacao ficam SOMENTE LEITURA aqui, com link
  // direto para o Plano de Acao — a aba Falhas deixa de permitir concluir/alterar status final.
  const planoVincFF=i?planoForFalha(i):null;
  const planoAtivoForm=!!(planoVincFF&&planoVincFF.situacao!=='Concluído'&&planoVincFF.situacao!=='Cancelado');
  const cu=currentUser(); const isAdmin=(cu.perfil==='Administrador');
  const respPadrao=o.responsavel||cu.nome||'';
  const origemOpts=['Painel Bosch','Inspeção técnica','Plano de ação','Comunicação do lojista','Teste programado','Outro'];
  const origemAtual=o.origem||'';
  openModal(`<h2>${i?'Editar ocorrência':'Registrar Falha'}</h2>
  <input type="hidden" id="mEditingId" value="${esc(i)}">

function saveFalha(i){

// criarPlanoAutomaticoParaFalha(f): cria (uma unica vez) o Plano de Acao vinculado a uma falha,
// respeitando a garantia estrutural 1 falha <-> 1 plano (nunca cria um segundo se ja existir).
// Reaproveitado por saveFalha() (nova falha) e por resolverFalha() (quando o usuario tenta resolver
// uma falha antiga que nunca teve plano gerado).
function criarPlanoAutomaticoParaFalha(f){
  if(!f)return null;
  const existente=planoForFalha(f.id); if(existente)return existente;
  const tpl=window._planoTemplate||null;
  const novo={id:id(),falhaId:f.id,criadoEm:isoNow(),categoria:tpl?.categoria||'Manutenção corretiva',prioridade:tpl?.prioridade||f.criticidade||'Média',responsavel:tpl?.responsavel||'L3A Engenharia',situacao:'Aberto',painel:paiName(f.painelId),laco:lacName(f.lacoId),piso:f.piso,local:locName(f.localId),item:f.itemNome,statusFalha:f.status,justificativa:f.motivo||f.obs||'',providencia:'',necessitaCompra:tpl?.necessitaCompra||false,material:tpl?.material||'',direcionamento:tpl?.direcionamento||undefined};
  db.planos.push(novo);
  if(tpl)window._planoTemplate=null;
  logLocal('Plano de Ação',novo.id,'Plano criado',`${novo.categoria} — ${novo.item||''} (${novo.local||'—'})`);
  return novo;
}
// BACKUP LOGICA ANTERIOR: resolverFalha(falhaId) so reaproveitava o Plano de Acao quando ja existia
// um plano ATIVO vinculado; caso contrario abria um modal de resolucao DIRETA (salvarResolverFalha)
// que encerrava a falha sem nunca passar pelo Plano — violando a regra "a aba Falhas nunca resolve
// sozinha" (item 1, 2026-07). NOVA LOGICA: se ja existe QUALQUER plano vinculado (mesmo concluido —
// nunca criamos um segundo plano para a mesma falha, ver criarPlanoAutomaticoParaFalha), reabre esse
// plano em formAtendimentoPlano para registrar uma nova visita; se nao existe nenhum plano, cria
// automaticamente e abre formAtendimentoPlano no plano recem-criado. A funcao salvarResolverFalha()
// permanece definida apenas por compatibilidade (nenhum botao/fluxo da UI a chama mais).
function resolverFalha(falhaId){
  const f=(db.falhas||[]).find(x=>x.id===falhaId); if(!f)return;
  let plano=planoForFalha(falhaId);
  if(!plano){
    plano=criarPlanoAutomaticoParaFalha(f);
    save();
  }
  if(!plano){alert('Não foi possível localizar ou criar o Plano de Ação desta falha.');return}
  formAtendimentoPlano(plano.id);
}
function salvarResolverFalha(falhaId){
  const f=(db.falhas||[]).find(x=>x.id===falhaId); if(!f)return;
  const responsavel=n(document.getElementById('rfResp')?.value)||f.responsavel;
  const resultado=document.getElementById('rfResultado')?.value||'Conforme';
  const conclusao=n(document.getElementById('rfConclusao')?.value);
  const evidencias=n(document.getElementById('rfEvidencias')?.value);
  const statusAnterior=f.status;
  db.eventosOperacionais=db.eventosOperacionais||[];
  if(resultado==='Conforme'){
    f.situacao='Resolvida'; f.resolvidaEm=isoNow(); f.status='Em operação';
    const isFlm=String(f.itemId||'').startsWith('flm:');
    const flmIdR=isFlm?String(f.itemId).slice(4):'';
    const itemR=isFlm?flmById(flmIdR):(db.equipamentos||[]).find(e=>e.id===f.itemId);
    const portaR=(db.portas||[]).find(p=>p.localId===f.localId)||null;
    if(itemR){itemR.status='Em operação';itemR.ultimaAlteracao=isoNow()}
    if(portaR){portaR.status='Em operação';portaR.ultimaAlteracao=isoNow()}
    const locR=localById(f.localId); if(locR){locR.status='Em operação';locR.ultimaAlteracao=isoNow()}
    db.eventosOperacionais.push({id:id(),data:isoNow(),tipoEvento:'Atendimento direto de Falha — Conforme',falhaId:f.id,planoId:'',localId:f.localId,itemId:f.itemId,painelId:f.painelId,lacoId:f.lacoId,statusAnterior,statusFinal:'Em operação',responsavel,resultado,observacao:conclusao,evidencias,encaminhamento:''});
    logLocal('Falha',f.id,'Resolver (Conforme)',`Falha marcada como resolvida por ${responsavel}. ${conclusao}`);
  } else if(resultado==='Não conforme'){
    f.situacao='Em atendimento';
    db.eventosOperacionais.push({id:id(),data:isoNow(),tipoEvento:'Atendimento direto de Falha — Não Conforme',falhaId:f.id,planoId:'',localId:f.localId,itemId:f.itemId,painelId:f.painelId,lacoId:f.lacoId,statusAnterior,statusFinal:statusAnterior,responsavel,resultado,observacao:conclusao,evidencias,encaminhamento:'Notificar lojista'});
    logLocal('Falha',f.id,'Tratativa (Não conforme)',`Notificar lojista. ${conclusao}`);
  } else {
    if(resultado==='Ocorrência cancelada'){f.situacao='Cancelada';f.resolvidaEm=isoNow()}
    else if(resultado==='Item desativado autorizado'){f.situacao='Resolvida';f.resolvidaEm=isoNow();f.status='Desativação'}
    else {f.situacao='Em atendimento'}
    db.eventosOperacionais.push({id:id(),data:isoNow(),tipoEvento:'Atendimento direto de Falha — '+resultado,falhaId:f.id,planoId:'',localId:f.localId,itemId:f.itemId,painelId:f.painelId,lacoId:f.lacoId,statusAnterior,statusFinal:f.status,responsavel,resultado,observacao:conclusao,evidencias,encaminhamento:''});
    logLocal('Falha',f.id,'Resolver ('+resultado+')',conclusao);
  }
  f.responsavel=responsavel;
  closeModal(); save();
}
function normalizeFotoUrl(u){
  if(!u)return '';
  const s=String(u);
  const m=s.match(/[?&]id=([a-zA-Z0-9_-]+)/)||s.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m)return 'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w800';
  return s;
}
function fotoHref(u){
  if(!u)return '#';
  const s=String(u);
  const m=s.match(/[?&]id=([a-zA-Z0-9_-]+)/)||s.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m)return 'https://drive.google.com/file/d/'+m[1]+'/view';
  return s;
}

  const m=s.match(/[?&]id=([a-zA-Z0-9_-]+)/)||s.match(/\/d\/([a-zA-Z0-9_-]+)/);

function normalizeFotos(f){
  if(!f)return [];
  if(Array.isArray(f))return f.filter(Boolean);
  if(typeof f==='string'){
    const s=f.trim(); if(!s)return [];
    if(s.startsWith('[')){try{const a=JSON.parse(s);return Array.isArray(a)?a.filter(Boolean):[]}catch(e){return []}}
    if(s.startsWith('http'))return [s];
  }
  return [];
}
function fotosThumbsHtml(fotos,tamanho=38,planoId=''){
  const lista=normalizeFotos(fotos);
  if(!lista.length)return '<span class="mutedLine">—</span>';
  const thumbs=lista.map((u,idx)=>{
    const src=normalizeFotoUrl(u);
    const href=fotoHref(u);
    const delBtn=planoId?`<button onclick="excluirFoto('${planoId}',${idx})" title="Excluir foto" style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);border:none;border-radius:50%;width:18px;height:18px;cursor:pointer;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1">✕</button>`:'';
    return `<div style="position:relative;display:inline-block"><a href="${esc(href)}" target="_blank" rel="noopener" title="Abrir foto em tamanho maior"><img src="${esc(src)}" alt="Foto do serviço" loading="lazy" style="width:${tamanho}px;height:${tamanho}px;object-fit:cover;border-radius:6px;border:1px solid var(--l3a-border);display:block" onerror="this.style.display='none';this.nextSibling&&(this.nextSibling.style.display='inline')"><span style="display:none;font-size:11px;padding:4px;background:var(--l3a-neutral-bg,#eef0f3);border-radius:6px">🔗 foto</span></a>${delBtn}</div>`;
  }).join('');
  return `<div style="display:flex;flex-direction:column;gap:4px"><small class="note"><b>${lista.length}</b> foto${lista.length===1?'':'s'}</small><div style="display:flex;gap:5px;flex-wrap:wrap">${thumbs}</div></div>`;
}
function excluirFoto(planoId,idx){
