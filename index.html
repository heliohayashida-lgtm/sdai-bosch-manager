function prioridadePeso(p){return {'Crítica':1,'Alta':2,'Média':3,'Baixa':4}[p]||9}
function isFalhaStatus(s){s=up(normalizeStatus(s));return s.includes('FALHA')||s.includes('DESATIV')||s.includes('TESTE')}
function itemInfoFromFalha(f){
  let isFlm=String(f.itemId||'').startsWith('flm:'), item=isFlm?flmById(String(f.itemId).slice(4)):db.equipamentos.find(e=>e.id===f.itemId);
  let localId=f.localId||item?.localId||'';
  return {painel:paiName(f.painelId||item?.painelId),laco:lacName(f.lacoId||item?.lacoId),piso:f.piso||item?.piso||'',tipo:f.tipo||(isFlm?'Módulo':item?.tipo)||'',itemNome:f.itemNome||(isFlm?'Módulo ':'')+(item?.endereco||item?.modelo||''),local:locName(localId),localId,itemId:f.itemId||item?.id||'',falhaId:f.id||''}
}
function falhasAtivasParaPlano(){
  let map={}; db.falhas.slice().sort((a,b)=>String(a.data).localeCompare(String(b.data))).forEach(f=>{let k=f.itemId||f.localId||f.id; map[k]=f});
  return Object.values(map).filter(f=>isFalhaStatus(f.status));
}
function planoForFalha(fid){return db.planos.find(p=>p.falhaId===fid)}
function renderPlano(){
  let planos=db.planos||[];
  let q=(document.getElementById('plBuscaPlano')?.value||'').toUpperCase();
  let fcat=document.getElementById('plCat')?.value||'', fprio=document.getElementById('plPrio')?.value||'', fsit=document.getElementById('plSit')?.value||'', fresp=document.getElementById('plResp')?.value||'', ini=document.getElementById('plIni')?.value||'', fim=document.getElementById('plFim')?.value||'';
  let falhas=falhasAtivasParaPlano();
  let rows=[];

  // 1) Planos já criados: nunca somem da base, mesmo concluídos.
  planos.forEach(p=>{
    let f=db.falhas.find(x=>x.id===p.falhaId)||{};
    let inf=f.id?itemInfoFromFalha(f):{};
    rows.push({
      origemLinha:'Plano',
      falhaId:p.falhaId||'',
      planoId:p.id,
      prioridade:p.prioridade||'Média',
      painel:inf.painel||p.painel||'',
      laco:inf.laco||p.laco||'',
      piso:inf.piso||p.piso||'',
      local:inf.local||p.local||'',
      itemNome:inf.itemNome||p.item||'',
      statusFalha:f.status||p.statusFalha||'',
      categoria:p.categoria||'',
      responsavel:p.responsavel||'',
      desde:f.data||p.criadoEm||'',
      criadoEm:p.criadoEm||'',
      concluidoEm:p.concluidoEm||'',
      situacao:p.situacao||'Aberto',
      justificativa:p.justificativa||'',
      providencia:p.providencia||'',
      necessitaCompra:p.necessitaCompra?'Sim':'Não'
    });
  });

  // 2) Falhas ativas sem plano: aparecem para permitir criar plano.
  falhas.forEach(f=>{
    if(planoForFalha(f.id)) return;
    let inf=itemInfoFromFalha(f);
    rows.push({
      origemLinha:'Falha sem plano',
      falhaId:f.id,
      planoId:'',
      prioridade:'Média',
      painel:inf.painel||'',
      laco:inf.laco||'',
      piso:inf.piso||'',
      local:inf.local||'',
      itemNome:inf.itemNome||'',
      statusFalha:f.status||'',
      categoria:'',
      responsavel:'',
      desde:f.data||'',
      criadoEm:'',
      concluidoEm:'',
      situacao:'Sem plano',
      justificativa:f.motivo||f.obs||'',
      providencia:'',
      necessitaCompra:'Não'
    });
  });

  function inPeriodo(x){
    if(!ini&&!fim) return true;
    let datas=[x.desde,x.criadoEm,x.concluidoEm].filter(Boolean).map(String);
    return datas.some(d=>(!ini||d>=ini)&&(!fim||d<=fim+'T23:59'));
  }
  function situacaoPeso(s){return {'Sem plano':0,'Aberto':1,'Em andamento':2,'Concluído':3}[s]??9}
  let filtrados=rows.filter(x=>(!q||JSON.stringify(x).toUpperCase().includes(q))&&(!fcat||x.categoria===fcat)&&(!fprio||x.prioridade===fprio)&&(!fsit||x.situacao===fsit)&&(!fresp||x.responsavel===fresp)&&inPeriodo(x))
    .sort((a,b)=>situacaoPeso(a.situacao)-situacaoPeso(b.situacao)||prioridadePeso(a.prioridade)-prioridadePeso(b.prioridade)||String(a.desde||a.criadoEm).localeCompare(String(b.desde||b.criadoEm)));

  document.getElementById('plano').innerHTML=`
    <div class="card"><h3 class="sectionTitle">Filtros do Plano de Ação</h3><div class="toolbar"><div class="field"><label>Busca</label><input id="plBuscaPlano" placeholder="Loja, laço, item, motivo..." value="${esc(document.getElementById('plBuscaPlano')?.value||'')}"></div><div class="field"><label>Categoria</label><select id="plCat">${selectOpts(planoCategorias(),fcat)}</select></div><div class="field"><label>Prioridade</label><select id="plPrio">${selectOpts(planoPrioridades(),fprio)}</select></div><div class="field"><label>Situação</label><select id="plSit">${selectOpts(['Sem plano','Aberto','Em andamento','Concluído'],fsit)}</select></div><div class="field"><label>Responsável</label><select id="plResp">${selectOpts(planoResponsaveis(),fresp)}</select></div><div class="field"><label>Inicial</label><input id="plIni" type="date" value="${esc(ini)}"></div><div class="field"><label>Final</label><input id="plFim" type="date" value="${esc(fim)}"></div><button class="btn" onclick="renderPlano()">Filtrar</button></div><p class="msg warn">Planos concluídos permanecem registrados para relatório e rastreabilidade.</p></div>
    <div class="card"><h3 class="sectionTitle">Lançamentos e acompanhamento</h3>${table(filtrados,[['Prioridade','prioridade'],['Painel','painel'],['Laço','laco'],['Piso','piso'],['Loja / Área','local'],['Item','itemNome'],['Falha','statusFalha',r=>`<span class="pill ${statusClass(r.statusFalha)}">${esc(r.statusFalha)}</span>`],['Categoria','categoria'],['Responsável','responsavel'],['Desde','desde'],['Situação','situacao',r=>`<span class="pill ${r.situacao==='Concluído'?'ok':r.situacao==='Sem plano'?'warn':''}">${esc(r.situacao)}</span>`],['Concluído em','concluidoEm']],r=>`${r.planoId?`<button class="btn small secondary" onclick="formPlano('${r.planoId}')"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20l1-4.2L15.5 5.3a1.5 1.5 0 0 1 2.1 0l1.1 1.1a1.5 1.5 0 0 1 0 2.1L8.2 19 4 20Z"/><path d="M13.8 7 17 10.2"/></svg> Editar</button>`:`<button class="btn small" onclick="formPlano('', '${r.falhaId}')">+ Criar</button>`} ${r.planoId&&r.situacao!=='Concluído'?`<button class="btn small" onclick="concluirPlano('${r.planoId}')"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12.5 9 17l10.5-10.5"/></svg> Concluir</button>`:''}`)}</div>`;
  ['plBuscaPlano','plCat','plPrio','plSit','plResp','plIni','plFim'].forEach(id=>{let el=document.getElementById(id); if(el)el.onchange=renderPlano});
}

function renderImportacao(){if(!can('importar')){document.getElementById('importacao').innerHTML='<div class="card"><h3 class="sectionTitle">Importação bloqueada</h3><p class="msg warn">Seu perfil não possui permissão para importar ou substituir base cadastral.</p></div>';return;}document.getElementById('importacao').innerHTML=`<div class="card"><h3 class="sectionTitle">Importar CSV / XLS / XLSX</h3><div class="toolbar"><div class="field"><label>Arquivo</label><input type="file" id="fileImp" accept=".csv,.xls,.xlsx"></div><div class="field"><label>Modo</label><select id="modeImp"><option value="diff">Somente diferença</option><option value="overwrite">Sobrescrever iguais preservando histórico</option><option value="replace">Apagar dados atuais e importar do zero</option></select></div></div><p class="msg warn"><b>Colunas esperadas:</b> Painel, Laço, Piso, Endereço FLM, Porta, Loja, Tipo, Modelo, Endereço, Fabricante, Status, Observação. O sistema valida antes de importar.</p><button class="btn secondary" onclick="previewImport()">Pré-visualizar / validar</button> <button class="btn" onclick="importFile()">Importar</button><div id="impMsg"></div><div id="previewBox"></div></div><div class="card"><h3 class="sectionTitle">Último diagnóstico de importação</h3>${lastImportHtml()}</div>`}
function lastImportHtml(){let r=db.imports.at(-1); if(!r)return '<p class="msg warn">Nenhuma importação executada.</p>'; let cards=Object.entries(r.stats).map(([k,v])=>`<div class="diagItem"><small>${esc(k)}</small><b>${esc(v)}</b></div>`).join(''); let rom=r.romannel?`<div class="msg ${r.romannel.ok?'ok':'err'}">ROMANNEL: ${esc(r.romannel.msg)}</div>`:''; return `${rom}<div class="diag">${cards}</div><h4>Erros / ignorados</h4>${table(r.errors||[],[['Linha','linha'],['Motivo','motivo'],['Registro','registro']])}`}
function renderExportacao(){document.getElementById('exportacao').innerHTML=`<div class="card"><h3 class="sectionTitle">Exportações</h3><div class="toolbar"><button class="btn" onclick="exportJson()">Base completa JSON</button><button class="btn" onclick="exportAllCsv()">Base completa CSV</button><button class="btn secondary" onclick="exportEntity('locais')">Lojas / Áreas</button><button class="btn secondary" onclick="exportEntity('flms')">FLMs</button><button class="btn secondary" onclick="exportEntity('equipamentos')">Equipamentos</button><button class="btn secondary" onclick="exportEntity('planos')">Plano de ação</button><button class="btn secondary" onclick="exportEntity('inconsistencias')">Inconsistências</button><button class="btn danger" onclick="if(confirm('Apagar toda base local?'))clearAll()">Limpar base local</button></div></div>`}
function reportData(){let ini=document.getElementById('repIni')?.value||'',fim=document.getElementById('repFim')?.value||'',painel=document.getElementById('repPainel')?.value||''; let fal=db.falhas.filter(f=>(!painel||paiName(f.painelId)===painel)&&(!ini||f.data>=ini)&&(!fim||f.data<=fim+'T23:59')); let lanc=fal.filter(f=>up(f.status).includes('FALHA')).length; let resol=fal.filter(f=>up(f.status).includes('OPER')||f.resolvidaEm).length; let byPainel={}; db.paineis.filter(p=>!painel||p.nome===painel).forEach(p=>{byPainel[p.nome]={op:0,falha:0,tipos:{}}}); db.equipamentos.forEach(e=>{let pn=paiName(e.painelId); if(!byPainel[pn])return; let st=up(e.status).includes('FALHA')?'falha':'op'; byPainel[pn][st]++; byPainel[pn].tipos[e.tipo]=(byPainel[pn].tipos[e.tipo]||{op:0,falha:0}); byPainel[pn].tipos[e.tipo][st]++}); db.flms.forEach(f=>{let pn=paiName(f.painelId); if(!byPainel[pn])return; let st=up(f.status).includes('FALHA')?'falha':'op'; byPainel[pn][st]++; byPainel[pn].tipos['Módulo']=(byPainel[pn].tipos['Módulo']||{op:0,falha:0}); byPainel[pn].tipos['Módulo'][st]++}); return {ini,fim,painel,fal,lanc,resol,byPainel}}
function renderRelatorios(){let pain=unique(db.paineis.map(p=>p.nome));document.getElementById('relatorios').innerHTML=`<div class="card hidePrint"><h3 class="sectionTitle">Central de relatórios</h3><p class="msg warn">Escolha o período e o painel. Você pode apenas visualizar na tela ou gerar PDF para envio ao cliente.</p><div class="toolbar"><div class="field"><label>Data inicial</label><input type="date" id="repIni"></div><div class="field"><label>Data final</label><input type="date" id="repFim"></div><div class="field"><label>Painel</label><select id="repPainel">${selectOpts(pain)}</select></div><button class="btn" onclick="drawReport()">Visualizar relatório</button><button class="btn secondary" onclick="drawReport();setTimeout(()=>window.print(),250)">Gerar PDF</button></div></div><div id="reportOut" class="printArea"></div>`}
function pct(v,t){return t?Math.round((v/t)*100):0}
function chartBarRows(rows,max){return `<div class="chartBars">${rows.map(r=>`<div class="chartLine"><b>${esc(r.label)}</b><div class="chartTrack"><i class="${r.cls||''}" style="width:${Math.max(2,pct(r.value,max))}%"></i></div><strong>${r.value}</strong></div>`).join('')}</div>`}
function donutChart(ok,bad){let total=ok+bad,deg=total?Math.round((bad/total)*360):0;return `<div class="donutWrap"><div class="donut" style="--deg:${deg}deg"></div><div class="legend"><span><i class="dot ok"></i>Em operação: ${ok}</span><span><i class="dot bad"></i>Em falha: ${bad}</span><span>Total: ${total}</span></div></div>`}

function reportPlanoBlock(r){let ini=r.ini||'',fim=r.fim||'';let plans=(db.planos||[]).filter(p=>(!r.painel||p.painel===r.painel)&&(!ini||String(p.criadoEm||p.atualizadoEm)>=ini)&&(!fim||String(p.criadoEm||p.atualizadoEm)<=fim+'T23:59'));let ab=plans.filter(p=>p.situacao!=='Concluído').length, co=plans.filter(p=>p.situacao==='Concluído').length;let cat=planoCategorias().map(c=>({label:c,value:plans.filter(p=>p.categoria===c).length})).filter(x=>x.value);let pend=plans.filter(p=>p.situacao!=='Concluído').sort((a,b)=>prioridadePeso(a.prioridade)-prioridadePeso(b.prioridade)||String(a.criadoEm).localeCompare(String(b.criadoEm))).slice(0,20);return `<div class="reportBlock"><h3>Plano de Ação</h3><div class="grid">${kpi('Planos criados',plans.length)}${kpi('Planos concluídos',co)}${kpi('Planos em aberto',ab)}${kpi('Pendências críticas',plans.filter(p=>p.prioridade==='Crítica'&&p.situacao!=='Concluído').length)}</div><div class="chartGrid"><div class="chartPanel"><h4>Plano por categoria</h4>${chartBarRows(cat,Math.max(1,...cat.map(x=>x.value)))}</div><div class="chartPanel"><h4>Situação dos planos</h4>${chartBarRows([{label:'Aberto',value:plans.filter(p=>p.situacao==='Aberto').length},{label:'Em andamento',value:plans.filter(p=>p.situacao==='Em andamento').length},{label:'Concluído',value:co,cls:'ok'}],Math.max(1,plans.length))}</div></div><h4>Pendências abertas</h4>${table(pend,[['Prioridade','prioridade'],['Local','local'],['Item','item'],['Categoria','categoria'],['Responsável','responsavel'],['Situação','situacao'],['Criado em','criadoEm']])}</div>`}

function drawReport(){let r=reportData(); let geral=Object.values(r.byPainel).reduce((a,d)=>{a.op+=d.op;a.falha+=d.falha;Object.entries(d.tipos).forEach(([t,v])=>{a.tipos[t]=a.tipos[t]||{op:0,falha:0};a.tipos[t].op+=(v.op||0);a.tipos[t].falha+=(v.falha||0)});return a},{op:0,falha:0,tipos:{}});let maxPain=Math.max(1,...Object.values(r.byPainel).map(d=>d.op+d.falha));let painelChart=chartBarRows(Object.entries(r.byPainel).map(([pn,d])=>({label:pn,value:d.op+d.falha})),maxPain);let tipoRows=Object.entries(geral.tipos).map(([t,v])=>({label:t,value:(v.op||0)+(v.falha||0)}));let tipoChart=chartBarRows(tipoRows,Math.max(1,...tipoRows.map(x=>x.value)));let painBlocks=Object.entries(r.byPainel).map(([pn,d])=>{let lacos=db.lacos.filter(l=>paiName(l.painelId)===pn).map(l=>{let eq=db.equipamentos.filter(e=>e.lacoId===l.id);let fl=db.flms.filter(f=>f.lacoId===l.id);let tipos={}; eq.forEach(e=>{tipos[e.tipo]=tipos[e.tipo]||{op:0,falha:0}; tipos[e.tipo][up(e.status).includes('FALHA')?'falha':'op']++}); fl.forEach(f=>{tipos['Módulo']=tipos['Módulo']||{op:0,falha:0}; tipos['Módulo'][up(f.status).includes('FALHA')?'falha':'op']++});let totalL=Object.values(tipos).reduce((a,v)=>a+(v.op||0)+(v.falha||0),0);let falhaL=Object.values(tipos).reduce((a,v)=>a+(v.falha||0),0);return `<div class="reportBlock"><b>${esc(l.nome)} — ${totalL} itens / ${falhaL} em falha</b><div class="premiumTable">${table(Object.entries(tipos).map(([t,v])=>({tipo:t,operacao:v.op||0,falha:v.falha||0,total:(v.op||0)+(v.falha||0)})),[['Tipo','tipo'],['Em operação','operacao'],['Falha','falha'],['Total','total']])}</div></div>`}).join('');let rowsTipo=Object.entries(d.tipos).map(([t,v])=>({tipo:t,operacao:v.op||0,falha:v.falha||0,total:(v.op||0)+(v.falha||0)}));return `<div class="reportBlock"><h3>${esc(pn)}</h3><div class="miniChart"><div class="chartCard"><h4>Em operação</h4><b>${d.op}</b></div><div class="chartCard"><h4>Em falha</h4><b>${d.falha}</b></div><div class="chartCard"><h4>Disponibilidade</h4><b>${pct(d.op,d.op+d.falha)}%</b></div></div><div class="chartPanel"><h4>Status do painel</h4>${donutChart(d.op,d.falha)}</div><h4>Compilado por tipo</h4><div class="premiumTable">${table(rowsTipo,[['Tipo','tipo'],['Em operação','operacao'],['Falha','falha'],['Total','total']])}</div><h4>Por laço</h4>${lacos}</div>`}).join('');document.getElementById('reportOut').innerHTML=`<div class="card"><div class="reportCover"><h2>Relatório Técnico L3A</h2><p>Setup Soluções Integradas • Diagnóstico operacional do sistema de detecção e alarme de incêndio</p><div class="reportMeta"><span>Período: ${esc(r.ini||'início')} até ${esc(r.fim||'atual')}</span><span>Painel: ${esc(r.painel||'Todos')}</span><span>Gerado em: ${now()}</span></div></div><div class="grid">${kpi('Falhas lançadas no período',r.lanc)}${kpi('Falhas resolvidas no período',r.resol)}${kpi('Itens em operação',geral.op)}${kpi('Itens em falha',geral.falha)}${kpi('Disponibilidade',pct(geral.op,geral.op+geral.falha)+'%')}${kpi('Total avaliado',geral.op+geral.falha)}</div><div class="chartGrid"><div class="chartPanel"><h4>Status geral do sistema</h4>${donutChart(geral.op,geral.falha)}</div><div class="chartPanel"><h4>Dispositivos por tipo</h4>${tipoChart}</div><div class="chartPanel"><h4>Total por painel</h4>${painelChart}</div><div class="chartPanel"><h4>Movimentação no período</h4>${chartBarRows([{label:'Falhas lançadas',value:r.lanc,cls:'bad'},{label:'Falhas resolvidas',value:r.resol,cls:'ok'}],Math.max(1,r.lanc,r.resol))}</div></div><div class="reportBlock"><h3>Compilado geral por tipo</h3><div class="premiumTable">${table(Object.entries(geral.tipos).map(([t,v])=>({tipo:t,operacao:v.op||0,falha:v.falha||0,total:(v.op||0)+(v.falha||0)})),[['Tipo','tipo'],['Em operação','operacao'],['Falha','falha'],['Total','total']])}</div></div>${painBlocks}${reportPlanoBlock(r)}<div class="reportBlock"><h3>Conclusão técnica</h3><p>Relatório compilado sem listagem nominal de todas as lojas, priorizando indicadores por painel, laço, tipo de dispositivo e status operacional. A base segue a estrutura Empreendimento → Painel → Laço → FLM físico → Porta → Loja/Área → Equipamentos → Histórico de falhas.</p></div><div class="reportFooter"><span>Setup Soluções Integradas</span><span>Documento técnico gerado pelo SDAI Bosch Manager</span></div></div>`}


function currentUserId(){return localStorage.getItem(KEY+':currentUserId') || ''}
function ensureDefaultUsers(){db.usuarios=db.usuarios||[]; if(!db.usuarios.length)db.usuarios.push({id:'admin-default',nome:'Administrador',email:'admin@local',perfil:'Administrador',senha:'1234',ativo:'Sim',criadoEm:isoNow()}); db.usuarios.forEach(u=>{if(!u.senha)u.senha='1234'; if(!u.ativo)u.ativo='Sim'});}
function isLoggedIn(){return !!currentUserId() && (db.usuarios||[]).some(u=>u.id===currentUserId()&&u.ativo!=='Não')}
function currentUser(){ensureDefaultUsers(); let u=(db.usuarios||[]).find(x=>x.id===currentUserId()) || (db.usuarios||[])[0]; return u||{id:'admin-default',nome:'Administrador',email:'admin@local',perfil:'Administrador',senha:'1234',ativo:'Sim'}}
function showLogin(){ensureDefaultUsers(); const ls=document.getElementById('loginScreen'); if(ls)ls.classList.add('show'); const lt=document.getElementById('loginTitle'); if(lt)lt.textContent=(db.config&&db.config.appName)||'Contratos L3A'; const logo=document.getElementById('loginLogo'); if(logo){if(db.config&&db.config.logoData){logo.style.backgroundImage=`url(${db.config.logoData})`;logo.style.backgroundSize='cover';logo.textContent=''}else{logo.style.backgroundImage='';logo.textContent='L3A'}}}
function hideLogin(){const ls=document.getElementById('loginScreen'); if(ls)ls.classList.remove('show')}
function login(){ensureDefaultUsers(); const user=n(document.getElementById('loginUser').value).toLowerCase(); const pass=n(document.getElementById('loginPass').value); const u=(db.usuarios||[]).find(x=>x.ativo!=='Não' && (String(x.email||'').toLowerCase()===user || String(x.nome||'').toLowerCase()===user)); const msg=document.getElementById('loginMsg'); if(!u||String(u.senha||'')!==pass){if(msg){msg.style.display='block';msg.textContent='Usuário ou senha inválidos.'}return} localStorage.setItem(KEY+':currentUserId',u.id); if(!document.getElementById('loginRemember').checked) sessionStorage.setItem(KEY+':sessionOnly','1'); hideLogin(); logLocal('Sessão',u.id,'login','Usuário entrou no sistema'); render()}
function logout(){const u=currentUser(); localStorage.removeItem(KEY+':currentUserId'); sessionStorage.removeItem(KEY+':sessionOnly'); document.getElementById('userMenu')?.classList.remove('show'); logLocal('Sessão',u.id,'logout','Usuário saiu do sistema'); showLogin(); render()}
function toggleUserMenu(){document.getElementById('userMenu')?.classList.toggle('show')}
function openMeuPerfil(){const u=currentUser(); openModal(`<h2>Meu Perfil</h2><div class="formGrid"><div class="field"><label>Nome</label><input id="pfNome" value="${esc(u.nome)}"></div><div class="field"><label>E-mail</label><input id="pfEmail" value="${esc(u.email)}"></div><div class="field"><label>Perfil</label><input value="${esc(u.perfil)}" disabled></div></div><br><button class="btn" onclick="saveMeuPerfil()">Salvar perfil</button> <button class="btn secondary" onclick="closeModal()">Cancelar</button>`); document.getElementById('userMenu')?.classList.remove('show')}
function saveMeuPerfil(){let u=currentUser();u.nome=n(pfNome.value);u.email=n(pfEmail.value);closeModal();markDirty('perfil');render()}

function logLocal(entidade,entidadeId,acao,descricao){db.historico=db.historico||[];db.historico.push({id:id(),data:isoNow(),usuario:(currentUser().email||currentUser().nome||'usuario'),entidade,entidadeId,acao,descricao}); if(db.historico.length>1000)db.historico=db.historico.slice(-1000); persistLocal()}
function perfilAtual(){return currentUser().perfil||'Administrador'}
function can(action){const p=perfilAtual(); if(p==='Administrador')return true; if(p==='Supervisor')return !['importar','cadastro'].includes(action); if(p==='Operacional')return ['operacao','status','planoStatus','visualizar'].includes(action); return false}
function requireAccess(action,msg){if(can(action))return true; alert(msg||'Seu perfil não possui permissão para esta ação.'); return false}
function applyBrand(){const cfg=db.config||{}; const name=cfg.appName||'Contratos L3A'; const sub=cfg.subtitle||'Gestão operacional • SDAI'; const logo=cfg.logoData||''; const bn=document.getElementById('brandName'), bs=document.getElementById('brandSub'), bl=document.getElementById('brandLogo'); if(bn)bn.textContent=name; if(bs)bs.textContent=sub; if(bl){ if(logo){bl.classList.add('hasImg'); bl.style.backgroundImage=`url(${logo})`; bl.textContent='';} else {bl.classList.remove('hasImg'); bl.style.backgroundImage=''; bl.textContent='L3A';}} const pb=document.getElementById('profileBadge'); const u=currentUser(); if(pb){pb.innerHTML=`<b>${esc(u.nome||'Usuário')}</b><span>${esc(u.perfil||'Administrador')} • Online</span>`} const tu=document.getElementById('topUser'); if(tu){tu.setAttribute('onclick','toggleUserMenu()');tu.innerHTML=`<span class="avatar">${esc((u.nome||'U').slice(0,1).toUpperCase())}</span><span class="uText"><b>${esc(u.nome||'Usuário')}</b><small>${esc(u.perfil||'Administrador')}</small></span>`}}
function applyRoleUI(){const p=perfilAtual(); document.querySelectorAll('[data-role-action]').forEach(el=>{const a=el.dataset.roleAction; const ok=can(a); el.classList.toggle('disabledByRole',!ok); el.title=ok?'':'Sem permissão para '+a});}
function logoToBase64(file){return new Promise((res,rej)=>{const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file)})}

und" stroke-linejoin="round"><path d="M5 7h14M9.5 7V5a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1v2"/><path d="M6.5 7 7.3 19a1.5 1.5 0 0 0 1.5 1.4h6.4a1.5 1.5 0 0 0 1.5-1.4L17.5 7"/><path d="M10 11v6M14 11v6"/></svg></button>`)}</div>`}

async function readRows(){let f=document.getElementById('fileImp').files[0]; if(!f)throw new Error('Selecione um arquivo.'); let ext=f.name.split('.').pop().toLowerCase(); let data=await f.arrayBuffer(); if(ext==='csv'){let txt=new TextDecoder('utf-8').decode(data); return parseCSV(txt)} if(typeof XLSX==='undefined')throw new Error('Biblioteca XLSX não carregada. Para XLS/XLSX, abra com internet ou use CSV.'); let wb=XLSX.read(data,{type:'array'}); let rows=[]; wb.SheetNames.forEach(sn=>{rows=rows.concat(XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:''}))}); return rows}
function parseCSV(txt){let sep=(txt.split('\n')[0].match(/;/g)||[]).length>=(txt.split('\n')[0].match(/,/g)||[]).length?';':','; let lines=txt.split(/\r?\n/).filter(x=>x.trim()); if(!lines.length)return []; let headers=splitCSV(lines[0],sep); return lines.slice(1).map(l=>{let vals=splitCSV(l,sep),o={};headers.forEach((h,i)=>o[h]=vals[i]||'');return o})}
function splitCSV(line,sep){let out=[],cur='',q=false; for(let i=0;i<line.length;i++){let ch=line[i]; if(ch==='"'){if(q&&line[i+1]==='"'){cur+='"';i++}else q=!q}else if(ch===sep&&!q){out.push(cur);cur=''}else cur+=ch} out.push(cur); return out}
async function previewImport(){try{let rows=await readRows(); let v=validateRows(rows); document.getElementById('previewBox').innerHTML=`<div class="msg ${v.ok?'ok':'err'}">${v.ok?'Arquivo validado':'Arquivo com inconsistências'}: ${rows.length} registros lidos.</div>${table(rows.slice(0,20),Object.keys(rows[0]||{}).map(k=>[k,k]))}${v.errors.length?table(v.errors,[['Linha','linha'],['Motivo','motivo'],['Registro','registro']]):''}`}catch(e){document.getElementById('impMsg').innerHTML=`<div class="msg err">${esc(e.message)}</div>`}}
function validateRows(rows){let errors=[]; if(!rows.length)errors.push({linha:0,motivo:'Arquivo vazio',registro:''}); let cols=Object.keys(rows[0]||{}).map(normKey); ['PAINEL','LACO','TIPO','MODELO'].forEach(c=>{if(!cols.some(x=>x.includes(c)))errors.push({linha:1,motivo:'Coluna obrigatória ausente: '+c,registro:Object.keys(rows[0]||{}).join(', ')})}); return {ok:!errors.length,errors}}
async function importFile(){try{let rows=await readRows(); let mode=document.getElementById('modeImp').value; let v=validateRows(rows); if(!v.ok)throw new Error(v.errors.map(e=>e.motivo).join(' | ')); if(mode==='replace')db=emptyDB(); let stats={registrosLidos:rows.length,paineis:0,lacos:0,flms:0,portas:0,lojasCriadas:0,areasTecnicas:0,areasComuns:0,detectores:0,acionadores:0,modulos:0,ignorados:0}; let errors=[],rom={ok:false,msg:'Não localizada no arquivo.'}; rows.forEach((r,i)=>{let linha=i+2; try{let painel=get(r,['Painel','Central']); let laco=get(r,['Laço','Laco','Loop']); let piso=get(r,['Piso','Pavimento']); let endFlm=get(r,['Endereço FLM','Endereco FLM','FLM','Módulo','Modulo']); let porta=get(r,['Porta','Canal','Porta / Ligação','Porta Ligação']); let loja=get(r,['Loja','Local','Área','Area','Ambiente']); let tipo=get(r,['Tipo','Classificação','Classificacao']); let modelo=get(r,['Modelo','Dispositivo','Nome do dispositivo']); let endereco=get(r,['Endereço','Endereco','Zona','Endereço Equipamento']); let fab=get(r,['Fabricante']); let status=normalizeStatus(get(r,['Status'])||'Em operação'); let obs=get(r,['Observação','Observacao','Obs']); if(!painel||!laco){stats.ignorados++; errors.push({linha,motivo:'Painel ou laço ausente',registro:JSON.stringify(r)}); return} let p0=db.paineis.length,l0=db.lacos.length,f0=db.flms.length,pt0=db.portas.length,loc0=db.locais.length; let p=ensurePanel(painel); let l=ensureLaco(p.id,laco,piso); stats.paineis+=db.paineis.length>p0?1:0; stats.lacos+=db.lacos.length>l0?1:0; let classe=classifyDevice(modelo,tipo,loja); let isModulo=classe==='Módulo'; let flm=null,portaObj=null,local=null; if(isModulo||endFlm){flm=ensureFlm(p.id,l.id,endFlm||endereco||modelo,modelo||'FLM',piso); stats.flms+=db.flms.length>f0?1:0; stats.modulos+=db.flms.length>f0?1:0; if(porta||loja){portaObj=ensurePorta(flm.id,porta||'1'); stats.portas+=db.portas.length>pt0?1:0} if(loja){local=ensureLocal(loja,localClass(loja),p.id,l.id,piso,flm.id,portaObj?.id); if(portaObj)local.portaId=portaObj.id, portaObj.localId=local.id; let created=db.locais.length>loc0; if(created){if(local.tipo==='Loja')stats.lojasCriadas++; if(local.tipo==='Área Técnica')stats.areasTecnicas++; if(local.tipo==='Área Comum')stats.areasComuns++} if(up(loja).includes('ROMANNEL'))rom={ok:true,msg:`Importada/vinculada ao ${painel} • ${laco} • FLM ${flm.endereco} • Porta ${portaObj?.numero||porta||'1'}.`}} } else { if(loja){local=db.locais.find(x=>up(x.nome)===up(loja)); if(!local){let areaTipo=equipAreaClass(loja,modelo,tipo); if(areaTipo){local=ensureLocal(loja,areaTipo,p.id,l.id,piso,'',''); if(up(loja).includes('ROMANNEL'))rom={ok:false,msg:'ROMANNEL apareceu em registro de equipamento/área. Não foi criada como loja; foi tratada como '+areaTipo+'.'} } else { if(up(loja).includes('ROMANNEL'))rom={ok:false,msg:'ROMANNEL apareceu em registro de equipamento, mas loja só é criada por porta de FLM. Registro não criou loja.'}; errors.push({linha,motivo:'Equipamento não cria loja. Loja informada não existe por porta de FLM: '+loja,registro:JSON.stringify(r)}) }}} let res=ensureEquip({painelId:p.id,lacoId:l.id,piso,tipo:classe,endereco:endereco||get(r,['Zona'])||'',modelo,fabricante:fab,localId:local?.id||'',flmId:flm?.id||'',portaId:portaObj?.id||'',status,ultimaAlteracao:isoNow(),obs},mode); if(res.created){if(classe.includes('Detector'))stats.detectores++; else if(classe.includes('Acionador'))stats.acionadores++;} }
      }catch(e){stats.ignorados++; errors.push({linha,motivo:e.message,registro:JSON.stringify(r)})}}); stats.lojasCriadas=db.locais.filter(x=>x.tipo==='Loja').length; stats.areasTecnicas=db.locais.filter(x=>x.tipo==='Área Técnica').length; stats.areasComuns=db.locais.filter(x=>x.tipo==='Área Comum').length; stats.detectores=db.equipamentos.filter(x=>x.tipo.includes('Detector')).length; stats.acionadores=db.equipamentos.filter(x=>x.tipo.includes('Acionador')).length; stats.modulos=db.flms.length; stats.flms=db.flms.length; stats.portas=db.portas.length; stats.paineis=db.paineis.length; stats.lacos=db.lacos.length; stats.ignorados=errors.length; db.inconsistencias=errors; db.imports.push({data:isoNow(),stats,errors,romannel:rom}); if(db.imports.length>10)db.imports=db.imports.slice(-10); persistLocal(); markDirty('importação'); render(); document.getElementById('impMsg').innerHTML=`<div class="msg ok">Importação concluída. DFO/FAP/ACM/DM210/SM210/FMC são importados como equipamentos vinculados a Área Comum/Técnica, sem criar loja.</div>`}catch(e){document.getElementById('impMsg').innerHTML=`<div class="msg err">${esc(e.message)}</div>`}}

function falhaItems(){
  const eq=db.equipamentos.map(e=>({id:e.id,n:`${e.tipo} • ${e.endereco||'sem endereço'} • ${locName(e.localId)||'Sem vínculo'}`,tipo:e.tipo,painelId:e.painelId,lacoId:e.lacoId,piso:e.piso,localId:e.localId,kind:'equip'}));
  const fl=db.flms.map(f=>{const ps=db.portas.filter(p=>p.flmId===f.id);const locs=ps.map(p=>p.localId).filter(Boolean);const label=ps.map(p=>`P${p.numero}: ${locName(p.localId)||'Sem vínculo'}`).join(' | ');return {id:'flm:'+f.id,n:`Módulo • ${f.endereco||f.modelo||'sem endereço'}${label?' • '+label:''}`,tipo:'Módulo',painelId:f.painelId,lacoId:f.lacoId,piso:f.piso,localId:'',localIds:locs,kind:'flm'}});
  return eq.concat(fl);
}
function getFalhaFilterValues(){return {
  painel:document.getElementById('mFiltroPainel')?.value||'',
  laco:document.getElementById('mFiltroLaco')?.value||'',
  piso:document.getElementById('mFiltroPiso')?.value||'',
  local:document.getElementById('mFiltroLocal')?.value||'',
  item:document.getElementById('mItem')?.value||''
}}
function itemMatchesFalhaFilters(it,f){
  if(f.painel && paiName(it.painelId)!==f.painel)return false;
  if(f.laco && lacName(it.lacoId)!==f.laco)return false;
  if(f.piso && n(it.piso)!==f.piso)return false;
  if(f.local){
    const locOk=it.localId===f.local || (it.localIds||[]).includes(f.local);
    if(!locOk)return false;
  }
  return true;
}
function falhaFilteredItems(ignoreField=''){
  const f=getFalhaFilterValues(); if(ignoreField)f[ignoreField]='';
  return falhaItems().filter(it=>itemMatchesFalhaFilters(it,f));
}
function refreshFalhaFilters(changed=''){
  const f=getFalhaFilterValues();
  const fill=(id,vals,sel,allLabel='Todos')=>{const el=document.getElementById(id); if(!el)return; const keep=vals.includes(sel)?sel:''; el.innerHTML=`<option value="">${allLabel}</option>`+vals.map(v=>`<option value="${esc(v)}" ${v===keep?'selected':''}>${esc(v)}</option>`).join('')};
  fill('mFiltroPainel',unique(falhaFilteredItems('painel').map(it=>paiName(it.painelId))),f.painel,'Todos os painéis');
  fill('mFiltroLaco',unique(falhaFilteredItems('laco').map(it=>lacName(it.lacoId))),f.laco,'Todos os laços');
  fill('mFiltroPiso',unique(falhaFilteredItems('piso').map(it=>it.piso)),f.piso,'Todos os pisos');
  const localIds=unique(falhaFilteredItems('local').flatMap(it=>[it.localId,...(it.localIds||[])]));
  const localOpts=localIds.map(id=>({id,nome:locName(id)})).filter(x=>x.id&&x.nome).sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'));
  const locEl=document.getElementById('mFiltroLocal'); if(locEl){const keep=localIds.includes(f.local)?f.local:''; locEl.innerHTML='<option value="">Todas as lojas/áreas</option>'+localOpts.map(x=>`<option value="${x.id}" ${x.id===keep?'selected':''}>${esc(x.nome)}</option>`).join('')}
  const items=falhaFilteredItems();
  const itemEl=document.getElementById('mItem'); if(itemEl){const keep=items.some(x=>x.id===f.item)?f.item:''; itemEl.innerHTML=items.map(it=>`<option value="${it.id}" ${it.id===keep?'selected':''}>${esc(it.n)}</option>`).join('')||'<option value="">Nenhum item encontrado</option>'}
  const hint=document.getElementById('mFalhaHint'); if(hint){hint.textContent=`${items.length} item(ns) disponível(is) com os filtros aplicados.`}
}
function bindFalhaModal(){['mFiltroPainel','mFiltroLaco','mFiltroPiso','mFiltroLocal'].forEach(id=>{const el=document.getElementById(id); if(el)el.addEventListener('change',()=>refreshFalhaFilters(id.replace('mFiltro','').toLowerCase()))});
  document.querySelectorAll('input[name="mStatusCheck"]').forEach(ch=>ch.addEventListener('change',e=>{if(e.target.checked)document.querySelectorAll('input[name="mStatusCheck"]').forEach(o=>{if(o!==e.target)o.checked=false})}));
  refreshFalhaFilters();
}
function formFalha(i=''){

  openModal(`<h2>Registrar Falha / Operação</h2>

    <div class="field" style="grid-column:1/-1"><label>Item filtrado</label><select id="mItem"><option value="${esc(o.itemId||'')}" selected>${esc(item?.n||'Selecione um item')}</option></select><small id="mFalhaHint" class="note"></small></div>

    <div class="field"><label>Responsável pelo lançamento</label><input id="mResp" value="${esc(o.responsavel)}" placeholder="Ex.: Hélio / equipe técnica"></div>
    <div class="field"><label>Origem</label><select id="mOrigem"><option ${o.origem==='Painel Bosch'?'selected':''}>Painel Bosch</option><option ${o.origem==='Teste em campo'?'selected':''}>Teste em campo</option><option ${o.origem==='Inspeção'?'selected':''}>Inspeção</option><option ${o.origem==='Importação'?'selected':''}>Importação</option></select></div>
    <div class="field"><label>Motivo</label><input id="mMotivo" value="${esc(o.motivo)}" placeholder="Ex.: curto, aberto, acionamento, normalização"></div>
    <div class="field" style="grid-column:1/-1"><label>Status do sistema</label><div class="toolbar statusChecks">
      ${['Em operação','Falha logista','Falha sistema','Desativada','Em teste'].map((st,idx)=>`<label class="check"><input type="checkbox" name="mStatusCheck" value="${st}" ${st===statusAtual?'checked':''}> ${st}</label>`).join('')}
    </div></div>
    <div class="field" style="grid-column:1/-1"><label>Observação técnica</label><textarea id="mObs" placeholder="Detalhe técnico do lançamento">${esc(o.obs)}</textarea></div>
  </div><br><button class="btn" onclick="saveFalha('${i}')">Salvar lançamento</button> <button class="btn secondary" onclick="closeModal()">Cancelar</button>`);
  bindFalhaModal();
}
function saveFalha(i){
  let sel=mItem.value; if(!sel){alert('Selecione um item filtrado antes de salvar.');return}
  let checked=document.querySelector('input[name="mStatusCheck"]:checked'); if(!checked){alert('Marque um status do sistema.');return}
  let isFlm=sel.startsWith('flm:');let item=isFlm?db.flms.find(x=>x.id===sel.slice(4)):db.equipamentos.find(x=>x.id===sel); if(!item)return;
  let localId=isFlm?(mFiltroLocal.value||''):(item.localId||mFiltroLocal.value||'');
  let statusAnterior=item.status||'Em operação'; item.status=checked.value; item.ultimaAlteracao=isoNow();
  let loc=localById(localId); if(loc){loc.status=checked.value;loc.ultimaAlteracao=isoNow()}
  let rec=i?db.falhas.find(x=>x.id===i):{id:id()};
  Object.assign(rec,{data:isoNow(),painelId:item.painelId,lacoId:item.lacoId,piso:item.piso,tipo:isFlm?'Módulo':item.tipo,itemId:sel,itemNome:(isFlm?'Módulo ':'')+(item.endereco||item.modelo),localId,status:checked.value,statusAnterior,responsavel:n(mResp.value),origem:mOrigem.value,motivo:n(mMotivo.value),obs:n(mObs.value),resolvidaEm:up(checked.value).includes('OPER')?isoNow():''});
  if(!i){db.falhas.push(rec); if(isFalhaStatus(rec.status)&&!db.planos.find(p=>p.falhaId===rec.id)){db.planos.push({id:id(),falhaId:rec.id,criadoEm:isoNow(),categoria:'Manutenção corretiva',prioridade:'Média',responsavel:'L3A Engenharia',situacao:'Aberto',painel:paiName(rec.painelId),laco:lacName(rec.lacoId),piso:rec.piso,local:locName(rec.localId),item:rec.itemNome,statusFalha:rec.status,justificativa:rec.motivo||rec.obs||'',providencia:'',necessitaCompra:false});}} closeModal(); save()
}

/* =========================================================================
   V8.1 — Dashboard orientado a "onde/quem", não só "quanto".
   Bloco 100% ADITIVO: nenhuma função existente foi alterada ou removida.
   Reaproveita os campos já existentes (piso, painelId, lacoId, status,
   ultimaAlteracao) — nenhuma mudança de schema, nenhuma mudança no Code.gs.
   ========================================================================= */
function pisoSortKey(p){const m=String(p||'').match(/\d+/);return m?parseInt(m[0],10):999}
function dashStatusBucket(st){const s=up(normalizeStatus(st||''));if(s.includes('FALHA'))return 'falha';if(s.includes('TESTE'))return 'teste';if(s.includes('DESATIV'))return 'desativada';return 'operacao'}
function timeSince(isoStr){if(!isoStr)return '—';const then=new Date(isoStr).getTime();if(isNaN(then))return '—';const diffMs=Math.max(0,Date.now()-then);const h=diffMs/3600000;if(h<1)return Math.max(1,Math.round(diffMs/60000))+' min';if(h<24)return Math.round(h)+'h';return Math.round(h/24)+'d'}
function dashPisoStats(){const map={};(db.equipamentos||[]).forEach(e=>{const p=n(e.piso)||'Sem piso';if(!map[p])map[p]={piso:p,operacao:0,teste:0,falha:0,desativada:0};map[p][dashStatusBucket(e.status)]++});return Object.values(map).sort((a,b)=>pisoSortKey(a.piso)-pisoSortKey(b.piso)||a.piso.localeCompare(b.piso,'pt-BR'))}
function dashLojasComFalha(){return (db.locais||[]).filter(l=>dashStatusBucket(l.status)==='falha').map(l=>({nome:l.nome||'—',piso:n(l.piso)||'—',laco:lacName(l.lacoId)||'—',desde:l.ultimaAlteracao||'',status:l.status})).sort((a,b)=>(a.desde||'').localeCompare(b.desde||''))}
function dashPorLaco(){const map={};(db.locais||[]).filter(l=>dashStatusBucket(l.status)==='falha').forEach(l=>{const key=(paiName(l.painelId)||'—')+' · '+(lacName(l.lacoId)||'—');map[key]=(map[key]||0)+1});return Object.entries(map).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value).slice(0,8)}

window._dashCharts=window._dashCharts||{};
function dashDestroyChart(k){if(window._dashCharts[k]){try{window._dashCharts[k].destroy()}catch(e){}delete window._dashCharts[k]}}

const _renderDashboardAnterior=null; // (mantido apenas como marcador de versão; a versão anterior de renderDashboard() continua no arquivo, apenas superada por esta)
function renderDashboard(){
  const el=document.getElementById('dashboard');if(!el)return;
  const pisos=dashPisoStats();
  const totalEquip=(db.equipamentos||[]).length;
  const totalOp=pisos.reduce((a,p)=>a+p.operacao,0);
  const totalTeste=pisos.reduce((a,p)=>a+p.teste,0);
  const disponibilidade=totalEquip?Math.round((totalOp/totalEquip)*100):0;
  const lojasFalha=dashLojasComFalha();
  const planosAbertos=(db.planos||[]).filter(p=>p.situacao!=='Concluído').length;
  const porLaco=dashPorLaco();

  const failRows=lojasFalha.length?lojasFalha.map(r=>{const t=timeSince(r.desde);const cls=(t.endsWith('d')&&parseInt(t)>=1)?'urgent':(t.endsWith('h')?'recent':'');return `<div class="failRow"><b>${esc(r.nome)}</b><span>${esc(r.piso)}</span><span>${esc(r.laco)}</span><span class="tsince ${cls}">${esc(t)}</span></div>`}).join(''):'<div class="emptyState">Nenhuma loja em falha no momento.</div>';

  el.innerHTML=`
  <div class="grid" style="margin-bottom:18px">
    ${kpi('Disponibilidade',disponibilidade+'%')}
    ${kpi('Lojas em falha',lojasFalha.length)}
    ${kpi('Em teste',totalTeste)}
    ${kpi('Planos em aberto',planosAbertos)}
  </div>
  <div class="chartPanel" style="margin-bottom:18px">
    <h4>Status por piso</h4>
    <p class="mutedLine" style="margin-bottom:10px">Onde os problemas estão concentrados, não só quantos existem</p>
    <div class="chartLegendRow"><span><i style="background:#15803D"></i>Em operação</span><span><i style="background:#B45309"></i>Em teste</span><span><i style="background:#B42318"></i>Falha</span></div>
    <div class="chartCanvasWrap" style="height:${Math.max(160,pisos.length*46+40)}px">
      <canvas id="dashPisoCanvas" role="img" aria-label="Status dos equipamentos por piso, em operação, teste e falha"></canvas>
    </div>
  </div>
  <div class="dashRow">
    <div class="premiumPanel">
      <h3>Lojas com falha agora</h3>
      <p>Nome, piso, laço e tempo em aberto — não apenas a contagem</p>
      <div class="failList" style="margin-top:14px">
        <div class="failRow head"><span>Loja</span><span>Piso</span><span>Laço</span><span>Aberto há</span></div>
        ${failRows}
      </div>
    </div>
    <div class="chartPanel">
      <h4>Compilado por painel / laço</h4>
      <p class="mutedLine" style="margin-bottom:10px">Onde concentrar a próxima visita técnica</p>
      <div class="chartCanvasWrap" style="height:${Math.max(160,porLaco.length*34+40)}px">
        <canvas id="dashLacoCanvas" role="img" aria-label="Falhas ativas por painel e laço"></canvas>
      </div>
    </div>
  </div>`;

  if(!el.classList.contains('active'))return; // evita desenhar em canvas oculto (largura zero)
  if(typeof Chart==='undefined')return;

  dashDestroyChart('piso');
  const ctxPiso=document.getElementById('dashPisoCanvas');
  if(ctxPiso){
    window._dashCharts.piso=new Chart(ctxPiso,{type:'bar',data:{labels:pisos.map(p=>p.piso),datasets:[
      {label:'Em operação',data:pisos.map(p=>p.operacao),backgroundColor:'#15803D'},
      {label:'Em teste',data:pisos.map(p=>p.teste),backgroundColor:'#B45309'},
      {label:'Falha',data:pisos.map(p=>p.falha),backgroundColor:'#B42318'}
    ]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,grid:{display:false}}},plugins:{legend:{display:false}}}});
  }
  dashDestroyChart('laco');
  const ctxLaco=document.getElementById('dashLacoCanvas');
  if(ctxLaco){
    window._dashCharts.laco=new Chart(ctxLaco,{type:'bar',data:{labels:porLaco.map(p=>p.label),datasets:[{data:porLaco.map(p=>p.value),backgroundColor:'#B42318'}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,scales:{x:{grid:{display:false},ticks:{precision:0}},y:{grid:{display:false}}},plugins:{legend:{display:false}}}});
  }
}

/* =========================================================================
   V8.2 — Falhas, Plano de Ação e Relatórios: mesmo padrão "onde/quem"
   aplicado ao Dashboard. Bloco 100% ADITIVO — nenhuma função removida.
   ========================================================================= */
function toggleFalhaPiso(label){filters.falhas=filters.falhas||{};filters.falhas.piso=(filters.falhas.piso===label?'':label);render()}
function renderFalhas(){
  let f=filters.falhas||{};
  let allRows=db.falhas.filter(x=>(!f.status||normalizeStatus(x.status)===f.status)&&(!f.tipo||x.tipo===f.tipo)&&(!f.q||JSON.stringify(x).toUpperCase().includes(up(f.q)))).map(x=>({...x,painel:paiName(x.painelId),laco:lacName(x.lacoId),loja:locName(x.localId)}));
  const pisoMap={};allRows.forEach(x=>{const p=n(x.piso)||'Sem piso';pisoMap[p]=(pisoMap[p]||0)+1});

async function verificarBaseAoAbrir(){
  if(!isLoggedIn())return;
  const c=syncCfg();
  if(!baseParecevazia())return; // banco local ok, nada a fazer
  if(!c.configured){alert('A base local está vazia e o banco Google ainda não foi configurado neste sistema. Vá em Sistema \u2192 Banco de Dados \u2192 "Inicializar/validar" e depois "Carregar base Google".');return}
  _recuperandoBaseInicial=true;
  updateSyncFooter('saving');
  const dEl=document.getElementById('dashboard');
  if(dEl)dEl.innerHTML='<div class="card"><p class="msg warn">Banco local vazio — recarregando automaticamente do Google Sheets, aguarde alguns segundos...</p></div>';
  try{
    const r=await jsonp('load');
    if(r.ok && r.db && Object.keys(r.db).length){
      db=normalizeAllStatuses(Object.assign(emptyDB(),r.db));
      persistLocal();
      setSyncCfg({dirty:false,lastSync:new Date().toLocaleTimeString('pt-BR')});
      _recuperandoBaseInicial=false;
      render();
      alert('A base local estava vazia (provável falha ao salvar no navegador). Os dados foram recarregados automaticamente do Google Sheets — nada foi perdido.');
    } else {
      _recuperandoBaseInicial=false;
      updateSyncFooter();
      render();
      alert('A base local está vazia e a base no Google também não retornou dados. Verifique manualmente em Sistema \u2192 Banco de Dados antes de sincronizar ou continuar usando o sistema, para não gravar uma base vazia por cima da planilha.');
    }
  }catch(e){
    _recuperandoBaseInicial=false;
    updateSyncFooter('error');
    render();
    alert('A base local está vazia e não foi possível recarregar automaticamente do Google (' + e.message + '). Vá em Sistema \u2192 Banco de Dados \u2192 "Carregar base Google" manualmente antes de continuar.');
  }
}

function ensureLucSchema(){
  db.baseLojas=db.baseLojas||[];
  db.conflitosAssociacao=db.conflitosAssociacao||[];
  (db.baseLojas||[]).forEach(l=>{if(!l.id)l.id=id(); if(!l.origem)l.origem='IMPORTACAO_LUC'; if(!l.statusAssociacao)l.statusAssociacao='Pendente';});
}
function lucNormText(s){return up(s).replace(/&/g,' E ').replace(/[^A-Z0-9 ]/g,' ').replace(/\b(LTDA|ME|EPP|LOJA|STORE|QUIOSQUE|SHOP|SHOPPING|PISO|P[123]|PAVIMENTO|UNIDADE|RESTAURANTE|ALIMENTACAO)\b/g,' ').replace(/\b(O|A|OS|AS|DA|DE|DO|DAS|DOS)\b/g,' ').replace(/\s+/g,' ').trim()}
function lucCompactText(s){return lucNormText(s).replace(/\s+/g,'')}
function lucTokenSet(s){return lucNormText(s).split(' ').filter(Boolean)}
function lucEditDistance(a,b){a=lucCompactText(a);b=lucCompactText(b); if(!a||!b)return 99; const m=[]; for(let i=0;i<=a.length;i++){m[i]=[i]} for(let j=0;j<=b.length;j++){m[0][j]=j} for(let i=1;i<=a.length;i++){for(let j=1;j<=b.length;j++){m[i][j]=Math.min(m[i-1][j]+1,m[i][j-1]+1,m[i-1][j-1]+(a[i-1]===b[j-1]?0:1))}} return m[a.length][b.length]}
function lucSimilarity(a,b){const A=lucTokenSet(a),B=lucTokenSet(b); const sa=lucNormText(a),sb=lucNormText(b),ca=lucCompactText(a),cb=lucCompactText(b); if(!ca||!cb)return 0; if(ca===cb||sa===sb)return 100; let common=A.filter(x=>B.includes(x)).length; let j=common/Math.max(1,new Set([...A,...B]).size); let inc=(ca.includes(cb)||cb.includes(ca)||sa.includes(sb)||sb.includes(sa))?0.30:0; let prefix=ca.slice(0,5)===cb.slice(0,5)?0.12:0; let dist=lucEditDistance(a,b), maxLen=Math.max(ca.length,cb.length,1); let edit=Math.max(0,1-(dist/maxLen)); return Math.round(Math.max(Math.min(1,j+inc+prefix),edit)*100)}
function lucPisoKey(v){const x=up(v); if(/(^|\D)1(\D|$)|PISO 1|P1/.test(x))return '1'; if(/(^|\D)2(\D|$)|PISO 2|P2/.test(x))return '2'; if(/(^|\D)3(\D|$)|PISO 3|P3/.test(x))return '3'; return ''}
function lucPisosCompat(localPiso,basePiso){const a=lucPisoKey(localPiso),b=lucPisoKey(basePiso); return !!a&&!!b&&a===b}
function pisoFromLuc(luc,tipo){const first=(n(luc).match(/[0-9]/)||[''])[0]; if(first==='1')return 'Piso 1'; if(first==='2')return 'Piso 2'; if(first==='3')return 'Piso 3'; return up(tipo)==='ALIMENTACAO'?'Piso 3':'Conferir'}
async function readRowsFromFile(f){let ext=f.name.split('.').pop().toLowerCase(); let data=await f.arrayBuffer(); if(ext==='csv'){let txt=new TextDecoder('utf-8').decode(data); return parseCSV(txt)} if(!['xls','xlsx'].includes(ext))throw new Error('Formato não aceito. Use XLSX, XLS ou CSV.'); if(typeof XLSX==='undefined')throw new Error('Biblioteca XLSX não carregada. Para XLS/XLSX, abra com internet ou use CSV.'); let wb=XLSX.read(data,{type:'array'}); let rows=[]; wb.SheetNames.forEach(sn=>{rows=rows.concat(XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:''}))}); return rows}
function readLucRowsFile(){const input=document.getElementById('fileLucImp'); if(!input||!input.files||!input.files[0])throw new Error('Selecione um arquivo XLSX ou CSV para Importação LUC/Loja.'); return readRowsFromFile(input.files[0])}

/* ===== Correção V8.4 — Importação LUC/Loja por posição fixa A-D =====
   Regra operacional: A=LUC, B=Tipo de Loja, C=Loja oficial, D=Área Contrato.
   Isso evita que cabeçalhos diferentes façam a loja virar o próprio número do LUC. */
function lucMatrixToRows(matrix){
  const rows=[];
  let start=0;
  const normCell=v=>normKey(String(v??''));
  const isHeaderRow=arr=>{
    const joined=(arr||[]).map(normCell).join('|');
    return joined.includes('LUC') || joined.includes('TIPODELOJA') || joined.includes('LOJA') || joined.includes('AREACONTRATO');
  };
  while(start<matrix.length && !(matrix[start]||[]).some(v=>n(v))) start++;
  if(start<matrix.length && isHeaderRow(matrix[start])) start++;
  for(let i=start;i<matrix.length;i++){
    const r=matrix[i]||[];
    if(!r.some(v=>n(v))) continue;
    rows.push({
      LUC:n(r[0]),
      'Tipo de Loja':n(r[1]),
      Loja:n(r[2]),
      'Área Contrato (m²)':n(r[3]),
      __linha:i+1,
      __raw:r
    });
  }
  return rows;
}
async function readLucRowsFile(){
  const input=document.getElementById('fileLucImp');
  if(!input||!input.files||!input.files[0])throw new Error('Selecione um arquivo XLSX ou CSV para Importação LUC/Loja.');
  const f=input.files[0];
  const ext=f.name.split('.').pop().toLowerCase();
  const data=await f.arrayBuffer();
  if(ext==='csv'){
    const txt=new TextDecoder('utf-8').decode(data);
    const sep=(txt.split('\n')[0].match(/;/g)||[]).length>=(txt.split('\n')[0].match(/,/g)||[]).length?';':',';
    const matrix=txt.split(/\r?\n/).filter(x=>x.trim()).map(l=>splitCSV(l,sep));
    return lucMatrixToRows(matrix);
  }
  if(!['xls','xlsx'].includes(ext))throw new Error('Formato não aceito. Use XLSX, XLS ou CSV.');
  if(typeof XLSX==='undefined')throw new Error('Biblioteca XLSX não carregada. Para XLS/XLSX, abra com internet ou use CSV.');
  const wb=XLSX.read(data,{type:'array'});
  let rows=[];
  wb.SheetNames.forEach(sn=>{
    const matrix=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:''});
    rows=rows.concat(lucMatrixToRows(matrix));
  });
  return rows;
}
function normalizeLucImportRows(rows){
  const out=[],errors=[]; const dt=isoNow();
  rows.forEach((r,i)=>{
    const linha=r.__linha||i+2;
    /* Regra definitiva da Importação LUC/Loja:
       leitura por posição física da planilha, sem depender do nome do cabeçalho.
       A=luc | B=tipo | C=nome oficial da loja | D=área contrato */
    const raw=Array.isArray(r.__raw)?r.__raw:[];
    const luc=n(raw.length?raw[0]:r.LUC);
    const tipo=n(raw.length?raw[1]:r['Tipo de Loja']);
    const loja=n(raw.length?raw[2]:r.Loja);
    const area=n(raw.length?raw[3]:r['Área Contrato (m²)']);
    if(up(luc)==='LUC' || up(tipo)==='TIPO DE LOJA' || up(loja)==='LOJA')return;
    if(!luc&&!loja){errors.push({linha,motivo:'Registro sem LUC e sem Loja',registro:JSON.stringify(raw.length?raw:r)});return}
    if(!loja){errors.push({linha,motivo:'Coluna C (Loja oficial) vazia. Registro não importado para evitar loja com nome igual ao LUC.',registro:JSON.stringify(raw.length?raw:r)});return}
    if(up(loja)===up(luc)){errors.push({linha,motivo:'Coluna C veio igual ao LUC. Confira se o arquivo possui a Loja oficial na coluna C. Registro não importado.',registro:JSON.stringify(raw.length?raw:r)});return}
    out.push({
      id:id(),luc,tipo,nome:loja,areaContrato:area,
      piso:pisoFromLuc(luc,tipo),origem:'IMPORTACAO_LUC',dataImportacao:dt,ultimaAtualizacao:dt,
      statusAssociacao:'Pendente',observacoes:''
    })
  });
  return {lojas:out,errors};
}

/* ===== Correção V8.6 — Leitura robusta de acentuação LUC/Loja =====
   Corrige CSV salvo em UTF-8, Windows-1252/ANSI e mojibake comum de Excel.
   A importação continua fixa por posição: A=LUC, B=Tipo, C=Loja, D=Área. */
function lucDecodeArrayBufferSmart(buffer){
  const tryDecode=(enc,fatal=false)=>{try{return new TextDecoder(enc,{fatal}).decode(buffer)}catch(e){return ''}};
  let utf=tryDecode('utf-8',true);
  if(utf) return utf.replace(/^\uFEFF/,'');
  let win=tryDecode('windows-1252',false) || tryDecode('iso-8859-1',false);
  return (win||'').replace(/^\uFEFF/,'');
}
function lucRepairMojibake(s){
  s=String(s??'');
  if(!s)return '';
  // Repara texto UTF-8 lido como Windows-1252: SoluÃ§Ã£o -> Solução.
  if(/[ÃÂâ€]/.test(s)){
    try{
      const bytes=Uint8Array.from([...s].map(ch=>ch.charCodeAt(0)&255));
      const fixed=new TextDecoder('utf-8',{fatal:true}).decode(bytes);
      if(fixed && (fixed.match(/[�]/g)||[]).length <= (s.match(/[�]/g)||[]).length) s=fixed;
    }catch(e){}
  }
  const map={
    '�':'', 'Â':'',
    'Ã¡':'á','Ã¢':'â','Ã£':'ã','Ãª':'ê','Ã©':'é','Ã­':'í','Ã³':'ó','Ã´':'ô','Ãµ':'õ','Ãº':'ú','Ã§':'ç',
    'Ã�':'Á','Ã‚':'Â','Ãƒ':'Ã','Ã‰':'É','ÃŠ':'Ê','Ã“':'Ó','Ã”':'Ô','Ã•':'Õ','Ãš':'Ú','Ã‡':'Ç',
    'â€“':'-','â€”':'-','â€˜':'\'','â€™':'\'','â€œ':'"','â€�':'"','Âº':'º','Âª':'ª','Â²':'²','Â³':'³'
  };
  Object.entries(map).forEach(([a,b])=>{s=s.split(a).join(b)});
  return s.normalize('NFC').replace(/[\u0000-\u001F\u007F]/g,' ').replace(/\s+/g,' ').trim();
}
function lucCleanField(v){return lucRepairMojibake(n(v));}
function lucCleanName(v){
  let s=lucCleanField(v);
  // Mantém siglas usuais e melhora apenas apresentação básica.
  if(!s)return '';
  return s.replace(/\s+([,.;:/])/g,'$1').replace(/([(/-])\s+/g,'$1').replace(/\s+([)/-])/g,'$1').trim();
}
async function readLucRowsFile(){
  const input=document.getElementById('fileLucImp');
  if(!input||!input.files||!input.files[0])throw new Error('Selecione um arquivo XLSX ou CSV para Importação LUC/Loja.');
  const f=input.files[0];
  const ext=f.name.split('.').pop().toLowerCase();
  const data=await f.arrayBuffer();
  if(ext==='csv'){
    const txt=lucDecodeArrayBufferSmart(data);
    const first=(txt.split(/\r?\n/).find(x=>x.trim())||'');
    const sep=(first.match(/;/g)||[]).length>=(first.match(/,/g)||[]).length?';':',';
    const matrix=txt.split(/\r?\n/).filter(x=>x.trim()).map(l=>splitCSV(l,sep).map(lucCleanField));
    return lucMatrixToRows(matrix);
  }
  if(!['xls','xlsx'].includes(ext))throw new Error('Formato não aceito. Use XLSX, XLS ou CSV.');
  if(typeof XLSX==='undefined')throw new Error('Biblioteca XLSX não carregada. Para XLS/XLSX, abra com internet ou use CSV.');
  const wb=XLSX.read(data,{type:'array',cellText:false,cellDates:false});
  let rows=[];
  wb.SheetNames.forEach(sn=>{
    const matrix=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:'',raw:false}).map(row=>row.map(lucCleanField));
    rows=rows.concat(lucMatrixToRows(matrix));
  });
  return rows;
}
function normalizeLucImportRows(rows){
  const out=[],errors=[]; const dt=isoNow();
  rows.forEach((r,i)=>{
    const linha=r.__linha||i+2;
    const raw=Array.isArray(r.__raw)?r.__raw:[];
    const luc=lucCleanField(raw.length?raw[0]:r.LUC);
    const tipo=lucCleanName(raw.length?raw[1]:r['Tipo de Loja']);
    const loja=lucCleanName(raw.length?raw[2]:r.Loja);
    const area=lucCleanField(raw.length?raw[3]:r['Área Contrato (m²)']);
    if(up(luc)==='LUC' || up(tipo)==='TIPO DE LOJA' || up(loja)==='LOJA')return;
    if(!luc&&!loja){errors.push({linha,motivo:'Registro sem LUC e sem Loja',registro:JSON.stringify(raw.length?raw:r)});return}
    if(!loja){errors.push({linha,motivo:'Coluna C (Loja oficial) vazia. Registro não importado para evitar loja com nome igual ao LUC.',registro:JSON.stringify(raw.length?raw:r)});return}
    if(up(loja)===up(luc)){errors.push({linha,motivo:'Coluna C veio igual ao LUC. Confira se o arquivo possui a Loja oficial na coluna C. Registro não importado.',registro:JSON.stringify(raw.length?raw:r)});return}
    out.push({id:id(),luc,tipo,nome:loja,areaContrato:area,piso:pisoFromLuc(luc,tipo),origem:'IMPORTACAO_LUC',dataImportacao:dt,ultimaAtualizacao:dt,statusAssociacao:'Pendente',observacoes:''});
  });
  return {lojas:out,errors};
}

/* ===== Correção V8.7 — Conflitos LUC com seleção manual e bloqueio de duplicidade =====
   - 1ª coluna LUC; 2ª Loja da Base LUC.
   - Seleção manual mostra apenas lojas/locais ainda não alocados.
   - Não permite salvar Base LUC duplicada nem loja cadastrada vinculada a duas LUCs. */
function lucLocalDisponivelParaBase(local,base,currentLocalId=''){
  if(!local||!base)return false;
  if(local.baseLojaId && local.baseLojaId!==base.id)return false;
  const usadoPorOutraBase=(db.baseLojas||[]).some(b=>b.id!==base.id && b.localId===local.id && b.statusAssociacao==='Vinculada');
  if(usadoPorOutraBase)return false;
  if(base.piso && local.piso && !lucPisosCompat(local.piso,base.piso))return false;
  return true;
}
function lucLocaisDisponiveisSelect(conflito){
  ensureLucSchema();
  const base=(db.baseLojas||[]).find(b=>b.id===conflito.baseLojaId)||{};
  const locais=(db.locais||[])
    .filter(l=>lucLocalDisponivelParaBase(l,base,conflito.localId))
    .sort((a,b)=>String(a.piso||'').localeCompare(String(b.piso||''),'pt-BR') || lucOfficialName(a).localeCompare(lucOfficialName(b),'pt-BR'));
  const selected=locais.some(l=>l.id===conflito.localId)?conflito.localId:'';
  if(!locais.length)return '<span class="pill bad">Sem loja disponível</span>';
  return `<select id="lucLocalSel_${conflito.id}" style="min-width:240px;border:1px solid var(--l3a-border);border-radius:8px;padding:7px;background:#fff">
    <option value="">Selecione a loja cadastrada</option>
    ${locais.map(l=>`<option value="${esc(l.id)}" ${l.id===selected?'selected':''}>${esc((l.nomeOriginalCadastro||l.nome||lucOfficialName(l))+' • '+(l.piso||'Sem piso'))}</option>`).join('')}
  </select>`;
}
function lucValidarSemDuplicidade(base,local){
  if(!base||!local)return 'Selecione uma Base LUC e uma loja cadastrada válida.';
  const outraBaseMesmoLocal=(db.baseLojas||[]).find(b=>b.id!==base.id && b.localId===local.id && b.statusAssociacao==='Vinculada');
  if(outraBaseMesmoLocal)return `Bloqueado: a loja cadastrada já está vinculada à LUC ${outraBaseMesmoLocal.luc} - ${outraBaseMesmoLocal.nome}.`;
  if(local.baseLojaId && local.baseLojaId!==base.id){
    const b=(db.baseLojas||[]).find(x=>x.id===local.baseLojaId);
    return `Bloqueado: este local já está alocado para ${b?('LUC '+b.luc+' - '+b.nome):'outra Base LUC'}.`;
  }
  const outroLocalMesmaBase=(db.locais||[]).find(l=>l.id!==local.id && l.baseLojaId===base.id);
  if(outroLocalMesmaBase)return `Bloqueado: a LUC ${base.luc} já está atribuída ao local ${lucOfficialName(outroLocalMesmaBase)}.`;
  if(base.localId && base.localId!==local.id && base.statusAssociacao==='Vinculada'){
    const l=(db.locais||[]).find(x=>x.id===base.localId);
    return `Bloqueado: a LUC ${base.luc} já está vinculada em ${l?lucOfficialName(l):'outro local'}.`;
  }
  return '';
}
function lucConfirmarConflito(conflitoId){
  ensureLucSchema();
  const c=(db.conflitosAssociacao||[]).find(x=>x.id===conflitoId); if(!c)return;
  const base=(db.baseLojas||[]).find(x=>x.id===c.baseLojaId);
  const sel=document.getElementById('lucLocalSel_'+conflitoId);
  const localId=(sel&&sel.value)||c.localId||'';
  const local=(db.locais||[]).find(x=>x.id===localId);
  const erro=lucValidarSemDuplicidade(base,local);
  if(erro){alert(erro);return;}
  applyLucToLocal(local,base,c.percentualSimilaridade||0);
  db.conflitosAssociacao=(db.conflitosAssociacao||[]).filter(x=>x.id!==conflitoId && x.baseLojaId!==base.id && x.localId!==local.id);
  markDirty('confirmação manual conflito LUC');
  renderImportacao();
}
function lucAtribuirManual(baseLojaId,localId){
  ensureLucSchema();
  const base=(db.baseLojas||[]).find(x=>x.id===baseLojaId);
  const local=(db.locais||[]).find(x=>x.id===localId);
  const erro=lucValidarSemDuplicidade(base,local);
  if(erro){alert(erro);return false;}
  applyLucToLocal(local,base,100);
  db.conflitosAssociacao=(db.conflitosAssociacao||[]).filter(x=>x.baseLojaId!==base.id && x.localId!==local.id);
  markDirty('atribuição manual LUC');
  renderImportacao();
  return true;
}
function lucConflitosRows(){
  ensureLucSchema();
  return (db.conflitosAssociacao||[]).map(c=>{
    const base=(db.baseLojas||[]).find(b=>b.id===c.baseLojaId)||{};
    return {...c,luc:base.luc||c.luc||'',lojaBaseLuc:base.nome||c.lojaBaseLuc||'',selecaoLocal:lucLocaisDisponiveisSelect(c)};
  });
}

/* ===== Evolução V8.8 — LUC como chave lógica das Lojas / Áreas =====
   - Adiciona coluna LUC logo após Nome Oficial na tabela Lojas / Áreas.
   - Mantém compatibilidade com id interno, mas usa luc como referência lógica quando vinculado.
   - Busca por Nome Oficial, LUC e Nome Antigo.
   - Preserva locais sem associação com LUC em branco/—. */
const _ensureLucSchemaV88=ensureLucSchema;
ensureLucSchema=function(){
  _ensureLucSchemaV88();
  (db.locais||[]).forEach(l=>{
    if(l.luc===undefined)l.luc='';
    if(l.lucAssociado===undefined)l.lucAssociado=l.luc||'';
    if(l.nomeOriginalCadastro===undefined)l.nomeOriginalCadastro='';
    if(l.nomeOficial===undefined)l.nomeOficial=l.nome||'';
  });
};
function lucValorLocal(local){return local?(local.luc||local.lucAssociado||''):''}
function lucDisplayLocal(local){const v=lucValorLocal(local); return v?esc(v):'—'}
function lucNomeOficialLocal(local){return lucOfficialName(local)||local?.nomeOficial||local?.nome||''}
function lucNomeAntigoLocal(local){return local?.nomeOriginalCadastro||''}
function lucChaveLogicaLocal(local){return lucValorLocal(local)||local?.id||''}
function lucBuscaLocal(local,q){
  if(!q)return true;
  const texto=[lucNomeOficialLocal(local),lucValorLocal(local),lucNomeAntigoLocal(local),local?.nome||'',local?.tipo||'',local?.piso||'',paiName(local?.painelId),lacName(local?.lacoId),flmById(local?.flmId)?.endereco||''].join(' ');
  return up(texto).includes(up(q));
}
const _applyLucToLocalV88=applyLucToLocal;
applyLucToLocal=function(local,base,score){
  if(!local||!base)return;
  if(!local.nomeOriginalCadastro)local.nomeOriginalCadastro=local.nome||'';
  _applyLucToLocalV88(local,base,score);
  local.luc=base.luc||local.luc||'';
  local.lucAssociado=local.luc;
  local.nomeOficial=base.nome||local.nomeOficial||local.nome||'';
  local.nome=local.nomeOficial;
  local.chaveLogica=lucChaveLogicaLocal(local);
};
const _ensureLocalV88=ensureLocal;
ensureLocal=function(nome,tipo,painelId,lacoId,piso,flmId,portaId){
  const loc=_ensureLocalV88(nome,tipo,painelId,lacoId,piso,flmId,portaId);
  if(loc.luc===undefined)loc.luc='';
  if(loc.lucAssociado===undefined)loc.lucAssociado=loc.luc||'';
  if(loc.nomeOficial===undefined)loc.nomeOficial=loc.nome||'';
  if(loc.chaveLogica===undefined)loc.chaveLogica=lucChaveLogicaLocal(loc);
  return loc;
};

function saveLocal(i){
  let o=i?db.locais.find(x=>x.id===i):{id:id(),ultimaAlteracao:isoNow()};
  const novoNome=n(mNome.value);
  const lucManual=n(document.getElementById('mLuc')?.value||'');
  const baseLojaIdSel=n(document.getElementById('mBaseLojaId')?.value||'');
  if(i&&o.nome!==novoNome)db.falhas.push({id:id(),data:isoNow(),tipo:'Alteração cadastral',itemId:o.id,itemNome:o.nome,localId:o.id,status:'Nome alterado',motivo:`Nome anterior: ${o.nome} | Novo: ${novoNome}`,origem:'Cadastro'});

  o.nome=novoNome;
  o.nomeOficial=novoNome;

  o.piso=n(mPiso.value);

  openModal(`<h2>${esc(lucNomeOficialLocal(l))}</h2><p><b>LUC:</b> ${lucDisplayLocal(l)} • <b>Chave lógica:</b> ${esc(lucChaveLogicaLocal(l))} • <b>Tipo:</b> ${esc(l.tipo)} • <b>Painel:</b> ${esc(paiName(l.painelId))} • <b>Laço:</b> ${esc(lacName(l.lacoId))} • <b>Piso:</b> ${esc(l.piso)}</p>${l.nomeOriginalCadastro?`<p class="note"><b>Nome antigo:</b> ${esc(l.nomeOriginalCadastro)}</p>`:''}<h3>Histórico da loja/área</h3><div class="timeline">${hist.map(h=>`<div class="tl"><b>${esc(h.status)}</b><br><small>${esc(h.data)} • ${esc(h.itemNome||'')}</small><p>${esc(h.motivo||h.obs||'Sem observação')}</p></div>`).join('')||'<p class="msg warn">Sem histórico.</p>'}</div>`);
}

function bootSDAIManager(){
  try{
    ensureLucSchema();
    render();
    setTimeout(verificarBaseAoAbrir,50);
  }catch(e){
    console.error('Falha crítica ao iniciar SDAI Manager:', e);
    const msg=(e&&e.message)?e.message:String(e);
    document.body.innerHTML=`<div style="font-family:Arial,sans-serif;background:#f3f6fa;min-height:100vh;padding:32px;color:#101828"><div style="max-width:760px;margin:0 auto;background:#fff;border:1px solid #e2e8f1;border-radius:16px;padding:24px;box-shadow:0 8px 22px rgba(16,24,40,.08)"><h1 style="margin:0 0 8px;color:#b42318">Falha ao carregar o SDAI Manager</h1><p>O sistema encontrou um erro de inicialização. Isso normalmente ocorre por cache antigo do navegador, base local corrompida ou arquivo publicado parcialmente no GitHub.</p><p><b>Erro técnico:</b> ${msg}</p><button onclick="localStorage.removeItem('sdai_bosch_manager_v4_flm_portas:currentUserId'); location.reload();" style="background:#0B5FAD;color:#fff;border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer">Recarregar sessão</button><button onclick="localStorage.removeItem('sdai_bosch_manager_v4_flm_portas'); localStorage.removeItem('sdai_bosch_manager_v4_flm_portas:currentUserId'); location.reload();" style="margin-left:8px;background:#fff;color:#0B5FAD;border:1px solid #cbd6e4;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer">Limpar base local e abrir</button></div></div>`;
  }
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',bootSDAIManager);
}else{
  bootSDAIManager();
}
</script>
</body>
