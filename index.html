  openModal(`<h2>${i?'Editar':'Nova'} Loja / Área</h2><p class="msg warn">Selecione a loja correta na lista da Base LUC — o Nome Oficial e o LUC são preenchidos automaticamente, sem risco de erro de digitação. Use isso para corrigir associações erradas feitas pela automação.</p><div class="formGrid"><div class="field" style="grid-column:1/-1"><label>Selecionar loja da Base LUC</label><select id="mBaseLojaSelect" onchange="onSelectBaseLojaModal(this)">${lucBaseLojaOptionsHtml(o.baseLojaId||'')}</select></div><div class="field"><label>Nome Oficial</label><input id="mNome" value="${esc(nomeAtual)}"></div><div class="field"><label>LUC</label><input id="mLuc" value="${esc(lucAtual)}" placeholder="—"><input type="hidden" id="mBaseLojaId" value="${esc(o.baseLojaId||'')}"></div><div class="field"><label>Classificação</label><select id="mTipo"><option ${o.tipo==='Loja'?'selected':''}>Loja</option><option ${o.tipo==='Área Técnica'?'selected':''}>Área Técnica</option><option ${o.tipo==='Área Comum'?'selected':''}>Área Comum</option></select></div><div class="field"><label>Sistema</label><select id="mSistema">${SISTEMA_LACO_OPTIONS.map(op=>`<option value="${esc(op)}" ${(o.sistema||'SDAI')===op?'selected':''}>${op}</option>`).join('')}</select></div><div class="field"><label>Piso</label><input id="mPiso" value="${esc(o.piso)}"></div><div class="field"><label>Status</label><select id="mStatus">${STATUS_SISTEMA_OPTIONS.map(st=>`<option ${normalizeStatus(o.status)===st?'selected':''}>${st}</option>`).join('')}</select></div><div class="field"><label>Nome antigo / cadastro original</label><input id="mNomeOriginal" value="${esc(o.nomeOriginalCadastro||'')}" placeholder="Preenchido ao vincular Base LUC"></div></div><br><button class="btn" onclick="saveLocal('${i}')">Salvar</button> <button class="btn secondary" onclick="closeModal()">Cancelar</button>`);
}
function saveLocal(i){
  let o=i?db.locais.find(x=>x.id===i):{id:id(),ultimaAlteracao:isoNow()};
  const novoNome=n(mNome.value);
  const lucManual=n(document.getElementById('mLuc')?.value||'');
  const baseLojaIdSel=n(document.getElementById('mBaseLojaId')?.value||'');
  if(i&&o.nome!==novoNome)logLocal('Loja/Área',o.id,'Alteração cadastral',`Nome anterior: ${o.nome} | Novo: ${novoNome}`);
  if(!o.nomeOriginalCadastro)o.nomeOriginalCadastro=n(document.getElementById('mNomeOriginal')?.value)||((i&&o.nome&&o.nome!==novoNome)?o.nome:'');
  else o.nomeOriginalCadastro=n(document.getElementById('mNomeOriginal')?.value)||o.nomeOriginalCadastro;
  o.nome=novoNome;
  o.nomeOficial=novoNome;
  if(lucManual&&lucManual!==(o.luc||''))o.lucEditadoManual=true;
  if(baseLojaIdSel){
    o.baseLojaId=baseLojaIdSel;
    o.lucEditadoManual=false;
    const baseSel=(db.baseLojas||[]).find(b=>b.id===baseLojaIdSel);
    if(baseSel){baseSel.statusAssociacao='Vinculada';baseSel.localId=o.id;baseSel.ultimaAtualizacao=isoNow()}
  }
  o.luc=lucManual||o.luc||'';
  o.lucAssociado=o.luc;
  o.chaveLogica=lucChaveLogicaLocal(o);
  o.tipo=mTipo.value;
  o.sistema=document.getElementById('mSistema')?.value||o.sistema||'SDAI';
  o.piso=n(mPiso.value);
  o.status=normalizeStatus(mStatus.value);
  o.ultimaAlteracao=isoNow();
  if(!i){db.locais.push(o); logLocal('Loja/Área',o.id,'criar','Loja/Área criada manualmente: '+o.nome)}
  lucSincronizarIrmaos(o);
  closeModal();save();
}
function openLocal(i){
  ensureLucSchema();
  let l=db.locais.find(x=>x.id===i); if(!l)return;
  let hist=db.falhas.filter(f=>f.localId===i||f.itemId===i).sort((a,b)=>String(b.data).localeCompare(String(a.data)));
  openModal(`<h2>${esc(lucNomeOficialLocal(l))}</h2><p><b>LUC:</b> ${lucDisplayLocal(l)} • <b>Chave lógica:</b> ${esc(lucChaveLogicaLocal(l))} • <b>Tipo:</b> ${esc(l.tipo)} • <b>Painel:</b> ${esc(paiName(l.painelId))} • <b>Laço:</b> ${esc(lacName(l.lacoId))} • <b>Piso:</b> ${esc(l.piso)}</p>${l.nomeOriginalCadastro?`<p class="note"><b>Nome antigo:</b> ${esc(l.nomeOriginalCadastro)}</p>`:''}<h3>Histórico da loja/área</h3><div class="timeline">${hist.map(h=>`<div class="tl"><b>${esc(h.status)}</b><br><small>${esc(h.data)} • ${esc(h.itemNome||'')}</small><p>${esc(h.motivo||h.obs||'Sem observação')}</p></div>`).join('')||'<p class="msg warn">Sem histórico.</p>'}</div>`);
}

/* =========================================================================
   MÓDULO PLANTAS BAIXAS INTERATIVAS (2026-07)
   -------------------------------------------------------------------------
   Especificação: tela "Plantas" com plantas baixas empilhadas por piso,
   pinos de dispositivos/lojas posicionados por arrastar-e-soltar (Pointer
   Events, nunca HTML5 DnD), coordenadas percentuais relativas ao container,
   zoom/pan próprios, estados agregados de loja, e integração total com o
   restante do sistema (db, save(), modal de detalhe existente, RBAC).
   renderPlantas() é PURA (lê db, escreve HTML); estado efêmero de UI vive
   em plantasUI e é reaplicado a cada re-render.
   ========================================================================= */
const plantasUI={edit:false,zoom:{},pan:{},filtro:{tipo:'',piso:'',q:''}};
function plantasOrdenadas(){return (db.plantas||[]).filter(p=>p.ativo!==false).slice().sort((a,b)=>(a.ordem??99)-(b.ordem??99))}
function podeEditarPlantas(){return can('posicionarPlanta')}

// Itens plotáveis: lojas (db.locais), equipamentos e módulos FLM. Cada um vira {kind,id,ref,...}.
function plantaTipoEquip(e){const t=up(e.tipo||'');if(t.includes('ACIONADOR'))return 'Acionador';if(t.includes('SIREN'))return 'Sirene';if(t.includes('MODULO')||t.includes('MÓDULO')||t.includes('FLM'))return 'Módulo FLM';return 'Detector'}
function plantaItens(){
  const its=[];
  (db.locais||[]).forEach(l=>its.push({kind:'local',id:l.id,ref:l,tipoFiltro:'Loja',nome:l.nomeOficial||l.nome,sub:pisoEfetivo(l)||l.piso||'',piso:pisoEfetivo(l)||n(l.piso)}));
  (db.equipamentos||[]).forEach(e=>its.push({kind:'equip',id:e.id,ref:e,tipoFiltro:plantaTipoEquip(e),nome:(e.tipo||'Equipamento')+' '+(e.endereco||e.modelo||''),sub:locName(e.localId)||'',piso:pisoEfetivo(e)}));
  (db.flms||[]).forEach(f=>its.push({kind:'flm',id:f.id,ref:f,tipoFiltro:'Módulo FLM',nome:'Módulo '+(f.endereco||f.modelo||''),sub:'Endereço LSN: '+(f.endereco||'—'),piso:pisoEfetivo(f)}));
  return its;
}
function plantaItemById(kind,id_){if(kind==='local')return (db.locais||[]).find(x=>x.id===id_);if(kind==='equip')return (db.equipamentos||[]).find(x=>x.id===id_);if(kind==='flm')return (db.flms||[]).find(x=>x.id===id_);return null}

// Status agregado da LOJA (spec seção 5.2): falha > desativação > operação.
function statusAgregadoLoja(localId){
  const eqs=(db.equipamentos||[]).filter(e=>e.localId===localId);
  const flmsDaLoja=(db.portas||[]).filter(p=>p.localId===localId).map(p=>p.flmId);
  const stats=[...eqs.map(e=>normalizeStatus(e.status)),...flmsDaLoja.map(fid=>flmStatusAgregado(fid))];
  const loja=(db.locais||[]).find(x=>x.id===localId);
  if(loja&&loja.status)stats.push(normalizeStatus(loja.status));
  const falhas=stats.filter(s=>isFalhaStatus(s)).length;
  if(falhas)return {estado:'falha',falhas};
  if(stats.length&&stats.every(s=>isDesativadoStatus(s)))return {estado:'desativado',falhas:0};
  return {estado:'ok',falhas:0};
}
function plantaFalhasAbertasLoja(localId){return (db.falhas||[]).filter(f=>f.localId===localId&&!f.resolvidaEm&&!f.excluida&&isFalhaStatus(f.status)).length}
function plantaStatusClassEquip(st){st=normalizeStatus(st);if(isFalhaStatus(st))return 'st-bad';if(isTesteStatus(st))return 'st-warn';if(isDesativadoStatus(st))return 'st-off';return 'st-ok'}

const PLANTA_ICONES={
  Loja:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10 5.5 4h13L20 10M5 10v10h14V10M9.5 20v-6h5v6"/></svg>',
  Detector:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="12" cy="12" r="7.5"/><circle cx="12" cy="12" r="2.2" fill="currentColor" stroke="none"/></svg>',
  Acionador:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="14" height="14" rx="2"/><circle cx="12" cy="12" r="2.4" fill="currentColor" stroke="none"/></svg>',
  Sirene:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 18h12M8 18v-5a4 4 0 0 1 8 0v5M12 5v2M5.5 7.5 7 9M18.5 7.5 17 9"/></svg>',
  'Módulo FLM':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><rect x="4.5" y="7" width="15" height="10" rx="2"/><path d="M8 7V5M16 7V5M8 19v-2M16 19v-2"/></svg>',
  power:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 4v7"/><path d="M7 7a7 7 0 1 0 10 0"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5 10 17.5 19 7"/></svg>'
};

function renderPlantas(){
  const el=document.getElementById('plantas'); if(!el)return;
  db.plantas=db.plantas||[];
  const plantas=plantasOrdenadas();
  const itens=plantaItens();
  const posicionados=itens.filter(i=>i.ref.plantaX!=null&&i.ref.plantaX!=='').length;
  const naoPosic=itens.length-posicionados;
  const lojasFalha=(db.locais||[]).filter(l=>statusAgregadoLoja(l.id).estado==='falha').length;
  const plantaIds=new Set((db.plantas||[]).map(p=>p.id));
  // Inconsistências (spec 8.2/8.4): plantaId órfão (planta excluída) ou piso divergente da planta.
  const inconsistentes=itens.filter(i=>{
    if(i.ref.plantaX==null||i.ref.plantaX==='')return false;
    if(i.ref.plantaId&&!plantaIds.has(i.ref.plantaId))return true;
    const pl=(db.plantas||[]).find(p=>p.id===i.ref.plantaId);
    return pl&&up(pl.piso||'')!==up(i.piso||'')&&!!i.piso;
  });

  const f=plantasUI.filtro;
  const pisosDisponiveis=unique(itens.map(i=>i.piso).filter(Boolean));
  const chips=itens.filter(i=>(i.ref.plantaX==null||i.ref.plantaX==='')&&(!f.tipo||i.tipoFiltro===f.tipo)&&(!f.piso||i.piso===f.piso)&&(!f.q||up(i.nome+' '+i.sub).includes(up(f.q)))).slice(0,400);

  const legenda=`<div class="plantaLegenda">
    <span><i class="lg" style="background:#15803D"></i>Em operação</span>
    <span><i class="lg" style="background:#B42318"></i>Falha</span>
    <span><i class="lg" style="background:#B45309"></i>Em teste</span>
    <span><i class="lg" style="background:#8695AB"></i>Desativado</span>
    <span style="border-left:1px solid var(--l3a-border);padding-left:12px"><i class="lg" style="background:#B42318;box-shadow:0 0 0 3px rgba(180,35,24,.25)"></i>Loja com falha (sirene pulsando)</span>
    <span><i class="lg" style="background:#8695AB;opacity:.6"></i>Loja desativada</span>
    <span><i class="lg" style="background:#15803D"></i>Loja OK</span>
  </div>`;

  const blocos=plantas.map(pl=>{
    const pins=itens.filter(i=>i.ref.plantaId===pl.id&&i.ref.plantaX!=null&&i.ref.plantaX!=='');
    // Deslocamento visual determinístico para pinos sobrepostos (spec 8.3) — só visual, dados intactos.
    const offset={};
    pins.forEach((i,ix)=>{
      let dx=0,dy=0;
      for(let j=0;j<ix;j++){
        const o=pins[j];
        if(Math.abs(o.ref.plantaX-i.ref.plantaX)<2&&Math.abs(o.ref.plantaY-i.ref.plantaY)<2){
          const h=[...String(i.id)].reduce((a,c)=>a+c.charCodeAt(0),0);
          dx=((h%3)-1)*6; dy=((h>>2)%3-1)*6; break;
        }
      }
      offset[i.kind+':'+i.id]=[dx,dy];
    });
    const pinsHtml=pins.map(i=>{
      const [dx,dy]=offset[i.kind+':'+i.id]||[0,0];
      let cls,inner,badge='',nome='';
      if(i.kind==='local'){
        const ag=statusAgregadoLoja(i.id);
        cls=ag.estado==='falha'?'st-bad lojaFalha':ag.estado==='desativado'?'st-off':'st-ok';
        inner=ag.estado==='falha'?PLANTA_ICONES.Sirene:ag.estado==='desativado'?PLANTA_ICONES.power:PLANTA_ICONES.check;
        const nf=ag.estado==='falha'?plantaFalhasAbertasLoja(i.id):0;
        if(nf)badge=`<span class="pinBadge">${nf}</span>`;
        nome=`<span class="pinNome">${esc(i.nome)}</span>`;
      } else {
        const st=i.kind==='flm'?flmStatusAgregado(i.id):i.ref.status;
        cls=plantaStatusClassEquip(st);
        inner=PLANTA_ICONES[i.tipoFiltro]||PLANTA_ICONES.Detector;
      }
      const tip=i.kind==='local'?`${i.nome} • ${i.piso||''}`:`${i.nome} • ${esc(i.sub)} • ${normalizeStatus(i.kind==='flm'?flmStatusAgregado(i.id):i.ref.status)}`;
      return `<div class="plantaPin ${cls}" data-kind="${i.kind}" data-id="${esc(i.id)}" style="left:${i.ref.plantaX}%;top:${i.ref.plantaY}%;margin-left:${dx}px;margin-top:${dy}px" title="${esc(tip)}">${badge}<span class="pinDot">${inner}</span>${nome}</div>`;
    }).join('');
    const z=plantasUI.zoom[pl.id]||1;
    const pan=plantasUI.pan[pl.id]||{x:0,y:0};
    const corpo=pl.imagemUrl
      ?`<div class="plantaViewport" data-planta="${esc(pl.id)}">
          <div class="plantaCanvas ${z<0.8?'plantaZoomOut':''}" data-planta-canvas="${esc(pl.id)}" style="aspect-ratio:${pl.imagemW||4}/${pl.imagemH||3};transform:translate(${pan.x}px,${pan.y}px) scale(${z})">
            <img class="plantaImg" src="${esc(pl.imagemUrl)}" alt="Planta ${esc(pl.piso)}">
            ${pinsHtml}
          </div>
        </div>`
      :`<div class="plantaViewport" data-planta="${esc(pl.id)}"><div class="plantaPlaceholder">
          ${pl.uploadFalhou?'<b>Falha no envio da imagem.</b>':'Nenhuma imagem carregada para esta planta.'}
          ${podeEditarPlantas()?`<label class="btn secondary small" style="cursor:pointer">${pl.uploadFalhou?'Tentar novamente':'Enviar imagem / PDF'}<input type="file" accept="image/*,.pdf" style="display:none" onchange="uploadPlantaArquivo('${esc(pl.id)}',this.files[0]);this.value=''"></label>`:''}
        </div></div>`;
    return `<div class="plantaBloco" data-planta-bloco="${esc(pl.id)}">
      <div class="plantaBlocoHead">
        <div><h3>${esc(pl.titulo||('Planta — '+pl.piso))}</h3><span class="pMeta">${esc(pl.piso)} • ${pins.length} pino(s)</span></div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <div class="plantaZoomBtns">
            <button class="iconBtn" title="Aproximar" onclick="plantaZoom('${esc(pl.id)}',1.25)">＋</button>
            <button class="iconBtn" title="Afastar" onclick="plantaZoom('${esc(pl.id)}',0.8)">−</button>
            <button class="iconBtn" title="Restaurar" onclick="plantaZoom('${esc(pl.id)}',0)">⟲</button>
          </div>
          ${podeEditarPlantas()&&pl.imagemUrl?`<label class="iconBtn" title="Trocar imagem" style="cursor:pointer">🖼<input type="file" accept="image/*,.pdf" style="display:none" onchange="uploadPlantaArquivo('${esc(pl.id)}',this.files[0]);this.value=''"></label>`:''}
          ${isMaster(currentUserSafe())?`<button class="iconBtn" title="Editar planta" onclick="formPlantaBaixa('${esc(pl.id)}')">✏</button>`:''}
        </div>
      </div>
      ${corpo}
    </div>`;
  }).join('');

  const chipsHtml=chips.map(i=>`<div class="plantaChip" data-chip-kind="${i.kind}" data-chip-id="${esc(i.id)}"><i style="color:var(--l3a-primary);width:14px;height:14px">${PLANTA_ICONES[i.tipoFiltro]||PLANTA_ICONES.Detector}</i><span class="cNome">${esc(i.nome)}<span class="cSub">${esc([i.tipoFiltro,i.piso,i.sub].filter(Boolean).join(' • '))}</span></span></div>`).join('')||'<p class="mutedLine" style="font-size:12px">Nenhum item pendente com esses filtros.</p>';

  const inconsHtml=inconsistentes.length?`<div class="card" style="padding:12px 16px;margin-bottom:12px;border-left:4px solid var(--l3a-warning,#B45309)">
    <h4 style="margin:0 0 8px;font-size:13px">Inconsistências de posicionamento (${inconsistentes.length})</h4>
    ${inconsistentes.slice(0,30).map(i=>{
      const pl=(db.plantas||[]).find(p=>p.id===i.ref.plantaId);
      const motivo=pl?`piso do item é "${esc(i.piso)}", mas está posicionado na planta "${esc(pl.piso)}"`:'posição salva de planta removida';
      return `<div style="display:flex;justify-content:space-between;gap:8px;align-items:center;font-size:12px;padding:4px 0;border-bottom:1px dashed var(--l3a-border)"><span><b>${esc(i.nome)}</b> — ${motivo}</span><span style="display:flex;gap:4px;white-space:nowrap"><button class="btn small secondary" onclick="plantaLimparPosicao('${i.kind}','${esc(i.id)}')">Limpar posição</button><button class="btn small secondary" onclick="plantaManterPosicao('${i.kind}','${esc(i.id)}')">Manter onde está</button></span></div>`;
    }).join('')}
    ${inconsistentes.length>30?`<p class="mutedLine" style="font-size:11px">…e mais ${inconsistentes.length-30}. <button class="btn small secondary" onclick="plantaLimparTodasInconsistencias()">Limpar todas em massa</button></p>`:`<p style="margin:6px 0 0"><button class="btn small secondary" onclick="plantaLimparTodasInconsistencias()">Limpar todas em massa</button></p>`}
  </div>`:'';

  const gerenciarHtml=isMaster(currentUserSafe())?`<div class="card" style="padding:12px 16px;margin-top:14px">
    <h4 style="margin:0 0 8px;font-size:13px">Gerenciar plantas</h4>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <button class="btn small" onclick="formPlantaBaixa()">+ Adicionar planta</button>
      ${(db.plantas||[]).map(p=>`<span class="pill ${p.ativo===false?'warn':''}" style="cursor:pointer" onclick="formPlantaBaixa('${esc(p.id)}')">${esc(p.piso)}${p.ativo===false?' (oculta)':''}</span>`).join('')}
    </div>
  </div>`:'';

  el.innerHTML=`
    ${dsKpiStrip([['Plantas',plantas.length,''],['Pinos posicionados',posicionados,'ok'],['Não posicionados',naoPosic,naoPosic>0?'warn':'ok'],['Lojas em falha',lojasFalha,lojasFalha>0?'bad':'ok']])}
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px">
      ${legenda}
      ${podeEditarPlantas()?`<label style="display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap"><input type="checkbox" ${plantasUI.edit?'checked':''} onchange="plantasUI.edit=this.checked;renderPlantas()"> ✏️ Modo posicionamento</label>`:''}
    </div>
    ${inconsHtml}
    <div class="plantasLayout">
      <aside class="plantasSide">
        <h4>Itens não posicionados (${chips.length})</h4>
        <div class="dsFilters" style="display:flex;flex-direction:column;gap:6px">
          <input placeholder="Buscar..." value="${esc(f.q)}" oninput="plantasUI.filtro.q=this.value;renderPlantas()" style="font-size:12px">
          <select onchange="plantasUI.filtro.tipo=this.value;renderPlantas()" style="font-size:12px">${selectOpts(['Loja','Detector','Acionador','Sirene','Módulo FLM'],f.tipo,'Todos os tipos')}</select>
          <select onchange="plantasUI.filtro.piso=this.value;renderPlantas()" style="font-size:12px">${selectOpts(pisosDisponiveis,f.piso,'Todos os pisos')}</select>
        </div>
        ${plantasUI.edit?'<p class="mutedLine" style="font-size:11px">Arraste um item para a planta correspondente.</p>':'<p class="mutedLine" style="font-size:11px">Ative o "Modo posicionamento" para arrastar.</p>'}
        ${chipsHtml}
      </aside>
      <div class="plantasMain">
        ${blocos||'<div class="emptyState">Nenhuma planta cadastrada.'+(isMaster(currentUserSafe())?' Use "Gerenciar plantas" abaixo para adicionar a primeira.':'')+'</div>'}
        ${gerenciarHtml}
      </div>
    </div>`;
  plantaBindEventos(el);
  plantaObservarViewport(el);
}

// Pausa a animação de pulso quando a planta sai do viewport (spec 5.2).
let _plantaIO=null;
function plantaObservarViewport(root){
  if(_plantaIO)_plantaIO.disconnect();
  if(typeof IntersectionObserver==='undefined'){root.querySelectorAll('.plantaBloco').forEach(b=>b.classList.add('animOn'));return}
  _plantaIO=new IntersectionObserver(entries=>entries.forEach(en=>en.target.classList.toggle('animOn',en.isIntersecting)),{threshold:0.05});
  root.querySelectorAll('.plantaBloco').forEach(b=>_plantaIO.observe(b));
}

function plantaZoom(plantaId,fator){
  if(!fator){plantasUI.zoom[plantaId]=1;plantasUI.pan[plantaId]={x:0,y:0}}
  else plantasUI.zoom[plantaId]=Math.min(4,Math.max(0.4,(plantasUI.zoom[plantaId]||1)*fator));
  renderPlantas();
}

// ---- Arrastar-e-soltar com Pointer Events (spec 4.3) ----
let _plantaDrag=null;
function plantaBindEventos(root){
  root.querySelectorAll('.plantaChip').forEach(chip=>{
    chip.addEventListener('pointerdown',ev=>{
      if(!plantasUI.edit)return;
      plantaIniciarDrag(ev,chip.dataset.chipKind,chip.dataset.chipId,chip);
    });
  });
  root.querySelectorAll('.plantaPin').forEach(pin=>{
    pin.addEventListener('pointerdown',ev=>{
      plantaIniciarDrag(ev,pin.dataset.kind,pin.dataset.id,pin); // clique também passa por aqui (distinção <6px)
    });
  });
  // Zoom com Ctrl+roda e pan por arrasto do fundo
  root.querySelectorAll('.plantaViewport').forEach(vp=>{
    const pid=vp.dataset.planta;
    vp.addEventListener('wheel',ev=>{
      if(!ev.ctrlKey)return;
      ev.preventDefault();
      plantasUI.zoom[pid]=Math.min(4,Math.max(0.4,(plantasUI.zoom[pid]||1)*(ev.deltaY<0?1.12:0.89)));
      const cv=vp.querySelector('.plantaCanvas'); const z=plantasUI.zoom[pid]; const pan=plantasUI.pan[pid]||{x:0,y:0};
      if(cv){cv.style.transform=`translate(${pan.x}px,${pan.y}px) scale(${z})`;cv.classList.toggle('plantaZoomOut',z<0.8)}
    },{passive:false});
    vp.addEventListener('pointerdown',ev=>{
      if(ev.target.closest('.plantaPin')||ev.target.closest('.plantaChip'))return;
      const z=plantasUI.zoom[pid]||1; if(z<=1)return;
      const start={x:ev.clientX,y:ev.clientY}; const pan0={...(plantasUI.pan[pid]||{x:0,y:0})};
      const cv=vp.querySelector('.plantaCanvas');
      const move=e2=>{const nx=pan0.x+(e2.clientX-start.x),ny=pan0.y+(e2.clientY-start.y);plantasUI.pan[pid]={x:nx,y:ny};if(cv)cv.style.transform=`translate(${nx}px,${ny}px) scale(${z})`};
      const upH=()=>{window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',upH)};
      window.addEventListener('pointermove',move);window.addEventListener('pointerup',upH);
    });
  });
}
function plantaIniciarDrag(ev,kind,id_,origemEl){
  ev.preventDefault();
  const start={x:ev.clientX,y:ev.clientY};
  let ghost=null,moved=false,alvoAtual=null;
  const move=e2=>{
    const dist=Math.hypot(e2.clientX-start.x,e2.clientY-start.y);
    if(!moved&&dist<6)return;
    if(!plantasUI.edit){ // sem modo edição, nunca vira arrasto
      return;
    }
    if(!moved){
      moved=true;
      ghost=origemEl.cloneNode(true);
      ghost.classList.add('plantaGhost');
      ghost.style.width=origemEl.offsetWidth+'px';
      document.body.appendChild(ghost);
    }
    ghost.style.left=e2.clientX+'px';ghost.style.top=e2.clientY+'px';
    const sob=document.elementFromPoint(e2.clientX,e2.clientY);
    const vp=sob?sob.closest('.plantaViewport'):null;
    if(alvoAtual&&alvoAtual!==vp)alvoAtual.classList.remove('plantaDropAlvo');
    alvoAtual=vp;
    if(vp)vp.classList.add('plantaDropAlvo');
  };
  const upH=e2=>{
    window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',upH);
    if(ghost)ghost.remove();
    if(alvoAtual)alvoAtual.classList.remove('plantaDropAlvo');
    if(!moved){plantaCliquePino(kind,id_);return} // clique (<6px) abre detalhe
    if(!alvoAtual)return; // soltou fora de qualquer planta: cancela
    const plantaId=alvoAtual.dataset.planta;
    const pl=(db.plantas||[]).find(p=>p.id===plantaId); if(!pl||!pl.imagemUrl)return;
    const item=plantaItemById(kind,id_); if(!item)return;
    const pisoItem=pisoEfetivo(item)||n(item.piso);
    if(pisoItem&&up(pl.piso||'')!==up(pisoItem)){
      if(!confirm(`Este item pertence ao ${pisoItem}, mas você está soltando no ${pl.piso}. Posicionar mesmo assim?`))return;
    }
    // O rect do canvas JÁ reflete o transform (zoom/pan) — a fórmula percentual continua correta em qualquer zoom.
    const cv=alvoAtual.querySelector('.plantaCanvas'); if(!cv)return;
    const rect=cv.getBoundingClientRect();
    const x=Math.min(100,Math.max(0,(e2.clientX-rect.left)/rect.width*100));
    const y=Math.min(100,Math.max(0,(e2.clientY-rect.top)/rect.height*100));
    item.plantaX=Math.round(x*100)/100; item.plantaY=Math.round(y*100)/100; item.plantaId=plantaId;
    try{logLocal('Plantas',id_,'posicionamento',`${kind} posicionado na planta ${pl.piso} (${item.plantaX}%, ${item.plantaY}%)`)}catch(e){}
    save();
  };
  window.addEventListener('pointermove',move);
  window.addEventListener('pointerup',upH);
  try{ev.target.setPointerCapture&&ev.target.releasePointerCapture(ev.pointerId)}catch(e){}
}
function plantaCliquePino(kind,id_){
  if(plantasUI.edit){ // modo edição: popover com detalhe + remover posição
    const item=plantaItemById(kind,id_); if(!item)return;
    const nome=kind==='local'?(item.nomeOficial||item.nome):kind==='flm'?('Módulo '+(item.endereco||item.modelo)):(item.tipo+' '+(item.endereco||item.modelo||''));
    openModal(`<h2>${esc(nome)}</h2><div class="maisOpcoesLista">
      <button class="btn secondary" onclick="closeModal();plantaAbrirDetalhe('${kind}','${esc(id_)}')">Abrir detalhe</button>
      <button class="btn danger" onclick="plantaLimparPosicao('${kind}','${esc(id_)}');closeModal()">✕ Remover da planta</button>
    </div><br><button class="btn secondary" onclick="closeModal()">Fechar</button>`);
    return;
  }
  plantaAbrirDetalhe(kind,id_);
}
function plantaAbrirDetalhe(kind,id_){
  if(kind==='local')return openLocal(id_);
  if(kind==='equip')return openEquip(id_);
  if(kind==='flm')return managePortas(id_);
}
function plantaLimparPosicao(kind,id_){const item=plantaItemById(kind,id_);if(!item)return;item.plantaX=null;item.plantaY=null;item.plantaId=null;try{logLocal('Plantas',id_,'posicionamento','posição removida da planta')}catch(e){};save()}
function plantaManterPosicao(kind,id_){const item=plantaItemById(kind,id_);if(!item)return;const pl=(db.plantas||[]).find(p=>p.id===item.plantaId);if(pl){item.pisoPlantaConfirmado=pl.piso}else{item.plantaId=null;item.plantaX=null;item.plantaY=null}save()}
function plantaLimparTodasInconsistencias(){
  if(!confirm('Limpar a posição de TODOS os itens inconsistentes? Eles voltam à lista de não posicionados.'))return;
  const plantaIds=new Set((db.plantas||[]).map(p=>p.id));
  plantaItens().forEach(i=>{
    if(i.ref.plantaX==null||i.ref.plantaX==='')return;
    const pl=(db.plantas||[]).find(p=>p.id===i.ref.plantaId);
    const orfao=i.ref.plantaId&&!plantaIds.has(i.ref.plantaId);
    const pisoDiverge=pl&&i.piso&&up(pl.piso||'')!==up(i.piso||'');
    if(orfao||pisoDiverge){i.ref.plantaX=null;i.ref.plantaY=null;i.ref.plantaId=null}
  });
  save();
}

// ---- CRUD de plantas (Administrador) ----
function formPlantaBaixa(i=''){
  const o=(db.plantas||[]).find(x=>x.id===i)||{};
  const pisos=unique([...(db.lacos||[]).map(l=>l.piso),...(db.locais||[]).map(l=>pisoEfetivo(l))].filter(Boolean));
  openModal(`<h2>${i?'Editar':'Nova'} planta baixa</h2><div class="formGrid">
    <div class="field"><label>Piso</label><input id="mPlPiso" list="plPisosList" value="${esc(o.piso||'')}" placeholder="Ex.: Piso 1"><datalist id="plPisosList">${pisos.map(p=>`<option value="${esc(p)}">`).join('')}</datalist></div>
    <div class="field"><label>Título</label><input id="mPlTitulo" value="${esc(o.titulo||'')}" placeholder="Planta — {piso}"></div>
    <div class="field"><label>Ordem na pilha (menor = mais acima)</label><input id="mPlOrdem" type="number" value="${esc(o.ordem??((db.plantas||[]).length+1))}"></div>
    <div class="field"><label>Ativa</label><select id="mPlAtivo"><option value="1" ${o.ativo!==false?'selected':''}>Sim</option><option value="0" ${o.ativo===false?'selected':''}>Não (oculta)</option></select></div>
    ${i?'':'<div class="field" style="grid-column:1/-1"><p class="mutedLine">Salve a planta primeiro; o upload da imagem/PDF fica disponível no bloco dela na tela.</p></div>'}
  </div><br>
  <button class="btn" onclick="savePlantaBaixa('${esc(i)}')">Salvar</button>
  ${i?`<button class="btn danger" onclick="delPlantaBaixa('${esc(i)}')">Excluir planta</button>`:''}
  <button class="btn secondary" onclick="closeModal()">Cancelar</button>`);
}
function savePlantaBaixa(i){
  const piso=n(document.getElementById('mPlPiso')?.value); if(!piso){alert('Informe o piso.');return}
  let o=i?(db.plantas||[]).find(x=>x.id===i):null;
  if(!o){o={id:id(),criadoEm:isoNow(),imagemUrl:'',imagemW:0,imagemH:0};db.plantas.push(o)}
  o.piso=piso;
  o.titulo=n(document.getElementById('mPlTitulo')?.value)||('Planta — '+piso);
  o.ordem=Number(document.getElementById('mPlOrdem')?.value)||1;
  o.ativo=document.getElementById('mPlAtivo')?.value!=='0';
  o.atualizadoEm=isoNow();
  closeModal(); save();
}
function delPlantaBaixa(i){
  if(!confirm('Excluir esta planta baixa? Os itens posicionados NÃO perdem os dados — voltam à lista de não posicionados.'))return;
  if(!confirm('Confirma a exclusão definitiva da planta? (segunda confirmação)'))return;
  db.plantas=(db.plantas||[]).filter(x=>x.id!==i);
  // spec 7: NÃO apagar plantaX/Y das entidades — plantaId fica órfão e cai na seção de inconsistências.
  closeModal(); save();
}

// ---- Upload de imagem/PDF da planta (reuso do pipeline de fotos, spec 3) ----
async function uploadPlantaArquivo(plantaId,file){
  if(!file)return;
  const pl=(db.plantas||[]).find(x=>x.id===plantaId); if(!pl)return;
  pl.uploadFalhou=false;
  try{
    ensurePhotoUploadFrame();
    if(/pdf$/i.test(file.type)||/\.pdf$/i.test(file.name||'')){
      const dataUrl=await plantaPdfParaImagem(file); // dataURL efêmero: NUNCA gravado no db
      _fotoUploadQueue.push({planoId:plantaId,dataUrl,filename:(file.name||'planta').replace(/\.pdf$/i,'')+'.jpg',destino:'planta'});
    } else {
      _fotoUploadQueue.push({planoId:plantaId,file,destino:'planta'});
    }
    if(currentView==='plantas')renderPlantas();
    processFotoQueue();
    alert('Envio da planta iniciado. A imagem aparece automaticamente quando o upload concluir (pode levar até alguns minutos).');
  }catch(e){pl.uploadFalhou=true;renderPlantas();alert('Falha ao preparar a planta: '+e.message)}
}
function plantaPdfParaImagem(file){
  return new Promise((resolve,reject)=>{
    const rodar=()=>{
      const reader=new FileReader();
      reader.onload=async ev=>{
        try{
          const pdf=await window.pdfjsLib.getDocument({data:new Uint8Array(ev.target.result)}).promise;
          const page=await pdf.getPage(1);
          const vp1=page.getViewport({scale:1});
          const scale=2000/vp1.width;
          const vp=page.getViewport({scale});
          const canvas=document.createElement('canvas');canvas.width=vp.width;canvas.height=vp.height;
          await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
          resolve(canvas.toDataURL('image/jpeg',0.85));
        }catch(e){reject(e)}
      };
      reader.onerror=()=>reject(new Error('Não foi possível ler o PDF.'));
      reader.readAsArrayBuffer(file);
    };
    if(window.pdfjsLib){rodar();return}
    // Carrega PDF.js sob demanda (só quando alguém envia um PDF de planta)
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload=()=>{try{window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'}catch(e){};rodar()};
    s.onerror=()=>reject(new Error('Não foi possível carregar o conversor de PDF (PDF.js). Verifique a conexão ou envie a planta já convertida em imagem.'));
    document.body.appendChild(s);
  });
}

/* =========================================================================
   NOTIFICAÇÕES POR USUÁRIO (2026-07)
   -------------------------------------------------------------------------
   db.notificacoes = [{id, paraUserId, paraNome, texto, refView, criadoEm,
   lidaEm}]. Criadas quando uma falha/plano é vinculado a um responsável que
   seja usuário cadastrado, e quando um plano do usuário é concluído. O sino
   no topo mostra o contador de não lidas do usuário logado. As notificações
   viajam dentro do db normal — ficam persistentes no navegador já; a
   persistência ENTRE navegadores depende da aba "Notificacoes" no SCHEMA do
   Code.gs (pendente de entrega do arquivo).
   ========================================================================= */
function criarNotificacao(paraNome,texto,refView){
  if(!paraNome)return;
  const u=(db.usuarios||[]).find(x=>x.ativo!=='Não'&&up(x.nome)===up(paraNome));
  if(!u)return; // responsável que não é usuário do sistema (ex.: Brigada) não recebe notificação
  const me=currentUserSafe();
  if(u.id===me.id)return; // não notifica a si mesmo
  db.notificacoes=db.notificacoes||[];
  db.notificacoes.push({id:id(),paraUserId:u.id,paraNome:u.nome,texto,refView:refView||'plano',criadoEm:isoNow(),lidaEm:''});
  if(db.notificacoes.length>500)db.notificacoes=db.notificacoes.slice(-500); // não deixa crescer sem limite
}
function notifsDoUsuario(){const me=currentUserSafe();return (db.notificacoes||[]).filter(n=>n.paraUserId===me.id).sort((a,b)=>String(b.criadoEm).localeCompare(String(a.criadoEm)))}
function updateNotifBadge(){
  const el=document.getElementById('notifCount'); if(!el)return;
  const naoLidas=notifsDoUsuario().filter(n=>!n.lidaEm).length;
  el.style.display=naoLidas?'flex':'none'; el.textContent=naoLidas>99?'99+':String(naoLidas);
}
function toggleNotifPanel(){
  const p=document.getElementById('notifPanel'); if(!p)return;
  if(p.classList.contains('show')){p.classList.remove('show');return}
  const ns=notifsDoUsuario().slice(0,40);
  p.innerHTML=ns.length?`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 8px"><b style="font-size:12.5px">Notificações</b><button class="btn small secondary" style="height:26px;padding:2px 8px;font-size:11px" onclick="marcarTodasNotifsLidas()">Marcar todas lidas</button></div>`+
    ns.map(nn=>`<div class="notifItem ${nn.lidaEm?'':'naoLida'}" onclick="abrirNotificacao('${esc(nn.id)}')">${esc(nn.texto)}<small>${esc(fmtDateSimple(nn.criadoEm))} ${esc(String(nn.criadoEm).slice(11,16))}${nn.lidaEm?'':' • nova'}</small></div>`).join('')
    :'<div class="emptyState" style="padding:18px;font-size:12.5px">Nenhuma notificação.</div>';
  p.classList.add('show');
}
function abrirNotificacao(nid){
  const nn=(db.notificacoes||[]).find(x=>x.id===nid); if(!nn)return;
  if(!nn.lidaEm){nn.lidaEm=isoNow();markDirty('notificação lida')}
  document.getElementById('notifPanel')?.classList.remove('show');
  currentView=nn.refView||'plano';
  document.querySelectorAll('.nav button').forEach(x=>x.classList.toggle('active',x.dataset.view===currentView));
  render();
}
function marcarTodasNotifsLidas(){notifsDoUsuario().forEach(n=>{if(!n.lidaEm)n.lidaEm=isoNow()});markDirty('notificações lidas');document.getElementById('notifPanel')?.classList.remove('show');updateNotifBadge()}
document.addEventListener('click',e=>{const p=document.getElementById('notifPanel');if(p&&p.classList.contains('show')&&!e.target.closest('#notifPanel')&&!e.target.closest('#notifBell'))p.classList.remove('show')});

function bootSDAIManager(){
  try{
    ensureLucSchema();
    // A auditoria Falhas↔Plano de Ação já rodou dentro de load() (via normalizeAllStatuses, chamada
    // ANTES deste boot — ver `let db=load()`), então o `db` aqui embaixo já está corrigido. Só falta
    // persistir a correção localmente (se algo foi criado/removido) e avisar o usuário, senão a
    // rotina rodaria de novo a cada F5 sem nunca ficar "resolvido" para valer no navegador dele.
    const rel=db._ultimaAuditoriaPlanos;
    if(rel&&(rel.planosCriados>0||rel.duplicidadesRemovidas>0)){
      markDirty('sincronização automática Falhas↔Plano de Ação na abertura');
      console.warn('[SDAI] Auditoria Falhas↔Plano de Ação corrigiu inconsistências no carregamento:',rel);
    }
    // Multi-cliente: se há cliente ativo, carregar sua base
    const cid=clienteAtivo();
    if(cid){
      const clienteExiste=loadClientes().find(c=>c.id===cid);
      if(clienteExiste){
        db=loadClienteDb(cid);
        menuState=loadMenuStateLocal();
        // Aplica a mesma prioridade de view do switchCliente ao abrir a página com
        // um cliente já selecionado — evita abrir Dashboard SDAI para cliente sem SDAI.
        currentView=viewInicialCliente();
        const loc=viewLocation(currentView);
        if(loc){menuState.openSubsys=loc.subsys;menuState.openGroups[loc.subsys]=loc.group;saveMenuStateLocal();}
      }
      else{setClienteAtivo('');} // cliente foi excluído, limpa seleção
    }
    render();
    setTimeout(verificarBaseAoAbrir,50);
  }catch(e){
    console.error('Falha crítica ao iniciar SDAI Manager:', e);
    const msg=(e&&e.message)?e.message:String(e);
    document.body.innerHTML=`<div style="font-family:Arial,sans-serif;background:#f3f6fa;min-height:100vh;padding:32px;color:#101828"><div style="max-width:760px;margin:0 auto;background:#fff;border:1px solid #e2e8f1;border-radius:16px;padding:24px;box-shadow:0 8px 22px rgba(16,24,40,.08)"><h1 style="margin:0 0 8px;color:#b42318">Falha ao carregar o SDAI Manager</h1><p>O sistema encontrou um erro de inicialização. Isso normalmente ocorre por cache antigo do navegador, base local corrompida ou arquivo publicado parcialmente no GitHub.</p><p><b>Erro técnico:</b> ${msg}</p><button onclick="localStorage.removeItem('sdai_bosch_manager_v4_flm_portas:currentUserId'); location.reload();" style="background:#0B5FAD;color:#fff;border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer">Recarregar sessão</button><button onclick="localStorage.removeItem('sdai_bosch_manager_v4_flm_portas'); localStorage.removeItem('sdai_bosch_manager_v4_flm_portas:currentUserId'); location.reload();" style="margin-left:8px;background:#fff;color:#0B5FAD;border:1px solid #cbd6e4;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer">Limpar base local e abrir</button></div></div>`;
  }
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',bootSDAIManager);
}else{
  bootSDAIManager();
}
</script>
