<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contratos L3A — Gestão Operacional SDAI</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* =========================================================================
   CONTRATOS L3A — SDAI MANAGER
   Design System v8.0 — fonte única de verdade para cores, tipografia,
   espaçamento, elevação e componentes. Substitui as camadas V5–V7
   acumuladas em versões anteriores (que conviviam com --blue, --premium-blue
   e --brand-blue simultaneamente). Nenhuma classe, id ou atributo usado
   pelo JavaScript foi removido ou renomeado — apenas a aparência.
   ========================================================================= */

/* ---------- 1. TOKENS ---------------------------------------------------- */
:root{
  /* Marca */
  --l3a-primary:#0B5FAD;        --l3a-primary-600:#0A4F92;   --l3a-primary-700:#073A6E;
  --l3a-primary-50:#EAF3FC;     --l3a-primary-100:#D3E7FA;
  --l3a-secondary:#0E2A44;      --l3a-secondary-700:#081A2C; --l3a-secondary-900:#050F1B;
  --l3a-accent:#0EA5B7;

  /* Semântica de status */
  --l3a-success:#15803D;   --l3a-success-bg:#E7F7EC;   --l3a-success-line:#BEE8C9;
  --l3a-warning:#B45309;   --l3a-warning-bg:#FDF3DF;   --l3a-warning-line:#F3DDA6;
  --l3a-danger:#B42318;    --l3a-danger-bg:#FCEAE9;    --l3a-danger-line:#F3C6C2;
  --l3a-info:#1D4ED8;      --l3a-info-bg:#EAF1FE;      --l3a-info-line:#C9DBFB;
  --l3a-neutral:#475569;   --l3a-neutral-bg:#EEF1F5;   --l3a-neutral-line:#D8DEE7;

  /* Superfícies e texto */
  --l3a-bg:#F3F6FA; --l3a-bg-soft:#EBF0F6; --l3a-surface:#FFFFFF;
  --l3a-border:#E2E8F1; --l3a-border-strong:#CBD6E4; --l3a-hover:#F2F6FB;
  --l3a-text:#101828; --l3a-text-soft:#51617A; --l3a-text-muted:#8695AB;
  --l3a-focus:#0B5FAD;

  /* Escala */
  --l3a-radius-sm:8px; --l3a-radius-md:12px; --l3a-radius-lg:18px; --l3a-radius-pill:999px;
  --l3a-shadow-sm:0 1px 2px rgba(16,24,40,.05),0 1px 1px rgba(16,24,40,.04);
  --l3a-shadow-md:0 8px 22px rgba(16,24,40,.08);
  --l3a-shadow-lg:0 22px 48px rgba(16,24,40,.14);
  --l3a-ease:cubic-bezier(.4,0,.2,1); --l3a-dur:160ms;
  --l3a-font:'Plus Jakarta Sans',Inter,'Segoe UI',Roboto,Arial,sans-serif;

  /* Aliases de compatibilidade — mantêm qualquer var(--x) legado apontando
     para o novo sistema, sem precisar tocar em nenhuma linha de JS */
  --bg:var(--l3a-bg); --panel:var(--l3a-secondary); --panel2:var(--l3a-secondary-700);
  --card:var(--l3a-surface); --line:var(--l3a-border); --text:var(--l3a-text);
  --muted:var(--l3a-text-muted); --blue:var(--l3a-primary); --blue2:var(--l3a-primary-700);
  --ok:var(--l3a-success); --bad:var(--l3a-danger); --warn:var(--l3a-warning);
  --chip:var(--l3a-primary-50); --gold:#C79A38; --shadow:var(--l3a-shadow-lg); --radius:var(--l3a-radius-lg);
  --brand-dark:var(--l3a-secondary); --brand-mid:var(--l3a-secondary-700); --brand-blue:var(--l3a-primary);
  --brand-soft:var(--l3a-bg); --brand-line:var(--l3a-border); --brand-text:var(--l3a-text);
  --brand-muted:var(--l3a-text-muted); --brand-radius:var(--l3a-radius-lg); --brand-shadow:var(--l3a-shadow-md);
  --brand-accent:var(--l3a-accent); --brand-primary:var(--l3a-primary); --brand-gold:#C79A38;
  --premium-blue:var(--l3a-primary); --premium-line:var(--l3a-border); --premium-muted:var(--l3a-text-muted);
  --premium-text:var(--l3a-text); --premium-navy:var(--l3a-secondary); --premium-surface:var(--l3a-surface);
  --premium-gold:#C79A38; --surface:var(--l3a-surface); --surface-2:var(--l3a-bg-soft); --text-main:var(--l3a-text);
}

/* ---------- 2. RESET & TIPOGRAFIA ---------------------------------------- */
*{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact}
html{-webkit-text-size-adjust:100%}
body{margin:0;font-family:var(--l3a-font);background:var(--l3a-bg);color:var(--l3a-text);
  font-size:14px;line-height:1.5;letter-spacing:-.011em;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer}
h1,h2,h3,h4{margin:0;font-family:var(--l3a-font);letter-spacing:-.02em;color:var(--l3a-text)}
p{margin:0}
a{color:var(--l3a-primary)}
::selection{background:var(--l3a-primary-100)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#c7d3e2;border-radius:99px}
::-webkit-scrollbar-track{background:transparent}

/* Foco de teclado visível + respeito a "reduzir movimento" */
a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,[tabindex]:focus-visible{
  outline:2px solid var(--l3a-focus);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion: reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}}

/* ---------- 3. LAYOUT — CASCA DO APP -------------------------------------- */
.app{display:grid;grid-template-columns:272px 1fr;min-height:100vh;transition:grid-template-columns var(--l3a-dur) var(--l3a-ease)}
.main{min-width:0;display:flex;flex-direction:column}
.content{padding:28px 32px 64px;max-width:1440px;width:100%;margin:0 auto}

/* ---------- 4. BARRA LATERAL ---------------------------------------------- */
.side{background:linear-gradient(190deg,var(--l3a-secondary) 0%,var(--l3a-secondary-700) 62%,var(--l3a-secondary-900) 100%);
  color:#e7eefb;padding:18px 12px 24px;position:sticky;top:0;height:100vh;overflow-y:auto;overflow-x:hidden;
  display:flex;flex-direction:column;gap:2px;box-shadow:6px 0 30px rgba(5,15,27,.18)}
.side::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14)}
.brand{display:flex;align-items:center;gap:12px;padding:8px 8px 18px;border-bottom:1px solid rgba(255,255,255,.10);margin-bottom:6px}
.logo{width:46px;height:46px;flex:0 0 46px;border-radius:var(--l3a-radius-md);background:linear-gradient(150deg,#fff,#eaf2fc);
  color:var(--l3a-primary-700);font-weight:800;font-size:13px;letter-spacing:.01em;display:grid;place-items:center;
  box-shadow:var(--l3a-shadow-sm);overflow:hidden}
.logo.hasImg{background-size:contain!important;background-position:center!important;background-repeat:no-repeat!important;
  background-color:#fff!important;color:transparent!important}
.brand b{display:block;font-size:15px;font-weight:800;letter-spacing:-.02em;color:#fff}
.brand span{display:block;margin-top:2px;font-size:11.5px;color:#8fa8c6;line-height:1.3}

.sideToggle{display:flex;align-items:center;justify-content:center;gap:8px;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);color:#dce8f8;border-radius:var(--l3a-radius-md);padding:9px 10px;margin:2px 4px 10px;
  width:calc(100% - 8px);font-weight:700;font-size:12.5px;transition:background var(--l3a-dur) var(--l3a-ease)}
.sideToggle:hover{background:rgba(255,255,255,.12)}
.sideToggle i{display:inline-flex;color:#fff}
.app.sideCollapsed .sideToggle span{display:none}
.app.sideCollapsed .sideToggle:before{content:none!important}

.profileBadge{margin:4px 4px 12px;padding:11px 12px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.045);
  border-radius:var(--l3a-radius-md);font-size:12px;color:#c3d4ea}
.profileBadge b{display:block;color:#fff;font-size:13px;font-weight:750}

.navTitle{display:none!important} /* substituído pelo acordeão .navGroup/.navTitleBtn gerado via JS */
.navGroup{margin:10px 2px 2px}
.navTitleBtn{width:100%;border:0;background:transparent;color:#7f9dbe;text-transform:uppercase;letter-spacing:.11em;
  font-size:10.5px;font-weight:800;display:flex;align-items:center;justify-content:space-between;padding:10px 10px 6px;
  transition:color var(--l3a-dur) var(--l3a-ease)}
.navTitleBtn:hover{color:#b7cbe3}
.navTitleBtn b{font-size:10px;font-weight:900;transition:transform var(--l3a-dur) var(--l3a-ease)}
.navGroup:not(.open) .navTitleBtn b{transform:rotate(-90deg)}
.navItems{display:grid;gap:2px}
.navGroup:not(.open) .navItems{display:none}

.nav{display:flex;flex-direction:column}
.nav button{width:100%;border:0;background:transparent;color:#c3d4ea;text-align:left;padding:10.5px 12px;
  border-radius:var(--l3a-radius-md);margin:1px 0;font-weight:650;font-size:13.5px;display:flex;align-items:center;gap:11px;
  transition:background var(--l3a-dur) var(--l3a-ease),color var(--l3a-dur) var(--l3a-ease),transform var(--l3a-dur) var(--l3a-ease)}
.nav button i{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;flex:0 0 20px;
  color:#7f9dbe;transition:color var(--l3a-dur) var(--l3a-ease)}
.nav button i svg{display:block}
.nav button:hover{background:rgba(255,255,255,.07);color:#fff;transform:translateX(1px)}
.nav button:hover i{color:#fff}
.nav button.active{background:linear-gradient(120deg,var(--l3a-primary-600),var(--l3a-primary));color:#fff;
  box-shadow:0 8px 20px rgba(11,95,173,.35),inset 0 0 0 1px rgba(255,255,255,.12)}
.nav button.active i{color:#fff}

.app.sideCollapsed{grid-template-columns:76px 1fr}
.app.sideCollapsed .brand div:not(.logo),.app.sideCollapsed .navTitleBtn,.app.sideCollapsed .navGroup,
.app.sideCollapsed .nav button span,.app.sideCollapsed .profileBadge{display:none}
.app.sideCollapsed .side{padding-left:10px;padding-right:10px}
.app.sideCollapsed .nav button{justify-content:center;gap:0}
.app.sideCollapsed .nav{gap:6px}
.app.sideCollapsed .nav > button{display:flex} /* mantém acesso visível mesmo com grupos ocultos */

/* ---------- 5. CABEÇALHO --------------------------------------------------- */
.top{height:72px;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--l3a-border);
  display:flex;align-items:center;justify-content:space-between;gap:16px;padding:0 28px;position:sticky;top:0;z-index:40}
.pageHead{display:flex;align-items:center;gap:12px;min-width:0}
.pageTitleWrap{min-width:0}
.top h1{font-size:20px;font-weight:800;letter-spacing:-.03em;line-height:1.1}
.top p{margin:4px 0 0;color:var(--l3a-text-muted);font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topMeta{display:flex;align-items:center;gap:10px;margin-left:auto}
.menuToggle{display:none;border:0;background:var(--l3a-primary);color:#fff;border-radius:var(--l3a-radius-md);
  padding:9px 11px;align-items:center;justify-content:center}

.syncFooter{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--l3a-border);background:var(--l3a-surface);
  border-radius:var(--l3a-radius-pill);padding:7px 12px;font-size:11.5px;font-weight:700;color:var(--l3a-text-soft);
  box-shadow:var(--l3a-shadow-sm)}
.syncDot{width:8px;height:8px;border-radius:50%;background:#9aa8bb;flex:0 0 8px}
.syncDot.ok{background:var(--l3a-success)} .syncDot.warn{background:var(--l3a-warning)} .syncDot.bad{background:var(--l3a-danger)}

.datetimePill{height:42px;min-width:104px;border:1px solid var(--l3a-border);background:var(--l3a-surface);
  border-radius:var(--l3a-radius-pill);padding:6px 14px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;line-height:1.1;box-shadow:var(--l3a-shadow-sm)}
.datetimePill span{font-size:10px;color:var(--l3a-text-muted);font-weight:750;text-transform:uppercase;letter-spacing:.03em}
.datetimePill b{font-size:13.5px;color:var(--l3a-text);letter-spacing:-.01em}

.topUser{cursor:pointer;display:flex;align-items:center;gap:9px;border:1px solid var(--l3a-border);background:var(--l3a-surface);
  border-radius:var(--l3a-radius-pill);padding:5px 12px 5px 6px;box-shadow:var(--l3a-shadow-sm);font-size:12px;
  color:var(--l3a-text-muted);max-width:200px;transition:box-shadow var(--l3a-dur) var(--l3a-ease)}
.topUser:hover{box-shadow:var(--l3a-shadow-md)}
.topUser:after{content:'▾';font-size:11px;color:var(--l3a-primary);font-weight:900;margin-left:2px}
.topUser b{display:block;color:var(--l3a-text);font-size:12.5px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topUser .uText{min-width:0;display:flex;flex-direction:column}
.topUser .uText small{font-size:10.5px;color:var(--l3a-text-muted);white-space:nowrap}
.avatar{width:30px;height:30px;flex:0 0 30px;border-radius:50%;display:inline-grid;place-items:center;
  background:linear-gradient(135deg,var(--l3a-primary),var(--l3a-accent));color:#fff;font-size:12px;font-weight:800}

.userMenu{position:fixed;right:28px;top:70px;z-index:100;background:var(--l3a-surface);border:1px solid var(--l3a-border);
  border-radius:var(--l3a-radius-md);box-shadow:var(--l3a-shadow-lg);display:none;min-width:220px;overflow:hidden}
.userMenu.show{display:block}
.userMenu button{display:flex;align-items:center;gap:9px;width:100%;border:0;background:var(--l3a-surface);text-align:left;
  padding:12px 14px;font-weight:700;font-size:13px;color:var(--l3a-text);transition:background var(--l3a-dur) var(--l3a-ease)}
.userMenu button:hover{background:var(--l3a-hover)}

/* ---------- 6. CARDS E KPIs ------------------------------------------------ */
.card,.premiumPanel{background:var(--l3a-surface);border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-lg);
  padding:20px;box-shadow:var(--l3a-shadow-md);margin-bottom:18px}
.premiumPanel h3{margin:0 0 4px;font-size:15.5px;font-weight:800;letter-spacing:-.02em;color:var(--l3a-text)}
.premiumPanel p{margin:0;color:var(--l3a-text-muted);font-size:13px;line-height:1.5}
.sectionTitle{font-size:12px;text-transform:uppercase;letter-spacing:.09em;color:var(--l3a-text-soft);font-weight:800;margin:0 0 14px}

.grid{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:14px}
.metric{background:var(--l3a-surface);border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-lg);padding:16px 18px;
  position:relative;overflow:hidden;box-shadow:var(--l3a-shadow-sm);transition:box-shadow var(--l3a-dur) var(--l3a-ease),transform var(--l3a-dur) var(--l3a-ease)}
.metric:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--l3a-primary),var(--l3a-accent))}
.metric:hover{box-shadow:var(--l3a-shadow-md);transform:translateY(-1px)}
.metric small{display:block;color:var(--l3a-text-muted);font-weight:800;text-transform:uppercase;font-size:10.5px;letter-spacing:.06em}
.metric strong{display:block;margin-top:6px;font-size:26px;font-weight:800;letter-spacing:-.02em;color:var(--l3a-text)}

.premiumGrid{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:14px}
.premiumStat{border:1px solid var(--l3a-border);background:linear-gradient(180deg,#fff,var(--l3a-bg-soft));
  border-radius:var(--l3a-radius-md);padding:14px 15px;min-height:80px;box-shadow:var(--l3a-shadow-sm)}
.premiumStat small{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--l3a-text-muted);font-weight:800}
.premiumStat b{display:block;margin-top:7px;font-size:22px;font-weight:800;letter-spacing:-.02em;color:var(--l3a-text)}
.premiumActions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.split2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.systemHero,.configHero{display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap}
.systemHeroBox p{margin:4px 0 0;color:var(--l3a-text-muted);font-size:13px}
.systemInfo{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:12px}
.softCard{border:1px solid var(--l3a-border);background:var(--l3a-bg-soft);border-radius:var(--l3a-radius-md);padding:12px 14px}
.softCard small{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--l3a-text-muted);font-weight:800}
.softCard b{display:block;margin-top:6px;font-size:19px;font-weight:800;color:var(--l3a-text)}
.systemHeaderSlim{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.titleBlock h3{font-size:15.5px;margin:0 0 3px;font-weight:800;letter-spacing:-.02em}
.titleBlock p{font-size:12.5px;color:var(--l3a-text-muted);margin:0}

.diag{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.diagItem{border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);padding:12px;background:var(--l3a-bg-soft)}
.diagItem b{font-size:21px;display:block;font-weight:800}
.systemStatusGrid{display:grid;grid-template-columns:repeat(3,minmax(160px,1fr));gap:12px}
.systemBox{border:1px solid var(--l3a-border);background:var(--l3a-surface);border-radius:var(--l3a-radius-md);padding:14px}
.systemBox b{display:block;font-size:19px;font-weight:800}
.systemBox small{color:var(--l3a-text-muted);font-weight:800;text-transform:uppercase;font-size:10.5px}

.identityCard{display:grid;grid-template-columns:112px 1fr;gap:18px;align-items:center}
.logoPreviewBox{width:104px;height:104px;border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-lg);background:#fff;
  display:grid;place-items:center;overflow:hidden;box-shadow:var(--l3a-shadow-sm)}
.logoPreviewBox img{width:100%;height:100%;object-fit:contain;padding:8px}
.logoPreviewBox span{font-weight:800;color:var(--l3a-primary)}
.logoPreviewWrap{margin-top:14px;display:flex;align-items:center;gap:14px}
.logoPreview{max-width:180px;max-height:90px;border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);
  background:#fff;padding:8px;object-fit:contain}
.logoPreview.empty{width:72px;height:72px;display:grid;place-items:center;border:1px dashed var(--l3a-border-strong);
  border-radius:var(--l3a-radius-md);color:var(--l3a-primary);font-weight:800}

.userRoleCard{background:var(--l3a-surface);border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);
  padding:15px;box-shadow:var(--l3a-shadow-sm)}
.userRoleCard h4{margin:0 0 6px;font-size:13.5px;font-weight:800}
.userRoleCard p{margin:0;font-size:12.5px;color:var(--l3a-text-muted);line-height:1.5}
.userGrid{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:12px}
.accessCard{border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);background:var(--l3a-surface);padding:14px}
.accessCard h4{margin:0 0 8px;font-size:13.5px;font-weight:800}
.accessMuted{color:var(--l3a-text-muted);font-size:12px;line-height:1.5}
.compactHelp{background:var(--l3a-bg-soft);border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);
  padding:10px 12px;color:var(--l3a-text-muted);font-size:12.5px}
.mutedLine,.note{color:var(--l3a-text-muted);font-size:12.5px;line-height:1.5}
.emptyState{background:var(--l3a-bg-soft);border:1px dashed var(--l3a-border-strong);border-radius:var(--l3a-radius-md);
  padding:22px;color:var(--l3a-text-muted);font-weight:700;text-align:center}
.check{display:inline-flex;gap:7px;align-items:center;background:var(--l3a-bg-soft);border:1px solid var(--l3a-border);
  border-radius:var(--l3a-radius-pill);padding:8px 10px;font-weight:800;font-size:12px}
.permGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px 14px}
.permCheck{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--l3a-text-soft)}

/* ---------- 7. BOTÕES ------------------------------------------------------ */
.btn{border:0;border-radius:var(--l3a-radius-md);padding:10px 16px;font-weight:750;font-size:13.5px;background:var(--l3a-primary);
  color:#fff;box-shadow:0 6px 16px rgba(11,95,173,.20);display:inline-flex;align-items:center;gap:7px;line-height:1;
  transition:background var(--l3a-dur) var(--l3a-ease),box-shadow var(--l3a-dur) var(--l3a-ease),transform var(--l3a-dur) var(--l3a-ease),opacity var(--l3a-dur) var(--l3a-ease)}
.btn:hover{background:var(--l3a-primary-600);box-shadow:0 8px 20px rgba(11,95,173,.26)}
.btn:active{transform:translateY(1px);box-shadow:0 4px 10px rgba(11,95,173,.22)}
.btn.secondary{background:var(--l3a-surface);color:var(--l3a-primary-700);border:1px solid var(--l3a-border);box-shadow:none}
.btn.secondary:hover{background:var(--l3a-hover);border-color:var(--l3a-border-strong)}
.btn.danger{background:var(--l3a-danger);box-shadow:0 6px 16px rgba(180,35,24,.22)}
.btn.danger:hover{background:#992019}
.btn.small{padding:6px 10px;border-radius:var(--l3a-radius-sm);font-size:12px;gap:6px}
.btn.small svg{flex:0 0 auto}
.btn:disabled,.btn[disabled]{opacity:.5;cursor:not-allowed;box-shadow:none;transform:none}

/* ---------- 8. FORMULÁRIOS -------------------------------------------------- */
.toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin:12px 0}
.field{display:flex;flex-direction:column;gap:6px;min-width:180px;flex:1}
.field label{font-size:11.5px;font-weight:800;color:var(--l3a-text-soft);text-transform:uppercase;letter-spacing:.03em}
.field input,.field select,.field textarea{border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-sm);
  padding:10px 11px;background:var(--l3a-surface);font-size:13.5px;color:var(--l3a-text);
  transition:border-color var(--l3a-dur) var(--l3a-ease),box-shadow var(--l3a-dur) var(--l3a-ease)}
.field input:hover,.field select:hover,.field textarea:hover{border-color:var(--l3a-border-strong)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--l3a-primary);
  box-shadow:0 0 0 3px var(--l3a-primary-50)}
.field input[type=checkbox],.field input[type=radio]{accent-color:var(--l3a-primary);width:auto}
input[type=checkbox],input[type=radio]{accent-color:var(--l3a-primary)}
.formGrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ---------- 9. TABELAS ------------------------------------------------------ */
.tableWrap{overflow:auto;border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);background:var(--l3a-surface)}
.softTable table{min-width:0}
table{border-collapse:collapse;width:100%;min-width:900px}
th,td{padding:11px 13px;border-bottom:1px solid var(--l3a-border);text-align:left;vertical-align:top;font-size:13px}
th{background:var(--l3a-bg-soft);color:var(--l3a-text-soft);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;
  font-weight:800;position:sticky;top:0}
tbody tr{transition:background var(--l3a-dur) var(--l3a-ease)}
tbody tr:hover td{background:var(--l3a-hover)}
tbody tr:last-child td{border-bottom:0}
.tableWrap td:has(.btn){text-align:right;white-space:nowrap}

/* ---------- 10. BADGES / STATUS --------------------------------------------- */
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:var(--l3a-radius-pill);
  font-weight:750;font-size:11px;background:var(--l3a-primary-50);color:var(--l3a-primary-700)}
.pill.ok{background:var(--l3a-success-bg);color:var(--l3a-success)}
.pill.bad{background:var(--l3a-danger-bg);color:var(--l3a-danger)}
.pill.warn{background:var(--l3a-warning-bg);color:var(--l3a-warning)}
.pill.off{background:var(--l3a-neutral-bg);color:var(--l3a-neutral)}
.statusPill{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-pill);
  padding:7px 11px;background:var(--l3a-surface);font-weight:800;font-size:12px;color:var(--l3a-text-soft)}
.statusPill i{width:8px;height:8px;border-radius:50%;background:var(--l3a-warning);display:block}
.statusPill.ok i{background:var(--l3a-success)}
.msg{padding:12px 14px;border-radius:var(--l3a-radius-md);margin:12px 0;font-weight:750;font-size:13px}
.msg.ok{background:var(--l3a-success-bg);color:var(--l3a-success)}
.msg.err{background:var(--l3a-danger-bg);color:var(--l3a-danger)}
.msg.warn{background:var(--l3a-warning-bg);color:var(--l3a-warning)}
.disabledByRole{opacity:.45;filter:grayscale(.5);pointer-events:none}
.accessDenied{opacity:.45;pointer-events:none}

/* ---------- 11. GRÁFICOS (dashboard e relatórios) --------------------------- */
.bars{display:grid;gap:12px}
.barrow{display:grid;grid-template-columns:170px 1fr 120px;gap:12px;align-items:center;font-size:12.5px}
.bar{height:9px;border-radius:99px;background:var(--l3a-bg-soft);overflow:hidden}
.bar i{display:block;height:100%;background:var(--l3a-primary);border-radius:99px}
.miniChart{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.chartCard{border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);padding:14px;background:var(--l3a-surface)}
.chartCard h4{margin:0 0 8px;font-size:13.5px;font-weight:800}
.chartGrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:14px 0}
.chartPanel{border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-lg);padding:16px;
  background:linear-gradient(180deg,#fff,var(--l3a-bg-soft))}
.chartPanel h4{margin:0 0 12px;font-size:13.5px;font-weight:800;color:var(--l3a-text)}
.chartBars{display:grid;gap:10px}
.chartLine{display:grid;grid-template-columns:150px 1fr 62px;gap:10px;align-items:center;font-size:12px}
.chartTrack{height:11px;border-radius:99px;background:var(--l3a-bg-soft);overflow:hidden}
.chartTrack i{display:block;height:100%;border-radius:99px;background:var(--l3a-primary)}
.chartTrack i.bad{background:var(--l3a-danger)} .chartTrack i.ok{background:var(--l3a-success)}
.donutWrap{display:flex;align-items:center;gap:18px}
.donut{width:114px;height:114px;border-radius:50%;
  background:conic-gradient(var(--l3a-danger) 0 var(--deg,0deg),var(--l3a-success) var(--deg,0deg) 360deg);position:relative}
.donut:after{content:"";position:absolute;inset:21px;background:#fff;border-radius:50%}
.legend{display:grid;gap:8px;font-size:12.5px}
.legend span{display:flex;align-items:center;gap:8px;font-weight:750;color:var(--l3a-text-soft)}
.dot{width:11px;height:11px;border-radius:50%;display:inline-block}
.dot.ok{background:var(--l3a-success)} .dot.bad{background:var(--l3a-danger)}
.premiumTable table{min-width:0}
.premiumTable th{background:var(--l3a-primary-50);color:var(--l3a-primary-700)}

.timeline{border-left:2px solid var(--l3a-border);margin-left:10px;padding-left:18px}
.tl{position:relative;margin:0 0 14px;padding:11px 13px;background:var(--l3a-bg-soft);border:1px solid var(--l3a-border);
  border-radius:var(--l3a-radius-md)}
.tl:before{content:"";position:absolute;left:-25px;top:17px;width:11px;height:11px;background:var(--l3a-primary);border-radius:50%}

/* ---------- 12. RELATÓRIOS / IMPRESSÃO -------------------------------------- */
.printArea{background:#fff}
.reportBlock{border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);margin:12px 0;padding:16px}
.reportCover{background:linear-gradient(135deg,var(--l3a-secondary-900),var(--l3a-primary));color:#fff;
  border-radius:var(--l3a-radius-lg);padding:30px;margin-bottom:18px;position:relative;overflow:hidden}
.reportCover:after{content:"";position:absolute;right:-90px;top:-90px;width:260px;height:260px;border-radius:50%;
  background:rgba(255,255,255,.10)}
.reportCover h2{font-size:27px;margin:0 0 8px;font-weight:800;color:#fff}
.reportCover p{margin:4px 0;color:#dcecff}
.reportMeta{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.reportMeta span{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.22);padding:8px 11px;
  border-radius:var(--l3a-radius-pill);font-weight:750;font-size:12px}
.reportFooter{border-top:2px solid var(--l3a-border);margin-top:24px;padding-top:14px;color:var(--l3a-text-muted);
  font-size:12px;display:flex;justify-content:space-between;gap:12px}
.reportCover,.metric,.chartPanel,.chartTrack i,.donut,.pill,.dot{-webkit-print-color-adjust:exact;print-color-adjust:exact}
.hidePrint{}
.view{display:none} .view.active{display:block}

/* ---------- 13. MODAL / DRAWER ---------------------------------------------- */
.modal{position:fixed;inset:0;background:rgba(8,20,36,.55);display:none;align-items:center;justify-content:flex-end;
  z-index:150;backdrop-filter:blur(1px)}
.modal.show{display:flex}
.drawer{width:min(720px,100%);height:100%;background:#fff;padding:28px;overflow:auto;box-shadow:var(--l3a-shadow-lg);position:relative}
.drawer h2{margin:0 0 8px;font-size:19px;font-weight:800;letter-spacing:-.02em}
.drawerClose{position:fixed;top:20px;right:20px;z-index:151;width:38px;height:38px;border:1px solid rgba(255,255,255,.25);
  background:rgba(15,25,40,.35);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);transition:background var(--l3a-dur) var(--l3a-ease)}
.drawerClose:hover{background:rgba(15,25,40,.55)}

/* ---------- 14. TELA DE LOGIN ------------------------------------------------ */
.loginScreen{position:fixed;inset:0;z-index:999;
  background:radial-gradient(circle at 18% 20%,rgba(14,165,183,.18),transparent 34%),
             linear-gradient(150deg,var(--l3a-secondary-900),var(--l3a-secondary-700) 55%,var(--l3a-secondary));
  display:none;align-items:center;justify-content:center;padding:22px}
.loginScreen.show{display:flex}
.loginCard{width:min(430px,100%);background:rgba(255,255,255,.98);border:1px solid rgba(255,255,255,.4);
  border-radius:var(--l3a-radius-lg);padding:32px;box-shadow:var(--l3a-shadow-lg)}
.loginLogo{width:72px;height:72px;border-radius:var(--l3a-radius-lg);background:linear-gradient(135deg,var(--l3a-primary),var(--l3a-primary-700));
  color:#fff;display:grid;place-items:center;font-weight:800;margin:0 auto 16px;letter-spacing:.04em}
.loginCard h1{text-align:center;margin:0;font-size:23px;font-weight:800;color:var(--l3a-text)}
.loginCard p{text-align:center;color:var(--l3a-text-muted);margin:8px 0 22px;font-size:13px}
.loginCard .field{min-width:0;margin-bottom:12px}
.loginCard input{font-size:15px}
.loginActions{display:flex;gap:10px;align-items:center;margin-top:10px}
.loginActions .btn{flex:1;justify-content:center}
.loginHint{margin-top:14px;font-size:12px;color:var(--l3a-text-muted);background:var(--l3a-bg-soft);
  border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-md);padding:11px}

/* ---------- 15. RESPONSIVIDADE ---------------------------------------------- */
@media(max-width:1200px){
  .grid,.premiumGrid{grid-template-columns:repeat(2,1fr)}
  .systemInfo{grid-template-columns:repeat(2,1fr)}
  .split2{grid-template-columns:1fr}
}
@media(max-width:1000px){
  .app{grid-template-columns:1fr}
  .side{position:fixed;left:0;top:0;bottom:0;width:288px;height:100vh;transform:translateX(-105%);
    transition:transform var(--l3a-dur) var(--l3a-ease);z-index:80}
  .side.open{transform:translateX(0)}
  .menuToggle{display:inline-flex}
  .top{padding:0 16px}
  .content{padding:18px 16px 64px}
  .diag,.chartGrid,.systemStatusGrid,.miniChart,.userGrid{grid-template-columns:1fr 1fr}
  .toolbar{display:grid;grid-template-columns:1fr}
  .field{min-width:0}
  .formGrid,.identityCard{grid-template-columns:1fr}
  .barrow,.chartLine{grid-template-columns:1fr}
  .drawer{width:100%}
  table{min-width:760px}
}
@media(max-width:640px){
  .grid,.premiumGrid,.diag,.chartGrid,.systemStatusGrid,.miniChart,.userGrid,.systemInfo{grid-template-columns:1fr!important}
  .top{height:auto;min-height:66px;padding:10px 14px;gap:8px;flex-wrap:wrap}
  .top h1{font-size:17px}
  .top p{display:none}
  .topMeta{gap:6px;width:100%;justify-content:space-between}
  .datetimePill{display:none}
  .syncFooter{font-size:0;padding:8px;gap:0}
  .syncFooter span:not(.syncDot){display:none}
  .topUser{max-width:44px;padding:5px}
  .topUser .uText,.topUser:after{display:none}
  .card,.premiumPanel{padding:15px}
  .content{padding-bottom:72px}
  .drawer{padding:20px}
}

/* ---------- 16. UTILITÁRIOS -------------------------------------------------- */
.hidden{display:none!important}

/* ---------- 16b. DASHBOARD — status por piso e lojas com falha (v8.1) ------- */
.dashRow{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;margin-bottom:18px}
@media(max-width:1000px){.dashRow{grid-template-columns:1fr}}
.chartLegendRow{display:flex;flex-wrap:wrap;gap:14px;margin:0 0 12px;font-size:11.5px;color:var(--l3a-text-soft);font-weight:700}
.chartLegendRow span{display:inline-flex;align-items:center;gap:6px}
.chartLegendRow i{width:10px;height:10px;border-radius:3px;display:inline-block}
.chartCanvasWrap{position:relative;width:100%}
.failList{display:grid;gap:8px}
.failRow{display:grid;grid-template-columns:1.5fr .6fr .7fr .8fr;gap:10px;align-items:center;
  border:1px solid var(--l3a-border);border-radius:var(--l3a-radius-sm);padding:9px 12px;font-size:12.5px}
.failRow.head{border:0;padding:0 12px;color:var(--l3a-text-muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;font-weight:800}
.failRow b{font-weight:750;color:var(--l3a-text)}
.failRow .tsince{font-weight:750}
.failRow .tsince.urgent{color:var(--l3a-danger)}
.failRow .tsince.recent{color:var(--l3a-warning)}
.subTipoTags{display:flex;flex-wrap:wrap;gap:6px;max-width:520px;align-items:flex-start}
.subTipoTags .pill{white-space:nowrap;background:var(--l3a-bg-soft);color:var(--l3a-text-soft);border:1px solid var(--l3a-border)}
.chartLine.clickable{cursor:pointer;border-radius:8px;transition:background var(--l3a-dur) var(--l3a-ease)}
.chartLine.clickable:hover{background:var(--l3a-hover)}
.chartLine.selected{background:var(--l3a-primary-50)}
.chartLine.selected b{color:var(--l3a-primary-700)}

/* ---------- 17. IMPRESSÃO (geração de relatório em PDF) --------------------- */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .side,.top,.hidePrint,.modal,.userMenu,.drawerClose{display:none!important}
  .app{display:block}
  .content{padding:0;max-width:none}
  .card{box-shadow:none;border:0}
  .view{display:block}
  .view:not(.printTarget){display:none!important}
  body{background:#fff;color:#0f172a}
  .reportCover{border-radius:0;margin:-8mm -8mm 8mm -8mm;padding:22mm 12mm 18mm}
  .reportCover h2{font-size:24px}
  .grid,.premiumGrid{grid-template-columns:repeat(4,1fr);gap:8px}
  .metric{padding:10px;border-radius:10px}
  .metric strong{font-size:20px}
  .chartGrid{grid-template-columns:1fr 1fr;gap:8px}
  .chartPanel{break-inside:avoid;padding:10px}
  .reportBlock{break-inside:avoid;border-radius:10px;padding:10px;margin:8px 0}
  table{min-width:0;font-size:9px}
  th,td{font-size:9px;padding:5px}
  .reportFooter{font-size:10px}
}
</style>
</head>

<div class="app">
  <aside class="side">
    <div class="brand"><div class="logo" id="brandLogo">L3A</div><div><b id="brandName">Contratos L3A</b><span id="brandSub">Gestão operacional • SDAI • Contratos</span></div></div><button class="sideToggle" id="sideCollapseBtn"><i><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 6.5h16M4 12h16M4 17.5h16"/></svg></i><span> Recolher menu</span></button><div class="profileBadge" id="profileBadge"><b>Usuário</b><span>Administrador</span></div>
    <div class="nav">
      <div class="navTitle">Gestão</div>
      <button class="active" data-view="dashboard"><i><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="3.5" width="7" height="7" rx="1.6" fill="currentColor" fill-opacity=".15"/><rect x="13.5" y="3.5" width="7" height="7" rx="1.6"/><rect x="3.5" y="13.5" width="7" height="7" rx="1.6"/><rect x="13.5" y="13.5" width="7" height="7" rx="1.6" fill="currentColor" fill-opacity=".15"/></svg></i><span>Dashboard</span></button>
      <div class="navTitle">Base técnica</div>
      <button data-view="paineis"><i><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="12" rx="2" fill="currentColor" fill-opacity=".12"/><path d="M8.5 20.5h7M12 16.5v4"/></svg></i><span>Painéis</span></button>
      <button data-view="lacos"><i><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12a8 8 0 0 1 13.3-6M20 12a8 8 0 0 1-13.3 6"/><path d="M17 3v4h-4M7 21v-4h4"/></svg></i><span>Laços</span></button>
      <button data-view="flms"><i><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="6.5" y="6.5" width="11" height="11" rx="2" fill="currentColor" fill-opacity=".14"/><path d="M9 3v3M15 3v3M9 18v3M15 18v3M3 9h3M3 15h3M18 9h3M18 15h3"/></svg></i><span>FLMs / Portas</span></button>
      <button data-view="locais"><i><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9.5 5 4h14l1 5.5"/><path d="M4 9.5a2.3 2.3 0 0 0 4.4 1 2.3 2.3 0 0 0 4.4 0 2.3 2.3 0 0 0 4.4 0 2.3 2.3 0 0 0 4.4-1" fill="currentColor" fill-opacity=".12"/><path d="M5.5 10.5V20h13v-9.5"/><path d="M10 20v-5h4v5"/></svg></i><span>Lojas / Áreas (Técnico)</span></button>
      <button data-view="equipamentos"><i><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-6.1 7-11.5A7 7 0 0 0 5 9.5C5 14.9 12 21 12 21Z" fill="currentColor" fill-opacity=".14"/><circle cx="12" cy="9.5" r="2.4"/></svg></i><span>Equipamentos</span></button>
      <div class="navTitle">Operação</div>
      <button data-view="falhas"><i><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.5 21.5 20h-19L12 3.5Z" fill="currentColor" fill-opacity=".14"/><path d="M12 9.5v4.2"/><circle cx="12" cy="17" r=".9" fill="currentColor" stroke="none"/></svg></i><span>Falhas</span></button>
      <button data-view="plano"><i><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4.5" width="14" height="16" rx="2" fill="currentColor" fill-opacity=".1"/><path d="M9 4.5V3h6v1.5"/><path d="M9 12.5l2 2 4-4.2"/></svg></i><span>Plano de Ação</span></button>
      <div class="navTitle">Dados</div>
      <button data-view="relatorios"><i><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3.5h7l4 4V20a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4.5a1 1 0 0 1 1-1Z" fill="currentColor" fill-opacity=".1"/><path d="M14 3.5V8h4"/><path d="M9 13h6M9 16.5h6"/></svg></i><span>Relatórios</span></button>
      <button data-view="importacao"><i><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V4M8 8l4-4 4 4"/><path d="M4 15v3.5A1.5 1.5 0 0 0 5.5 20h13a1.5 1.5 0 0 0 1.5-1.5V15" fill="currentColor" fill-opacity=".1"/></svg></i><span>Importação</span></button>

<script>

function onSearchInput(el){

function attachSearchInputs(){

}

function load(){try{return normalizeAllStatuses(Object.assign(emptyDB(),JSON.parse(localStorage.getItem(KEY))||{}))}catch(e){return emptyDB()}}
function syncCfg(){try{return Object.assign({configured:false,auto:true,intervalSec:30,lastSync:'',sheetUrl:'',dirty:false},JSON.parse(localStorage.getItem(SYNC_KEY)||'{}'))}catch(e){return {configured:false,auto:true,intervalSec:30,lastSync:'',sheetUrl:'',dirty:false}}}

function updateSyncFooter(status){const c=syncCfg(); const dot=document.getElementById('syncDot'), txt=document.getElementById('syncText'); if(!dot||!txt)return; dot.className='syncDot '+(status==='saving'?'warn':status==='error'?'bad':(!c.configured?'warn':c.dirty?'warn':'ok')); txt.textContent=status==='saving'?'Sincronizando...':status==='error'?'Falha ao sincronizar':(!c.configured?'Banco Google não configurado':c.dirty?'Alterações pendentes':'Sincronizado '+(c.lastSync||''));}
let autoSyncTimer=null; let _recuperandoBaseInicial=false; function scheduleAutoSync(ms){const c=syncCfg(); if(!c.configured||!c.auto||_recuperandoBaseInicial)return; clearTimeout(autoSyncTimer); autoSyncTimer=setTimeout(()=>syncNow(false),ms||((c.intervalSec||30)*1000));}
function jsonp(action, params={}){return new Promise((resolve,reject)=>{const cb='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2); window[cb]=(data)=>{delete window[cb]; s.remove(); resolve(data)}; const q=new URLSearchParams({action,callback:cb,...params}); const s=document.createElement('script'); s.src=API_URL+'?'+q.toString(); s.onerror=()=>{delete window[cb]; s.remove(); reject(new Error('Falha de comunicação com Apps Script'))}; document.body.appendChild(s); setTimeout(()=>{if(window[cb]){delete window[cb]; try{s.remove()}catch(e){} reject(new Error('Tempo esgotado na API'))}},30000)})}

async function setupGoogle(){try{updateSyncFooter('saving'); const r=await jsonp('setup'); if(!r.ok)throw new Error(r.error||'Erro ao configurar banco'); setSyncCfg({configured:true,sheetUrl:r.sheetUrl||'',dirty:true}); renderSistema(); updateSyncFooter(); alert('Banco Google configurado/validado.');}catch(e){updateSyncFooter('error'); alert('Falha ao configurar banco: '+e.message)}}
async function loadGoogle(){try{updateSyncFooter('saving'); const r=await jsonp('load'); if(!r.ok)throw new Error(r.error||'Erro ao carregar'); if(r.db && Object.keys(r.db).length){ db=normalizeAllStatuses(Object.assign(emptyDB(),r.db)); persistLocal(); setSyncCfg({configured:true,dirty:false,lastSync:new Date().toLocaleTimeString('pt-BR')}); render(); } else { alert('Banco Google vazio. Dados locais preservados. Use Sincronizar agora para enviar sua base.'); setSyncCfg({configured:true}); renderSistema(); }}catch(e){updateSyncFooter('error'); alert('Falha ao carregar Google: '+e.message)}}
function baseParecevazia(){return !(db.paineis||[]).length && !(db.equipamentos||[]).length && !(db.locais||[]).length && !(db.flms||[]).length}
async function syncNow(showAlert=true){const c=syncCfg(); if(!c.configured){ if(showAlert) alert('Configure/valide o banco Google primeiro.'); return; } if(baseParecevazia()){ if(!showAlert){updateSyncFooter();return} if(!confirm('ATENÇÃO: a base local está vazia (sem painéis, laços, FLMs, equipamentos ou lojas). Sincronizar agora vai SUBSTITUIR os dados no Google Sheets por uma base vazia — isso pode apagar tudo que já está lá. Use "Carregar base Google" antes, a menos que você realmente queira começar do zero. Deseja continuar mesmo assim?'))return } try{updateSyncFooter('saving'); persistLocal(); await apiPost('save',{db}); setSyncCfg({dirty:false,lastSync:new Date().toLocaleTimeString('pt-BR')}); if(showAlert) alert('Sincronização enviada ao Google.'); renderSistema();}catch(e){updateSyncFooter('error'); if(showAlert) alert('Falha ao sincronizar: '+e.message)}}
function setAutoInterval(sec){setSyncCfg({intervalSec:Number(sec)||30,dirty:syncCfg().dirty}); scheduleAutoSync((Number(sec)||30)*1000); renderSistema()}

const id=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const n=s=>String(s??'').trim(); const up=s=>n(s).toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
function normalizeStatus(st){const raw=n(st); const x=up(raw); if(!x||x==='ATIVO'||x==='OK'||x==='NORMAL'||x.includes('OPERACAO')||x.includes('FUNCION'))return 'Em operação'; if(x.includes('LOGISTA'))return 'Falha logista'; if(x.includes('SISTEMA'))return 'Falha sistema'; if(x.includes('FALHA'))return raw||'Falha sistema'; if(x.includes('DESATIV')||x==='INATIVO')return 'Desativada'; if(x.includes('TESTE'))return 'Em teste'; return raw||'Em operação'}
function normalizeAllStatuses(base){['equipamentos','flms','locais','falhas'].forEach(k=>(base[k]||[]).forEach(o=>{if(o.status)o.status=normalizeStatus(o.status)}));return base}
function now(){return new Date().toLocaleString('pt-BR')}
function isoNow(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+'T'+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function esc(s){return n(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function csvEscape(s){s=n(s);return /[;,"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s}
function normKey(k){return up(k).replace(/^\uFEFF/,'').replace(/[^A-Z0-9]/g,'')}
function get(row,names){const keys=Object.keys(row); for(const name of names){const nk=normKey(name); const k=keys.find(x=>normKey(x)===nk); if(k!==undefined)return n(row[k])} return ''}
function classifyDevice(model,tipo,local){const m=up(model+' '+tipo); if(/FLM4204CONS|FLM420I2WE|FLM/.test(m))return 'Módulo'; if(/FAP|DFO/.test(m))return 'Detector de Fumaça'; if(/FAH/.test(m))return 'Detector Térmico'; if(/ACM|DM210|SM210|FMC210|FMC420RW|ACIONADOR/.test(m))return 'Acionador Manual'; if(/FNM|FNS|SIRENE|SINALIZ/.test(m))return 'Sirene / Sinalizador'; if(/DETECTOR/.test(m))return 'Detector'; return n(tipo)||'Não classificado'}
function localClass(name){const x=up(name); if(!x)return ''; if(/AREA COMUM|MALL|CORREDOR|HALL|PRACA|CIRCULACAO|ACESSO/.test(x))return 'Área Comum'; if(/TECNIC|CASA|SALA|BARRILETE|SUBEST|SHAFT|DML|DOCAS|DEPOSITO|SEGURANCA|ADMIN|CPD|TI|BOMBA|GERADOR/.test(x))return 'Área Técnica'; return 'Loja'}
function isEquipAreaLabel(name,model,tipo){const x=up((name||'')+' '+(model||'')+' '+(tipo||'')); return /(^|\s)(DFO|FAP|ACM|DM210|SM210|FMC210|FMC420RW)(\s|$)/.test(x)}
function equipAreaClass(name,model,tipo){const cls=localClass(name); if(cls==='Área Técnica'||cls==='Área Comum')return cls; return isEquipAreaLabel(name,model,tipo)?'Área Comum':''}
function statusClass(s){s=up(normalizeStatus(s)); if(/OPER/.test(s))return 'ok'; if(/LOGISTA|SISTEMA|FALHA/.test(s))return 'bad'; if(/TESTE/.test(s))return 'warn'; if(/DESATIV/.test(s))return 'off'; return ''}
function unique(arr){return [...new Set(arr.filter(Boolean).map(n))].sort((a,b)=>a.localeCompare(b,'pt-BR'))}
function findOrCreate(arr,match,obj){let x=arr.find(match); if(x)return {obj:x,created:false}; x={id:id(),...obj}; arr.push(x); return {obj:x,created:true}}
function painelById(v){return db.paineis.find(x=>x.id===v)||db.paineis.find(x=>x.nome===v)}

function ensureLaco(painelId,nome,piso=''){return findOrCreate(db.lacos,x=>x.painelId===painelId&&up(x.nome)===up(nome),{painelId,nome:nome||'Laço não informado',piso,obs:'Importado'}).obj}
function ensureFlm(painelId,lacoId,endereco,modelo,piso){return findOrCreate(db.flms,x=>x.painelId===painelId&&x.lacoId===lacoId&&up(x.endereco)===up(endereco),{painelId,lacoId,endereco:endereco||'S/E',modelo:modelo||'FLM',piso,obs:'Importado'}).obj}
function ensurePorta(flmId,numero,localId='',ligacao=''){return findOrCreate(db.portas,x=>x.flmId===flmId&&String(x.numero)===String(numero||'1'),{flmId,numero:numero||'1',localId,ligacao,obs:'Importado'}).obj}
function ensureLocal(nome,tipo,painelId,lacoId,piso,flmId,portaId){let r=findOrCreate(db.locais,x=>up(x.nome)===up(nome),{nome,tipo:tipo||localClass(nome),painelId,lacoId,piso,flmId,portaId,status:'Em operação',ultimaAlteracao:isoNow(),obs:'Importado'}); Object.assign(r.obj,{painelId:r.obj.painelId||painelId,lacoId:r.obj.lacoId||lacoId,piso:r.obj.piso||piso,flmId:r.obj.flmId||flmId,portaId:r.obj.portaId||portaId}); return r.obj}
function deviceKey(d){return [d.painelId,d.lacoId,up(d.tipo),up(d.endereco),up(d.modelo),d.flmId||''].join('|')}
function ensureEquip(obj,mode='diff'){obj.status=normalizeStatus(obj.status); let key=deviceKey(obj); let ex=db.equipamentos.find(e=>deviceKey(e)===key); if(ex){ ex.status=normalizeStatus(ex.status||obj.status); if(mode==='overwrite')Object.assign(ex,{...obj,id:ex.id,status:normalizeStatus(ex.status||obj.status),ultimaAlteracao:ex.ultimaAlteracao||obj.ultimaAlteracao}); return {obj:ex,created:false,updated:mode==='overwrite'} } obj.id=id(); db.equipamentos.push(obj); return {obj,created:true}}
function clearAll(){db=emptyDB();persistLocal();markDirty('limpeza');render()}
function counts(){let tipos=unique(db.equipamentos.map(e=>e.tipo).concat(['Módulo'])); let c={paineis:db.paineis.length,lacos:db.lacos.length,flms:db.flms.length,portas:db.portas.length,locais:db.locais.length,equipamentos:db.equipamentos.length,totalDispositivos:db.equipamentos.length+db.flms.length,tipos:{},status:{}}; tipos.forEach(t=>c.tipos[t]=0); db.flms.forEach(()=>c.tipos['Módulo']=(c.tipos['Módulo']||0)+1); db.equipamentos.forEach(e=>{c.tipos[e.tipo]=(c.tipos[e.tipo]||0)+1;{let st=normalizeStatus(e.status); c.status[st]=(c.status[st]||0)+1}}); db.flms.forEach(f=>{{let st=normalizeStatus(f.status||'Em operação'); c.status[st]=(c.status[st]||0)+1}}); return c}

document.querySelectorAll('.nav button').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');currentView=b.dataset.view;render()})); function updateClock(){const d=new Date();const cd=document.getElementById('clockDate');const ct=document.getElementById('clockTime');if(cd)cd.textContent=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}).replace('.','');if(ct)ct.textContent=d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});} updateClock(); setInterval(updateClock,1000);
function isOperacaoStatus(st){st=up(normalizeStatus(st||'Em operação'));return st.includes('OPER')}

function isDesativadoStatus(st){st=up(normalizeStatus(st||''));return st.includes('DESATIV')}
function isTesteStatus(st){st=up(normalizeStatus(st||''));return st.includes('TESTE')}
function statusClass(st){st=normalizeStatus(st); if(isFalhaStatus(st))return 'bad'; if(isOperacaoStatus(st))return 'ok'; if(isTesteStatus(st))return 'warn'; if(isDesativadoStatus(st))return 'off'; return ''}
function dashBar(label,value,total,cls=''){
  const pct=total?Math.round((value/total)*100):0;
  return `<div class="barrow"><b>${esc(label)}</b><div class="bar"><i class="${cls}" style="width:${pct}%"></i></div><span>${value} • ${pct}%</span></div>`
}
function renderDashboard(){
  const c=counts();
  const allDevices=[...db.flms.map(f=>({...f,tipo:'Módulo'})),...db.equipamentos];
  const total=allDevices.length;
  const op=allDevices.filter(x=>isOperacaoStatus(x.status)).length;
  const falhaLogista=allDevices.filter(x=>up(x.status).includes('LOGISTA')).length;
  const falhaSistema=allDevices.filter(x=>up(x.status).includes('SISTEMA')).length;
  const desativados=allDevices.filter(x=>isDesativadoStatus(x.status)).length;
  const teste=allDevices.filter(x=>isTesteStatus(x.status)).length;
  const falhas=allDevices.filter(x=>isFalhaStatus(x.status)).length;
  const disponibilidade=total?Math.round((op/total)*100):0;
  const falhaPct=total?Math.round((falhas/total)*100):0;
  const deg=Math.max(0,Math.min(360,Math.round((falhas/Math.max(1,total))*360)));

  const tipoRows=Object.entries(c.tipos).map(([tipo,qtd])=>({tipo,qtd,pct:total?Math.round((qtd/total)*100):0}));
  const tipoTable=table(tipoRows,[['Tipo','tipo'],['Qtd.','qtd'],['Participação','pct',r=>dashBar('',r.qtd,total)]]);
  const statusRows=Object.entries(c.status).map(([status,qtd])=>({status:status||'Sem status',qtd,pct:total?Math.round((qtd/total)*100):0}));
  const statusTable=table(statusRows,[['Status','status',r=>`<span class="pill ${statusClass(r.status)}">${esc(r.status)}</span>`],['Qtd.','qtd'],['Participação','pct',r=>dashBar('',r.qtd,total,statusClass(r.status))]]);

  const painelRows=db.paineis.map(p=>{
    const fl=db.flms.filter(f=>f.painelId===p.id);
    const eq=db.equipamentos.filter(e=>e.painelId===p.id);
    const dev=[...fl.map(f=>({...f,tipo:'Módulo'})),...eq];
    const totalP=dev.length;
    const opP=dev.filter(x=>isOperacaoStatus(x.status)).length;
    const falP=dev.filter(x=>isFalhaStatus(x.status)).length;
    return {painel:p.nome,total:totalP,flms:fl.length,equip:eq.length,operacao:opP,falhas:falP,ef:totalP?Math.round((opP/totalP)*100):0};
  });
  const painelTable=table(painelRows,[['Painel','painel'],['Total','total'],['FLMs','flms'],['Equip.','equip'],['Em operação','operacao'],['Falhas','falhas'],['Eficiência','ef',r=>dashBar('',r.operacao,r.total,'ok')]]);

  const painelBlocks=db.paineis.map(p=>{
    const lac=db.lacos.filter(l=>l.painelId===p.id);
    const rows=lac.map(l=>{
      const fl=db.flms.filter(f=>f.lacoId===l.id);
      const eq=db.equipamentos.filter(e=>e.lacoId===l.id);
      const dev=[...fl.map(f=>({...f,tipo:'Módulo'})),...eq];
      const totalL=dev.length;
      const opL=dev.filter(x=>isOperacaoStatus(x.status)).length;
      const falL=dev.filter(x=>isFalhaStatus(x.status)).length;
      const porTipo={};dev.forEach(d=>porTipo[d.tipo]=(porTipo[d.tipo]||0)+1);
      return {laco:l.nome,piso:l.piso,total:totalL,operacao:opL,falhas:falL,ef:totalL?Math.round((opL/totalL)*100):0,tipos:Object.entries(porTipo).map(([k,v])=>`${k}: ${v}`).join(' • ')};
    });
    return `<div class="card"><h3 class="sectionTitle">${esc(p.nome)} — Laços, tipos e performance</h3>${table(rows,[['Laço','laco'],['Piso','piso'],['Total','total'],['Tipos cadastrados','tipos'],['Em operação','operacao'],['Falhas','falhas'],['Eficiência','ef',r=>dashBar('',r.operacao,r.total,'ok')]])}</div>`
  }).join('');

  document.getElementById('dashboard').innerHTML=`
    <div class="card">
      <h3 class="sectionTitle">Base configurada no sistema</h3>
      <div class="grid">
        ${kpi('Painéis',c.paineis)}${kpi('Laços',c.lacos)}${kpi('FLMs físicos',c.flms)}${kpi('Portas',c.portas)}
        ${kpi('Lojas / áreas',c.locais)}${kpi('Equipamentos',c.equipamentos)}${kpi('Total dispositivos',c.totalDispositivos)}${kpi('Tipos distintos',Object.keys(c.tipos).length)}
      </div>
    </div>
    <div class="chartGrid">
      <div class="chartPanel">
        <h4>Distribuição por tipo cadastrado</h4>
        <div class="chartBars">${tipoRows.map(r=>dashBar(r.tipo,r.qtd,total)).join('')||'<p class="msg warn">Sem dados.</p>'}</div>
      </div>
      <div class="chartPanel">
        <h4>Resumo técnico por painel</h4>
        ${painelTable}
      </div>
    </div>
    <div class="card">
      <h3 class="sectionTitle">Eficiência e performance operacional</h3>
      <div class="grid">
        ${kpi('Disponibilidade',disponibilidade+'%')}${kpi('Em operação',op)}${kpi('Falha logista',falhaLogista)}${kpi('Falha sistema',falhaSistema)}
        ${kpi('Falhas totais',falhas)}${kpi('Taxa de falha',falhaPct+'%')}${kpi('Em teste',teste)}${kpi('Desativados',desativados)}
      </div>
    </div>
    <div class="chartGrid">
      <div class="chartPanel">
        <h4>Disponibilidade operacional</h4>
        <div class="donutWrap"><div class="donut" style="--deg:${deg}deg"></div><div class="legend"><span><i class="dot ok"></i>Em operação: ${op}</span><span><i class="dot bad"></i>Falhas: ${falhas}</span><span><i class="dot"></i>Outros status: ${Math.max(0,total-op-falhas)}</span></div></div>
      </div>
      <div class="chartPanel">
        <h4>Status operacional por quantidade</h4>
        <div class="chartBars">${statusRows.map(r=>dashBar(r.status,r.qtd,total,statusClass(r.status))).join('')||'<p class="msg warn">Sem status.</p>'}</div>
      </div>
    </div>
    <div class="card">
      <h3 class="sectionTitle">Tabela consolidada por status</h3>
      ${statusTable}
    </div>
    <h3 class="sectionTitle">Compilado por Painel → Laço</h3>
    ${painelBlocks||'<div class="card"><p class="msg warn">Importe uma base para iniciar.</p></div>'}
  `
}
function renderPaineis(){let rows=db.paineis.map(p=>({...p,totalDisp:db.flms.filter(f=>f.painelId===p.id).length+db.equipamentos.filter(e=>e.painelId===p.id).length,sub:subTipos(x=>x.painelId===p.id)}));document.getElementById('paineis').innerHTML=`<div class="card"><button class="btn" onclick="formPainel()">+ Criar novo painel</button></div><div class="card"><h3 class="sectionTitle">Painéis cadastrados</h3>${table(rows,[['Painel','nome'],['Modelo','modelo'],['Localização','localizacao'],['Total disp.','totalDisp'],['Subtotal por tipo','sub',r=>r.sub]],r=>`<button class="btn small secondary" onclick="formPainel('${r.id}')"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20l1-4.2L15.5 5.3a1.5 1.5 0 0 1 2.1 0l1.1 1.1a1.5 1.5 0 0 1 0 2.1L8.2 19 4 20Z"/><path d="M13.8 7 17 10.2"/></svg></button> <button class="btn small danger" onclick="del('paineis','${r.id}')"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7h14M9.5 7V5a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1v2"/><path d="M6.5 7 7.3 19a1.5 1.5 0 0 0 1.5 1.4h6.4a1.5 1.5 0 0 0 1.5-1.4L17.5 7"/><path d="M10 11v6M14 11v6"/></svg></button>`)}</div>`}
function renderLacos(){let fp=filters.lacoPainel||'',fl=filters.lacoNome||'',fs=filters.lacoStatus||''; let rows=db.lacos.filter(l=>(!fp||paiName(l.painelId)===fp)&&(!fl||l.nome===fl)).map(l=>{let eq=db.equipamentos.filter(e=>e.lacoId===l.id);let status=eq.some(e=>up(e.status).includes('FALHA'))?'Com falha':'Em operação';return {...l,painel:paiName(l.painelId),totalDisp:db.flms.filter(f=>f.lacoId===l.id).length+eq.length,status,sub:subTipos(x=>x.lacoId===l.id)}}).filter(r=>(!fs||r.status===fs));document.getElementById('lacos').innerHTML=`<div class="card"><button class="btn" onclick="formLaco()">+ Criar novo laço</button><div class="toolbar"><div class="field"><label>Painel</label><select onchange="filters.lacoPainel=this.value;render()">${selectOpts(unique(db.paineis.map(p=>p.nome)),fp)}</select></div><div class="field"><label>Laço</label><select onchange="filters.lacoNome=this.value;render()">${selectOpts(unique(db.lacos.map(l=>l.nome)),fl)}</select></div><div class="field"><label>Status</label><select onchange="filters.lacoStatus=this.value;render()">${selectOpts(['Em operação','Com falha'],fs)}</select></div></div></div><div class="card"><h3 class="sectionTitle">Laços cadastrados</h3>${table(rows,[['Painel','painel'],['Laço','nome'],['Piso','piso'],['Total disp.','totalDisp'],['Status','status',r=>`<span class="pill ${r.status==='Com falha'?'bad':'ok'}">${r.status}</span>`],['Subtotal por tipo/modelo','sub',r=>r.sub]],r=>`<button class="btn small secondary" onclick="formLaco('${r.id}')"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20l1-4.2L15.5 5.3a1.5 1.5 0 0 1 2.1 0l1.1 1.1a1.5 1.5 0 0 1 0 2.1L8.2 19 4 20Z"/><path d="M13.8 7 17 10.2"/></svg></button> <button class="btn small danger" onclick="del('lacos','${r.id}')"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7h14M9.5 7V5a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1v2"/><path d="M6.5 7 7.3 19a1.5 1.5 0 0 0 1.5 1.4h6.4a1.5 1.5 0 0 0 1.5-1.4L17.5 7"/><path d="M10 11v6M14 11v6"/></svg></button>`)}</div>`}
function subTipos(match){let map={}; db.flms.filter(match).forEach(f=>{let k='Módulo • '+(f.modelo||'FLM');map[k]=(map[k]||0)+1}); db.equipamentos.filter(match).forEach(e=>{let k=(e.tipo||'Equipamento')+' • '+(e.modelo||'S/modelo');map[k]=(map[k]||0)+1}); let entries=Object.entries(map); if(!entries.length)return '-'; return '<div class="subTipoTags">'+entries.map(([k,v])=>`<span class="pill">${esc(k)}: ${v}</span>`).join('')+'</div>'}
function renderFlms(){let f=filters.flm||{};let paineis=unique(db.paineis.map(p=>p.nome));let lacos=unique(db.lacos.map(l=>l.nome));let pisos=unique(db.flms.map(x=>x.piso).concat(db.lacos.map(x=>x.piso),db.locais.map(x=>x.piso),db.equipamentos.map(x=>x.piso)));let lojas=unique(db.locais.map(x=>x.nome));let rows=db.flms.map(flm=>{let ps=db.portas.filter(p=>p.flmId===flm.id);let portas=ps.map(p=>`P${p.numero}: ${locName(p.localId)||'Sem vínculo'}${p.ligacao?' • '+esc(p.ligacao):''}`).join('<br>');let nomesPortas=ps.map(p=>locName(p.localId)).filter(Boolean).join(' | ');return {...flm,painel:paiName(flm.painelId),laco:lacName(flm.lacoId),portas,lojas:nomesPortas}}).filter(r=>(!f.painel||r.painel===f.painel)&&(!f.laco||r.laco===f.laco)&&(!f.piso||r.piso===f.piso)&&(!f.loja||up(r.lojas).includes(up(f.loja))));document.getElementById('flms').innerHTML=`<div class="card"><button class="btn" onclick="formFlm()">+ Criar novo FLM</button><div class="toolbar"><div class="field"><label>Painel</label><select onchange="filters.flm={...filters.flm,painel:this.value};render()">${selectOpts(paineis,f.painel)}</select></div><div class="field"><label>Laço</label><select onchange="filters.flm={...filters.flm,laco:this.value};render()">${selectOpts(lacos,f.laco)}</select></div><div class="field"><label>Piso</label><select onchange="filters.flm={...filters.flm,piso:this.value};render()">${selectOpts(pisos,f.piso)}</select></div><div class="field"><label>Loja / Área</label><select onchange="filters.flm={...filters.flm,loja:this.value};render()">${selectOpts(lojas,f.loja)}</select></div><button class="btn secondary" onclick="filters.flm={};render()">Limpar filtros</button></div></div><div class="card"><h3 class="sectionTitle">FLMs físicos e portas</h3>${table(rows,[['Painel','painel'],['Laço','laco'],['Piso','piso'],['Endereço FLM','endereco'],['Modelo','modelo'],['Portas / Ligações','portas',r=>r.portas||'-']],r=>`<button class="btn small secondary" onclick="formFlm('${r.id}')"><svg viewB
