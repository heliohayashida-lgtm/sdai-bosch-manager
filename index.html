function compressImageFile(file,maxWidth=1200,quality=0.72){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxWidth){h=Math.round(h*maxWidth/w);w=maxWidth}
        const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.onerror=reject; img.src=ev.target.result;
    };
    reader.onerror=reject; reader.readAsDataURL(file);
  });
}
let _fotoUploadQueue=[]; let _fotoUploadBusy=false; const _fotoUploadPending={};
function queueFotoUploads(planoId,files){
  ensurePhotoUploadFrame();
  const LIMITE_REJEITAR=30*1024*1024, LIMITE_AVISAR=8*1024*1024;
  let avisouGrande=false, rejeitadas=0;
  [...files].forEach(file=>{
    if(file.size>LIMITE_REJEITAR){rejeitadas++; return}
    if(file.size>LIMITE_AVISAR&&!avisouGrande){avisouGrande=true; alert('Uma ou mais fotos são grandes — o navegador pode levar alguns segundos pra comprimir antes de enviar. Aguarde sem fechar a janela.')}
    _fotoUploadQueue.push({planoId,file});
  });
  if(rejeitadas)alert(`${rejeitadas} foto(s) maior(es) que 30MB foram ignoradas — tire uma foto nova ou reduza o tamanho antes de anexar.`);
  updateFotoUploadStatus(); processFotoQueue();
}
function updateFotoUploadStatus(){
  const el=document.getElementById('mFotoStatus'); if(!el)return;
  const pend=Object.values(_fotoUploadPending);
  const total=_fotoUploadQueue.length+pend.length;
  if(!total){el.textContent='';return;}
  const aguardando=pend.filter(p=>!p.timedOut).length;
  const recuperando=pend.filter(p=>p.timedOut).length;
  let msg='';
  if(_fotoUploadQueue.length)msg+=`${_fotoUploadQueue.length} foto(s) na fila. `;
  if(aguardando)msg+=`Enviando ${aguardando} foto(s)... `;
  if(recuperando)msg+=`Aguardando confirmação do servidor (pode levar até 4 min)... `;
  el.textContent=msg.trim();
}
async function processFotoQueue(){
  if(_fotoUploadBusy||!_fotoUploadQueue.length)return;
  _fotoUploadBusy=true;
  const job=_fotoUploadQueue.shift();
  try{
    const dataUrl=await compressImageFile(job.file);
    const reqId=id();
    const nomeFoto=job.file.name||'foto';
    _fotoUploadPending[reqId]={planoId:job.planoId,filename:nomeFoto,timedOut:false};
    updateFotoUploadStatus();
    const form=document.createElement('form');
    form.method='POST'; form.action=API_URL; form.target='photoUploadFrame'; form.style.display='none';
    const fields={action:'uploadFoto',token:getApiToken(),reqId,planoId:job.planoId,filename:nomeFoto,imageData:dataUrl};
    Object.entries(fields).forEach(([k,v])=>{const inp=document.createElement('input');inp.type='hidden';inp.name=k;inp.value=v;form.appendChild(inp)});
    document.body.appendChild(form); form.submit(); setTimeout(()=>form.remove(),2000);
    // Polling independente: consulta o diagnóstico a cada 10s por até 4 minutos
    let tentativas=0; let resolvido=false;
    const pollTimer=setInterval(async()=>{
      if(resolvido||!_fotoUploadPending[reqId]){clearInterval(pollTimer);return;}
      tentativas++;
      try{
        const r=await jsonp('debugFoto');
        if(!r||!r.ok)return;
        const linhas=r.log.split('\n');
        // Procura linha de SUCESSO para este planoId, ou pelo nome do arquivo (fallback p/ Code.gs antigo)
        const sucessoLinha=linhas.find(l=>l.includes('SUCESSO')&&(l.includes(job.planoId)||l.includes(nomeFoto)));
        if(sucessoLinha){
          const mId=sucessoLinha.match(/id=([a-zA-Z0-9_-]{25,})/);
          if(mId){
            resolvido=true; clearInterval(pollTimer);
            const fileId=mId[1];
            const url='https://drive.google.com/thumbnail?id='+fileId+'&sz=w800';
            handleFotoUploadResult({reqId,ok:true,url,planoId:job.planoId,conta:'(recuperado via polling)'});
            return;
          }
        }
        // Procura linha de ERRO para este planoId
        const erroLinha=linhas.find(l=>l.includes('ERRO')&&l.includes(job.planoId));
        if(erroLinha&&tentativas>2){
          resolvido=true; clearInterval(pollTimer);
          handleFotoUploadResult({reqId,ok:false,error:erroLinha,planoId:job.planoId});
          return;
        }
      }catch(_e){}
      if(tentativas>=24){
        resolvido=true; clearInterval(pollTimer);
        if(_fotoUploadPending[reqId]){
          delete _fotoUploadPending[reqId];
          const el=document.getElementById('mFotoStatus');
          if(el)el.textContent=`Foto "${nomeFoto}" não confirmada em 4 minutos. Verifique a pasta no Drive.`;
          updateFotoUploadStatus();
          _fotoUploadBusy=false; processFotoQueue();
        }
      }
    },10000);
  }catch(e){
    alert('Não foi possível preparar a foto: '+e.message);
    _fotoUploadBusy=false; processFotoQueue();
  }
}
function handleFotoUploadResult(data){
  _fotoUploadBusy=false;
  const pend=_fotoUploadPending[data.reqId];
  if(pend){
    if(data.ok&&data.url){
      const plano=(db.planos||[]).find(p=>p.id===pend.planoId);
      if(plano){plano.fotos=normalizeFotos(plano.fotos);plano.fotos.push(data.url);markDirty('foto anexada ao plano');renderPlano();const grid=document.getElementById('mFotoGrid');if(grid)grid.innerHTML=fotosThumbsHtml(plano.fotos,72,plano.id)}
      if(pend.timedOut){alert('Foto recebida com sucesso (chegou depois do aviso de demora). Já foi salva no chamado.');}
      if(data.conta&&!window._contaFotoAvisada){window._contaFotoAvisada=true;const elc=document.getElementById('mFotoConta');if(elc)elc.innerHTML=`Foto salva na conta <b>${esc(data.conta)}</b>${data.pastaUrl?` — <a href="${esc(data.pastaUrl)}" target="_blank" rel="noopener">abrir pasta no Drive</a>`:''}.`}
    } else {
      alert('Falha ao enviar uma foto: '+(data.error||'erro desconhecido no Apps Script')+(data.conta?`\n\nConta: ${data.conta}`:''));
    }
    delete _fotoUploadPending[data.reqId];
  }
  updateFotoUploadStatus();
  processFotoQueue();
}
function planoVisitasEfetivas(p){
  // Compatibiliza planos antigos (um único atendimento gravado direto no objeto plano) com o novo
  // modelo de histórico acumulativo (plano.visitas[]). Nunca modifica o registro antigo — apenas
  // apresenta o atendimento legado como "primeira visita" quando plano.visitas ainda não existe ou
  // quando existem dados de atendimento anteriores à introdução do array.
  const visitas=(p.visitas||[]).slice();
  if(p.atendidoEm&&!visitas.some(v=>v.legado)){
    visitas.push({id:'legado-'+p.id,legado:true,data:p.atendidoEm,responsavel:p.responsavel||'',intervencao:'',observacao:p.providencia||'',resultado:p.resultado==='Conforme'?'Normalizado':(p.resultado?'Permanece com falha':''),proximaAcao:p.encaminhamento||'Nenhuma',fotos:p.atendimentoFotos||[],videos:p.atendimentoVideos||[],documentos:p.atendimentoDocumentos||[]});
  }
  return visitas.sort((a,b)=>String(b.data||'').localeCompare(String(a.data||'')));
}
function visitaEvidenciasHtml(v){
  const fotos=(v.fotos||[]).filter(a=>a&&a.dataUrl);

function historicoVisitasHtml(p){

async function saveAtendimentoPlano(planoId){
  // BACKUP LÓGICA ANTERIOR: saveAtendimentoPlano concatenava fotos/vídeos/documentos direto nos
  // campos plano.atendimentoFotos/atendimentoVideos/atendimentoDocumentos, sobrescrevia
  // plano.providencia/resultado a cada chamada (sem separar por visita) e sempre concluía o plano,
  // mesmo quando o resultado era "Não Conforme".
  // NOVA LÓGICA: cada chamada empilha uma visita em plano.visitas[] (histórico acumulativo, nunca
  // apaga visitas anteriores). Só encerra a ocorrência (falha resolvida + plano concluído + status
  // técnico "Em operação") quando o resultado da visita for "Normalizado". Demais próximas ações
  // ajustam a situação da falha reaproveitando os mesmos rótulos já usados em salvarResolverFalha.
  const p=db.planos.find(x=>x.id===planoId); if(!p){alert('Plano não encontrado.');return}
  const f=db.falhas.find(x=>x.id===p.falhaId);
  const dataVal=document.getElementById('mAtdData').value||isoNow();
  const responsavel=n(document.getElementById('mAtdResp').value);
  const intervencao=document.getElementById('mAtdIntervencao').value||'Nenhuma intervenção';
  const observacoes=n(document.getElementById('mAtdObs').value);
  const resultado=document.getElementById('mAtdResultado').value||'Permanece com falha';
  const proximaAcao=document.getElementById('mAtdProximaAcao').value||'Nenhuma';
  const [fotos,videos,documentos]=await Promise.all([
    readFilesAsDataUrls(document.getElementById('mAtdFotos').files),
    readFilesAsDataUrls(document.getElementById('mAtdVideos').files),
    readFilesAsDataUrls(document.getElementById('mAtdDocs').files)
  ]);
  const visita={id:id(),data:dataVal,responsavel:responsavel||p.responsavel||'',intervencao,observacao:observacoes,resultado,proximaAcao,fotos,videos,documentos};
  p.visitas=p.visitas||[];
  p.visitas.push(visita);
  if(responsavel)p.responsavel=responsavel;
  // Fallback de compatibilidade: Dashboard/relatórios/exportação ainda leem p.resultado/p.encaminhamento
  // (texto livre "Conforme"/"Não Conforme") — mantidos coerentes com o resultado da última visita.
  p.resultado=resultado==='Normalizado'?'Conforme':'Não Conforme';
  p.providencia=observacoes||p.providencia;
  p.atendidoEm=dataVal;

  const itemId=(f&&f.itemId)||'';
  const isFlm=String(itemId).startsWith('flm:');
  const item=isFlm?flmById(String(itemId).slice(4)):db.equipamentos.find(e=>e.id===itemId);
  const loc=(f&&f.localId)?localById(f.localId):null;
  const statusAnterior=(item&&item.status)||(f&&f.status)||p.statusFalha||'Falha';

  db.eventosOperacionais=db.eventosOperacionais||[];
  if(resultado==='Normalizado'){
    p.encaminhamento='';
    p.situacao='Concluído';
    p.concluidoEm=dataVal;
    if(f){
      f.situacao='Resolvida'; f.resolvidaEm=dataVal; f.status='Em operação';
      if(item){item.status='Em operação';item.ultimaAlteracao=isoNow()}
      if(loc){loc.status='Em operação';loc.ultimaAlteracao=isoNow()}
    }
    db.eventosOperacionais.push({id:id(),data:dataVal,tipoEvento:'Atendimento de Plano de Ação — Normalizado',falhaId:p.falhaId,planoId:p.id,localId:f?f.localId:'',itemId:f?f.itemId:'',painelId:(item&&item.painelId)||(f&&f.painelId)||'',lacoId:(item&&item.lacoId)||(f&&f.lacoId)||'',statusAnterior,statusFinal:'Em operação',responsavel:p.responsavel,resultado,intervencao,observacao:observacoes,encaminhamento:''});
    logLocal('Plano de Ação',p.id,'Visita registrada — Normalizado',`Falha ${f?f.id:''} marcada como resolvida. Status ${statusAnterior} → Em operação.`);
    alert('Visita salva. Ocorrência encerrada: falha resolvida e status técnico atualizado para Em operação.');
  } else {
    p.situacao='Em andamento';
    let encaminhamentoTxt=proximaAcao!=='Nenhuma'?proximaAcao:'';
    p.encaminhamento=encaminhamentoTxt;
    if(f){
      if(proximaAcao==='Notificar lojista')f.situacao='Aguardando lojista';
      else if(proximaAcao==='Solicitar material')f.situacao='Aguardando material';
      else if(resultado==='Sem acesso')f.situacao='Aguardando acesso';
      else f.situacao='Em atendimento';
    }
    db.eventosOperacionais.push({id:id(),data:dataVal,tipoEvento:'Atendimento de Plano de Ação — '+resultado,falhaId:p.falhaId,planoId:p.id,localId:f?f.localId:'',itemId:f?f.itemId:'',painelId:(item&&item.painelId)||(f&&f.painelId)||'',lacoId:(item&&item.lacoId)||(f&&f.lacoId)||'',statusAnterior,statusFinal:statusAnterior,responsavel:p.responsavel,resultado,intervencao,observacao:observacoes,encaminhamento:encaminhamentoTxt});
    logLocal('Plano de Ação',p.id,'Visita registrada — '+resultado,`Falha ${f?f.id:''} permanece ativa (${statusAnterior}). Próxima ação: ${proximaAcao}.`);
    alert('Visita salva. A ocorrência permanece ativa. Próxima ação: '+proximaAcao+'.');
  }
  closeModal(); save();
}

function historicoPlano(falhaId){
  const f=db.falhas.find(x=>x.id===falhaId);
  if(!f){alert('Falha não encontrada para exibir histórico.');return}
  if(f.localId&&db.locais.find(x=>x.id===f.localId))return openLocal(f.localId);
  if(f.itemId&&!String(f.itemId).startsWith('flm:')&&db.equipamentos.find(x=>x.id===f.itemId))return openEquip(f.itemId);
  openModal(`<h2>Histórico</h2><div class="timeline"><div class="tl"><b>${esc(normalizeStatus(f.status))}</b><br><small>${esc(f.data)} • ${esc(f.itemNome||'')}</small><p>${esc(f.motivo||f.obs||'Sem observação')}</p></div></div><br><button class="btn secondary" onclick="closeModal()">Fechar</button>`);
}
function duplicarPlano(planoId){
  // "Duplicar" (item 7 do pedido de reestruturação, 2026-07) não cria um segundo plano para a MESMA
  // falha — isso quebraria a garantia estrutural 1 falha ⇄ 1 plano corrigida nesta sessão. Em vez
  // disso, copia os dados descritivos do plano (categoria, prioridade, responsável, material,
  // direcionamento) como um "molde" que é aplicado automaticamente ao PRÓXIMO plano criado a partir
  // de uma nova falha — útil para ocorrências recorrentes no mesmo padrão de atendimento.
  const p=db.planos.find(x=>x.id===planoId); if(!p)return;
  window._planoTemplate={categoria:p.categoria,prioridade:p.prioridade,responsavel:p.responsavel,material:p.material,necessitaCompra:p.necessitaCompra,direcionamento:p.direcionamento};
  closeModal();
  alert('Dados do plano copiados (categoria, prioridade, responsável, material). Registre a nova falha em Falhas → "+ Registrar" — o plano gerado automaticamente já virá preenchido com os mesmos dados.');
  formFalha();
}
function concluirPlano(i){let o=db.planos.find(x=>x.id===i); if(!o)return; o.situacao='Concluído'; o.concluidoEm=isoNow(); o.resultado=o.resultado||'Conforme'; let f=db.falhas.find(x=>x.id===o.falhaId); if(f){
    // CORREÇÃO (item 5/6 do pedido do usuário, 2026-07): antes só a falha SINTÉTICA "Em operação"
    // criada abaixo recebia resolvidaEm — a falha original permanecia com resolvidaEm vazio e por
    // isso continuava aparecendo como "Em aberto" na aba Falhas mesmo com o plano concluído. Agora a
    // falha original também é marcada como resolvida, então ela some da aba Falhas Ativas assim que
    // o Plano de Ação é concluído, sem precisar recarregar a página (render() já roda via save()).
    f.resolvidaEm=f.resolvidaEm||isoNow();
    // CORREÇÃO (Parte B, saneamento de falhas duplicadas, 2026-07): concluirPlano() não cria mais
    // nenhum registro sintético em db.falhas. Antes um segundo registro com status "Em operação"
    // era empurrado para db.falhas só para marcar o retorno à operação, duplicando a base (falha
    // original + falha artificial por conclusão de plano). Agora a falha original é apenas marcada
    // como resolvida (resolvidaEm acima) e o evento de retorno à operação vai para
    // db.eventosOperacionais (auditável), sem criar falha nova.
    let itemId=f.itemId||'';let isFlm=String(itemId).startsWith('flm:');let item=isFlm?flmById(String(itemId).slice(4)):db.equipamentos.find(e=>e.id===itemId);let loc=localById(f.localId||'');let statusAnterior=(item&&item.status)||f.status||'Falha'; if(item){item.status='Em operação';item.ultimaAlteracao=isoNow()} if(loc){loc.status='Em operação';loc.ultimaAlteracao=isoNow()}
    db.eventosOperacionais=db.eventosOperacionais||[];
    db.eventosOperacionais.push({id:id(),data:isoNow(),tipoEvento:'Retorno a operação',falhaId:f.id,planoId:o.id,localId:f.localId,itemId:f.itemId,painelId:(item&&item.painelId)||f.painelId,lacoId:(item&&item.lacoId)||f.lacoId,statusAnterior,statusFinal:'Em operação',responsavel:o.responsavel,providencia:o.providencia,observacao:'Plano de ação concluído — falha original marcada como resolvida.'});
    logLocal('Plano de Ação',o.id,'Conclusão de plano',`Falha ${f.id} marcada como resolvida (retorno a operação). Status anterior: ${statusAnterior} → Em operação.`);
    alert(item||loc?'Plano concluído. Status do equipamento e da loja atualizado para Em operação.':'Plano concluído.');
  } save()}

function openEquip(i){let e=db.equipamentos.find(x=>x.id===i);let hist=db.falhas.filter(f=>f.itemId===i||f.localId===e.localId).sort((a,b)=>b.data.localeCompare(a.data));openModal(`<h2>${esc(e.tipo)} ${esc(e.endereco)}</h2><p><b>Loja:</b> ${esc(locName(e.localId))} • <b>Painel:</b> ${esc(paiName(e.painelId))} • <b>Laço:</b> ${esc(lacName(e.lacoId))}</p><h3>Histórico</h3><div class="timeline">${hist.map(h=>`<div class="tl"><b>${esc(h.status)}</b><br><small>${esc(h.data)} • ${esc(h.origem||'')}</small><p>${esc(h.motivo||h.obs||'Sem observação')}</p></div>`).join('')||'<p class="msg warn">Sem histórico.</p>'}</div>`)}

// CORREÇÃO (sistema lento / digitação travando): render() recalculava as 17 telas do sistema
// inteiras a CADA chamada — inclusive a cada tecla digitada em qualquer busca (debounce de
// 120ms em onSearchInput chama render() de novo). Ou seja, digitar num campo de busca da tela de
// Falhas também recalculava Dashboard, Painéis, Laços, Módulos, Equipamentos, Plano de Ação,
// Relatórios etc. por baixo dos panos, mesmo estando todas ocultas — daí a lentidão/travamento ao
// digitar rápido, e a lentidão geral do sistema conforme a base cresce. Agora só a tela
// ATUALMENTE visível é recalculada; as demais são recalculadas no momento em que o usuário
// efetivamente navega até elas (a troca de aba já chama render() de novo, então nada fica
// desatualizado — só deixa de ser recalculado enquanto está fora de vista). Nenhuma tela ou
// funcionalidade foi removida, apenas deixou de ser recomputada sem necessidade.
const RENDER_POR_TELA={dashboard:renderDashboard,paineis:renderPaineis,lacos:renderLacos,flms:renderFlms,locais:renderLocais,equipamentos:renderEquipamentos,falhas:renderFalhas,plano:renderPlano,importacao:renderImportacao,exportacao:renderExportacao,relatorios:renderRelatorios,sistema:renderSistema,usuarios:renderUsuarios,configuracoes:renderConfiguracoes,backup:renderBackup,logs:renderLogs,sobre:renderSobre};
function render(){ensureDefaultUsers(); if(!isLoggedIn()){showLogin();return}else{hideLogin()} applyNavPermissions(); document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.getElementById(currentView)?.classList.add('active'); const t=document.getElementById('pageTitle'); if(t)t.textContent=L3A_VIEWS[currentView]||'Contratos L3A'; (RENDER_POR_TELA[currentView]||renderDashboard)();try{applyBrand()}catch(e){}try{applyRoleUI()}catch(e){}attachSearchInputs();restoreSearchFocus();updateSyncFooter()}

// ---- Parte B2: auditoria e saneamento de falhas sintéticas geradas pelo bug de concluirPlano() ----
// auditarFalhasDuplicadas(): DRY-RUN. Não altera nada em db — só analisa db.falhas e devolve um
// relatório com 3 grupos: manter (falhas reais), migrarERemover (sintéticos com evidência forte) e
// revisaoManual (suspeitos sem evidência suficiente, nunca removidos automaticamente).
function auditarFalhasDuplicadas(){
  const falhas=(db.falhas||[]).slice().sort((a,b)=>String(a.data||'').localeCompare(String(b.data||'')));
  const manter=[],migrarERemover=[],revisaoManual=[];
  falhas.forEach(f=>{
    let evidencias=0;
    const motivoNorm=up(n(f.motivo||''));
    const origemNorm=up(n(f.origem||''));
    const statusNorm=up(normalizeStatus(f.status||''));
    if(statusNorm==='EM OPERAÇÃO'||statusNorm==='EM OPERACAO')evidencias++;
    if(f.resolvidaEm)evidencias++;
    if(origemNorm.includes('PLANO'))evidencias++;
    if(motivoNorm.includes('PLANO DE AÇÃO CONCLUÍDO')||motivoNorm.includes('PLANO DE ACAO CONCLUIDO')||motivoNorm.includes('PLANO CONCLU'))evidencias++;
    // falha anterior vinculada ao mesmo local/item (o "original" que o bug duplicou)
    const anterior=falhas.find(o=>o.id!==f.id&&o.localId===f.localId&&(o.itemId||'')===(f.itemId||'')&&String(o.data||'')<String(f.data||''));
    if(anterior)evidencias++;
    // criado poucos minutos após a conclusão do plano vinculado à falha anterior
    let proximoDeConclusaoDePlano=false;
    if(anterior){
      const planoAnterior=(db.planos||[]).find(p=>p.falhaId===anterior.id&&p.situacao==='Concluído'&&p.concluidoEm);
      if(planoAnterior){
        const tPlano=Date.parse(planoAnterior.concluidoEm)||0, tFalha=Date.parse(f.data)||0;
        if(tPlano&&tFalha&&Math.abs(tFalha-tPlano)<=15*60*1000){evidencias++; proximoDeConclusaoDePlano=true}
      }
    }
    const item={falha:f,evidencias,anteriorId:anterior?anterior.id:'',proximoDeConclusaoDePlano};
    // Critério: NUNCA remover só por status="Em operação" isolado (evidencias mínimas ==1 vindo só
    // do status não basta). Exige combinação de pelo menos 3 evidências, incluindo ter uma falha
    // anterior vinculada ao mesmo local/item (ou seja, o registro é claramente um "extra").
    if(evidencias>=3&&anterior){migrarERemover.push(item)}
    else if(evidencias>=2){revisaoManual.push(item)}
    else{manter.push(item)}
  });
  return{
    executadoEm:isoNow(),
    totalFalhas:falhas.length,
    qtdSuspeitos:migrarERemover.length+revisaoManual.length,
    qtdReaisPreservadas:manter.length,
    qtdSinteticosRemover:migrarERemover.length,
    qtdRevisaoManual:revisaoManual.length,
    manter,migrarERemover,revisaoManual
  };
}
// aplicarSaneamentoFalhas(relatorio): EXECUTA de fato — só deve ser chamada após confirmação
// explícita do usuário (ver UI em renderSistema/modalAuditoriaFalhas). Faz backup completo do db
// antes de qualquer alteração, migra cada sintético para db.eventosOperacionais/db.historico e só
// então remove o registro de db.falhas. Recalcula os totais reaproveitando as funções já
// existentes (render() atualiza Dashboard/Relatórios/Falhas a partir do db já saneado).
function aplicarSaneamentoFalhas(relatorio){
  if(!relatorio||!relatorio.migrarERemover)return;
  db._backupAntesSaneamento=JSON.parse(JSON.stringify(db));
  db.historico=db.historico||[]; db.eventosOperacionais=db.eventosOperacionais||[]; db.logsAuditoria=db.logsAuditoria||[];
  const idsRemover=new Set();
  relatorio.migrarERemover.forEach(item=>{
    const f=item.falha;
    const plano=(db.planos||[]).find(p=>p.falhaId===item.anteriorId&&p.situacao==='Concluído');
    db.eventosOperacionais.push({
      id:id(),data:isoNow(),tipoEvento:'Conclusão de plano migrada',falhaId:item.anteriorId||f.id,planoId:plano?plano.id:'',
      localId:f.localId,itemId:f.itemId,statusAnterior:f.statusAnterior||'',statusFinal:f.status||'',
      responsavel:f.responsavel||'',providencia:(plano&&plano.providencia)||f.obs||'',
      observacao:'Registro sintético gerado pelo bug de concluirPlano() — migrado para histórico e removido de db.falhas no saneamento.',
      evidencias:item.evidencias,origemRemovidaId:f.id,origemRemovidaSnapshot:f
    });
    idsRemover.add(f.id);
  });
  if(idsRemover.size){db.falhas=(db.falhas||[]).filter(f=>!idsRemover.has(f.id))}
  db.logsAuditoria.push({
    timestamp:isoNow(),usuario:(currentUser&&currentUser().email)||(currentUserSafe&&currentUserSafe().email)||'sistema',
    resumo:`Saneamento de falhas duplicadas: ${idsRemover.size} sintético(s) migrado(s) e removido(s) de db.falhas. ${relatorio.qtdRevisaoManual} em revisão manual (não removidos). ${relatorio.qtdReaisPreservadas} falha(s) real(is) preservada(s).`
  });
  logLocal('Sistema','saneamento-falhas','Auditar e corrigir falhas duplicadas',`${idsRemover.size} sintético(s) removido(s) de db.falhas (migrados para db.eventosOperacionais).`);
  persistLocal(); markDirty('saneamento de falhas duplicadas'); save();
  alert(`Saneamento concluído: ${idsRemover.size} registro(s) sintético(s) migrado(s) e removido(s). ${relatorio.qtdRevisaoManual} suspeito(s) ficaram em revisão manual (não removidos automaticamente).`);
}

function confirmarSaneamentoFalhas(){
  const rel=window._relatorioAuditoriaFalhas;
  if(!rel)return;
  if(!confirm(`Confirma remover ${rel.qtdSinteticosRemover} registro(s) sintético(s) de db.falhas? Um backup completo (db._backupAntesSaneamento) é criado antes, e cada registro é migrado para db.eventosOperacionais antes de ser removido.`))return;

// ---- Validacao/saneamento de consistencia Falha x Plano (item 4/5, 2026-07) ----
// analisarConsistenciaFalhaPlano(f): analise PURA (dry-run), nao altera nada em db. Detecta, por
// falha: (a) falha resolvida com plano ainda aberto; (b) plano concluido sem resultado preenchido;
// (c) falha ativa com status tecnico "Em operação" (inconsistente); (d) multiplos planos abertos
// simultaneos para a mesma falha. Cada issue traz autoCorrigivel (true so quando inequivoco) e uma
// funcao aplicar() usada apenas por validarConsistenciaFalhaPlano()/aplicarCorrecaoConsistencia().
function analisarConsistenciaFalhaPlano(f){
  const issues=[];
  if(!f)return {falhaId:'',issues};
  const planosDaFalha=(db.planos||[]).filter(p=>p.falhaId===f.id);
  const situacaoEf=situacaoFalhaEfetiva(f);
  const ativa=falhaSituacaoAtiva(f);
  const planoAtivo=planosDaFalha.find(p=>p.situacao!=='Concluído'&&p.situacao!=='Cancelado');
  if(situacaoEf==='Resolvida'&&planoAtivo){
    const normalizado=(planoAtivo.visitas||[]).slice().reverse().find(v=>v.resultado==='Normalizado');
    issues.push({tipo:'falha_resolvida_plano_aberto',descricao:`Falha ${f.id} está Resolvida mas o plano ${planoAtivo.id} continua "${planoAtivo.situacao}".`,autoCorrigivel:!!normalizado,falhaId:f.id,planoId:planoAtivo.id,
      aplicar:normalizado?()=>{planoAtivo.situacao='Concluído';planoAtivo.concluidoEm=planoAtivo.concluidoEm||normalizado.data;planoAtivo.resultado=planoAtivo.resultado||'Conforme'}:null});
  }
  planosDaFalha.filter(p=>p.situacao==='Concluído'&&!p.resultado).forEach(p=>{
    issues.push({tipo:'plano_concluido_sem_resultado',descricao:`Plano ${p.id} está Concluído mas o campo "resultado" está vazio.`,autoCorrigivel:false,falhaId:f.id,planoId:p.id,aplicar:null});
  });
  if(ativa&&up(normalizeStatus(f.status||''))==='EM OPERAÇÃO'){
    issues.push({tipo:'falha_ativa_status_operacao',descricao:`Falha ${f.id} está ativa (${situacaoEf}) mas o status técnico é "Em operação".`,autoCorrigivel:false,falhaId:f.id,planoId:'',aplicar:null});
  }
  const abertos=planosDaFalha.filter(p=>p.situacao!=='Concluído'&&p.situacao!=='Cancelado');
  if(abertos.length>1){
    const manter=abertos.slice().sort((a,b)=>String(a.criadoEm||'').localeCompare(String(b.criadoEm||'')))[0];
    const extras=abertos.filter(p=>p.id!==manter.id);
    issues.push({tipo:'multiplos_planos_abertos',descricao:`Falha ${f.id} tem ${abertos.length} planos abertos simultâneos (mantendo ${manter.id}).`,autoCorrigivel:true,falhaId:f.id,planoId:extras.map(p=>p.id).join(','),
      aplicar:()=>{extras.forEach(p=>{p.situacao='Cancelado';p.canceladoEm=isoNow();p.observacaoCancelamento='Cancelado automaticamente — plano duplicado para a mesma falha (mantido '+manter.id+').'})}});
  }
  return {falhaId:f.id,issues};
}
// validarConsistenciaFalhaPlano(falhaId): roda a analise acima E APLICA de fato as correcoes
// inequivocas (autoCorrigivel), marcando os casos ambiguos com falha._revisaoManual=true e um motivo
// legivel em falha._motivoRevisao. Nunca apaga falhas reais.
function validarConsistenciaFalhaPlano(falhaId){
  const f=(db.falhas||[]).find(x=>x.id===falhaId); if(!f)return null;
  const rel=analisarConsistenciaFalhaPlano(f);
  let corrigidos=0,manuais=0;
  rel.issues.forEach(is=>{
    if(is.autoCorrigivel&&is.aplicar){ is.aplicar(); is.corrigido=true; corrigidos++; }
    else { manuais++; }
  });
  if(manuais>0){
    f._revisaoManual=true;
    f._motivoRevisao=rel.issues.filter(is=>!is.corrigido).map(is=>is.descricao).join(' | ');
  } else if(f._revisaoManual){
    delete f._revisaoManual; delete f._motivoRevisao;
  }
  return {falhaId,corrigidos,manuais,issues:rel.issues};
}
// validarConsistenciaGeral(): roda validarConsistenciaFalhaPlano() para TODAS as falhas, mais os
// checks de nivel geral: planos sem falha vinculada e falhas duplicadas ativas (mesmo item/local/
// tipo) — ambos apenas SINALIZADOS (_revisaoManual), nunca corrigidos automaticamente (ambiguos).
function validarConsistenciaGeral(){
  const resultados=(db.falhas||[]).map(f=>validarConsistenciaFalhaPlano(f.id)).filter(Boolean);
  const orfaos=(db.planos||[]).filter(p=>p.falhaId&&!(db.falhas||[]).find(f=>f.id===p.falhaId));
  orfaos.forEach(p=>{p._revisaoManual=true;p._motivoRevisao='Plano sem falha vinculada (falhaId="'+(p.falhaId||'—')+'").'});
  const grupos={};
  (db.falhas||[]).filter(falhaSituacaoAtiva).forEach(f=>{const k=(f.itemId||'')+'|'+(f.localId||'')+'|'+(f.tipo||'');grupos[k]=grupos[k]||[];grupos[k].push(f)});
  const duplicadas=Object.values(grupos).filter(arr=>arr.length>1);
  duplicadas.forEach(arr=>arr.forEach(f=>{f._revisaoManual=true;f._motivoRevisao=(f._motivoRevisao?f._motivoRevisao+' | ':'')+'Possível falha duplicada ativa (mesmo item/local/tipo com outra(s) '+(arr.length-1)+' falha(s) ativa(s)).'}));
  return {
    totalFalhas:(db.falhas||[]).length,
    totalPlanosOrfaos:orfaos.length,
    totalGruposDuplicados:duplicadas.length,
    corrigidosAuto:resultados.reduce((a,r)=>a+r.corrigidos,0),
    revisaoManual:resultados.filter(r=>r.manuais>0).length+orfaos.length+duplicadas.reduce((a,g)=>a+g.length,0)
  };
}
// auditarConsistenciaFalhaPlano(): DRY-RUN puro (usa analisarConsistenciaFalhaPlano, nunca aplica()),
// devolve contagens por tipo de inconsistencia para exibir em modal antes de qualquer alteracao.
function auditarConsistenciaFalhaPlano(){
  const porTipo={};
  let autoCorrigiveis=0,manuais=0;
  (db.falhas||[]).forEach(f=>{
    const rel=analisarConsistenciaFalhaPlano(f);
    rel.issues.forEach(is=>{porTipo[is.tipo]=(porTipo[is.tipo]||0)+1; if(is.autoCorrigivel)autoCorrigiveis++; else manuais++;});
  });
  const orfaos=(db.planos||[]).filter(p=>p.falhaId&&!(db.falhas||[]).find(f=>f.id===p.falhaId));
  if(orfaos.length){porTipo['plano_sem_falha']=orfaos.length; manuais+=orfaos.length;}
  const grupos={};
  (db.falhas||[]).filter(falhaSituacaoAtiva).forEach(f=>{const k=(f.itemId||'')+'|'+(f.localId||'')+'|'+(f.tipo||'');grupos[k]=grupos[k]||[];grupos[k].push(f)});
  const duplicadas=Object.values(grupos).filter(arr=>arr.length>1);
  if(duplicadas.length){const qtd=duplicadas.reduce((a,g)=>a+g.length,0);porTipo['falhas_duplicadas_ativas']=qtd; manuais+=qtd;}
  return {executadoEm:isoNow(),totalAnalisado:(db.falhas||[]).length,porTipo,totalAutoCorrigivel:autoCorrigiveis,totalRevisaoManual:manuais};
}
// aplicarCorrecaoConsistencia(relatorio): EXECUTA de fato — so deve ser chamada apos confirmacao
// explicita (ver abrirAuditoriaConsistenciaFalhaPlano/confirmarConsistenciaFalhaPlano). Cria backup
// completo em db._backupConsistenciaFalhaPlano antes de qualquer alteracao (mesmo padrao ja usado em
// db._backupAntesSaneamento). Nao apaga nenhuma falha.
function aplicarCorrecaoConsistencia(relatorio){
  if(!relatorio)return;
  db._backupConsistenciaFalhaPlano={timestamp:isoNow(),db:JSON.parse(JSON.stringify(db))};
  const res=validarConsistenciaGeral();
  db.logsAuditoria=db.logsAuditoria||[];
  db.logsAuditoria.push({timestamp:isoNow(),usuario:(currentUser&&currentUser().email)||(currentUserSafe&&currentUserSafe().email)||'sistema',
    resumo:`Consistência Falha × Plano: ${res.corrigidosAuto} correção(ões) automática(s), ${res.revisaoManual} caso(s) marcado(s) para revisão manual, ${res.totalPlanosOrfaos} plano(s) órfão(s), ${res.totalGruposDuplicados} grupo(s) de falha duplicada ativa.`});
  logLocal('Sistema','consistencia-falha-plano','Auditar consistência Falha × Plano',`${res.corrigidosAuto} corrigido(s) automaticamente, ${res.revisaoManual} sinalizado(s) para revisão manual.`);
  persistLocal(); markDirty('consistência falha-plano'); save();
  alert(`Consistência aplicada: ${res.corrigidosAuto} correção(ões) automática(s). ${res.revisaoManual} caso(s) marcado(s) para revisão manual (não alterados).`);
  return res;
}
// UI: mesmo padrao ja usado em abrirAuditoriaFalhas() — previa (dry-run) em modal, revisao, so
// aplica apos confirmacao explicita.
function abrirAuditoriaConsistenciaFalhaPlano(){
  const rel=auditarConsistenciaFalhaPlano();
  window._relatorioConsistenciaFalhaPlano=rel;

  openModal(`<h2>Auditar consistência Falha × Plano</h2>
  <p class="msg warn">Prévia (nada foi alterado ainda). Falhas analisadas: <b>${rel.totalAnalisado}</b> • Autocorrigíveis: <b>${rel.totalAutoCorrigivel}</b> • Revisão manual: <b>${rel.totalRevisaoManual}</b></p>
  <div class="dsTableWrap"><table class="dsTable"><thead><tr><th>Tipo de inconsistência</th><th>Qtd</th></tr></thead><tbody>${linhasTipo}</tbody></table></div>
  <p class="note">Casos autocorrigíveis (ex.: sincronizar plano com visita "Normalizado" já registrada, cancelar plano duplicado mantendo o mais antigo) são aplicados automaticamente. Casos ambíguos são apenas sinalizados (falha._revisaoManual=true) para revisão manual — nenhum dado é alterado nesses casos.</p>
  <br><button class="btn danger" onclick="confirmarConsistenciaFalhaPlano()">Confirmar e aplicar correções (${rel.totalAutoCorrigivel})</button> <button class="btn secondary" onclick="closeModal()">Cancelar</button>`);
}
function confirmarConsistenciaFalhaPlano(){
  const rel=window._relatorioConsistenciaFalhaPlano; if(!rel)return;
  if(!confirm(`Confirma aplicar ${rel.totalAutoCorrigivel} correção(ões) automática(s)? Um backup completo (db._backupConsistenciaFalhaPlano) é criado antes. Casos de revisão manual não serão alterados.`))return;
  aplicarCorrecaoConsistencia(rel);
  closeModal();
  render();
}

/* =========================================================================
   V8.1 — Dashboard orientado a "onde/quem", não só "quanto".
   Bloco 100% ADITIVO: nenhuma função existente foi alterada ou removida.
   Reaproveita os campos já existentes (piso, painelId, lacoId, status,
   ultimaAlteracao) — nenhuma mudança de schema, nenhuma mudança no Code.gs.
   ========================================================================= */
function pisoSortKey(p){const m=String(p||'').match(/\d+/);return m?parseInt(m[0],10):999}
function dashStatusBucket(st){const s=up(normalizeStatus(st||''));if(s.includes('INCEND')||s.includes('DISPAR'))return 'falha';if(s.includes('ABERT')||s.includes('CURTO'))return 'falha';if(s.includes('TESTE'))return 'teste';if(s.includes('DESATIV'))return 'desativada';return 'operacao'}
// Piso efetivo: o piso OFICIAL definido no Laço (tela Painéis → Piso por Laço) manda
// mais que o piso gravado solto no próprio equipamento/loja/FLM — que pode estar
// vazio ou desatualizado em registros antigos. Só cai para o piso do próprio
// registro se o laço dele ainda não tiver piso oficial definido.
function pisoEfetivo(obj){
  if(!obj)return '';
  const lacoId=obj.lacoId;
  const l=lacoId?(db.lacos||[]).find(x=>x.id===lacoId):null;
  let piso=n(l&&l.piso);
  if(!piso&&lacoId){
    // Cobre o caso de Laços duplicados/órfãos (mesmo nome, ID diferente) deixados
    // por uma reconstrução antiga da base — procura outro registro de Laço com o
    // MESMO NOME que já tenha o piso oficial definido, em vez de mostrar "Sem piso".
    const nomeAtual=l?l.nome:lacName(lacoId);
    if(nomeAtual){
      const irmao=(db.lacos||[]).find(x=>up(x.nome)===up(nomeAtual)&&x.piso);
      if(irmao)piso=n(irmao.piso);
    }
  }
  return piso||n(obj.piso)||'';
}
function timeSince(isoStr){if(!isoStr)return '—';const then=new Date(isoStr).getTime();if(isNaN(then))return '—';const diffMs=Math.max(0,Date.now()-then);const h=diffMs/3600000;if(h<1)return Math.max(1,Math.round(diffMs/60000))+' min';if(h<24)return Math.round(h)+'h';return Math.round(h/24)+'d'}
function dashPisoStats(){const map={};const bump=(obj)=>{const p=pisoEfetivo(obj)||'Sem piso';if(!map[p])map[p]={piso:p,operacao:0,teste:0,falha:0,desativada:0};map[p][dashStatusBucket(obj.status)]++};(db.equipamentos||[]).forEach(bump);(db.flms||[]).forEach(bump);return Object.values(map).sort((a,b)=>pisoSortKey(a.piso)-pisoSortKey(b.piso)||a.piso.localeCompare(b.piso,'pt-BR'))}
function dashLojasComFalha(){return (db.locais||[]).filter(l=>dashStatusBucket(l.status)==='falha').map(l=>({nome:l.nome||'—',piso:pisoEfetivo(l)||'—',laco:lacName(l.lacoId)||'—',desde:l.ultimaAlteracao||'',status:l.status})).sort((a,b)=>(a.desde||'').localeCompare(b.desde||''))}
function dashPorLaco(){const map={};(db.locais||[]).filter(l=>dashStatusBucket(l.status)==='falha').forEach(l=>{const key=(paiName(l.painelId)||'—')+' · '+(lacName(l.lacoId)||'—');map[key]=(map[key]||0)+1});return Object.entries(map).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value).slice(0,8)}
// Panorama completo: TODOS os laços da central (não só os com falha), com
// quantidade de dispositivos (FLM+Equipamento), piso, sistema e disponibilidade —
// para dar uma leitura completa da central só pelo Dashboard.
function dashPanoramaLacos(){
  return (db.lacos||[]).map(l=>{
    const fl=db.flms.filter(f=>f.lacoId===l.id);
    const eq=db.equipamentos.filter(e=>e.lacoId===l.id);
    const dev=[...fl,...eq];
    const total=dev.length;
    const falha=dev.filter(x=>dashStatusBucket(x.status)==='falha').length;
    const teste=dev.filter(x=>dashStatusBucket(x.status)==='teste').length;
    const op=total-falha-teste;
    return {
      painel:paiName(l.painelId)||'—',
      laco:l.nome||'—',
      pisoDisplay:l.piso||'—',
      sistema:l.sistema||sistemaAutoDetect(l.nome),
      flms:fl.length,
      equip:eq.length,
      total,op,falha,teste,
      disp:total?Math.round((op/total)*100):0
    };
  }).sort((a,b)=>a.painel.localeCompare(b.painel,'pt-BR')||pisoSortKey(a.pisoDisplay)-pisoSortKey(b.pisoDisplay)||a.laco.localeCompare(b.laco,'pt-BR',{numeric:true}));
}

// Lista de status técnicos tratados como CRÍTICOS no sistema (confirmada via STATUS_TECNICO_OPTIONS
// e normalizeStatus(): os três estados que representam risco imediato de segurança/detecção).
const STATUS_CRITICOS=['Incêndio disparado','Laço aberto','Módulo em curto'];
function isStatusCritico(st){return STATUS_CRITICOS.includes(normalizeStatus(st))}

// ---- Indicadores básicos (item 1) ----
function dashDisponibilidadeReal(){
  const totalEquip=(db.equipamentos||[]).length+(db.flms||[]).length;
  if(!totalEquip)return 0;
  const emOp=(db.equipamentos||[]).filter(e=>dashStatusBucket(e.status)==='operacao').length
    +(db.flms||[]).filter(f=>dashStatusBucket(f.status)==='operacao').length;
  return Math.round((emOp/totalEquip)*1000)/10; // 1 casa decimal
}
function dashFalhasAtivas(){return (db.falhas||[]).filter(f=>!f.resolvidaEm&&isFalhaStatus(f.status))}
function dashPendenciasCriticas(){return dashFalhasAtivas().filter(f=>isStatusCritico(f.status))}
function dashTestesNoMes(){
  const hoje=new Date(); const ym=hoje.getFullYear()+'-'+String(hoje.getMonth()+1).padStart(2,'0');
  let total=0;
  (db.locais||[]).forEach(l=>{(l.inspecoes||[]).forEach(insp=>{if(String(insp.data||'').startsWith(ym))total++})});
  return total;
}
function dashPlanosPendentes(){return (db.planos||[]).filter(p=>p.situacao==='Aberto'||p.situacao==='Em andamento')}

// ---- Reincidência (lojas com 2+ falhas), item 9 ----
function dashReincidencia(){
  const map={};
  (db.falhas||[]).forEach(f=>{if(!f.localId)return; map[f.localId]=(map[f.localId]||0)+1});
  return Object.entries(map).filter(([,q])=>q>=2).map(([localId,q])=>{
    const l=(db.locais||[]).find(x=>x.id===localId);
    const ultima=(db.falhas||[]).filter(f=>f.localId===localId).sort((a,b)=>String(b.data||'').localeCompare(String(a.data||'')))[0];
    return {localId,nome:l?l.nome:'—',piso:l?(pisoEfetivo(l)||'—'):'—',qtd:q,ultima:ultima?ultima.data:''};
  }).sort((a,b)=>b.qtd-a.qtd).slice(0,10);
}

// ---- Tempo de atendimento/solução e SLA (item 8) ----
// LIMITAÇÃO DOCUMENTADA: o sistema não possui um campo específico de "hora do 1º atendimento
// técnico" — só existem criadoEm (quando o Plano de Ação é aberto, junto com a falha) e
// concluidoEm (quando o plano é concluído). Por isso:
//  - "Tempo até solução" = concluidoEm - criadoEm (dado real).
//  - "Tempo até atendimento" = estimativa (documentada como tal na tela) de 1/3 do tempo até a
//    solução, heurística conservadora na ausência de um marco de "1ª visita técnica" no banco.
//  - SLA: usamos 48h como prazo razoável (não há campo de SLA configurado no sistema hoje).
function dashTemposAtendimento(){
  const SLA_HORAS=48;
  const concluidos=(db.planos||[]).filter(p=>p.situacao==='Concluído'&&p.criadoEm&&p.concluidoEm);
  if(!concluidos.length)return {atendimentoH:null,solucaoH:null,slaPct:null,amostra:0,slaHoras:SLA_HORAS};
  let somaSolucao=0,dentroSLA=0;
  concluidos.forEach(p=>{
    const h=(new Date(p.concluidoEm).getTime()-new Date(p.criadoEm).getTime())/3600000;
    if(isNaN(h)||h<0)return;
    somaSolucao+=h;
    if(h<=SLA_HORAS)dentroSLA++;
  });
  const solucaoH=somaSolucao/concluidos.length;
  return {atendimentoH:solucaoH/3,solucaoH,slaPct:Math.round((dentroSLA/concluidos.length)*100),amostra:concluidos.length,slaHoras:SLA_HORAS};
}
function fmtHoras(h){if(h===null||h===undefined||isNaN(h))return '—';if(h<1)return Math.max(1,Math.round(h*60))+' min';if(h<48)return h.toFixed(1)+'h';return (h/24).toFixed(1)+'d'}

// ---- Tendência dos últimos 12 meses (item 3) ----
function dadosTendencia12Meses(){
  const meses=[]; const hoje=new Date();
  for(let i=11;i>=0;i--){
    const d=new Date(hoje.getFullYear(),hoje.getMonth()-i,1);
    meses.push({ym:d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'),label:d.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'}).replace('.','')});
  }
  return meses.map(m=>{
    const falhasAbertas=(db.falhas||[]).filter(f=>String(f.data||'').startsWith(m.ym)).length;
    const falhasResolvidas=(db.planos||[]).filter(p=>p.situacao==='Concluído'&&String(p.concluidoEm||'').startsWith(m.ym)).length;
    let testes=0; (db.locais||[]).forEach(l=>(l.inspecoes||[]).forEach(insp=>{if(String(insp.data||'').startsWith(m.ym))testes++}));
    const totalEquip=(db.equipamentos||[]).length+(db.flms||[]).length;
    return {...m,falhasAbertas,falhasResolvidas,testes,totalEquip};
  });
}

// ---- Disponibilidade detalhada por piso (item 4) ----
function dashPisoDetalhado(){
  const pisos=dashPisoStats();
  const hoje=new Date(); const ym=hoje.getFullYear()+'-'+String(hoje.getMonth()+1).padStart(2,'0');
  return pisos.map(p=>{
    const total=p.operacao+p.teste+p.falha+p.desativada;
    const disp=total?Math.round((p.operacao/total)*100):0;
    let testesMes=0;
    (db.locais||[]).filter(l=>(pisoEfetivo(l)||'Sem piso')===p.piso).forEach(l=>{
      (l.inspecoes||[]).forEach(insp=>{if(String(insp.data||'').startsWith(ym))testesMes++});
    });
    return {...p,total,disp,testesMes};
  });
}

// ---- Ranking de laços com maior incidência (item 5) — reaproveita dashPanoramaLacos() ----
function dashRankingLacos(){return dashPanoramaLacos().filter(r=>r.falha>0).sort((a,b)=>b.falha-a.falha)}

// ---- Top 10 lojas críticas, últimos 12 meses (item 6) ----
function dashTopLojasCriticas(){
  const limite=Date.now()-365*24*3600*1000;
  const map={};
  (db.falhas||[]).forEach(f=>{
    if(!f.localId)return;
    const t=new Date(f.data).getTime();
    if(isNaN(t)||t<limite)return;
    (map[f.localId]=map[f.localId]||[]).push(f);
  });
  return Object.entries(map).map(([localId,fs])=>{
    const l=(db.locais||[]).find(x=>x.id===localId);
    const ultima=fs.slice().sort((a,b)=>String(b.data||'').localeCompare(String(a.data||'')))[0];
    const diasSemFalha=ultima?Math.floor((Date.now()-new Date(ultima.data).getTime())/86400000):null;
    return {localId,nome:l?l.nome:'—',piso:l?(pisoEfetivo(l)||'—'):'—',qtd:fs.length,ultima:ultima?ultima.data:'',diasSemFalha,status:l?l.status:''};
  }).sort((a,b)=>b.qtd-a.qtd).slice(0,10);
}

// ---- Produtividade do contrato de manutenção (item 7) ----
function dashContratoProdutividade(){
  const testes=dashTestesNoMes();
  const planosConcluidos=(db.planos||[]).filter(p=>p.situacao==='Concluído').length;
  const falhasResolvidas=(db.falhas||[]).filter(f=>f.resolvidaEm).length;
  let fotos=0;
  (db.locais||[]).forEach(l=>{(l.inspecoes||[]).forEach(insp=>{fotos+=obterAnexosEvento('teste',insp).filter(a=>a.tipo==='foto').length})});
  (db.planos||[]).forEach(p=>{fotos+=obterAnexosEvento('plano',p).filter(a=>a.tipo==='foto').length});
  const lojasAtendidas=new Set((db.falhas||[]).filter(f=>f.resolvidaEm).map(f=>f.localId).filter(Boolean)).size;
  return {testes,planosConcluidos,falhasResolvidas,fotos,lojasAtendidas};
}

// ---- Próximas prioridades, geradas 100% a partir dos dados reais (item 10) ----
function dashProximasPrioridades(){
  const itens=[];
  const porPiso={};
  dashFalhasAtivas().forEach(f=>{
    const l=(db.locais||[]).find(x=>x.id===f.localId);
    const piso=l?pisoEfetivo(l):'';
    if(piso)porPiso[piso]=(porPiso[piso]||0)+1;
  });
  Object.entries(porPiso).sort((a,b)=>b[1]-a[1]).slice(0,3).forEach(([piso,q])=>itens.push(`${q} falha(s) ativa(s) no Piso ${piso}`));
  const curto=dashFalhasAtivas().filter(f=>normalizeStatus(f.status)==='Módulo em curto').length;
  if(curto)itens.push(`${curto} módulo(s) em curto`);
  const aguardandoLojista=(db.planos||[]).filter(p=>p.encaminhamento==='Notificar lojista'&&p.situacao!=='Concluído').length;
  if(aguardandoLojista)itens.push(`${aguardandoLojista} loja(s) aguardando retorno do lojista`);
  const limite=Date.now()-30*24*3600*1000;
  const semTeste=(db.locais||[]).filter(l=>{
    const insps=(l.inspecoes||[]).slice().sort((a,b)=>String(b.data||'').localeCompare(String(a.data||'')));
    if(!insps.length)return true;
    const t=new Date(insps[0].data).getTime();
    return isNaN(t)||t<limite;
  }).length;
  if(semTeste)itens.push(`${semTeste} loja(s)/área(s) sem teste executado há mais de 30 dias`);
  return itens;
}

// ---- Índice de Risco Operacional (IRO), item 2 ----
// Escala 0-100, onde 100 = risco mínimo. Fórmula ponderada (soma dos pesos = 100%):
//   Disponibilidade real .......................... 30%
//   Ausência de falhas críticas (Incêndio/Laço/Curto) 25%
//   Ausência de falhas abertas em geral ........... 20%
//   Ausência de reincidência (lojas com 2+ falhas)   15%
//   Percentual de testes realizados no mês vs. meta  10%  (meta = nº de lojas/áreas cadastradas)
// Cada componente crítico usa uma penalização decrescente (quanto mais ocorrências, mais o score
// daquele componente cai, até o piso de 0), depois soma-se tudo pelos pesos acima.
function calcularIndiceRiscoOperacional(ind){
  const disp=ind.disponibilidade; // já em 0-100
  const scoreCriticas=Math.max(0,100-Math.min(100,ind.pendenciasCriticas.length*20));
  const scoreAbertas=Math.max(0,100-Math.min(100,ind.falhasAtivas.length*8));
  const scoreReincidencia=Math.max(0,100-Math.min(100,dashReincidencia().length*10));
  const metaTestes=Math.max(1,(db.locais||[]).length);
  const scoreTestes=Math.min(100,Math.round((ind.testesNoMes/metaTestes)*100));
  const iro=Math.round(disp*0.30+scoreCriticas*0.25+scoreAbertas*0.20+scoreReincidencia*0.15+scoreTestes*0.10);
  return Math.max(0,Math.min(100,iro));
}
function iroFaixa(v){
  if(v>=90)return {label:'Baixo risco',cor:'#2E7D32',bg:'#E7F7EC',texto:'Operação estável, dentro do esperado.'};
  if(v>=75)return {label:'Atenção',cor:'#FB8C00',bg:'#FFF3E0',texto:'Pontos de atenção identificados — acompanhar de perto.'};
  if(v>=50)return {label:'Risco elevado',cor:'#C05A0A',bg:'#FEF0E6',texto:'Concentração relevante de falhas/pendências — ação recomendada.'};
  return {label:'Crítico',cor:'#D32F2F',bg:'#FDEBEE',texto:'Situação crítica — requer ação imediata da equipe técnica.'};
}

// ---- Cache dos indicadores (item 15) ----
// "Versão" simples = soma dos tamanhos das coleções que alimentam o Dashboard. Se nada mudou desde
// o último cálculo, reaproveita o resultado em vez de recalcular tudo a cada render().
let _dashboardCache=null;
function dashVersaoDados(){
  const insp=(db.locais||[]).reduce((a,l)=>a+((l.inspecoes||[]).length),0);
  return [(db.falhas||[]).length,(db.planos||[]).length,(db.equipamentos||[]).length,(db.flms||[]).length,(db.locais||[]).length,insp,(db.eventosOperacionais||[]).length].join(':');
}
function getDashboardIndicadores(){
  const v=dashVersaoDados();
  if(_dashboardCache&&_dashboardCache.v===v)return _dashboardCache.data;
  const falhasAtivas=dashFalhasAtivas();
  const pendenciasCriticas=dashPendenciasCriticas();
  const testesNoMes=dashTestesNoMes();
  const planosPendentes=dashPlanosPendentes();
  const disponibilidade=dashDisponibilidadeReal();
  const tempos=dashTemposAtendimento();
  const data={falhasAtivas,pendenciasCriticas,testesNoMes,planosPendentes,disponibilidade,tempos};
  data.iro=calcularIndiceRiscoOperacional(data);
  _dashboardCache={v,data};
  return data;
}

// ---- Mini-gráfico SVG "à mão" (sem biblioteca externa), para a tendência de 12 meses ----
function dashSvgLinhas(series,labels){
  const W=760,H=180,padL=30,padR=10,padT=10,padB=24;
  const max=Math.max(1,...series.flatMap(s=>s.data));
  const stepX=(W-padL-padR)/Math.max(1,labels.length-1);
  const y=v=>H-padB-(v/max)*(H-padT-padB);
  const path=(data)=>data.map((v,i)=>`${i===0?'M':'L'}${(padL+i*stepX).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const linhas=series.map(s=>`<path d="${path(s.data)}" fill="none" stroke="${s.cor}" stroke-width="2.2"/>`+
    s.data.map((v,i)=>`<circle cx="${(padL+i*stepX).toFixed(1)}" cy="${y(v).toFixed(1)}" r="2.6" fill="${s.cor}"/>`).join('')).join('');
  const eixoX=labels.map((l,i)=>i%2===0?`<text x="${(padL+i*stepX).toFixed(1)}" y="${H-6}" font-size="9" fill="#64748B" text-anchor="middle">${esc(l)}</text>`:'').join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" role="img" aria-label="Tendência dos últimos 12 meses">${eixoX}${linhas}</svg>`;
}

function dsBadgeClass(status){
  const s=(status||'').toLowerCase();

  if(s.includes('teste'))return 'test';
  if(s.includes('incêndio')||s.includes('disparado'))return 'fire';
  if(s.includes('curto')||s.includes('falha')||s.includes('aberto'))return 'fail';
  if(s.includes('desativação')||s.includes('desativado'))return 'off';
  if(s.includes('aguardando'))return 'wait';
  if(s.includes('alerta'))return 'alert';
  if(s==='concluído'||s==='concluido')return 'done';
  if(s==='em andamento')return 'prog';
  if(s==='aberto'||s==='open')return 'open';
  if(s==='sem plano')return 'noplan';

function dsKpiStrip(items){return `<div class="dsKpiStrip">${items.map(([l,v,c,k])=>dsKpi(l,v,c,k)).join('')}</div>`}
function buildPlanoRowsBase(){
  // Monta a base de linhas (Plano + Falha sem plano) sem aplicar nenhum filtro. Extraído para ser
  // reaproveitado tanto pela tela (renderPlano) quanto pela geração dos PDFs, garantindo que os dois
  // usem exatamente a mesma lógica (item 4/6 do pedido do usuário, 2026-07).
  let planos=db.planos||[];
  let falhas=falhasAtivasParaPlano();
  let rows=[];
  planos.forEach(p=>{
    let f=db.falhas.find(x=>x.id===p.falhaId)||{};
    let inf=f.id?itemInfoFromFalha(f):{};
    let fotos=normalizeFotos(p.fotos||[]);
    // fotoCount agora soma também as fotos anexadas por visita (plano.visitas[].fotos), já que o
    // upload de evidências deixou de ficar só no bloco antigo "fotos do serviço" (p.fotos).
    let fotoCountVisitas=(p.visitas||[]).reduce((acc,v)=>acc+((v.fotos||[]).length),0);
    rows.push({origemLinha:'Plano',falhaId:p.falhaId||'',planoId:p.id,itemId:f.itemId||'',prioridade:p.prioridade||'Média',painel:inf.painel||p.painel||'',laco:inf.laco||p.laco||'',piso:inf.piso||p.piso||'',local:inf.local||p.local||'',itemNome:inf.itemNome||p.item||'',statusFalha:f.status||p.statusFalha||'',categoria:p.categoria||'',responsavel:p.responsavel||'',desde:f.data||p.criadoEm||'',criadoEm:p.criadoEm||'',concluidoEm:p.concluidoEm||'',situacao:p.situacao||'Aberto',direcionamento:p.direcionamento||getDirecionamento(f.status||p.statusFalha),resultado:p.resultado||'',encaminhamento:p.encaminhamento||'',fotos,fotoCount:fotos.length+fotoCountVisitas,plano:p,falha:f});
  });
  falhas.forEach(f=>{
    if(planoForFalha(f.id))return;
    let inf=itemInfoFromFalha(f);
    rows.push({origemLinha:'Falha sem plano',falhaId:f.id,planoId:'',itemId:f.itemId||'',prioridade:'Média',painel:inf.painel||'',laco:inf.laco||'',piso:inf.piso||'',local:inf.local||'',itemNome:inf.itemNome||'',statusFalha:f.status||'',categoria:'',responsavel:'',desde:f.data||'',criadoEm:'',concluidoEm:'',situacao:'Sem plano',direcionamento:getDirecionamento(f.status),resultado:'',encaminhamento:'',fotos:[],fotoCount:0,plano:null,falha:f});
  });
  return rows;
}
function planoFiltrosAtuais(){
  // Lê os filtros atualmente aplicados na tela do Plano de Ação a partir de `filters.plano` — mesmo
  // padrão de estado já usado nas abas Falhas/Equipamentos/Locais (filters.<aba>={...}) — em vez de
  // ler direto do DOM. Isso permite atualização automática a cada mudança (item 3 do pedido de
  // reestruturação, 2026-07: "remover botão Filtrar") sem perder o valor ao re-renderizar a tabela,
  // e é usado tanto pelo renderPlano quanto pelos geradores de PDF, que assim sempre respeitam
  // exatamente o que está filtrado na tela.
  const f=filters.plano||{};
  return {
    q:(f.q||'').toUpperCase(),
    cat:f.cat||'',
    prio:f.prio||'',
    sit:f.sit||'',
    resp:f.resp||'',
    painel:f.painel||'',
    laco:f.laco||'',
    piso:f.piso||'',
    loja:f.loja||'',
    ini:f.ini||'',
    fim:f.fim||'',
    statusTec:f.statusTec||'',
    resultado:f.resultado||'',

}
function inPeriodoPlano(x,ini,fim){if(!ini&&!fim)return true;let datas=[x.desde,x.criadoEm,x.concluidoEm].filter(Boolean).map(String);return datas.some(d=>(!ini||d>=ini)&&(!fim||d<=fim+'T23:59'))}
function situacaoPesoPlano(s){return {'Sem plano':0,'Aberto':1,'Em andamento':2,'Concluído':3}[s]??9}
function planoRowsFiltrados(fx,{ignorarSituacao=false,ignorarCategoria=false,ignorarPrioridade=false}={}){
  // Aplica os filtros (exceto os overrides explícitos acima, usados pelos cards de KPI clicáveis e
  // pelos PDFs, que precisam de variações do mesmo filtro base) sobre a base de linhas.
  let rows=buildPlanoRowsBase();
  return rows.filter(x=>
    (!fx.q||JSON.stringify(x).toUpperCase().includes(fx.q))&&
    (ignorarCategoria||!fx.cat||(x.categoria||'Sem categoria')===fx.cat)&&
    (ignorarPrioridade||!fx.prio||x.prioridade===fx.prio)&&
    (ignorarSituacao||!fx.sit||x.situacao===fx.sit)&&
    (!fx.resp||x.responsavel===fx.resp)&&
    (!fx.painel||x.painel===fx.painel)&&
    (!fx.laco||x.laco===fx.laco)&&
    (!fx.piso||x.piso===fx.piso)&&
    (!fx.loja||x.local===fx.loja)&&
    (!fx.statusTec||normalizeStatus(x.statusFalha)===fx.statusTec)&&
    (!fx.resultado||x.resultado===fx.resultado)&&
    inPeriodoPlano(x,fx.ini,fx.fim)
  );
}

function itemEnderecoOrdenavel(itemId){
  if(!itemId)return 9999;
  let raw='';
  if(String(itemId).startsWith('flm:')){
    const flmId=String(itemId).split(':')[1];
    const f=flmById(flmId);
    raw=f?f.endereco:'';
  } else {
    const e=db.equipamentos.find(x=>x.id===itemId);
    raw=e?e.endereco:'';
  }
  const num=parseFloat(String(raw||'').replace(',','.'));
  return isNaN(num)?9999:num;
}
function planoRowsParaPdf(modo){
  // Reaproveita a MESMA base e os MESMOS filtros da tela (planoFiltrosAtuais + planoRowsFiltrados),
  // aplicando por cima apenas a restrição de Situação do modo do PDF. Isso corrige o item 3/6 do
  // pedido do usuário: antes o PDF usava sua própria lógica de filtragem (só respeitava Período e um
  // dropdown "pdfSituacao" isolado) e ignorava Categoria/Prioridade/Responsável/Piso/Busca/etc. que
  // estivessem aplicados na tela.
  const fx=planoFiltrosAtuais();
  let rows=planoRowsFiltrados(fx,{ignorarSituacao:true});
  rows=rows.filter(r=>modo==='concluidos'?r.situacao==='Concluído':r.situacao!=='Concluído');
  rows=rows.map(r=>({...r,endereco:itemEnderecoOrdenavel(r.itemId||''),concluidoEmFmt:r.concluidoEm?fmtDateSimple(r.concluidoEm):''}));
  rows.sort((a,b)=>pisoSortKey(a.piso)-pisoSortKey(b.piso)||String(a.laco).localeCompare(String(b.laco),'pt-BR',{numeric:true})||a.endereco-b.endereco);
  return {rows,fx};
}

// ---- Resumo geral: reaproveita counts() e dashPisoStats() (mesmas do Dashboard) ----
function relResumoGeral(){
  const c=counts();
  const pisos=dashPisoStats();
  const totalEquip=(db.equipamentos||[]).length+(db.flms||[]).length;
  const op=pisos.reduce((a,p)=>a+p.operacao,0);
  const teste=pisos.reduce((a,p)=>a+p.teste,0);
  const desativado=pisos.reduce((a,p)=>a+p.desativada,0);
  const falha=pisos.reduce((a,p)=>a+p.falha,0);
  const disponibilidade=totalEquip?Math.round((op/totalEquip)*100):0;
  const lojasFalha=dashLojasComFalha();
  const planosAbertos=(db.planos||[]).filter(p=>p.situacao!=='Concluído').length;
  const planosConcluidos=(db.planos||[]).filter(p=>p.situacao==='Concluído').length;
  return {c,pisos,totalEquip,op,teste,desativado,falha,disponibilidade,lojasFalha,planosAbertos,planosConcluidos};
}
// ---- Tempo médio das falhas em aberto (novo indicador; reaproveita a mesma lógica de data usada em timeSince) ----
function relTempoMedioFalhasHoras(){
  // CORREÇÃO: só considera lançamentos que são realmente falha — um "Em teste" aguardando
  // confirmação não é uma falha em aberto para efeito de tempo médio de atendimento.
  const abertas=(db.falhas||[]).filter(f=>!f.resolvidaEm&&isFalhaStatus(f.status));
  if(!abertas.length)return 0;
  const soma=abertas.reduce((a,f)=>{const t=new Date(f.data).getTime();return a+(isNaN(t)?0:Math.max(0,(Date.now()-t)/3600000))},0);
  return Math.round(soma/abertas.length);
}
// ---- Falhas por prioridade — junta Falha ao Plano via planoForFalha() já existente (não duplica cadastro de prioridade) ----
function relFalhasPorPrioridade(){
  const map={'Crítica':0,'Alta':0,'Média':0,'Baixa':0,'Sem plano':0};
  // CORREÇÃO: só considera lançamentos que são realmente falha (isFalhaStatus) — antes contava
  // qualquer lançamento (inclusive "Em teste"/"Desativação") na prioridade do plano.
  (db.falhas||[]).filter(f=>isFalhaStatus(f.status)).forEach(f=>{const p=planoForFalha(f.id);const k=p?(p.prioridade||'Sem plano'):'Sem plano';map[k]=(map[k]||0)+1});
  return map;
}
function relPorCampoGenerico(arr,getter,fallback){
  const map={};arr.forEach(x=>{const k=getter(x)||fallback;map[k]=(map[k]||0)+1});
  return Object.entries(map).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value);
}
// ---- Falhas: dashboard executivo (novo; reaproveita paiName/lacName/locName/isFalhaStatus já existentes) ----
function relFalhasResumo(){
  // CORREÇÃO (relatório contabilizava teste como falha): a seção "Falhas" do relatório deve
  // refletir apenas lançamentos que são realmente falha (Laço aberto/Módulo aberto/Módulo em
  // curto/Incêndio disparado). "Em teste" e "Desativação" são lançamentos válidos e continuam
  // aparecendo normalmente na tela de Falhas do sistema — só não entram mais nestes indicadores/

  const rows=(db.falhas||[]).filter(f=>isFalhaStatus(f.status)).map(f=>({...f,painel:paiName(f.painelId),laco:lacName(f.lacoId),loja:locName(f.localId)}));

  return {

    porTipo:relPorCampoGenerico(rows,r=>r.tipo,'Não classificada'),

// ---- Lojas/Áreas: indicadores executivos (novo; reaproveita dashLojasComFalha/dashStatusBucket/pisoEfetivo) ----
function relLojasResumo(){
  const locais=db.locais||[];
  const comFalha=dashLojasComFalha();
  const semDispositivo=locais.filter(l=>!l.flmId&&!l.portaId&&!(db.equipamentos||[]).some(e=>e.localId===l.id)).length;
  // CORREÇÃO: ranking de "lojas com mais falhas" só conta lançamentos que são realmente falha —
  // antes contava também "Em teste"/"Desativação", fazendo lojas só testadas aparecerem como se
  // tivessem falha.
  const rankingFalhas=(()=>{const map={};(db.falhas||[]).filter(f=>isFalhaStatus(f.status)).forEach(f=>{if(!f.localId)return;const nome=locName(f.localId)||'—';map[nome]=(map[nome]||0)+1});return Object.entries(map).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value).slice(0,10)})();
  return {
    total:locais.length,
    porPiso:relPorCampoGenerico(locais,l=>pisoEfetivo(l)||l.piso,'Sem piso').sort((a,b)=>pisoSortKey(a.label)-pisoSortKey(b.label)),
    monitoradas:locais.filter(l=>l.flmId||l.portaId||l.lacoId).length,
    comFalha:comFalha.length,
    emTeste:locais.filter(l=>dashStatusBucket(l.status)==='teste').length,
    semDispositivo,
    rankingFalhas
  };
}
// ---- Inventário hierárquico Painel→Laço (novo agrupamento; reaproveita dashPanoramaLacos() do Dashboard, sem recalcular status) ----
function relInventarioPorPainel(){
  const panorama=dashPanoramaLacos();
  const map={};
  panorama.forEach(r=>{
    map[r.painel]=map[r.painel]||{painel:r.painel,lacos:[],total:0,op:0,falha:0,teste:0};
    map[r.painel].lacos.push(r);
    map[r.painel].total+=r.total;map[r.painel].op+=r.op;map[r.painel].falha+=r.falha;map[r.painel].teste+=r.teste;
  });
  return Object.values(map).map(p=>({...p,disp:p.total?Math.round((p.op/p.total)*100):0}));
}

async function verificarBaseAoAbrir(){
  if(!isLoggedIn())return;
  const c=syncCfg();
  if(!baseParecevazia())return; // banco local ok, nada a fazer
  if(!c.configured){alert('A base local está vazia e o banco Google ainda não foi configurado neste sistema. Vá em Sistema \u2192 Banco de Dados \u2192 "Inicializar/validar" e depois "Carregar base Google".');return}
  _recuperandoBaseInicial=true;
  updateSyncFooter('saving');
  const dEl=document.getElementById('dashboard');
  if(dEl)dEl.innerHTML='<div class="card"><p class="msg warn">Banco local vazio — recarregando automaticamente do Google Sheets, aguarde alguns segundos...</p></div>';
  try{
    const r=await jsonp('load');
    if(r.ok && r.db && Object.keys(r.db).length){
      db=normalizeAllStatuses(Object.assign(emptyDB(),r.db));
      persistLocal();
      setSyncCfg({dirty:false,lastSync:new Date().toLocaleTimeString('pt-BR')});
      _recuperandoBaseInicial=false;
      render();
      alert('A base local estava vazia (provável falha ao salvar no navegador). Os dados foram recarregados automaticamente do Google Sheets — nada foi perdido.');
    } else {
      _recuperandoBaseInicial=false;
      updateSyncFooter();
      render();
      alert('A base local está vazia e a base no Google também não retornou dados. Verifique manualmente em Sistema \u2192 Banco de Dados antes de sincronizar ou continuar usando o sistema, para não gravar uma base vazia por cima da planilha.');
    }
  }catch(e){
    _recuperandoBaseInicial=false;
    updateSyncFooter('error');
    render();
    alert('A base local está vazia e não foi possível recarregar automaticamente do Google (' + e.message + '). Vá em Sistema \u2192 Banco de Dados \u2192 "Carregar base Google" manualmente antes de continuar.');
  }
}

function ensureLucSchema(){
  db.baseLojas=db.baseLojas||[];
  db.conflitosAssociacao=db.conflitosAssociacao||[];
  (db.baseLojas||[]).forEach(l=>{if(!l.id)l.id=id(); if(!l.origem)l.origem='IMPORTACAO_LUC'; if(!l.statusAssociacao)l.statusAssociacao='Pendente';});
}
function lucNormText(s){return up(s).replace(/&/g,' E ').replace(/[^A-Z0-9 ]/g,' ').replace(/\b(LTDA|ME|EPP|LOJA|STORE|QUIOSQUE|SHOP|SHOPPING|PISO|P[123]|PAVIMENTO|UNIDADE|RESTAURANTE|ALIMENTACAO)\b/g,' ').replace(/\b(O|A|OS|AS|DA|DE|DO|DAS|DOS)\b/g,' ').replace(/\s+/g,' ').trim()}
function lucCompactText(s){return lucNormText(s).replace(/\s+/g,'')}
function lucTokenSet(s){return lucNormText(s).split(' ').filter(Boolean)}
function lucEditDistance(a,b){a=lucCompactText(a);b=lucCompactText(b); if(!a||!b)return 99; const m=[]; for(let i=0;i<=a.length;i++){m[i]=[i]} for(let j=0;j<=b.length;j++){m[0][j]=j} for(let i=1;i<=a.length;i++){for(let j=1;j<=b.length;j++){m[i][j]=Math.min(m[i-1][j]+1,m[i][j-1]+1,m[i-1][j-1]+(a[i-1]===b[j-1]?0:1))}} return m[a.length][b.length]}
function lucSimilarity(a,b){const A=lucTokenSet(a),B=lucTokenSet(b); const sa=lucNormText(a),sb=lucNormText(b),ca=lucCompactText(a),cb=lucCompactText(b); if(!ca||!cb)return 0; if(ca===cb||sa===sb)return 100; let common=A.filter(x=>B.includes(x)).length; let j=common/Math.max(1,new Set([...A,...B]).size); let inc=(ca.includes(cb)||cb.includes(ca)||sa.includes(sb)||sb.includes(sa))?0.30:0; let prefix=ca.slice(0,5)===cb.slice(0,5)?0.12:0; let dist=lucEditDistance(a,b), maxLen=Math.max(ca.length,cb.length,1); let edit=Math.max(0,1-(dist/maxLen)); return Math.round(Math.max(Math.min(1,j+inc+prefix),edit)*100)}
function lucPisoKey(v){const x=up(v); if(/(^|\D)1(\D|$)|PISO 1|P1/.test(x))return '1'; if(/(^|\D)2(\D|$)|PISO 2|P2/.test(x))return '2'; if(/(^|\D)3(\D|$)|PISO 3|P3/.test(x))return '3'; return ''}
function lucPisosCompat(localPiso,basePiso){const a=lucPisoKey(localPiso),b=lucPisoKey(basePiso); return !!a&&!!b&&a===b}
function pisoFromLuc(luc,tipo){const first=(n(luc).match(/[0-9]/)||[''])[0]; if(first==='1')return 'Piso 1'; if(first==='2')return 'Piso 2'; if(first==='3')return 'Piso 3'; return up(tipo)==='ALIMENTACAO'?'Piso 3':'Conferir'}
async function readRowsFromFile(f){let ext=f.name.split('.').pop().toLowerCase(); let data=await f.arrayBuffer(); if(ext==='csv'){let txt=new TextDecoder('utf-8').decode(data); return parseCSV(txt)} if(!['xls','xlsx'].includes(ext))throw new Error('Formato não aceito. Use XLSX, XLS ou CSV.'); if(typeof XLSX==='undefined')throw new Error('Biblioteca XLSX não carregada. Para XLS/XLSX, abra com internet ou use CSV.'); let wb=XLSX.read(data,{type:'array'}); let rows=[]; wb.SheetNames.forEach(sn=>{rows=rows.concat(XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:''}))}); return rows}

/* ===== Correção V8.4 — Importação LUC/Loja por posição fixa A-D =====
   Regra operacional: A=LUC, B=Tipo de Loja, C=Loja oficial, D=Área Contrato.
   Isso evita que cabeçalhos diferentes façam a loja virar o próprio número do LUC. */
function lucMatrixToRows(matrix){
  const rows=[];
  let start=0;
  const normCell=v=>normKey(String(v??''));
  const isHeaderRow=arr=>{
    const joined=(arr||[]).map(normCell).join('|');
    return joined.includes('LUC') || joined.includes('TIPODELOJA') || joined.includes('LOJA') || joined.includes('AREACONTRATO');
  };
  while(start<matrix.length && !(matrix[start]||[]).some(v=>n(v))) start++;
  if(start<matrix.length && isHeaderRow(matrix[start])) start++;
  for(let i=start;i<matrix.length;i++){
    const r=matrix[i]||[];
    if(!r.some(v=>n(v))) continue;
    rows.push({
      LUC:n(r[0]),
      'Tipo de Loja':n(r[1]),
      Loja:n(r[2]),
      'Área Contrato (m²)':n(r[3]),
      __linha:i+1,
      __raw:r
    });
  }
  return rows;
}
async function readLucRowsFile(){
  const input=document.getElementById('fileLucImp');
  if(!input||!input.files||!input.files[0])throw new Error('Selecione um arquivo XLSX ou CSV para Importação LUC/Loja.');
  const f=input.files[0];
  const ext=f.name.split('.').pop().toLowerCase();
  const data=await f.arrayBuffer();
  if(ext==='csv'){
    const txt=new TextDecoder('utf-8').decode(data);
    const sep=(txt.split('\n')[0].match(/;/g)||[]).length>=(txt.split('\n')[0].match(/,/g)||[]).length?';':',';
    const matrix=txt.split(/\r?\n/).filter(x=>x.trim()).map(l=>splitCSV(l,sep));
    return lucMatrixToRows(matrix);
  }
  if(!['xls','xlsx'].includes(ext))throw new Error('Formato não aceito. Use XLSX, XLS ou CSV.');
  if(typeof XLSX==='undefined')throw new Error('Biblioteca XLSX não carregada. Para XLS/XLSX, abra com internet ou use CSV.');
  const wb=XLSX.read(data,{type:'array'});
  let rows=[];
  wb.SheetNames.forEach(sn=>{
    const matrix=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:''});
    rows=rows.concat(lucMatrixToRows(matrix));
  });
  return rows;
}
function normalizeLucImportRows(rows){
  const out=[],errors=[]; const dt=isoNow();
  rows.forEach((r,i)=>{
    const linha=r.__linha||i+2;
    /* Regra definitiva da Importação LUC/Loja:
       leitura por posição física da planilha, sem depender do nome do cabeçalho.
       A=luc | B=tipo | C=nome oficial da loja | D=área contrato */
    const raw=Array.isArray(r.__raw)?r.__raw:[];
    const luc=n(raw.length?raw[0]:r.LUC);
    const tipo=n(raw.length?raw[1]:r['Tipo de Loja']);
    const loja=n(raw.length?raw[2]:r.Loja);
    const area=n(raw.length?raw[3]:r['Área Contrato (m²)']);
    if(up(luc)==='LUC' || up(tipo)==='TIPO DE LOJA' || up(loja)==='LOJA')return;
    if(!luc&&!loja){errors.push({linha,motivo:'Registro sem LUC e sem Loja',registro:JSON.stringify(raw.length?raw:r)});return}
    if(!loja){errors.push({linha,motivo:'Coluna C (Loja oficial) vazia. Registro não importado para evitar loja com nome igual ao LUC.',registro:JSON.stringify(raw.length?raw:r)});return}
    if(up(loja)===up(luc)){errors.push({linha,motivo:'Coluna C veio igual ao LUC. Confira se o arquivo possui a Loja oficial na coluna C. Registro não importado.',registro:JSON.stringify(raw.length?raw:r)});return}
    out.push({
      id:id(),luc,tipo,nome:loja,areaContrato:area,
      piso:pisoFromLuc(luc,tipo),origem:'IMPORTACAO_LUC',dataImportacao:dt,ultimaAtualizacao:dt,
      statusAssociacao:'Pendente',observacoes:''
    })
  });
  return {lojas:out,errors};
}

/* ===== Correção V8.6 — Leitura robusta de acentuação LUC/Loja =====
   Corrige CSV salvo em UTF-8, Windows-1252/ANSI e mojibake comum de Excel.
   A importação continua fixa por posição: A=LUC, B=Tipo, C=Loja, D=Área. */
function lucDecodeArrayBufferSmart(buffer){
  const tryDecode=(enc,fatal=false)=>{try{return new TextDecoder(enc,{fatal}).decode(buffer)}catch(e){return ''}};
  let utf=tryDecode('utf-8',true);
  if(utf) return utf.replace(/^\uFEFF/,'');
  let win=tryDecode('windows-1252',false) || tryDecode('iso-8859-1',false);
  return (win||'').replace(/^\uFEFF/,'');
}
function lucRepairMojibake(s){
  s=String(s??'');
  if(!s)return '';
  // Repara texto UTF-8 lido como Windows-1252: SoluÃ§Ã£o -> Solução.
  if(/[ÃÂâ€]/.test(s)){
    try{
      const bytes=Uint8Array.from([...s].map(ch=>ch.charCodeAt(0)&255));
      const fixed=new TextDecoder('utf-8',{fatal:true}).decode(bytes);
      if(fixed && (fixed.match(/[�]/g)||[]).length <= (s.match(/[�]/g)||[]).length) s=fixed;
    }catch(e){}
  }
  const map={
    '�':'', 'Â':'',
    'Ã¡':'á','Ã¢':'â','Ã£':'ã','Ãª':'ê','Ã©':'é','Ã­':'í','Ã³':'ó','Ã´':'ô','Ãµ':'õ','Ãº':'ú','Ã§':'ç',
    'Ã�':'Á','Ã‚':'Â','Ãƒ':'Ã','Ã‰':'É','ÃŠ':'Ê','Ã“':'Ó','Ã”':'Ô','Ã•':'Õ','Ãš':'Ú','Ã‡':'Ç',
    'â€“':'-','â€”':'-','â€˜':'\'','â€™':'\'','â€œ':'"','â€�':'"','Âº':'º','Âª':'ª','Â²':'²','Â³':'³'
  };
  Object.entries(map).forEach(([a,b])=>{s=s.split(a).join(b)});
  return s.normalize('NFC').replace(/[\u0000-\u001F\u007F]/g,' ').replace(/\s+/g,' ').trim();
}
function lucCleanField(v){return lucRepairMojibake(n(v));}
function lucCleanName(v){
  let s=lucCleanField(v);
  // Mantém siglas usuais e melhora apenas apresentação básica.
  if(!s)return '';
  return s.replace(/\s+([,.;:/])/g,'$1').replace(/([(/-])\s+/g,'$1').replace(/\s+([)/-])/g,'$1').trim();
}
async function readLucRowsFile(){

    const first=(txt.split(/\r?\n/).find(x=>x.trim())||'');
    const sep=(first.match(/;/g)||[]).length>=(first.match(/,/g)||[]).length?';':',';
    const matrix=txt.split(/\r?\n/).filter(x=>x.trim()).map(l=>splitCSV(l,sep).map(lucCleanField));
    return lucMatrixToRows(matrix);
  }
  if(!['xls','xlsx'].includes(ext))throw new Error('Formato não aceito. Use XLSX, XLS ou CSV.');
  if(typeof XLSX==='undefined')throw new Error('Biblioteca XLSX não carregada. Para XLS/XLSX, abra com internet ou use CSV.');
  const wb=XLSX.read(data,{type:'array',cellText:false,cellDates:false});
  let rows=[];
  wb.SheetNames.forEach(sn=>{
    const matrix=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:'',raw:false}).map(row=>row.map(lucCleanField));
    rows=rows.concat(lucMatrixToRows(matrix));
  });
  return rows;
}
function normalizeLucImportRows(rows){
  const out=[],errors=[]; const dt=isoNow();
  rows.forEach((r,i)=>{
    const linha=r.__linha||i+2;
    const raw=Array.isArray(r.__raw)?r.__raw:[];
    const luc=lucCleanField(raw.length?raw[0]:r.LUC);
    const tipo=lucCleanName(raw.length?raw[1]:r['Tipo de Loja']);
    const loja=lucCleanName(raw.length?raw[2]:r.Loja);
    const area=lucCleanField(raw.length?raw[3]:r['Área Contrato (m²)']);
    if(up(luc)==='LUC' || up(tipo)==='TIPO DE LOJA' || up(loja)==='LOJA')return;
    if(!luc&&!loja){errors.push({linha,motivo:'Registro sem LUC e sem Loja',registro:JSON.stringify(raw.length?raw:r)});return}
    if(!loja){errors.push({linha,motivo:'Coluna C (Loja oficial) vazia. Registro não importado para evitar loja com nome igual ao LUC.',registro:JSON.stringify(raw.length?raw:r)});return}
    if(up(loja)===up(luc)){errors.push({linha,motivo:'Coluna C veio igual ao LUC. Confira se o arquivo possui a Loja oficial na coluna C. Registro não importado.',registro:JSON.stringify(raw.length?raw:r)});return}
    out.push({id:id(),luc,tipo,nome:loja,areaContrato:area,piso:pisoFromLuc(luc,tipo),origem:'IMPORTACAO_LUC',dataImportacao:dt,ultimaAtualizacao:dt,statusAssociacao:'Pendente',observacoes:''});
  });
  return {lojas:out,errors};
}

function lucLocalDisponivelParaBase(local,base,currentLocalId=''){

  if(local.baseLojaId && local.baseLojaId!==base.id)return false;
  const usadoPorOutraBase=(db.baseLojas||[]).some(b=>b.id!==base.id && b.localId===local.id && b.statusAssociacao==='Vinculada');
  if(usadoPorOutraBase)return false;
  if(base.piso && local.piso && !lucPisosCompat(local.piso,base.piso))return false;
  return true;
}
function lucLocaisDisponiveisSelect(conflito){

    .sort((a,b)=>String(a.piso||'').localeCompare(String(b.piso||''),'pt-BR') || lucOfficialName(a).localeCompare(lucOfficialName(b),'pt-BR'));
  const selected=locais.some(l=>l.id===conflito.localId)?conflito.localId:'';

  </select>`;
}
function lucValidarSemDuplicidade(base,local){
  if(!base||!local)return 'Selecione uma Base LUC e uma loja cadastrada válida.';
  const outraBaseMesmoLocal=(db.baseLojas||[]).find(b=>b.id!==base.id && b.localId===local.id && b.statusAssociacao==='Vinculada');
  if(outraBaseMesmoLocal)return `Bloqueado: a loja cadastrada já está vinculada à LUC ${outraBaseMesmoLocal.luc} - ${outraBaseMesmoLocal.nome}.`;
  if(local.baseLojaId && local.baseLojaId!==base.id){
    const b=(db.baseLojas||[]).find(x=>x.id===local.baseLojaId);
    return `Bloqueado: este local já está alocado para ${b?('LUC '+b.luc+' - '+b.nome):'outra Base LUC'}.`;
  }
  const outroLocalMesmaBase=(db.locais||[]).find(l=>l.id!==local.id && l.baseLojaId===base.id);
  if(outroLocalMesmaBase)return `Bloqueado: a LUC ${base.luc} já está atribuída ao local ${lucOfficialName(outroLocalMesmaBase)}.`;
  if(base.localId && base.localId!==local.id && base.statusAssociacao==='Vinculada'){
    const l=(db.locais||[]).find(x=>x.id===base.localId);
    return `Bloqueado: a LUC ${base.luc} já está vinculada em ${l?lucOfficialName(l):'outro local'}.`;
  }
  return '';
}
